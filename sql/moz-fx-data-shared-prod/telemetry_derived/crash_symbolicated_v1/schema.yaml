fields:
- name: submission_timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The precise UTC timestamp at which a ping or record was received by
    Mozilla's ingestion pipeline, including microsecond precision. Used for fine-grained
    temporal analysis within a submission date.
- name: document_id
  type: STRING
  mode: NULLABLE
  description: A unique UUID identifying an individual telemetry ping submission.
    This identifier is used to deduplicate records and trace a specific ping through
    the data pipeline.
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: async_shutdown_timeout
  type: STRING
  mode: NULLABLE
  description: JSON string present when an async shutdown blocker failed to complete
    within the allowed time window, describing the blocking operation.
- name: ipc_channel_error
  type: STRING
  mode: NULLABLE
  description: The error message or reason associated with an IPC (Inter-Process Communication)
    channel failure, such as 'ShutDownKill' or 'GPUProcessKill'. A null value indicates
    no IPC channel error was recorded.
- name: oom_allocation_size
  type: STRING
  mode: NULLABLE
  description: The size (in bytes) of the memory allocation that triggered an out-of-memory
    (OOM) condition, represented as a string. Null indicates the allocation size was
    not available, which is the common case as OOM events are relatively rare.
- name: moz_crash_reason
  type: STRING
  mode: NULLABLE
  description: A human-readable string describing the reason for a Mozilla crash,
    such as an OOM condition or a blocking shutdown step. Null when no specific crash
    reason was recorded.
- name: reason
  type: STRING
  mode: NULLABLE
  description: The technical reason or signal associated with an event such as a crash,
    describing the specific exception type or OS signal (e.g., 'SIGSEGV / SEGV_MAPERR',
    'EXCEPTION_BREAKPOINT'). Null when no reason was recorded.
- name: crashing_thread
  type: INTEGER
  mode: NULLABLE
  description: The zero-based index of the thread that caused the crash within the
    crash's stack trace.
- name: threads
  type: RECORD
  mode: REPEATED
  description: Array of per-thread stack frame information from the symbolicated crash,
    including function names, file names, and line numbers resolved from debug symbols.
  fields:
  - name: frames
    type: RECORD
    mode: REPEATED
    description: The list of symbolicated stack frames for a given thread in the crash,
      ordered from innermost to outermost call.
    fields:
    - name: module_offset
      type: STRING
      mode: NULLABLE
      description: The hexadecimal offset of the frame's instruction pointer within
        the containing module, used for symbolication.
    - name: module
      type: STRING
      mode: NULLABLE
      description: The name of the binary module (DLL, dylib, or shared library) containing
        this stack frame.
    - name: function
      type: STRING
      mode: NULLABLE
      description: The symbolicated function name for this stack frame. Null if the
        frame could not be symbolicated.
    - name: function_offset
      type: STRING
      mode: NULLABLE
      description: The hexadecimal offset of the instruction pointer within the containing
        function, indicating how far into the function execution was.
    - name: file
      type: STRING
      mode: NULLABLE
      description: The source file name corresponding to this stack frame, if available
        from debug symbols.
    - name: line
      type: INTEGER
      mode: NULLABLE
      description: The source code line number within the file for this stack frame,
        if available from debug symbols.
    - name: inlines
      type: RECORD
      mode: REPEATED
      description: Array of inlined function frames within this stack frame, representing
        functions inlined by the compiler at this location.
      fields:
      - name: function
        type: STRING
        mode: NULLABLE
        description: The name of the inlined function at this location within the
          parent stack frame.
      - name: file
        type: STRING
        mode: NULLABLE
        description: The source file name of the inlined function.
      - name: line
        type: INTEGER
        mode: NULLABLE
        description: The source code line number of the inlined function call.
