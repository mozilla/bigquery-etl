fields:
- name: _fivetran_synced
  type: TIMESTAMP
  description: Timestamp when the record was last synchronized by Fivetran.
- name: account_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the user's logged in to an FxA account.
- name: active_hours
  type: FLOAT64
  description: Total number of hours in which the browser was active.
- name: active_hours_mean
  type: RECORD
  description: Array of statistical estimates for mean active hours including point
    estimates and confidence intervals.
- name: active_hours_sum
  type: FLOAT64
  description: Sum of the client's active hours, converted from active ticks (5-second
    intervals of user activity).
- name: activity_segment
  type: STRING
  description: Classification of users based on their browsing activity. E.g., infrequent,
    casual, regular.
  aliases:
  - segment
  possible_values:
  - casual_user
  - core_user
  - infrequent_user
  - regular_user
  - other
- name: ad_click
  type: INT64
  description: Count of advertisement clicks.
- name: ad_clicks
  type: INT64
  description: Number of times a user clicked on an advertisement.
- name: ad_clicks_mean
  type: RECORD
  description: Array of statistical estimates for mean ad clicks including point estimates
    and confidence intervals.
- name: additional_properties
  type: STRING
  description: JSON string containing payload properties not defined in the schema.
- name: addon_version
  type: STRING
  description: Semantic version of an add-on.
- name: adjust_ad_group
  type: STRING
  description: Adjust ad group ID from which the user installed Firefox-iOS.
- name: adjust_campaign
  type: STRING
  description: Adjust campaign ID from which the user installed Firefox-iOS.
- name: adjust_creative
  type: STRING
  description: Adjust creative ID from which the user installed Firefox-iOS.
- name: adjust_network
  type: STRING
  mode: NULLABLE
  description: The name of the Adjust Network that sourced the installation.
- name: advertiser
  type: STRING
  description: Name of the advertiser (e.g., Amazon, eBay, Best Buy).
- name: agg_type
  type: STRING
  description: Type of aggregation applied to the data.
- name: android_sdk_version
  type: STRING
  description: Android-specific SDK version of the software running on the device.
- name: app_build
  type: STRING
  description: Build identifier generated by the CI system or a system-specific default
    value.
- name: app_build_id
  type: STRING
  description: The build ID of the application.
- name: app_channel
  type: STRING
  description: Distribution channel through which the application is being distributed.
- name: app_id
  type: STRING
  description: API identifier of the browser application or channel.
- name: app_name
  type: STRING
  description: The name of the browser.
- name: app_version
  type: INTEGER
  description: User visible version string (e.g. "1.0.3") for the browser.
  aliases:
  - version
  - app_display_version
- name: app_version_major
  type: INTEGER
  description: The major version of the user visible app version string for the browser,
    e.g. "142.1.3", has major version 142
- name: app_version_minor
  type: INTEGER
  description: The minor version of the user visible app version string for the browser,
    e.g. "142.1.3" has minor version 1
- name: app_version_patch
  type: NUMERIC
  description: Patch version number of the application.
- name: application
  type: STRING
  description: Application for which metrics were collected.
- name: arch
  type: STRING
  description: Device architecture.
- name: architecture
  type: STRING
  description: The architecture of the device, (e.g. "arm", "x86").
- name: args
  type: STRING
  description: Query parameter part of the submission URI.
- name: attributed
  type: BOOL
  description: Indicator of whether attribution source and medium are available.
- name: attribution
  type: RECORD
  description: Attribution data included with the installer such as campaign, content,
    medium, source, and term.
- name: attribution_campaign
  type: STRING
  description: The attribution campaign; similar or the same as UTM campaign.
- name: attribution_content
  type: STRING
  description: The attribution content; similar or the same as UTM content.
- name: attribution_dlsource
  type: STRING
  description: Identifier indicating where installations of Firefox originate (e.g.,
    mozorg, mozillaci).
- name: attribution_dltoken
  type: STRING
  description: Unique token generated at Firefox download time.
- name: attribution_experiment
  type: STRING
  description: The attribution experiment key.
- name: attribution_medium
  type: STRING
  description: The attribution medium; similar or the same as UTM medium.
- name: attribution_msclkid
  type: STRING
  description: Unique token created at Firefox download time using the Microsoft Store.
- name: attribution_source
  type: STRING
  description: The attribution source; similar or the same as UTM source.
- name: attribution_ua
  type: STRING
  description: Identifier derived from the user agent downloading the Firefox installer.
- name: attribution_variation
  type: STRING
  description: The attribution variation key.
- name: branch
  type: STRING
  description: Study branch or variation assigned to the user.
- name: browser
  type: STRING
  description: Name of the browser used (e.g., Chrome, Firefox, Safari).
- name: browser_engagement_active_ticks
  type: INT64
  description: Count of five-second intervals during which the user interacted with
    the browser via keyboard or mouse.
- name: browser_engagement_uri_count
  type: INT64
  description: Total number of non-unique HTTP(S) URIs visited including reloads after
    session restore.
- name: build_id
  type: INT64
  description: Build identifier or date in YYYYMMDDHHMMSS format.
- name: campaign
  type: STRING
  description: Identifier or name of the campaign that led to acquisition or attribution.
- name: campaign_id
  type: STRING
  description: Unique identifier of an advertising campaign.
- name: campaign_name
  type: STRING
  description: Human-readable name of an advertising campaign.
- name: city
  type: STRING
  description: City where the activity took place, determined by IP geolocation.
- name: clicks
  type: INT64
  description: Count of times content or search results were clicked.
- name: client_id
  type: STRING
  description: A unique identifier (UUID) for the client.
- name: client_info
  type: RECORD
  description: Client device and application information including SDK version, app
    build, device details, OS, locale, session data, and attribution/distribution
    metadata.
- name: content_crashes
  type: INT64
  description: Count of crashes occurring in content processes.
- name: content_length
  type: STRING
  description: Content-Length HTTP header value.
- name: context_id
  type: STRING
  description: A unique identifier (UUID) for clients in contextual services user
    interaction pings, e.g. top-sites ping.
- name: country
  type: STRING
  description: Name of the country in which the activity took place, as determined
    by the IP geolocation.
  aliases:
  - normalized_country
  - geo
- name: country_code
  type: STRING
  description: Code of the country in which the activity took place, as determined
    by the IP geolocation. Unknown or NULL values are normally stored as '??'.
  aliases:
  - normalized_country_code
- name: country_name
  type: STRING
  description: Name of the country associated with the user or activity.
- name: created
  type: TIMESTAMP
  description: Timestamp indicating when an entity was created.
- name: created_at
  type: TIMESTAMP
  description: Timestamp when the row was created.
  aliases:
  - created_timestamp
  - created_date
- name: createdAt
  type: TIMESTAMP
  description: Timestamp when the account was created.
- name: creation_date
  type: STRING
  description: User profile creation date as the number of days since Unix epoch.
- name: daily_users
  type: INT64
  description: Count of users that reported activity on a specified date.
- name: date
  type: STRING
  description: Date value from the HTTP header.
- name: dau
  type: INTEGER
  description: The number of daily active users, corresponding to the count of clients
    that reported at least one ping on the submission_date and qualify as active.
- name: days_active_bits
  type: INT64
  description: Bit pattern representing whether the client met activity criteria for
    each of the last 28 days.
- name: days_created_profile_bits
  type: INT64
  description: Bit field indicating the number of days elapsed since profile creation.
- name: days_of_use
  type: INT64
  description: Total number of days the user has actively used the application.
- name: days_of_use_mean
  type: RECORD
  description: Array of statistical estimates for mean days of use including point
    estimates and confidence intervals.
- name: days_seen_bits
  type: INT64
  description: Bit pattern representing client activity over the last 28 days.
- name: days_seen_bytes
  type: BYTES
  description: Days of client activity over the past year represented as bytes.
- name: days_seen_session_end_bits
  type: INT64
  description: Bit field encoding which days a session was seen ending.
- name: days_seen_session_start_bits
  type: INT64
  description: Bit field encoding which days a session was seen starting.
- name: days_sent_metrics_ping_bits
  type: INT64
  description: Value indicating whether the client sent a metrics ping on the specified
    date.
- name: days_since_active
  type: INT64
  description: Number of days since the client was last active.
- name: days_since_created_profile
  type: INT64
  description: Number of days elapsed since the user profile was created.
- name: days_since_seen
  type: INT64
  description: Number of days since the client was last seen.
- name: days_since_seen_session_end
  type: INT64
  description: Number of days since the last observed session end.
- name: days_since_seen_session_start
  type: INT64
  description: Number of days since the last observed session start.
- name: days_since_visited_1_uri
  type: INT64
  description: Number of days since the user visited at least one URI.
- name: days_visited_1_uri_bits
  type: INT64
  description: Bit pattern for days on which the client visited exactly one URI.
- name: default_search_engine
  type: STRING
  description: String identifier or name of the default search engine provider.
- name: description
  type: STRING
  description: Human-readable description or name of an entity.
- name: device
  type: STRING
  description: Device category such as desktop or mobile.
- name: device_category
  type: STRING
  description: Category of device used (desktop, mobile, or tablet).
- name: device_manufacturer
  type: STRING
  description: Manufacturer of the device the application is running on.
- name: device_model
  type: STRING
  description: Marketing name or model identifier of the device the application is
    running on.
- name: device_type
  type: STRING
  description: Classification of device type (desktop, mobile, tablet, or other).
- name: distribution
  type: RECORD
  description: Distribution channel name and extended metadata.
- name: distribution_id
  type: STRING
  description: The distribution id associated with the install of Firefox.
- name: distribution_partner_id
  type: STRING
  description: Value of the mozilla.partner.id preference.
- name: distribution_version
  type: STRING
  description: Version of partner distribution, defaulting to 0 for Mozilla distributions.
- name: distributor
  type: STRING
  description: Value of the app.distributor preference.
- name: distributor_channel
  type: STRING
  description: Value of the app.distributor.channel preference.
- name: dnt
  type: STRING
  description: Do Not Track (DNT) HTTP header value.
- name: document_event_number
  type: INT64
  description: Sequential event identifier within a document.
- name: document_id
  type: STRING
  description: The document ID specified in the URI when the client sent this message.
- name: document_namespace
  type: STRING
  description: Document namespace identifier.
- name: document_type
  type: STRING
  description: Classification of the document content or telemetry schema type.
- name: document_version
  type: STRING
  description: Version number of the document schema.
- name: durations
  type: INT64
  description: Sum of the duration of the last foreground session in seconds across
    each unique baseline ping.
- name: environment
  type: STRING
  description: Server environment in which the response was generated (Sandbox or
    Production).
- name: error_message
  type: STRING
  description: Human-readable description of the error.
- name: error_type
  type: STRING
  description: Type of error that triggered the ping.
- name: event
  type: STRING
  description: Event identifier.
- name: event_category
  type: STRING
  description: Category classification of the recorded event.
- name: event_extra
  type: JSON
  description: Additional contextual data associated with an event stored as JSON.
- name: event_extra_key
  type: STRING
  description: Key name for event extra metadata.
- name: event_id
  type: STRING
  description: UUID uniquely identifying each event.
- name: event_name
  type: STRING
  description: Name of the event.
- name: event_timestamp
  type: TIMESTAMP
  description: Timestamp when the event occurred.
- name: events
  type: RECORD
  description: Array of discrete events with category, name, timestamp, and optional
    key-value extra data.
- name: exception_class
  type: STRING
  description: Category or type of exception that occurred.
- name: experiment
  type: STRING
  description: Funnel experiment parameters.
- name: experiment_branch
  type: STRING
  description: Experiment branch this data is associated with.
- name: experiments
  type: RECORD
  description: Array of active experiments with branch assignment and enrollment metadata.
- name: first_run_date
  type: DATE
  mode: NULLABLE
  description: The date of the first run of the application.
- name: first_seen_date
  type: DATE
  mode: NULLABLE
  description: Date when the server first received a ping from this client.
- name: first_seen_year
  type: INT64
  description: Year extracted from the date when the first ping was received from
    the client.
- name: geo_city
  type: STRING
  description: City of the location where the event was reported.
- name: geo_country
  type: STRING
  description: ISO 3166-1 alpha-2 country code of the location where the event was
    reported.
- name: geo_subdivision
  type: STRING
  description: First-level country subdivision (state/province) based on IP geolocation.
- name: geo_subdivision1
  type: STRING
  description: First-level country subdivision such as US state, Canadian province,
    or similar administrative division.
- name: geo_subdivision2
  type: STRING
  description: Second-level country subdivision such as US county or similar administrative
    division.
- name: histogram
  type: RECORD
  description: Distribution data with bucket counts, sum, type, range boundaries,
    and frequency values.
- name: host
  type: STRING
  description: Hostname parsed from the origin URL, including subdomains.
- name: id
  type: STRING
  description: Unique identifier such as story tile ID or theme ID.
- name: impressions
  type: INT64
  description: Count of times an ad or content was displayed or seen.
- name: input
  type: STRING
  description: Input value or parameter provided to a process.
- name: input_type
  type: STRING
  description: Data type or classification of the input.
- name: install_source
  type: STRING
  description: Source from which the browser or profile was installed.
- name: is_bot_generated
  type: BOOL
  description: Indicates whether the client is a bot.
- name: is_default_browser
  type: BOOLEAN
  description: A flag indicating whether the browser is set as the default browser
    on the client side.
- name: is_desktop
  type: BOOLEAN
  description: Indicates if the client is included in the desktop KPI.
- name: is_mobile
  type: BOOLEAN
  description: Indicates if the client is included in the mobile KPI.
- name: is_new_profile
  type: BOOL
  description: Indicates whether the submission date is the same as the client's first
    seen date.
- name: isp_name
  type: STRING
  description: The name of the internet service provider associated with the client's
    IP address.
  aliases:
  - isp
- name: isp_organization
  type: STRING
  description: Internet Service Provider organization name.
- name: job_name
  type: STRING
  description: Name or identifier of a scheduled or batch job.
- name: language
  type: STRING
  description: Language setting or code of the device or user.
- name: legacy_telemetry_client_id
  type: STRING
  description: UUID uniquely identifying the legacy telemetry client for supporting
    legacy telemetry in deletion-request pings.
- name: load_date
  type: DATE
  description: Date the record was loaded.
- name: locale
  type: STRING
  description: Set of language- and/or country-based preferences for a user interface.
- name: lower
  type: FLOAT64
  description: Lower bound of a confidence interval or range estimate.
- name: main_crashes
  type: INT64
  description: Count of crashes occurring in the main process.
- name: mau
  type: INTEGER
  description: The number of monthly active users, corresponding to the count of clients
    that reported at least one ping on the previous 28 days from the submission_date
    and qualify as active.
- name: medium
  type: STRING
  description: Attribution medium category (e.g., organic for search engines).
- name: memory_total
  type: RECORD
  description: Histogram of total memory across all processes in kilobytes.
- name: memory_total_percentile
  type: RECORD
  description: Array of statistical estimates for memory total percentiles including
    point estimates and confidence intervals.
- name: metadata
  type: RECORD
  description: Structured data containing geographical, header, ISP, and user agent
    information extracted from request context.
- name: method
  type: STRING
  description: HTTP method or event type (e.g., POST).
- name: metric
  type: STRING
  description: Name of the specific metric being measured or collected.
- name: metrics
  type: RECORD
  description: Structured collection of labeled counters tracking Glean validation
    errors and string-based telemetry metrics including client annotation IDs and
    uploader capabilities.
- name: monthly_users
  type: INT64
  description: Count of users that reported activity within the previous 28 days.
- name: n_metrics_ping
  type: INT64
  description: Number of metrics pings received from the client on the submission
    date.
- name: name
  type: STRING
  description: Human-readable identifier such as CPU name, add-on name, OS name, search
    engine name, or theme name.
- name: new_profiles
  type: INT64
  description: Count of newly created profiles on a specified date.
- name: normalized_app_id
  type: STRING
  description: Normalized application ID of the channel from which data was received.
- name: normalized_app_name
  type: STRING
  description: Standardized application name, set to 'Other' for unrecognized app
    names.
- name: normalized_channel
  description: The normalized channel the application is being distributed on.
  type: STRING
  aliases:
  - channel
  possible_values:
  - release
  - beta
  - nightly
  - aurora
  - esr
  - Other
- name: normalized_os
  type: STRING
  description: The normalized name of the operating system running at the client.
  aliases:
  - os
- name: oom_crashes
  type: INT64
  description: Count of crashes caused by out-of-memory conditions.
- name: organic
  type: INT64
  description: Count of organic searches.
- name: os_code
  type: STRING
  mode: NULLABLE
  description: The operating system code based on the Common Platform Enumeration
    CPE.
- name: os_major
  type: INTEGER
  description: Major or first part of the operating system version running at the
    client. E.g. for version "100.9.11", the major is 100.
  aliases:
  - os_major_version
  - os_version_major
- name: os_minor
  type: INTEGER
  description: Minor part of the operating system version running at the client. E.g.
    for version "100.9.11", the minor is 9.
  aliases:
  - os_minor_version
  - os_version_minor
- name: os_name
  type: STRING
  description: Name of the operating system used by the client or device.
- name: os_version
  type: INTEGER
  description: Version of the operating system version running at the client. E.g.
    "100.9.11".
  aliases:
  - normalized_os_version
- name: osversion
  type: STRING
  description: Operating system version.
- name: paid_vs_organic
  type: STRING
  description: Whether the client attribution source is paid or organic.
- name: paid_vs_organic_gclid
  type: STRING
  description: Categorized as paid if the attribution install referrer response contained
    a Google click ID (gclid).
- name: parameter
  type: STRING
  description: Named parameter or variable used in analysis.
- name: partition_date
  type: TIMESTAMP
  description: Date partition for data organization and querying efficiency.
- name: payload
  type: BYTES
  description: Gzip-compressed JSON payload containing event data.
- name: ping_info
  type: RECORD
  description: Telemetry ping metadata including timing, type, reason, sequence number,
    active experiments, and server configuration for metrics and pings.
- name: plan_id
  type: STRING
  description: Identifier for a subscription or service plan.
- name: plan_interval
  type: STRING
  description: Text summary of the subscription plan's interval (e.g., 1 month, 6
    months, 1 year).
- name: platform
  type: STRING
  description: Operating system or platform on which the application is running.
- name: play_store_attribution_campaign
  type: STRING
  description: Name of the utm_campaign responsible for the installation.
- name: point
  type: FLOAT64
  description: Point estimate or central value in statistical analysis.
- name: policies_is_enterprise
  type: BOOL
  description: Determination of whether the user is an enterprise user based on various
    signals.
- name: position
  type: INT64
  description: Zero-based or one-based integer indicating the position or placement
    of the event or item.
- name: probe
  type: STRING
  description: Name of the telemetry probe.
- name: product
  type: STRING
  description: Mozilla ad product or service name.
- name: product_id
  type: STRING
  description: Unique identifier for a product.
- name: product_name
  type: STRING
  description: Name of the product (Firefox).
- name: profile_creation_date
  type: INT64
  description: Profile age in days since Unix epoch.
- name: profile_group_id
  type: STRING
  description: A UUID uniquely identifying the profile group, not shared with other
    telemetry data.
- name: protocol
  type: STRING
  description: HTTP protocol version (e.g., HTTP/1.1).
- name: provider
  type: STRING
  description: Name or identifier of the external service provider.
- name: qualified_cumulative_days_of_use
  type: INT64
  description: Total days of use meeting specific qualification criteria.
- name: qualified_cumulative_days_of_use_mean
  type: RECORD
  description: Array of statistical estimates for mean qualified cumulative days of
    use including point estimates and confidence intervals.
- name: reason
  type: STRING
  description: Trigger reason for the ping (e.g., saved-session, environment-change,
    shutdown).
- name: region
  type: STRING
  description: Geographical region associated with the user or activity.
- name: release_channel
  type: STRING
  description: Firefox release channel (e.g., release, beta, nightly).
- name: remote_addr
  type: STRING
  description: Deprecated; source IP address from load balancer.
- name: retained
  type: INT64
  description: Binary indicator or count of user retention status.
- name: retained_mean
  type: RECORD
  description: Array of statistical estimates for mean retention including point estimates
    and confidence intervals.
- name: retained_week_4
  type: INT64
  description: Count of profiles that were active between days 22 and 28 after first
    seen.
- name: sample_id
  type: INTEGER
  description: A number, 0-99, that samples by client_id and allows filtering data
    for analysis. It is a pipeline-generated artifact that should match between pings.
- name: sap
  type: INT64
  description: Search Access Point identifier.
- name: search_count
  type: INT64
  description: Number of searches performed by the client in the last 3 days.
- name: search_count_mean
  type: RECORD
  description: Array of statistical estimates for mean search count including point
    estimates and confidence intervals.
- name: search_with_ads
  type: INT64
  description: Number of searches that displayed advertisements.
- name: sessions
  type: INT64
  description: Count of unique user sessions.
- name: shutdown_hangs
  type: INT64
  description: Count of application hangs occurring during shutdown.
- name: source
  type: STRING
  description: Origin or location where an event, impression, suggestion, or interaction
    occurred.
- name: source_column
  type: STRING
  description: Column name in the source used to ingest the data.
- name: source_report
  type: STRING
  description: Name of the report file used to ingest the data.
  aliases:
  - source_file
- name: stack_trace
  type: STRING
  description: Full call stack at the time of an exception or crash.
- name: stack_trace_cause_1
  type: STRING
  description: First level cause in the exception call stack.
- name: stack_trace_cause_2
  type: STRING
  description: Second level cause in the exception call stack.
- name: stack_trace_cause_3
  type: STRING
  description: Third level cause in the exception call stack.
- name: stack_trace_cause_4
  type: STRING
  description: Fourth level cause in the exception call stack.
- name: stack_trace_cause_5
  type: STRING
  description: Fifth level cause in the exception call stack.
- name: startup_crashes
  type: INT64
  description: Count of crashes occurring during application startup.
- name: startup_profile_selection_reason_first
  type: STRING
  description: Reason how the profile was selected during startup.
- name: state
  type: STRING
  description: Current state or status of a job, DAG run, device, or configuration.
- name: statistic
  type: STRING
  description: Type of statistical measure or aggregation applied.
- name: status
  type: STRING
  description: Current state or condition such as subscription status, user status,
    or ticket status.
- name: submission_date
  type: DATE
  description: The date when the telemetry ping is received on the server side.
- name: submission_hour
  type: TIMESTAMP
  description: The submission_timestamp truncated to the hour.
- name: submission_month
  type: DATE
  description: First calendar day of the month extracted from submission_date or submission_timestamp.
- name: submission_timestamp
  type: TIMESTAMP
  description: Timestamp when the ping is received on the server side.
- name: subscription
  type: RECORD
  description: Complete subscription details including service, pricing, billing period,
    payment status, discounts, attribution, and lifecycle dates.
- name: subscription_id
  type: STRING
  description: Unique identifier for the subscription.
- name: tagged_follow_on
  type: INT64
  description: Count of tagged follow-on searches.
- name: tagged_sap
  type: INT64
  description: Count of tagged search access point events.
