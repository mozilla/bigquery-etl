- name: payload
  type: RECORD
  mode: NULLABLE
  description: ''
  fields:
  - name: crashDate
    type: STRING
    mode: NULLABLE
    description: The calendar date of the crash in ISO 8601 format (YYYY-MM-DD), sourced from the crash ping
      payload.
  - name: crashTime
    type: STRING
    mode: NULLABLE
    description: The time of the crash in ISO 8601 format with per-hour resolution, sourced from the crash
      ping payload.
  - name: hasCrashEnvironment
    type: BOOLEAN
    mode: NULLABLE
    description: True if the crash ping includes a full environment block; false indicates the environment
      was not captured at crash time.
  - name: metadata
    type: RECORD
    mode: NULLABLE
    description: ''
    fields:
    - name: key_value
      type: RECORD
      mode: REPEATED
      description: Array of key-value pairs from the crash ping payload metadata containing additional crash
        annotations not individually promoted to top-level columns.
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
        description: ''
      - name: value
        type: STRING
        mode: NULLABLE
        description: ''
  - name: processType
    type: STRING
    mode: NULLABLE
    description: The type of Firefox process that crashed, such as 'main', 'content', 'gpu', or 'rdd', sourced
      from the crash ping payload.
  - name: version
    type: INT64
    mode: NULLABLE
    description: The schema version of the crash ping payload, used to interpret the payload structure.
