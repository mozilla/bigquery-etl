fields:
- name: pr_number
  type: INTEGER
  mode: REQUIRED
  description: GitHub pull request number.
- name: repo_name
  type: STRING
  mode: REQUIRED
  description: Repository name in owner/repo format (e.g. mozilla/bigquery-etl).
- name: title
  type: STRING
  mode: REQUIRED
  description: PR title text that was embedded.
- name: body
  type: STRING
  mode: NULLABLE
  description: PR description text that was embedded. Retained to detect staleness.
- name: body_embedding
  type: FLOAT
  mode: REPEATED
  description: 768-dimensional vector embedding of the PR description generated by Vertex AI text-embedding-004.
- name: model_version
  type: STRING
  mode: REQUIRED
  description: Vertex AI embedding model used to generate the vector (e.g. text-embedding-004).
- name: merged_date
  type: DATE
  mode: REQUIRED
  description: Date the pull request was merged. Used as the partition field.
