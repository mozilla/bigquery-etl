fields:
- name: id
  type: STRING
  mode: NULLABLE
  description: |-
    History record ID.
- name: valid_from
  type: TIMESTAMP
  mode: NULLABLE
  description: |-
    Start of the time range this history record is considered valid for (inclusive).
- name: valid_to
  type: TIMESTAMP
  mode: NULLABLE
  description: |-
    End of the time range this history record is considered valid for (non-inclusive).
    Open-ended history records will have this set to the max timestamp value (9999-12-31 23:59:59.999999).
- name: stripe_subscriptions_revised_changelog_id
  type: STRING
  mode: NULLABLE
  description: |-
    ID of the `stripe_subscriptions_revised_changelog_v1` record this history record was derived from.
- name: stripe_customers_revised_changelog_id
  type: STRING
  mode: NULLABLE
  description: |-
    ID of the `stripe_customers_revised_changelog_v1` record this history record was derived from.
- name: subscription
  type: RECORD
  mode: NULLABLE
  description: |-
    Stripe subscription as it ostensibly was during the time range this history record is considered valid for.
  fields: !flatten-lists
  - !include-field
    table: moz-fx-data-shared-prod.subscription_platform_derived.stripe_subscriptions_revised_changelog_v1
    field: subscription.id
  - name: customer
    type: RECORD
    mode: NULLABLE
    description: |-
      Stripe customer record as it ostensibly was during the time range this history record is considered valid for.
    fields: !include-fields
      table: moz-fx-data-shared-prod.subscription_platform_derived.stripe_customers_history_v1
      parent_field: customer
  - !include-fields
    table: moz-fx-data-shared-prod.subscription_platform_derived.stripe_subscriptions_revised_changelog_v1
    parent_field: subscription
    exclude_field_names:
    - id
    - customer_id
