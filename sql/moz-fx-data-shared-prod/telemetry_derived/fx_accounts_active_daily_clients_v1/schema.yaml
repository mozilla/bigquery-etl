fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: legacy_telemetry_client_id
  type: STRING
  mode: NULLABLE
  description: The unique client identifier used in Firefox's legacy telemetry system,
    formatted as a UUID. This is used to track individual browser installations across
    telemetry pings.
- name: android_sdk_version
  type: STRING
  mode: NULLABLE
  description: The optional Android specific SDK version of the software running on
    this hardware device.
- name: app_build
  type: STRING
  mode: NULLABLE
  description: The build identifier generated by the CI system (e.g. "1234/A").
- name: app_channel
  type: STRING
  mode: NULLABLE
  description: The release channel of the application build, indicating the target
    audience and stability level. Possible values include 'release', 'beta', and 'nightly'.
- name: app_display_version
  type: STRING
  mode: NULLABLE
  description: The human-readable version string of the application as displayed to
    users, including major, minor, and patch components (e.g., '151.0.1' or '115.36.0esr').
- name: architecture
  type: STRING
  mode: NULLABLE
  description: The CPU architecture of the system on which the application is running
    (e.g., 'x86-64', 'aarch64', 'arm'). Identifies the instruction set architecture
    of the client device.
- name: build_date
  type: STRING
  mode: NULLABLE
  description: The date & time the application was built
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- name: device_manufacturer
  type: STRING
  mode: NULLABLE
  description: The manufacturer of the device the application is running on.
- name: device_model
  type: STRING
  mode: NULLABLE
  description: The model identifier of the device on which the browser is running
    (e.g., 'iPhone14,5'). This field may be null for desktop or unrecognized device
    types where model information is unavailable.
- name: first_run_date
  type: STRING
  mode: NULLABLE
  description: The date of the first run of the application.
- name: locale
  type: STRING
  mode: NULLABLE
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: os_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- name: session_count
  type: INTEGER
  mode: NULLABLE
  description: Session Count
- name: session_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier (UUID) representing a single browser session. This
    ID can be used to link events and activity records belonging to the same session.
- name: telemetry_sdk_build
  type: STRING
  mode: NULLABLE
  description: The version of the Glean SDK at the time the ping was collected (e.g.
    25.0.0).
- name: windows_build_number
  type: INTEGER
  mode: NULLABLE
  description: The Windows OS build number of the client's operating system, such
    as 19045 for a specific Windows 10 release. Null values indicate the client was
    not running a Windows operating system.
- name: metadata
  type: RECORD
  mode: NULLABLE
  description: Metadata
  fields:
  - name: geo
    type: RECORD
    mode: NULLABLE
    description: Results of a geographic lookup based on the client's IP address
    fields:
    - name: city
      type: STRING
      mode: NULLABLE
      description: The city associated with the client's IP address or profile geography
        at the time of the record. May be null when city-level geolocation is unavailable
        or suppressed.
    - name: country
      type: STRING
      mode: NULLABLE
      description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
        from the client's IP address or profile geography. Used for geographic segmentation
        of telemetry data.
    - name: db_version
      type: STRING
      mode: NULLABLE
      description: The version identifier of the database or data snapshot used to
        produce the record, expressed as an ISO 8601 UTC timestamp string. This indicates
        when the underlying reference data was last updated.
    - name: subdivision1
      type: STRING
      mode: NULLABLE
      description: The first-level administrative subdivision (e.g., state, province,
        or region) derived from the client's geographic location, represented as a
        code. Null indicates the subdivision could not be determined.
    - name: subdivision2
      type: STRING
      mode: NULLABLE
      description: Second major country subdivision; not applicable for most countries
  - name: header
    type: RECORD
    mode: NULLABLE
    description: Headers included in the client's HTTP request
    fields:
    - name: date
      type: STRING
      mode: NULLABLE
      description: The calendar date associated with the record, formatted as a YYYY-MM-DD
        string. This typically represents the day on which the activity or metric
        was measured.
    - name: dnt
      type: STRING
      mode: NULLABLE
      description: DNT (Do Not Track) Header
    - name: x_debug_id
      type: STRING
      mode: NULLABLE
      description: X-Debug-ID HTTP Header
    - name: x_foxsec_ip_reputation
      type: STRING
      mode: NULLABLE
      description: X-Foxsec-IP-Reputation header
    - name: x_lb_tags
      type: STRING
      mode: NULLABLE
      description: X-LB-Tags HTTP Header
    - name: x_pingsender_version
      type: STRING
      mode: NULLABLE
      description: X-PingSender-Version HTTP Header
    - name: x_source_tags
      type: STRING
      mode: NULLABLE
      description: X-Source-Tags HTTP header
    - name: x_telemetry_agent
      type: STRING
      mode: NULLABLE
      description: X-Telemetry-Agent HTTP header
    - name: parsed_date
      type: TIMESTAMP
      mode: NULLABLE
      description: Parsed Date
    - name: parsed_x_source_tags
      type: STRING
      mode: REPEATED
      description: Parsed X Source Tags
    - name: parsed_x_lb_tags
      type: RECORD
      mode: NULLABLE
      description: Parsed X LB Tags
      fields:
      - name: tls_version
        type: STRING
        mode: NULLABLE
        description: TLS Version
      - name: tls_cipher_hex
        type: STRING
        mode: NULLABLE
        description: TLS Cipher Hex
  - name: isp
    type: RECORD
    mode: NULLABLE
    description: The name of the Internet Service Provider associated with the client's
      IP address. This field provides a granular ISP identification and may include
      regional carriers.
    fields:
    - name: db_version
      type: STRING
      mode: NULLABLE
      description: The version identifier of the database or data snapshot used to
        produce the record, expressed as an ISO 8601 UTC timestamp string. This indicates
        when the underlying reference data was last updated.
    - name: name
      type: STRING
      mode: NULLABLE
      description: A human-readable name string associated with the entity being described,
        such as an add-on or extension name. May be null or a placeholder string when
        the name is unavailable or not yet resolved.
    - name: organization
      type: STRING
      mode: NULLABLE
      description: 'The name of a specific business entity associated with the client''s
        IP address when available;

        otherwise the ISP name'
  - name: user_agent
    type: RECORD
    mode: NULLABLE
    description: The browser or user agent type used to access a resource, with values
      such as firefox, chrome, edge, ie, or other. Null indicates the user agent was
      not captured.
    fields:
    - name: browser
      type: STRING
      mode: NULLABLE
      description: Browser
    - name: os
      type: STRING
      mode: NULLABLE
      description: The raw operating system name as reported by the client, such as
        'Windows_NT', 'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed
        OS string before normalization.
    - name: version
      type: STRING
      mode: NULLABLE
      description: The version string of the software, add-on, or component being
        measured. Follows standard versioning conventions such as major.minor.patch.
- name: labeled_counter
  type: RECORD
  mode: NULLABLE
  description: Labeled Counter
  fields:
  - name: glean_error_invalid_label
    type: RECORD
    mode: REPEATED
    description: 'Counts the number of times a metric was set with an invalid label.

      The labels are the `category.name` identifier of the metric.'
    fields:
    - name: key
      type: STRING
      mode: NULLABLE
      description: A string identifier representing the specific action, search engine,
        or event type associated with a record, such as a search entry point or provider
        key. An empty string indicates no specific key was recorded.
    - name: value
      type: INTEGER
      mode: NULLABLE
      description: A generic integer value associated with a measurement, event, or
        metric. The specific meaning depends on the context of the surrounding fields.
  - name: glean_error_invalid_overflow
    type: RECORD
    mode: REPEATED
    description: 'Counts the number of times a metric was set a value that overflowed.

      The labels are the `category.name` identifier of the metric.'
    fields:
    - name: key
      type: STRING
      mode: NULLABLE
      description: A string identifier representing the specific action, search engine,
        or event type associated with a record, such as a search entry point or provider
        key. An empty string indicates no specific key was recorded.
    - name: value
      type: INTEGER
      mode: NULLABLE
      description: A generic integer value associated with a measurement, event, or
        metric. The specific meaning depends on the context of the surrounding fields.
  - name: glean_error_invalid_state
    type: RECORD
    mode: REPEATED
    description: 'Counts the number of times a timing metric was used incorrectly.

      The labels are the `category.name` identifier of the metric.'
    fields:
    - name: key
      type: STRING
      mode: NULLABLE
      description: A string identifier representing the specific action, search engine,
        or event type associated with a record, such as a search entry point or provider
        key. An empty string indicates no specific key was recorded.
    - name: value
      type: INTEGER
      mode: NULLABLE
      description: A generic integer value associated with a measurement, event, or
        metric. The specific meaning depends on the context of the surrounding fields.
  - name: glean_error_invalid_value
    type: RECORD
    mode: REPEATED
    description: 'Counts the number of times a metric was set with an invalid label.

      The labels are the `category.name` identifier of the metric.'
    fields:
    - name: key
      type: STRING
      mode: NULLABLE
      description: A string identifier representing the specific action, search engine,
        or event type associated with a record, such as a search entry point or provider
        key. An empty string indicates no specific key was recorded.
    - name: value
      type: INTEGER
      mode: NULLABLE
      description: A generic integer value associated with a measurement, event, or
        metric. The specific meaning depends on the context of the surrounding fields.
- name: glean_client_annotation_experimentation_id
  type: STRING
  mode: NULLABLE
  description: 'An experimentation identifier derived and provided by the application
    for the purpose of experimentation

    enrollment.'
- name: experiments
  type: RECORD
  mode: REPEATED
  description: An array of key-value pairs representing all active experiment enrollments
    for the client at the time of the ping, where the key is the experiment slug and
    the value is the assigned branch. This captures the full set of concurrent experiment
    enrollments.
  fields:
  - name: key
    type: STRING
    mode: NULLABLE
    description: A string identifier representing the specific action, search engine,
      or event type associated with a record, such as a search entry point or provider
      key. An empty string indicates no specific key was recorded.
  - name: value
    type: RECORD
    mode: NULLABLE
    description: A generic integer value associated with a measurement, event, or
      metric. The specific meaning depends on the context of the surrounding fields.
    fields:
    - name: branch
      type: STRING
      mode: NULLABLE
      description: The experiment branch to which a client was assigned (e.g., 'control',
        'treatment-a', 'rollout'). Used to segment clients for A/B test and rollout
        analyses.
    - name: extra
      type: RECORD
      mode: NULLABLE
      description: Extra
      fields:
      - name: enrollment_id
        type: STRING
        mode: NULLABLE
        description: Enrollment ID
      - name: type
        type: STRING
        mode: NULLABLE
        description: The category of a browser add-on or extension, indicating its
          nature. Common values include 'extension', 'locale', 'dictionary', and 'service'.
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- name: normalized_app_name
  type: STRING
  mode: NULLABLE
  description: A human-readable, standardized name for the Firefox application that
    submitted the telemetry, such as 'Firefox Desktop', 'Fenix', 'Firefox iOS', or
    'Focus Android'. This normalizes across different app identifiers.
- name: app_version_major
  type: NUMERIC
  mode: NULLABLE
  description: The major version number component of the application version (e.g.,
    151 for version '151.0.2'). Increments with each major Firefox release cycle.
- name: app_version_minor
  type: NUMERIC
  mode: NULLABLE
  description: The minor version number component of the application version (e.g.,
    0 for version '151.0'). Typically 0 for major releases and non-zero for extended
    support or point releases.
- name: app_version_patch
  type: NUMERIC
  mode: NULLABLE
  description: The patch-level version number component of the application version
    (e.g., 2 for version '151.0.2'). Null when the release does not include a patch
    component.
- name: normalized_os
  type: STRING
  mode: NULLABLE
  description: The standardized operating system name for the client device, such
    as 'Windows', 'Mac', or 'Linux'. This normalizes raw OS strings into a consistent
    set of values.
- name: normalized_os_version
  type: STRING
  mode: NULLABLE
  description: The standardized version string of the client's operating system, such
    as '10.0' for Windows 10 or '6.8.0' for a Linux kernel version. Provides a normalized
    representation across different OS reporting formats.
- name: normalized_country_code
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code representing the country associated
    with the client's IP address at the time of submission, such as 'US', 'DE', or
    'BR'.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- name: attribution
  type: RECORD
  mode: NULLABLE
  description: Attribution information
  fields:
  - name: campaign
    type: STRING
    mode: NULLABLE
    description: The marketing campaign name associated with a user's acquisition
      or install event (e.g., 'SET_DEFAULT_BROWSER', 'non-fx-button'). Null when no
      campaign attribution is available.
  - name: content
    type: STRING
    mode: NULLABLE
    description: A string representing the UTM content parameter or creative identifier
      associated with a marketing touchpoint or link. May be null or URL-encoded when
      not explicitly set.
  - name: medium
    type: STRING
    mode: NULLABLE
    description: The marketing or traffic medium through which a user arrived, such
      as 'referral', 'cpc', or 'firefox-desktop'. Used to classify the acquisition
      channel for attribution purposes.
  - name: source
    type: STRING
    mode: NULLABLE
    description: The referring domain or source URL from which a user navigated to
      a Mozilla property. Null indicates the source was not captured or not applicable.
  - name: term
    type: STRING
    mode: NULLABLE
    description: The attribution term (e.g. 'browser with developer tools for android').
  - name: ext
    type: JSON
    mode: NULLABLE
    description: EXT
- name: distribution
  type: RECORD
  mode: NULLABLE
  description: Distribution Name
  fields:
  - name: name
    type: STRING
    mode: NULLABLE
    description: A human-readable name string associated with the entity being described,
      such as an add-on or extension name. May be null or a placeholder string when
      the name is unavailable or not yet resolved.
  - name: ext
    type: JSON
    mode: NULLABLE
    description: EXT
