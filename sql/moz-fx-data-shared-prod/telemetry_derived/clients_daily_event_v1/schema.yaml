fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The date when the telemetry ping is received on the server side.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: A number, 0-99, that samples by client_id and allows filtering data
    for analysis. It is a pipeline-generated artifact that should match between pings.
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier (UUID) for the client.
- name: n_logged_event
  type: INTEGER
  mode: NULLABLE
  description: The total number of telemetry events logged by this client during the day, summed across all event ping subsessions.
- name: n_created_pictureinpicture
  type: INTEGER
  mode: NULLABLE
  description: The number of times the client opened a Picture-in-Picture video window during the day.
- name: n_viewed_protection_report
  type: INTEGER
  mode: NULLABLE
  description: The number of times the client viewed the Firefox Enhanced Tracking Protection report during the day.
- name: profile_group_id
  type: STRING
  mode: NULLABLE
  description: A UUID uniquely identifying the profile group, not shared with other
    telemetry data.
