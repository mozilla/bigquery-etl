fields:
- name: id
  type: STRING
  mode: NULLABLE
  description: |-
    Revised changelog ID.
- name: timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: |-
    When the change occurred.
- name: type
  type: STRING
  mode: NULLABLE
  description: |-
    Type of revised changelog.
    "original" indicates the changelog wasn't altered from what Fivetran synced.
    "adjusted_..." indicates a minor adjustment was made, like altering when the change was considered to have occurred.
    "synthetic_..." indicates the changelog was synthesized based on other available data.
    "pre_fivetran" indicates the changelog is for a customer that was deleted before the initial Fivetran Stripe sync.
- name: stripe_customers_changelog_id
  type: STRING
  mode: NULLABLE
  description: |-
    ID of the `stripe_external.customers_changelog_v1` record this changelog was derived from.
    This isn't available for customers that were deleted before the initial Fivetran Stripe sync.
- !include-field
  table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
  field: customer
  new_fields: !include-fields
    table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
    parent_field: customer
    field_replacements:
    - name: metadata
      type: RECORD
      mode: NULLABLE
      description: |-
        Set of key-value pairs attached to the customer.
      fields:
      - name: geoip_date
        type: TIMESTAMP
        mode: NULLABLE
        description: |-
          Time at which IP address-based geo-location was done for the customer.
          This isn't available for customers that were deleted before the initial Fivetran Stripe sync.
      - name: paypalAgreementId
        type: STRING
        mode: NULLABLE
        description: |-
          The customer's PayPal agreement ID (if any).
      - name: userid
        type: STRING
        mode: NULLABLE
        description: |-
          The customer's Firefox Account user ID.
          This isn't available for customers that were deleted before the initial Fivetran Stripe sync.
      - name: userid_sha256
        type: STRING
        mode: NULLABLE
        description: |-
          SHA256 hash of the customer's Firefox Account user ID.
    - !include-field
      table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
      field: customer.address
      new_fields:
      - !include-field
        table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
        field: customer.address.country
    - !include-field
      table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
      field: customer.shipping
      append_description: |-
        This isn't available for customers that were deleted before the initial Fivetran Stripe sync.
      new_fields: !include-fields
        table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
        parent_field: customer.shipping
        field_replacements:
        - !include-field
          table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
          field: customer.shipping.address
          new_fields:
          - !include-field
            table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
            field: customer.shipping.address.country
    - !include-field
      table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
      field: customer.default_source_id
      append_description: |-
        This isn't available for customers that were deleted before the initial Fivetran Stripe sync.
    - !include-field
      table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
      field: customer.discount
      append_description: |-
        This isn't available for customers that were deleted before the initial Fivetran Stripe sync.
    - !include-field
      table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
      field: customer.tax_exempt
      append_description: |-
        This isn't available for customers that were deleted before the initial Fivetran Stripe sync.
    - !include-field
      table: moz-fx-data-shared-prod.stripe_external.customers_changelog_v1
      field: customer.invoice_settings
      append_description: |-
        This isn't available for customers that were deleted before the initial Fivetran Stripe sync.
