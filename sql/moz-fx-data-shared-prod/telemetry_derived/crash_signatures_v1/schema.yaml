---
fields:
- name: submission_timestamp
  type: TIMESTAMP
  mode: REQUIRED
  description: Timestamp when the ping is received on the server side.
- name: document_id
  type: STRING
  mode: REQUIRED
  description: The document ID specified in the URI when the client sent this message.
- name: signature
  type: STRING
  mode: NULLABLE
  description: The Socorro-style crash signature string generated by the siggen library from the symbolicated crash stack trace. Null when a signature
    could not be generated.
