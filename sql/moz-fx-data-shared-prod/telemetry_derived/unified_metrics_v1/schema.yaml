fields:
- mode: NULLABLE
  name: client_id
  type: STRING
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- mode: NULLABLE
  name: sample_id
  type: INTEGER
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- mode: NULLABLE
  name: activity_segment
  type: STRING
  description: A categorical label describing the user's activity level, such as 'core_user',
    'regular_user', 'casual_user', 'infrequent_user', or 'other', based on their engagement
    frequency.
- mode: NULLABLE
  name: normalized_app_name
  type: STRING
  description: A human-readable, standardized name for the Firefox application that
    submitted the telemetry, such as 'Firefox Desktop', 'Fenix', 'Firefox iOS', or
    'Focus Android'. This normalizes across different app identifiers.
- mode: NULLABLE
  name: app_version
  type: STRING
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- mode: NULLABLE
  name: normalized_channel
  type: STRING
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: city
  type: STRING
  description: The city associated with the client's IP address or profile geography
    at the time of the record. May be null when city-level geolocation is unavailable
    or suppressed.
- mode: NULLABLE
  name: days_seen_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which the
    client submitted a telemetry ping and was therefore 'seen'. Each bit corresponds
    to one day in the window.
- mode: NULLABLE
  name: days_since_first_seen
  type: INTEGER
  description: The number of days elapsed since the client was first observed submitting
    telemetry. A value of 0 indicates the client was first seen on the current reporting
    day.
- mode: NULLABLE
  name: device_model
  type: STRING
  description: The model identifier of the device on which the browser is running
    (e.g., 'iPhone14,5'). This field may be null for desktop or unrecognized device
    types where model information is unavailable.
- mode: NULLABLE
  name: is_new_profile
  type: BOOLEAN
  description: Indicates whether the Firefox profile associated with the client was
    newly created. True means the profile was created recently; false means it is
    an existing profile.
- mode: NULLABLE
  name: locale
  type: STRING
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- mode: NULLABLE
  name: first_seen_date
  type: DATE
  description: The calendar date on which the client profile was first observed in
    telemetry data. This is used to determine client tenure and cohort assignment.
- mode: NULLABLE
  name: days_since_seen
  type: INTEGER
  description: The number of days elapsed since the client was last observed submitting
    telemetry. A value of 0 indicates the client was seen on the current reporting
    day.
- mode: NULLABLE
  name: normalized_os
  type: STRING
  description: The standardized operating system name for the client device, such
    as 'Windows', 'Mac', or 'Linux'. This normalizes raw OS strings into a consistent
    set of values.
- mode: NULLABLE
  name: normalized_os_version
  type: STRING
  description: The standardized version string of the client's operating system, such
    as '10.0' for Windows 10 or '6.8.0' for a Linux kernel version. Provides a normalized
    representation across different OS reporting formats.
- mode: NULLABLE
  name: os_version_major
  type: INTEGER
  description: "The major version number component of the operating system. For example,\
    \ a value of 10 corresponds to Windows 10 or macOS 10.x, while values like 13\u2013\
    16 correspond to major iOS/macOS releases."
- mode: NULLABLE
  name: os_version_minor
  type: INTEGER
  description: The minor version number component of the operating system, representing
    the second numeric segment of the full OS version string. A value of 0 is by far
    the most common, indicating that most clients are on a base major release with
    no minor increment.
- mode: NULLABLE
  name: os_version_patch
  type: INTEGER
  description: The patch version component of the normalized OS version string (e.g.,
    11 for macOS 14.0.11).
- mode: NULLABLE
  name: durations
  type: NUMERIC
  description: The total duration, in seconds, associated with a session, event, or
    activity during the reporting period. A value of zero indicates no measurable
    duration was recorded.
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: uri_count
  type: INTEGER
  description: The total number of URIs visited by the client during the reporting
    period. Null values indicate the metric was not recorded for that row.
- mode: NULLABLE
  name: is_default_browser
  type: BOOLEAN
  description: Indicates whether Firefox is set as the default browser on the client's
    device. True means it is the default; false means another browser is set as default.
- mode: NULLABLE
  name: distribution_id
  type: STRING
  description: An identifier for the Firefox distribution package the client is running,
    such as 'default' for the standard Mozilla build or partner-specific identifiers
    like 'canonical-002' or 'mozilla-MSIX'. This field is null when no distribution
    identifier is available.
- mode: NULLABLE
  name: attribution_content
  type: STRING
  description: The content variant or creative identifier from the marketing attribution
    parameters, used to distinguish specific ad placements or page elements (e.g.,
    'body-download-button'). Null when attribution data is unavailable.
- mode: NULLABLE
  name: attribution_source
  type: STRING
  description: The referring source from attribution parameters, typically the website
    or property that directed the user to download Firefox (e.g., 'www.google.com',
    'www.bing.com'). Null when attribution data is unavailable.
- mode: NULLABLE
  name: attribution_medium
  type: STRING
  description: The marketing medium from attribution parameters describing how the
    user arrived at the download (e.g., 'referral', 'firefox-desktop'). Null when
    attribution data is unavailable.
- mode: NULLABLE
  name: attribution_campaign
  type: STRING
  description: The marketing campaign name associated with the Firefox installation,
    sourced from attribution parameters (e.g., 'SET_DEFAULT_BROWSER'). Null when attribution
    data is unavailable.
- mode: NULLABLE
  name: attribution_experiment
  type: STRING
  description: The experiment identifier from attribution parameters, indicating whether
    the install was part of a specific marketing experiment (e.g., 'download-privacy').
    Null when no experiment was associated with the attribution.
- mode: NULLABLE
  name: attribution_variation
  type: STRING
  description: The A/B test variation from attribution parameters that the user was
    assigned to during the download funnel (e.g., 'treatment', 'control'). Null when
    no variation was recorded.
- mode: NULLABLE
  name: ad_click
  type: INTEGER
  description: Number of ad clicks on search engine result pages originating from
    Firefox searches on this submission date. Null when no search data is available.
- mode: NULLABLE
  name: organic_search_count
  type: INTEGER
  description: The number of organic (non-paid) searches performed by the client within
    the aggregation period. Null indicates the value was not available for the record,
    while 0 indicates the client performed no organic searches.
- mode: NULLABLE
  name: search_count
  type: INTEGER
  description: The total number of searches performed during the period. A null value
    indicates that no search count data was recorded.
- mode: NULLABLE
  name: search_with_ads
  type: INTEGER
  description: The total number of search result pages that contained advertisements
    during the period. A null value indicates this metric was not recorded; higher
    values indicate more ad-bearing search sessions.
- mode: NULLABLE
  name: active_hours_sum
  type: FLOAT
  description: The sum of active browser usage hours across all sessions or clients
    within the aggregation period.
- mode: NULLABLE
  name: days_created_profile_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which a
    new browser profile was created. Each bit corresponds to one day in the window.
- mode: NULLABLE
  name: isp
  type: STRING
  description: The name of the Internet Service Provider associated with the client's
    IP address. This field provides a granular ISP identification and may include
    regional carriers.
