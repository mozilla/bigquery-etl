friendly_name: Knowledgebase Retrieval Index
description: |-
  AI-enriched retrieval table derived from the Mozilla Support (SUMO) Knowledge Base, containing
  embeddings and semantic features to support grounded question answering over support articles.

  Grain: one row per Knowledge Base article (keyed by `id`).

  LLM generated fields:
  - article_summary_llm
  - article_category_llm
  - article_language_llm
  - article_entities_llm
  - article_topics_llm
  - embedding based on [title, content]
  - article_sentiment_score based on [title, content]

  Read-time fields (computed on the `customer_experience.knowledgebase_retrieval_index` view, not stored here):
  - recency_score = `EXP(-DATE_DIFF(CURRENT_DATE(), DATE(last_updated), DAY) / 30)` — 30-day exponential decay,
    1.0 today, ~0.37 after 30 days. Always reflects freshness at query time.

  Metadata
  - Additional data to support technical processes, such as backfills or investigations.
  - The prompt version is a self-managed version for changes in the prompt given to the LLM.

  Refresh
  - The whole table is rebuilt on each run by merging the existing and newly processed records.
  - Rows whose `current_revision_id` is unchanged AND whose prior AI run succeeded AND whose
    `metadata.model_version`, `metadata.embedding_version` and `metadata.prompt_version` still
    match the current targets are carried forward as-is, skipping all `AI.GENERATE` /
    `AI.EMBED` calls. Articles deleted upstream are dropped naturally.
owners:
- lvargas@mozilla.com
- mozilla/customer_experience
labels:
  level: gold
  # The whole table is rebuilt on each run by merging existing and newly processed records;
  # only changed/new/failed rows incur Vertex AI cost. Bumping the LLM/embedding model or
  # `prompt_version` invalidates the cache and forces a clean reprocess.
  incremental: false
  change_controlled: true
scheduling:
  dag_name: bqetl_analytics_tables
  depends_on_past: true
  date_partition_parameter: null
bigquery:
  clustering:
    fields:
    - locale
    - category
require_column_descriptions: true
monitoring:
  enabled: true
references:
  query.sql:
  - moz-fx-data-shared-prod.sumo_syndicate.kitsune_wiki_document_plus
