fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: metric
  type: STRING
  description: The name of the telemetry metric or histogram being recorded, such
    as 'gc_ms' or 'thread_wakeup'. Used to identify which specific measurement a row
    represents.
- mode: NULLABLE
  name: key
  type: STRING
  description: A string identifier representing the specific action, search engine,
    or event type associated with a record, such as a search entry point or provider
    key. An empty string indicates no specific key was recorded.
- mode: NULLABLE
  name: value
  type: STRING
  description: A generic integer value associated with a measurement, event, or metric.
    The specific meaning depends on the context of the surrounding fields.
- mode: NULLABLE
  name: country_code
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'IN', 'US', 'RU') associated
    with the record. Equivalent in format to the `country` field and used for geographic
    filtering and grouping.
- mode: NULLABLE
  name: total_client_count
  type: INTEGER
  description: The total count of distinct clients (by client_id) that reported this
    metric, key, value, and country combination on the submission date.
