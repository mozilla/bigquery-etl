friendly_name: FxA Services
description: |-
  Full per-user state of FxA OAuth ToS authorizations, flattened to
  one row per (uid, service). Each row carries the user's primary email and the
  first-authorized ToS timestamp for that service.

  Sourced from the daily accounts_db_external.fxa_oauth_account_authorizations_v1
  and accounts_db_external.fxa_emails_v1 mirrors. Because those are full-table
  mirrors, this table always reflects the complete current set of a user's
  services and is fully rebuilt each run. The downstream
  braze_external.changed_fxa_services_sync_v1 table picks the rows that are new
  since the last sync and builds the Braze sync payload.
owners:
- sherrera@mozilla.com
labels:
  schedule: daily
  owner: sherrera
  dag: bqetl_braze
  owner1: sherrera
scheduling:
  dag_name: bqetl_braze
  date_partition_parameter: null
bigquery: {}
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:braze/data-viewers
- role: roles/bigquery.dataEditor
  members:
  - workgroup:braze/data-developers
references:
  checks.sql:
  - ..
  query.sql:
  - moz-fx-data-shared-prod.accounts_db_external.fxa_emails_v1
  - moz-fx-data-shared-prod.accounts_db_external.fxa_oauth_account_authorizations_v1
require_column_descriptions: true
