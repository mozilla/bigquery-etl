friendly_name: Facebook Conversion Events
description: |-
  Contains data for Conversions API export.

  Expected grain: max 1 row per fbclid + conversion_name combination.

owners:
- kik@mozilla.com

labels:
  incremental: true
  table_type: client_level

scheduling:
  dag_name: bqetl_census_feed
  date_partition_parameter: submission_date
  date_partition_offset: -2
  depends_on_past: true
  arguments:
  - --submission_date={{ds}}  # TODO: this sould be - 2 days
  secrets:
  - deploy_target: FB_ACCESS_TOKEN
    key: bqetl_fb_access_token
  - deploy_target: FB_PIXEL_ID
    key: bqetl_fb_pixel_id

  referenced_tables:
  - 'moz-fx-data-shared-prod.firefoxdotcom_derived.fbclid_conversion_events_v1'

bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: false
    expiration_days: null

monitoring:
  enabled: true
