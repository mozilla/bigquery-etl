friendly_name: Sync Desktop
description: |-
  Daily aggregated sync metrics for Desktop
owners:
- sync-team@mozilla.com
labels:
  incremental: true
  dag: bqetl_sync_metrics
  owner1: sync-team
scheduling:
  dag_name: bqetl_sync_metrics
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: true
    expiration_days: null
  clustering:
    fields:
    - application
    - channel
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  query.sql:
  - mozdata.firefox_desktop.sync
require_column_descriptions: false
