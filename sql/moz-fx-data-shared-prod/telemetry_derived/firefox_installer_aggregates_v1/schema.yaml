fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: installer_type
  type: STRING
  mode: NULLABLE
  description: The type of installer package used to install the application, either
    'full' for a complete installer or 'stub' for a lightweight installer that downloads
    components during setup.
- name: version
  type: STRING
  mode: NULLABLE
  description: The version string of the software, add-on, or component being measured.
    Follows standard versioning conventions such as major.minor.patch.
- name: funnelcake
  type: STRING
  mode: NULLABLE
  description: Funnelcake ID
- name: isp_name
  type: STRING
  mode: NULLABLE
  description: The canonical name of the Internet Service Provider associated with
    the client's network connection. This is a normalized or deduplicated version
    of the ISP identifier.
- name: isp_organization
  type: STRING
  mode: NULLABLE
  description: The organization name associated with the client's IP address block,
    as registered with regional internet registries. This may differ from the ISP
    name when the organization is a reseller or enterprise.
- name: ping_version
  type: STRING
  mode: NULLABLE
  description: Ping Version - only set for stub installer pings
- name: attribution_campaign
  type: STRING
  mode: NULLABLE
  description: The marketing campaign name associated with the Firefox installation,
    sourced from attribution parameters (e.g., 'SET_DEFAULT_BROWSER'). Null when attribution
    data is unavailable.
- name: attribution_content
  type: STRING
  mode: NULLABLE
  description: The content variant or creative identifier from the marketing attribution
    parameters, used to distinguish specific ad placements or page elements (e.g.,
    'body-download-button'). Null when attribution data is unavailable.
- name: attribution_medium
  type: STRING
  mode: NULLABLE
  description: The marketing medium from attribution parameters describing how the
    user arrived at the download (e.g., 'referral', 'firefox-desktop'). Null when
    attribution data is unavailable.
- name: attribution_source
  type: STRING
  mode: NULLABLE
  description: The referring source from attribution parameters, typically the website
    or property that directed the user to download Firefox (e.g., 'www.google.com',
    'www.bing.com'). Null when attribution data is unavailable.
- name: attribution_ua
  type: STRING
  mode: NULLABLE
  description: The user agent type of the browser the user was using when they downloaded
    Firefox, as captured in attribution parameters (e.g., 'chrome', 'edge', 'firefox').
    Null when attribution data is unavailable.
- name: attribution_dlsource
  type: STRING
  mode: NULLABLE
  description: The download source identifier from attribution parameters, indicating
    the platform or property from which Firefox was downloaded (e.g., 'mozorg', 'fxdotcom',
    'mozillaci'). Null when attribution data is unavailable.
- name: has_attribution_dltoken
  type: BOOLEAN
  mode: NULLABLE
  description: Has Attribution Download Token - Boolean indicator for a non-null attribution
    download token
- name: attribution_experiment
  type: STRING
  mode: NULLABLE
  description: The experiment identifier from attribution parameters, indicating whether
    the install was part of a specific marketing experiment (e.g., 'download-privacy').
    Null when no experiment was associated with the attribution.
- name: attribution_variation
  type: STRING
  mode: NULLABLE
  description: The A/B test variation from attribution parameters that the user was
    assigned to during the download funnel (e.g., 'treatment', 'control'). Null when
    no variation was recorded.
- name: distribution_id
  type: STRING
  mode: NULLABLE
  description: An identifier for the Firefox distribution package the client is running,
    such as 'default' for the standard Mozilla build or partner-specific identifiers
    like 'canonical-002' or 'mozilla-MSIX'. This field is null when no distribution
    identifier is available.
- name: city
  type: STRING
  mode: NULLABLE
  description: The city associated with the client's IP address or profile geography
    at the time of the record. May be null when city-level geolocation is unavailable
    or suppressed.
- name: country
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- name: subdivision1
  type: STRING
  mode: NULLABLE
  description: The first-level administrative subdivision (e.g., state, province,
    or region) derived from the client's geographic location, represented as a code.
    Null indicates the subdivision could not be determined.
- name: normalized_country_code
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code representing the country associated
    with the client's IP address at the time of submission, such as 'US', 'DE', or
    'BR'.
- name: locale
  type: STRING
  mode: NULLABLE
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- name: normalized_os
  type: STRING
  mode: NULLABLE
  description: The standardized operating system name for the client device, such
    as 'Windows', 'Mac', or 'Linux'. This normalizes raw OS strings into a consistent
    set of values.
- name: os_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- name: build_channel
  type: STRING
  mode: NULLABLE
  description: The release channel of the Firefox build (e.g., 'release', 'beta',
    'nightly', 'aurora'). Indicates the stage in the Firefox release pipeline from
    which the build originated.
- name: build_id
  type: STRING
  mode: NULLABLE
  description: A timestamp-based identifier for the specific Firefox build, formatted
    as YYYYMMDDHHmmss (e.g., '20260514164700'). Uniquely identifies a compiled build
    artifact.
- name: update_channel
  type: STRING
  mode: NULLABLE
  description: The release channel from which the browser receives updates, such as
    'release', 'beta', 'nightly', or 'esr'. This reflects the user's update track
    and may include custom or misconfigured values.
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- name: had_old_install
  type: BOOLEAN
  mode: NULLABLE
  description: Has Old Install
- name: old_default
  type: BOOLEAN
  mode: NULLABLE
  description: Old Default
- name: old_version
  type: STRING
  mode: NULLABLE
  description: Old Version
- name: from_msi
  type: BOOLEAN
  mode: NULLABLE
  description: From MSI - True if the install was launched from an MSI wrapper
- name: manual_download
  type: BOOLEAN
  mode: NULLABLE
  description: Manual Download - True if the user clicked through the error message
    to the manual full installer download page.
- name: silent
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether an update or notification was delivered silently
    without user-visible prompting. True means the action was silent; false means
    the user was notified.
- name: user_cancelled
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether a user explicitly cancelled an operation or prompt.
    True means the user cancelled; false means they did not. Null indicates the field
    was not applicable or not recorded.
- name: succeeded
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether an operation or process completed successfully. True
    means the operation succeeded; false means it failed.
- name: profile_cleanup_prompt
  type: STRING
  mode: NULLABLE
  description: Profile Cleanup Prompt - Which type of profile cleanup prompt was shown
    (reinstall or paveover)
- name: profile_cleanup_requested
  type: BOOLEAN
  mode: NULLABLE
  description: Profile Cleanup Requested - True if profile cleanup prompt was shown
    and the user accepted the prompt
- name: new_default
  type: BOOLEAN
  mode: NULLABLE
  description: New Default - True if the new installation was successfully set as
    the default browser
- name: new_launched
  type: BOOLEAN
  mode: NULLABLE
  description: New Launched - True if the installation succeeded and we were able
    to launch the newly installed application
- name: funnel_derived
  type: STRING
  mode: NULLABLE
  description: A categorical label describing the acquisition channel or funnel through
    which a user was obtained (e.g. 'mozorg windows funnel', 'mozorg mac funnel',
    'partner', 'other'). This is used to segment users by how they came to install
    Firefox.
- name: distribution_model
  type: STRING
  mode: NULLABLE
  description: A categorical label describing the channel or method through which
    the Firefox distribution was delivered to the user (e.g., 'non-distribution',
    'OS pre-installed', 'OEM pre-installed', 'secondary store'). This field classifies
    how the client obtained the browser.
- name: partner_org
  type: STRING
  mode: NULLABLE
  description: A human-readable label categorizing the browser's distribution partner
    into a broader organizational group (e.g., 'Linux - Canonical', 'Mozilla - China',
    'non-distribution'). Used to segment clients by distribution partnership type.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- name: install_attempts
  type: INTEGER
  mode: NULLABLE
  description: Install Attempts
