fields:
- name: key
  type: STRING
  mode: NULLABLE
  description: The cache key identifying the forecast scenario this row belongs to
    (the metric/dimension grouping the cached forecast values apply to).
- name: submission_date
  type: TIMESTAMP
  mode: NULLABLE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: dau_forecast
  type: FLOAT64
  mode: NULLABLE
  description: The forecasted Daily Active Users (DAU) value for this date; null when
    not yet populated.
- name: dau_target
  type: FLOAT64
  mode: NULLABLE
  description: The DAU target or goal value for this date as set in planning; null
    when not yet populated.
- name: cdou_forecast
  type: FLOAT64
  mode: NULLABLE
  description: The forecasted Cumulative Days of Use (CDOU) value for this date; null
    when not yet populated.
- name: cdou_target
  type: FLOAT64
  mode: NULLABLE
  description: The CDOU target or goal value for this date; null when not yet populated.
- name: dau_forecast_lower
  type: FLOAT64
  mode: NULLABLE
  description: The lower confidence bound of the DAU forecast for this date; null
    when not yet populated.
- name: dau_forecast_upper
  type: FLOAT64
  mode: NULLABLE
  description: The upper confidence bound of the DAU forecast for this date; null
    when not yet populated.
- name: new_profiles_forecast
  type: FLOAT64
  mode: NULLABLE
  description: The forecasted new profile count for this date; null when not yet populated.
- name: new_profiles_target
  type: FLOAT64
  mode: NULLABLE
  description: The new profile target or goal value for this date; null when not yet
    populated.
- name: cum_new_profiles_forecast
  type: FLOAT64
  mode: NULLABLE
  description: The cumulative forecasted new profile count up to this date within
    the current period; null when not yet populated.
- name: cum_new_profiles_target
  type: FLOAT64
  mode: NULLABLE
  description: The cumulative new profiles target for this date within the current
    period; null when not yet populated.
- name: new_profiles_forecast_lower
  type: FLOAT64
  mode: NULLABLE
  description: The lower confidence bound of the new profiles forecast; null when
    not yet populated.
- name: new_profiles_forecast_upper
  type: FLOAT64
  mode: NULLABLE
  description: The upper confidence bound of the new profiles forecast; null when
    not yet populated.
