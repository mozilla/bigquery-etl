friendly_name: Firefox-CI Worker Usage
description: |-
  Derived Firefox-CI worker usage data used to attribute worker costs to task
  runs across GCP and Azure.
owners:
- ahalberstadt@mozilla.com
- jmoss@mozilla.com
labels:
  incremental: true
  owner1: ahalberstadt
  owner2: jmoss
  dag: bqetl_fxci
scheduling:
  dag_name: bqetl_fxci
  task_name: fxci_worker_usage__v1
bigquery:
  time_partitioning:
    type: day
    field: usage_start_date
    require_partition_filter: true
    expiration_days: null
  clustering:
    fields:
    - cloud_provider
    - project
    - zone
    - instance_id
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  query.sql:
  - moz-fx-data-shared-prod.azure_billing_syndicate.fxci_daily_actual_load
  - moz-fx-data-shared-prod.azure_billing_syndicate.fxci_daily_actual_lookup
  - moz-fx-data-shared-prod.azure_billing_syndicate.taskcluster_daily_actual_load
  - moz-fx-data-shared-prod.azure_billing_syndicate.taskcluster_daily_actual_lookup
  - moz-fx-data-shared-prod.fxci_derived.worker_metrics_v1
