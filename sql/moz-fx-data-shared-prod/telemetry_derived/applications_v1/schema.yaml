fields:
- mode: NULLABLE
  name: app_channel
  type: STRING
  description: The release channel of the application build, indicating the target
    audience and stability level. Possible values include 'release', 'beta', and 'nightly'.
- mode: NULLABLE
  name: app_description
  type: STRING
  description: App Description
- mode: NULLABLE
  name: app_id
  type: STRING
  description: App ID
- mode: NULLABLE
  name: app_name
  type: STRING
  description: The name of the Mozilla application that generated the telemetry event
    (e.g., 'firefox_desktop', 'fenix', 'firefox_ios', 'mozilla_vpn'). Used to distinguish
    telemetry across Mozilla's suite of products.
- mode: NULLABLE
  name: bq_dataset_family
  type: STRING
  description: Dataset name ping data is stored in
- mode: NULLABLE
  name: canonical_app_name
  type: STRING
  description: Human readable app name
- mode: NULLABLE
  name: document_namespace
  type: STRING
  description: Document Namespace
- mode: REPEATED
  name: notification_emails
  type: STRING
  description: Set of emails that will receive any app-related notifications
- mode: NULLABLE
  name: url
  type: STRING
  description: Repository URL
- mode: NULLABLE
  name: v1_name
  type: STRING
  description: V1 App Name
- mode: NULLABLE
  name: is_glean
  type: BOOL
  description: Whether the application is using Glean
