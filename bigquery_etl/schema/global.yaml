fields:
- name: account_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the user's logged in to an FxA account.
- name: active_experiment_branch
  type: STRING
  mode: NULLABLE
  description: >-
    The branch of the active Normandy/Nimbus experiment the client is enrolled
    in. Note - for Firefox Desktop telemetry_derived tables (clients_daily_v6,
    clients_last_seen_v1) this field is deprecated and always NULL; consult the
    experiments RECORD instead.
- name: active_experiment_id
  type: STRING
  mode: NULLABLE
  description: >-
    The identifier of the active Normandy/Nimbus experiment the client is
    enrolled in. Note - for Firefox Desktop telemetry_derived tables
    (clients_daily_v6, clients_last_seen_v1) this field is deprecated and always
    NULL; consult the experiments RECORD instead.
- name: activity_segment
  type: STRING
  mode: NULLABLE
  description: Classification of users based on their browsing activity.
    E.g., infrequent, casual, regular.
  aliases:
  - segment
  possible_values:
  - casual_user
  - core_user
  - infrequent_user
  - regular_user
  - other
- name: adjust_network
  type: STRING
  mode: NULLABLE
  description: The name of the Adjust Network that sourced the installation.
- name: app_build
  type: STRING
  mode: NULLABLE
  description: The build identifier of the application at the time the ping was sent,
    as reported by the Glean client_info.app_build metric.
- name: app_build_id
  type: STRING
  mode: NULLABLE
  description: The build ID of the application.
- name: app_name
  type: STRING
  mode: NULLABLE
  description: The name of the browser.
- name: app_version
  type: STRING
  mode: NULLABLE
  description: User visible version string (e.g. "1.0.3") for the browser.
  aliases:
  - version
  - app_display_version
- name: app_version_is_major_release
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the current app version is a major release (i.e. patch and minor
    version components are both zero), as derived from the app version string.
- name: app_version_major
  type: INTEGER
  mode: NULLABLE
  description: The major version of the user visible app version string for the browser,
    e.g. "142.1.3", has major version 142
- name: app_version_minor
  type: INTEGER
  mode: NULLABLE
  description: The minor version of the user visible app version string for the browser,
    e.g. "142.1.3" has minor version 1
- name: app_version_patch_revision
  type: NUMERIC
  mode: NULLABLE
  description: The patch or revision component of the user visible app version string
    for the browser, e.g. "142.1.3" has patch revision 3.
- name: apple_model_id
  type: STRING
  mode: NULLABLE
  description: The hw.model of the hardware running this software. Mac only. e.g. "MacBookPro14,1".
- name: architecture
  type: STRING
  mode: NULLABLE
  description: The architecture of the device, (e.g. "arm", "x86").
- name: attribution_campaign
  type: STRING
  mode: NULLABLE
  description: The attribution campaign; similar or the same as UTM campaign.
- name: attribution_content
  type: STRING
  mode: NULLABLE
  description: The attribution content; similar or the same as UTM content.
- name: attribution_dlsource
  type: STRING
  mode: NULLABLE
  description: Identifier indicating where a Firefox installation originated, such as
    the download source or distribution channel. Extracted from the attribution_ext
    JSON field on Firefox Desktop or reported directly on other platforms.
- name: attribution_dltoken
  type: STRING
  mode: NULLABLE
  description: Unique token created at Firefox download time, used to associate an install
    with its originating download event and to join with stub attribution logs.
- name: attribution_experiment
  type: STRING
  mode: NULLABLE
  description: The attribution experiment key.
- name: attribution_medium
  type: STRING
  mode: NULLABLE
  description: The attribution medium; similar or the same as UTM medium.
- name: attribution_source
  type: STRING
  mode: NULLABLE
  description: The attribution source; similar or the same as UTM source.
- name: attribution_term
  type: STRING
  mode: NULLABLE
  description: The attribution term parameter captured at download time, typically used
    to identify the search keyword or term associated with the install. Similar or the
    same as UTM term.
- name: attribution_ua
  type: STRING
  mode: NULLABLE
  description: The user agent string captured at download time, used in attribution to
    identify the browser or device used when Firefox was downloaded. Extracted from the
    attribution_ext JSON field on Firefox Desktop.
- name: attribution_variation
  type: STRING
  mode: NULLABLE
  description: The attribution variation key.
- name: city
  type: STRING
  mode: NULLABLE
  description: Name of the city in which the activity took place, as determined by IP
    geolocation.
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier (UUID) for the client.
- name: context_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier (UUID) for clients in contextual services user
    interaction pings, e.g. top-sites ping.
- name: country
  type: STRING
  mode: NULLABLE
  description: Name of the country in which the activity took place, as determined by
    the IP geolocation.
  aliases:
  - normalized_country
  - geo
- name: country_code
  type: STRING
  mode: NULLABLE
  description: Code of the country in which the activity took place, as determined by
    the IP geolocation. Unknown or NULL values are normally stored as '??'.
  aliases:
  - normalized_country_code
- name: cpu_cores
  type: INTEGER
  mode: NULLABLE
  description: Number of physical CPU cores available on the client device.
- name: cpu_count
  type: INTEGER
  mode: NULLABLE
  description: Total number of logical CPUs (including hyperthreaded) available on the
    client device.
- name: cpu_family
  type: INTEGER
  mode: NULLABLE
  description: CPU family identifier as reported by the processor's CPUID instruction.
- name: cpu_l2_cache_kb
  type: INTEGER
  mode: NULLABLE
  description: Size of the CPU L2 cache in kilobytes.
- name: cpu_l3_cache_kb
  type: INTEGER
  mode: NULLABLE
  description: Size of the CPU L3 cache in kilobytes.
- name: cpu_model
  type: INTEGER
  mode: NULLABLE
  description: CPU model identifier of the user's device, as reported by CPUID.
- name: cpu_speed_mhz
  type: INTEGER
  mode: NULLABLE
  description: CPU speed in MHz as reported by the operating system.
- name: cpu_stepping
  type: INTEGER
  mode: NULLABLE
  description: CPU stepping identifier as reported by CPUID.
- name: cpu_vendor
  type: STRING
  mode: NULLABLE
  description: The CPU vendor string of the processor on the client device (e.g. "GenuineIntel",
    "AuthenticAMD").
- name: created_at
  type: TIMESTAMP
  mode: NULLABLE
  description: Timestamp when the row was created.
  aliases:
  - created_timestamp
  - created_date
- name: dau
  type: INTEGER
  mode: NULLABLE
  description: The number of daily active users, corresponding to the count of clients that reported
    at least one ping on the submission_date and qualify as active.
  aliases:
  - total_active
- name: days_active_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days in the past 28 days on which the client
    was active (sent any ping). The least significant bit represents the submission_date.
- name: days_created_profile_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days in the past 28 days on which the client's
    profile was created. The least significant bit represents the submission_date.
- name: days_desktop_active_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days in the past 28 days on which the client
    was active on the desktop. The least significant bit represents the submission_date.
    Used to derive DAU, WAU, and MAU for desktop activity.
- name: days_had_8_active_ticks_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days on which the client had at least 8
    active ticks (active_hours_sum >= 0.011) in the past 28 days.
- name: days_interacted_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days in the past 28 days on which the client
    had user interactions (e.g. active hours > 0). The least significant bit represents
    the submission_date.
- name: days_opened_dev_tools_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days in the past 28 days on which the client
    opened the developer tools toolbox at least once.
- name: days_seen_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days in the past 28 days on which the client
    sent a telemetry/baseline ping. The least significant bit represents the submission_date.
- name: days_seen_session_end_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days in the past 28 days on which the client
    reported a session end event. The least significant bit represents the submission_date.
- name: days_seen_session_start_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days in the past 28 days on which the client
    reported a session start event. The least significant bit represents the submission_date.
- name: days_since_active
  type: INTEGER
  mode: NULLABLE
  description: Number of days since the client was last active (sent any ping), based
    on the days_active_bits bitmask. NULL if the client has not been active in the last
    28 days.
- name: days_since_created_profile
  type: INTEGER
  mode: NULLABLE
  description: Number of days since the client's profile was first created, based on
    the days_created_profile_bits bitmask.
- name: days_since_desktop_active
  type: INTEGER
  mode: NULLABLE
  description: Number of days since the client was last active on the desktop, based
    on the days_desktop_active_bits bitmask. NULL if the client has never been active.
- name: days_since_seen
  type: INTEGER
  mode: NULLABLE
  description: Number of days since the client last sent a baseline ping, based on the
    days_seen_bits bitmask. NULL if the client has not been seen in the last 28 days.
- name: days_since_seen_session_end
  type: INTEGER
  mode: NULLABLE
  description: Number of days since the client last reported a session end event, based
    on the days_seen_session_end_bits bitmask.
- name: days_since_seen_session_start
  type: INTEGER
  mode: NULLABLE
  description: Number of days since the client last reported a session start event, based
    on the days_seen_session_start_bits bitmask.
- name: days_since_visited_1_uri
  type: INTEGER
  mode: NULLABLE
  description: Number of days since the client last visited at least one URI, based on
    the days_visited_1_uri_bits bitmask.
- name: days_visited_10_uri_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days on which the client visited at least
    10 URIs in the past 28 days.
- name: days_visited_1_uri_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days on which the client visited at least
    1 URI (normal + private mode combined) in the past 28 days. Used to measure Active
    MAU.
- name: days_visited_1_uri_normal_mode_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days on which the client visited at least
    1 URI in normal (non-private) browsing mode in the past 28 days.
- name: days_visited_1_uri_private_mode_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days on which the client visited at least
    1 URI in private browsing mode in the past 28 days. Only populated for Firefox version
    84 and later.
- name: days_visited_5_uri_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer encoding the days on which the client visited at least
    5 URIs in the past 28 days.
- name: distribution_id
  type: STRING
  mode: NULLABLE
  description: The distribution id associated with the install of Firefox.
- name: distributor
  type: STRING
  mode: NULLABLE
  description: The name of the distribution partner that provided this installation.
- name: document_id
  type: STRING
  mode: NULLABLE
  description: The document ID specified in the URI when the client sent this message.
- name: durations
  type: INTEGER
  mode: NULLABLE
  description: Total duration in seconds of all sessions recorded in the baseline ping
    window.
- name: env_build_arch
  type: STRING
  mode: NULLABLE
  description: The CPU architecture for which the browser build was compiled (e.g. x86,
    x86-64, aarch64).
- name: first_run_date
  type: DATE
  mode: NULLABLE
  description: The date of the first run of the application.
- name: first_seen_date
  type: DATE
  mode: NULLABLE
  description: Date when the server first received a ping from this client.
- name: fxa_configured
  type: BOOLEAN
  mode: NULLABLE
  description: Whether a Firefox Account (FxA) is configured on the client.
- name: geo_db_version
  type: STRING
  mode: NULLABLE
  description: The version string of the GeoIP database used to determine the client's
    geographic location.
- name: geo_subdivision1
  type: STRING
  mode: NULLABLE
  description: First-level geographic subdivision (e.g. state or province) where the
    client activity took place, as determined by IP geolocation.
- name: geo_subdivision2
  type: STRING
  mode: NULLABLE
  description: Second-level geographic subdivision (e.g. county or district) where the
    client activity took place, as determined by IP geolocation.
- name: is_default_browser
  type: BOOLEAN
  mode: NULLABLE
  description: A flag indicating whether the browser is set as the default browser on the client side.
- name: is_desktop
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates if the client is included in the desktop KPI.
- name: is_mobile
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates if the client is included in the mobile KPI.
- name: is_new_profile
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the client's profile was created on the submission_date, indicating
    this is the first day the profile was seen.
- name: is_wow64
  type: BOOLEAN
  mode: NULLABLE
  description: Whether a 32-bit Firefox process is running under 64-bit Windows via WOW64
    emulation.
- name: isp_name
  type: STRING
  mode: NULLABLE
  description: The name of the internet service provider associated with the client's IP address.
  aliases:
  - isp
- name: isp_organization
  type: STRING
  mode: NULLABLE
  description: The organization name associated with the client's IP address as reported
    by the ISP database; may differ from isp_name for corporate connections.
- name: locale
  type: STRING
  mode: NULLABLE
  description: Set of language- and/or country-based preferences for a user interface.
- name: mau
  type: INTEGER
  mode: NULLABLE
  description: The number of monthly active users, corresponding to the count of clients that reported
    at least one ping on the previous 28 days from the submission_date and qualify as active.
- name: memory_mb
  type: INTEGER
  mode: NULLABLE
  description: Total physical memory available on the client device, in megabytes.
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The normalized channel the application is being distributed on.
  aliases:
  - channel
  possible_values:
  - release
  - beta
  - nightly
  - aurora
  - esr
  - Other
- name: normalized_os
  type: STRING
  mode: NULLABLE
  description: The normalized name of the operating system running at the client.
  aliases:
  - os
- name: os_code
  type: STRING
  mode: NULLABLE
  description: The operating system code based on the Common Platform Enumeration CPE.
- name: os_major
  type: INTEGER
  mode: NULLABLE
  description: Major or first part of the operating system version running at the
    client. E.g. for version "100.9.11", the major is 100.
  aliases:
  - os_major_version
  - os_version_major
- name: os_minor
  type: INTEGER
  mode: NULLABLE
  description: Minor part of the operating system version running at the client. E.g.
    for version "100.9.11", the minor is 9.
  aliases:
  - os_minor_version
  - os_version_minor
- name: os_version
  type: STRING
  mode: NULLABLE
  description: Version of the operating system running at the client, as a string (e.g.
    "100.9.11", "10.0.19041").
  aliases:
  - normalized_os_version
- name: partner_id
  type: STRING
  mode: NULLABLE
  description: The partner identifier associated with the Firefox distribution, used
    for partner attribution.
- name: profile_age_in_days
  type: INTEGER
  mode: NULLABLE
  description: Age of the Firefox profile in days, measured as the difference between
    submission_date and the profile creation date.
- name: profile_creation_date
  type: STRING
  mode: NULLABLE
  description: The date the Firefox profile was created, formatted as a string in YYYY-MM-DD
    format (or YYYY-MM-DD 00:00:00 in some tables).
- name: profile_group_id
  type: STRING
  mode: NULLABLE
  description: A UUID uniquely identifying the profile group, not shared with other telemetry data.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: A number, 0-99, that samples by client_id and allows filtering data for analysis.
    It is a pipeline-generated artifact that should match between pings.
- name: second_seen_date
  type: DATE
  mode: NULLABLE
  description: Date when the server received the second ping from this client, used to
    distinguish new from returning users. NULL if the client has only been seen once.
- name: source_column
  type: STRING
  mode: NULLABLE
  description: Column name in the source used to ingest the data.
- name: source_report
  type: STRING
  mode: NULLABLE
  description: Name of the report file used to ingest the data.
  aliases:
  - source_file
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The date when the telemetry ping is received on the server side.
- name: submission_hour
  type: TIMESTAMP
  mode: NULLABLE
  description: The submission_timestamp truncated to the hour.
- name: submission_month
  type: DATE
  mode: NULLABLE
  description: First calendar day of the month extracted from submission_date or
    submission_timestamp.
- name: submission_timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: Timestamp when the ping is received on the server side.
- name: sync_configured
  type: BOOLEAN
  mode: NULLABLE
  description: Whether Firefox Sync is configured and enabled on the client.
- name: telemetry_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Whether Firefox telemetry data collection is enabled on the client.
- name: telemetry_sdk_build
  type: STRING
  mode: NULLABLE
  description: The version of the Glean SDK at the time the ping was collected (e.g. 25.0.0).
- name: timezone_offset
  type: INTEGER
  mode: NULLABLE
  description: The client's local timezone offset from UTC in minutes.
- name: updated_at
  type: TIMESTAMP
  mode: NULLABLE
  description: Most recent date and time when the row was updated.
  aliases:
  - updated_timestamp
  - updated_date
- name: wau
  type: INTEGER
  mode: NULLABLE
  description: The number of weekly active users, corresponding to the count of clients that reported
    at least one ping on the previous 7 days from the submission_date and qualify as active.
- name: windows_build_number
  type: INTEGER
  mode: NULLABLE
  description: The Windows build number identifying the specific Windows OS build running
    on the client (e.g. 22000). Only set for Windows clients; NULL for other platforms.
- name: windows_ubr
  type: INTEGER
  mode: NULLABLE
  description: The Windows Update Build Revision (UBR) number, indicating the specific
    cumulative patch level applied. Windows only; NULL for other platforms.
