fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The date for which this aggregation row was computed. Each row represents
    activity counts for a specific combination of dimensions on this date.
- name: impression_id
  type: STRING
  mode: NULLABLE
  description: A UUID (formatted with curly braces) that identifies the Firefox browser
    instance for CFR purposes. Used together with client_id to uniquely identify a
    user-day record; may be null when not set on the client.
- name: client_id
  type: STRING
  mode: NULLABLE
  description: The Telemetry client identifier for the Firefox profile. Used together
    with impression_id to deduplicate CFR pings to one row per user per day; may be
    null when not present in the source ping.
- name: seen_whats_new
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the user saw a What's New CFR recommendation at any
    point during the submission day. True when at least one CFR ping for the user
    on that day had a bucket_id matching the pattern '%WHATS_NEW%'.
- name: release_channel
  type: STRING
  mode: NULLABLE
  description: The Firefox release channel of the client (e.g. "release", "beta",
    "nightly", "esr"). Used to segment engagement metrics by update channel.
- name: locale
  type: STRING
  mode: NULLABLE
  description: The browser locale of the client at the time of the CFR impression
    (e.g. "en-US", "fr", "es-ES"). Used to segment engagement by language.
- name: country
  type: STRING
  mode: NULLABLE
  description: The two-letter ISO 3166-1 alpha-2 country code of the client, as inferred
    from their IP address at submission time.
- name: version
  type: STRING
  mode: NULLABLE
  description: The Firefox application version string of the client at the time of
    the CFR impression (e.g. "115.0.3").
