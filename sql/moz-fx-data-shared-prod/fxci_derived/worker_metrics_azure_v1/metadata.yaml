friendly_name: Firefox-CI Worker Metrics (Azure)
description: |-
  Derived Firefox-CI Azure worker uptime intervals from generic-worker
  WORKER_METRICS events syndicated through taskclusteretl.
owners:
- ahalberstadt@mozilla.com
- jmoss@mozilla.com
labels:
  incremental: true
  owner1: ahalberstadt
  dag: bqetl_fxci
scheduling:
  dag_name: bqetl_fxci
  task_name: fxci_worker_metric_azure__v1
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: true
    expiration_days: null
  range_partitioning: null
  clustering:
    fields:
    - project
    - zone
    - instance_id
