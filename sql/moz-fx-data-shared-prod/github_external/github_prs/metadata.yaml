friendly_name: GitHub Pull Requests
description: |-
  Union of all GitHub PR tables in github_external. Provides a single source
  for querying merged pull requests across all tracked repositories:
  mozilla/bigquery-etl, mozilla/private-bigquery-etl, mozilla/lookml-generator,
  mozilla/looker-spoke-default, and mozilla/looker-spoke-private.
owners:
- gkaberere@mozilla.com
labels:
  owner1: gkaberere
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  view.sql:
  - moz-fx-data-shared-prod.github_external.bqetl_prs_v1
  - moz-fx-data-shared-prod.github_external.looker_spoke_default_prs_v1
  - moz-fx-data-shared-prod.github_external.looker_spoke_private_prs_v1
  - moz-fx-data-shared-prod.github_external.lookml_generator_prs_v1
  - moz-fx-data-shared-prod.github_external.private_bqetl_prs_v1
