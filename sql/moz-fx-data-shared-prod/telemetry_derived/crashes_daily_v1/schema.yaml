fields:
- description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
  mode: NULLABLE
  name: submission_date
  type: DATE
- description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
  mode: NULLABLE
  name: client_id
  type: STRING
- description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
  mode: NULLABLE
  name: sample_id
  type: INTEGER
- description: The normalized name of the Mozilla application that produced the crash
    data (e.g., 'Firefox', 'Fennec'), taken as the most frequently observed value
    across the client's crashes for the day.
  mode: NULLABLE
  name: application_name
  type: STRING
- description: A timestamp-based identifier for the specific Firefox build, formatted
    as YYYYMMDDHHmmss (e.g., '20260514164700'). Uniquely identifies a compiled build
    artifact.
  mode: NULLABLE
  name: build_id
  type: STRING
- description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
  mode: NULLABLE
  name: channel
  type: STRING
- description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
  mode: NULLABLE
  name: os
  type: STRING
- description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
  mode: NULLABLE
  name: os_version
  type: STRING
- description: The ISO 3166-1 alpha-2 country code (e.g., 'IN', 'US', 'RU') associated
    with the record. Equivalent in format to the `country` field and used for geographic
    filtering and grouping.
  mode: NULLABLE
  name: country_code
  type: STRING
- description: An array of per-process-type crash counts, where each entry's key is
    the process type (e.g., 'main', 'content', 'gpu') and value is the number of detected
    crashes of that process type, excluding shutdown-kill crashes.
  mode: REPEATED
  type: RECORD
  name: process_crash_counts
  fields:
  - mode: NULLABLE
    name: key
    type: STRING
    description: The Firefox process type (e.g., 'main', 'content', 'gpu') for which
      crashes are counted.
  - mode: NULLABLE
    name: value
    type: INTEGER
    description: The number of detected crashes of the corresponding process type,
      excluding shutdown-kill crashes.
- description: An array of per-process-type counts of shutdown-kill crashes, where
    each entry's key is the process type (e.g., 'main', 'content', 'gpu') and value
    is the number of crashes of that process type attributed to a shutdown kill.
  mode: REPEATED
  type: RECORD
  name: process_shutdown_kill_crash_counts
  fields:
  - mode: NULLABLE
    name: key
    type: STRING
    description: The Firefox process type (e.g., 'main', 'content', 'gpu') for which
      shutdown-kill crashes are counted.
  - mode: NULLABLE
    name: value
    type: INTEGER
    description: The number of shutdown-kill crashes of the corresponding process
      type.
- description: A UUID that identifies a group of profiles belonging to the same user
    or installation context. Null when profile group information is unavailable.
  mode: NULLABLE
  name: profile_group_id
  type: STRING
