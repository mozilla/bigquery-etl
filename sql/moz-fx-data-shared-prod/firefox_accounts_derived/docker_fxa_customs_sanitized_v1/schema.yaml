fields:
- name: date
  type: DATE
  mode: NULLABLE
  description: Event date derived from `DATE(timestamp)`, used as the partition key
    in some log-derived tables. Distinct from `submission_date` (the pipeline ingestion
    date). Use `submission_date` for incremental processing; use this field when you
    need the event's occurrence date.
- name: logName
  type: STRING
  mode: NULLABLE
  description: The resource name of the log to which this log entry belongs.
- name: resource
  type: RECORD
  mode: NULLABLE
  description: The monitored resource that produced this log entry.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: The monitored resource type. For example, the type of a Compute Engine
      VM instance is `gce_instance`.
  - name: labels
    type: RECORD
    mode: NULLABLE
    description: GCP resource metadata labels attached to the log entry by Cloud Logging.
    fields:
    - name: instance_id
      type: STRING
      mode: NULLABLE
      description: Cloud instance identifier of the node that generated the log entry.
    - name: zone
      type: STRING
      mode: NULLABLE
      description: Availability zone of the resource.
    - name: project_id
      type: STRING
      mode: NULLABLE
      description: GCP project ID of the log source.
- name: textPayload
  type: STRING
  mode: NULLABLE
  description: The log entry payload, represented as a Unicode string (UTF-8).
- name: jsonPayload
  type: RECORD
  mode: NULLABLE
  description: The log entry payload, represented as a structure that is expressed
    as a JSON object.
  fields:
  - name: name
    type: STRING
    mode: NULLABLE
    description: Name field from the log payload, identifying the process or subsystem
      (e.g., 'customs-server', 'configure-sentry').
  - name: v
    type: FLOAT
    mode: NULLABLE
    description: Payload schema version number used by the FxA logging framework.
  - name: msg
    type: STRING
    mode: NULLABLE
    description: Log message string from the FxA service payload.
  - name: level
    type: FLOAT
    mode: NULLABLE
    description: Log severity level. Numeric Bunyan-style in some tables (30=info,
      50=error); string level name in others.
  - name: op
    type: STRING
    mode: NULLABLE
    description: Operation type from the log payload.
  - name: pid
    type: FLOAT
    mode: NULLABLE
    description: Process ID of the FxA service instance that generated the log entry.
  - name: ip
    type: BYTES
    mode: NULLABLE
    description: Client IP address from the customs server log payload.
  - name: rtime
    type: STRING
    mode: NULLABLE
    description: Request processing time from the customs server log payload, in seconds.
  - name: hostname
    type: STRING
    mode: NULLABLE
    description: Hostname of the server or container that generated the log entry.
  - name: statuscode
    type: FLOAT
    mode: NULLABLE
    description: HTTP or application status code from the log payload.
  - name: filename
    type: STRING
    mode: NULLABLE
    description: Name of an IP blocklist data file associated with the log event.
  - name: filesize
    type: FLOAT
    mode: NULLABLE
    description: File size in bytes associated with the log event.
  - name: reputation
    type: FLOAT
    mode: NULLABLE
  - name: err
    type: STRING
    mode: NULLABLE
    description: Error details from the top-level log payload.
  - name: email
    type: BYTES
    mode: NULLABLE
    description: Hashed or redacted email identifier. Not a raw email address.
  - name: action
    type: STRING
    mode: NULLABLE
    description: Action type from the customs server log payload.
  - name: block
    type: BOOLEAN
    mode: NULLABLE
    description: Whether the request was blocked by the customs server.
  - name: suspect
    type: BOOLEAN
    mode: NULLABLE
    description: Whether the IP or account was flagged as suspect by the customs server.
  - name: unblock
    type: BOOLEAN
    mode: NULLABLE
    description: Whether the request was unblocked by the customs server.
  - name: foundin
    type: FLOAT
    mode: NULLABLE
    description: IP blocklist name in which the client address was found.
  - name: errno
    type: FLOAT
    mode: NULLABLE
    description: FxA error number from the customs server payload.
  - name: regex
    type: STRING
    mode: NULLABLE
    description: Regular expression pattern used in user-agent blocklist matching
      (e.g., matching browser or device strings to identify blocked clients).
  - name: listhitcount
    type: FLOAT
    mode: NULLABLE
    description: Number of IP blocklists that matched the request.
  - name: listhits
    type: STRING
    mode: NULLABLE
    description: JSON-encoded list of IP blocklist names that matched the request.
  - name: suggested_action
    type: STRING
    mode: NULLABLE
  - name: heuristic
    type: STRING
    mode: NULLABLE
  - name: id
    type: STRING
    mode: NULLABLE
  - name: reportonly
    type: BOOLEAN
    mode: NULLABLE
  - name: heuristic_description
    type: STRING
    mode: NULLABLE
  - name: confidence
    type: FLOAT
    mode: NULLABLE
  - name: timestamp
    type: STRING
    mode: NULLABLE
    description: Application-level event timestamp as a Unix epoch nanoseconds float,
      as reported by the FxA service. Distinct from the top-level Cloud Logging `timestamp`.
  - name: reason
    type: STRING
    mode: NULLABLE
  - name: loadedin
    type: FLOAT
    mode: NULLABLE
    description: Time in milliseconds for the page or resource to load.
  - name: message
    type: STRING
    mode: NULLABLE
    description: Structured log message from the FxA service payload.
  - name: host
    type: STRING
    mode: NULLABLE
    description: Hostname from the top-level log payload.
  - name: port
    type: FLOAT
    mode: NULLABLE
    description: Network port from the top-level log payload.
  - name: config
    type: RECORD
    mode: NULLABLE
    fields:
    - name: userdefinedratelimitrules
      type: RECORD
      mode: NULLABLE
      fields:
      - name: tokencoderules
        type: RECORD
        mode: NULLABLE
        fields:
        - name: limits
          type: RECORD
          mode: NULLABLE
          fields:
          - name: ratelimitintervalms
            type: FLOAT
            mode: NULLABLE
          - name: max
            type: FLOAT
            mode: NULLABLE
          - name: periodms
            type: FLOAT
            mode: NULLABLE
        - name: actions
          type: STRING
          mode: REPEATED
      - name: totpcoderules
        type: RECORD
        mode: NULLABLE
        fields:
        - name: limits
          type: RECORD
          mode: NULLABLE
          fields:
          - name: periodms
            type: FLOAT
            mode: NULLABLE
          - name: max
            type: FLOAT
            mode: NULLABLE
          - name: ratelimitintervalms
            type: FLOAT
            mode: NULLABLE
        - name: actions
          type: STRING
          mode: REPEATED
    - name: log
      type: RECORD
      mode: NULLABLE
      fields:
      - name: level
        type: STRING
        mode: NULLABLE
    - name: requestchecks
      type: RECORD
      mode: NULLABLE
      fields:
      - name: flowidexemptuseragentres
        type: STRING
        mode: REPEATED
      - name: flowidrequiredonlogin
        type: BOOLEAN
        mode: NULLABLE
      - name: treateveryonewithsuspicion
        type: BOOLEAN
        mode: NULLABLE
    - name: limits
      type: RECORD
      mode: NULLABLE
      fields:
      - name: maxaccountaccess
        type: FLOAT
        mode: NULLABLE
      - name: maxunblockattempts
        type: FLOAT
        mode: NULLABLE
      - name: maxaccountstatuscheck
        type: FLOAT
        mode: NULLABLE
      - name: ipratelimitbandurationseconds
        type: FLOAT
        mode: NULLABLE
      - name: ratelimitintervalseconds
        type: FLOAT
        mode: NULLABLE
      - name: maxbadlogins
        type: FLOAT
        mode: NULLABLE
      - name: maxemails
        type: FLOAT
        mode: NULLABLE
      - name: maxbadloginsperip
        type: FLOAT
        mode: NULLABLE
      - name: smsratelimit
        type: RECORD
        mode: NULLABLE
        fields:
        - name: limitintervalseconds
          type: FLOAT
          mode: NULLABLE
        - name: maxsms
          type: FLOAT
          mode: NULLABLE
      - name: suspectinterval
        type: FLOAT
        mode: NULLABLE
      - name: uidratelimit
        type: RECORD
        mode: NULLABLE
        fields:
        - name: maxchecks
          type: FLOAT
          mode: NULLABLE
        - name: bandurationseconds
          type: FLOAT
          mode: NULLABLE
        - name: limitintervalseconds
          type: FLOAT
          mode: NULLABLE
      - name: maxverifycodes
        type: FLOAT
        mode: NULLABLE
      - name: blockintervalseconds
        type: FLOAT
        mode: NULLABLE
      - name: ipratelimitintervalseconds
        type: FLOAT
        mode: NULLABLE
      - name: maxbadloginsperemail
        type: FLOAT
        mode: NULLABLE
      - name: disableinterval
        type: FLOAT
        mode: NULLABLE
    - name: reputationservice
      type: RECORD
      mode: NULLABLE
      fields:
      - name: enable
        type: BOOLEAN
        mode: NULLABLE
      - name: baseurl
        type: STRING
        mode: NULLABLE
      - name: suspectbelow
        type: FLOAT
        mode: NULLABLE
      - name: timeout
        type: FLOAT
        mode: NULLABLE
      - name: hawkid
        type: STRING
        mode: NULLABLE
      - name: hawkkey
        type: STRING
        mode: NULLABLE
      - name: blockbelow
        type: FLOAT
        mode: NULLABLE
      - name: enablecheck
        type: BOOLEAN
        mode: NULLABLE
    - name: tracing
      type: RECORD
      mode: NULLABLE
      fields:
      - name: gcp
        type: RECORD
        mode: NULLABLE
        fields:
        - name: enabled
          type: BOOLEAN
          mode: NULLABLE
        - name: filterpii
          type: BOOLEAN
          mode: NULLABLE
      - name: otel
        type: RECORD
        mode: NULLABLE
        fields:
        - name: url
          type: STRING
          mode: NULLABLE
        - name: concurrencylimit
          type: FLOAT
          mode: NULLABLE
        - name: enabled
          type: BOOLEAN
          mode: NULLABLE
      - name: samplerate
        type: FLOAT
        mode: NULLABLE
      - name: console
        type: RECORD
        mode: NULLABLE
        fields:
        - name: enabled
          type: BOOLEAN
          mode: NULLABLE
      - name: filterpii
        type: BOOLEAN
        mode: NULLABLE
      - name: servicename
        type: STRING
        mode: NULLABLE
      - name: corsurls
        type: STRING
        mode: NULLABLE
      - name: batchprocessor
        type: BOOLEAN
        mode: NULLABLE
      - name: clientname
        type: STRING
        mode: NULLABLE
      - name: jaeger
        type: RECORD
        mode: NULLABLE
        fields:
        - name: filterpii
          type: BOOLEAN
          mode: NULLABLE
        - name: enabled
          type: BOOLEAN
          mode: NULLABLE
    - name: listen
      type: RECORD
      mode: NULLABLE
      fields:
      - name: host
        type: STRING
        mode: NULLABLE
      - name: port
        type: FLOAT
        mode: NULLABLE
    - name: allowedemaildomains
      type: STRING
      mode: REPEATED
    - name: dataflow
      type: RECORD
      mode: NULLABLE
      fields:
      - name: ignoreolderthan
        type: FLOAT
        mode: NULLABLE
      - name: enabled
        type: BOOLEAN
        mode: NULLABLE
      - name: gcppubsub
        type: RECORD
        mode: NULLABLE
        fields:
        - name: subscriptionname
          type: STRING
          mode: NULLABLE
        - name: projectid
          type: STRING
          mode: NULLABLE
      - name: reportonly
        type: BOOLEAN
        mode: NULLABLE
    - name: updatepollintervalseconds
      type: FLOAT
      mode: NULLABLE
    - name: allowedphonenumbers
      type: STRING
      mode: REPEATED
    - name: memcache
      type: RECORD
      mode: NULLABLE
      fields:
      - name: recordlifetimeseconds
        type: FLOAT
        mode: NULLABLE
      - name: address
        type: STRING
        mode: NULLABLE
    - name: env
      type: STRING
      mode: NULLABLE
    - name: ipblocklist
      type: RECORD
      mode: NULLABLE
      fields:
      - name: enable
        type: BOOLEAN
        mode: NULLABLE
      - name: logonlylists
        type: STRING
        mode: REPEATED
      - name: updatepollinterval
        type: FLOAT
        mode: NULLABLE
      - name: lists
        type: STRING
        mode: REPEATED
    - name: allowedips
      type: STRING
      mode: REPEATED
    - name: sentry
      type: RECORD
      mode: NULLABLE
      fields:
      - name: servername
        type: STRING
        mode: NULLABLE
      - name: env
        type: STRING
        mode: NULLABLE
      - name: samplerate
        type: FLOAT
        mode: NULLABLE
      - name: dsn
        type: STRING
        mode: NULLABLE
    - name: publicurl
      type: STRING
      mode: NULLABLE
  - name: blockreason
    type: STRING
    mode: NULLABLE
    description: Reason the request was blocked by the customs server.
  - name: data
    type: STRING
    mode: NULLABLE
- name: timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the event described by the log entry occurred, as reported
    by the originating FxA service.
- name: receiveTimestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the log entry was received by Logging.
- name: severity
  type: STRING
  mode: NULLABLE
  description: The severity of the log entry. The default value is `LogSeverity.DEFAULT`.
- name: insertId
  type: STRING
  mode: NULLABLE
  description: A unique identifier for the log entry. Logging considers other log
    entries in the same project, with the same `timestamp`, and with the same `insertId`
    to be duplicates which are removed in a single query result.
- name: httpRequest
  type: RECORD
  mode: NULLABLE
  description: Information about the HTTP request associated with this log entry,
    if applicable.
  fields:
  - name: requestMethod
    type: STRING
    mode: NULLABLE
    description: 'The request method. Examples: "GET", "HEAD", "PUT", "POST".'
  - name: requestUrl
    type: STRING
    mode: NULLABLE
    description: The scheme (http, https), the host name, the path and the query portion
      of the URL that was requested.
  - name: requestSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP request message in bytes, including the request
      headers and the request body.
  - name: status
    type: INTEGER
    mode: NULLABLE
    description: 'The response code indicating the status of response. Examples: 200,
      404.'
  - name: responseSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP response message sent back to the client, in
      bytes.
  - name: userAgent
    type: STRING
    mode: NULLABLE
    description: The user agent sent by the client.
  - name: remoteIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the client that issued the HTTP
      request.
  - name: serverIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the origin server that the request
      was sent to.
  - name: referer
    type: STRING
    mode: NULLABLE
    description: The referer URL of the request, as defined in HTTP/1.1 Header Field
      Definitions.
  - name: cacheLookup
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not a cache lookup was attempted.
  - name: cacheHit
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not an entity was served from cache (with or without validation).
  - name: cacheValidatedWithOriginServer
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not the response was validated with the origin server
      before being served from cache. This field is only meaningful if `cacheHit`
      is True.
  - name: cacheFillBytes
    type: INTEGER
    mode: NULLABLE
    description: The number of HTTP response bytes inserted into cache. Set only when
      a cache fill was attempted.
  - name: protocol
    type: STRING
    mode: NULLABLE
    description: 'Protocol used for the request. Examples: "HTTP/1.1", "HTTP/2".'
- name: labels
  type: RECORD
  mode: NULLABLE
  description: A map of key, value pairs that provides additional information about
    the log entry.
  fields:
  - name: application
    type: STRING
    mode: NULLABLE
    description: Application label identifying the FxA application.
  - name: stack
    type: STRING
    mode: NULLABLE
    description: Stack label from the log metadata.
  - name: env
    type: STRING
    mode: NULLABLE
    description: Deployment environment label.
  - name: compute_googleapis_com_resource_name
    type: STRING
    mode: NULLABLE
    description: GCP Compute resource name (compute.googleapis.com/resource_name),
      identifying the VM or node that generated the log entry.
  - name: type
    type: STRING
    mode: NULLABLE
    description: Type label from the log metadata indicating the log source category.
- name: operation
  type: RECORD
  mode: NULLABLE
  description: Information about an operation associated with the log entry, if applicable.
  fields:
  - name: id
    type: STRING
    mode: NULLABLE
    description: An arbitrary operation identifier. Log entries with the same identifier
      are assumed to be part of the same operation.
  - name: producer
    type: STRING
    mode: NULLABLE
    description: An arbitrary producer identifier. The combination of `id` and `producer`
      must be globally unique.
  - name: first
    type: BOOLEAN
    mode: NULLABLE
    description: Set this to True if this is the first log entry in the operation.
  - name: last
    type: BOOLEAN
    mode: NULLABLE
    description: Set this to True if this is the last log entry in the operation.
- name: trace
  type: STRING
  mode: NULLABLE
  description: The trace ID being written to Cloud Trace in association with this
    log entry.
- name: spanId
  type: STRING
  mode: NULLABLE
  description: The ID of the Cloud Trace span associated with the current operation
    in which the log is being written.
- name: traceSampled
  type: BOOLEAN
  mode: NULLABLE
  description: The sampling decision of the span associated with the log entry at
    the time the log entry was created.
- name: sourceLocation
  type: RECORD
  mode: NULLABLE
  description: Source code location information associated with the log entry, if
    any.
  fields:
  - name: file
    type: STRING
    mode: NULLABLE
    description: Source file name. Depending on the runtime environment, this might
      be a simple name or a fully-qualified name.
  - name: line
    type: INTEGER
    mode: NULLABLE
    description: Line within the source file. 1-based; 0 indicates no line number
      available.
  - name: function
    type: STRING
    mode: NULLABLE
    description: Human-readable name of the function or method being invoked, with
      optional context such as the class or package name.
- name: split
  type: RECORD
  mode: NULLABLE
  description: Information indicating this LogEntry is part of a sequence of multiple
    log entries split from a single LogEntry.
  fields:
  - name: uid
    type: STRING
    mode: NULLABLE
    description: A globally unique identifier for all log entries in a sequence of
      split log entries.
  - name: index
    type: INTEGER
    mode: NULLABLE
    description: The index of this LogEntry in the sequence of split log entries.
  - name: totalSplits
    type: INTEGER
    mode: NULLABLE
    description: The total number of log entries that the original LogEntry was split
      into.
