fields:
- name: account_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the user's logged in to an FxA account.
- name: activity_segment
  type: STRING
  description: Classification of users based on their browsing activity.
    E.g., infrequent, casual, regular.
  aliases:
  - segment
  possible_values:
  - casual_user
  - core_user
  - infrequent_user
  - regular_user
  - other
- name: adjust_network
  type: STRING
  mode: NULLABLE
  description: The name of the Adjust Network that sourced the installation.
- name: app_build_id
  type: STRING
  description: The build ID of the application.
  aliases:
  - build_id
- name: app_version
  type: INTEGER
  description: User visible version string (e.g. "1.0.3") for the browser.
  aliases:
  - version
  - app_display_version
- name: app_version_major
  type: INTEGER
  description: The major version of the user visible app version string for the browser,
    e.g. "142.1.3", has major version 142
- name: app_version_minor
  type: INTEGER
  description: The minor version of the user visible app version string for the browser,
    e.g. "142.1.3" has minor version 1
- name: app_version_patch
  type: INTEGER
  description: The patch version of the user visible app version string for the browser,
    e.g. "142.1.3" has patch version 3
- name: app_name
  type: STRING
  description: The name of the browser or application.
- name: architecture
  type: STRING
  description: The architecture of the device, (e.g. "arm", "x86").
- name: branch
  type: STRING
  description: The Nimbus experiment branch to which the client was assigned
    (e.g., "control", "treatment-a", "treatment-b").
- name: attribution_campaign
  type: STRING
  description: The campaign this client/install was attributed to (utm_campaign
    value, identifying a specific marketing campaign or promotion).
- name: attribution_content
  type: STRING
  description: The attribution content; similar or the same as UTM content.
- name: attribution_experiment
  type: STRING
  description: The attribution experiment key.
- name: attribution_medium
  type: STRING
  description: The attribution medium; similar or the same as UTM medium.
- name: attribution_source
  type: STRING
  description: The attribution source; similar or the same as UTM source.
- name: attribution_variation
  type: STRING
  description: The attribution variation key.
- name: client_id
  type: STRING
  description: A unique identifier (UUID) for the client.
- name: context_id
  type: STRING
  description: A unique identifier (UUID) for clients in contextual services user
    interaction pings, e.g. top-sites ping.
- name: country
  type: STRING
  description: Name of the country in which the activity took place, as determined by
    the IP geolocation.
  aliases:
  - normalized_country
  - geo
- name: country_code
  type: STRING
  description: Code of the country in which the activity took place, as determined by
    the IP geolocation. Unknown or NULL values are normally stored as '??'.
  aliases:
  - normalized_country_code
- name: created_at
  type: TIMESTAMP
  description: Timestamp when the row was created.
  aliases:
  - created_timestamp
  - created_date
- name: dau
  type: INTEGER
  description: The number of daily active users, corresponding to the count of clients that reported
    at least one ping on the submission_date and qualify as active.
- name: first_run_date
  type: DATE
  mode: NULLABLE
  description: The date of the first run of the application.
- name: first_seen_date
  type: DATE
  mode: NULLABLE
  description: Date when the server first received a ping from this client.
- name: wau
  type: INTEGER
  description: The number of weekly active users, corresponding to the count of clients that reported
    at least one ping on the previous 7 days from the submission_date and qualify as active.
- name: mau
  type: INTEGER
  description: The number of monthly active users, corresponding to the count of clients that reported
    at least one ping on the previous 28 days from the submission_date and qualify as active.
- name: distribution_id
  type: STRING
  description: The distribution id associated with the install of Firefox.
- name: document_id
  type: STRING
  description: The document ID specified in the URI when the client sent this message.
- name: is_bot_generated
  type: BOOLEAN
  description: A flag indicating whether the record was generated by a bot rather
    than a real user interaction.
- name: is_default_browser
  type: BOOLEAN
  description: A flag indicating whether the browser is set as the default browser on the client side.
- name: is_desktop
  type: BOOLEAN
  description: Indicates if the client is included in the desktop KPI.
- name: is_mobile
  type: BOOLEAN
  description: Indicates if the client is included in the mobile KPI.
- name: isp_name
  type: STRING
  description: The name of the internet service provider associated with the client's IP address.
  aliases:
  - isp
- name: locale
  type: STRING
  description: Set of language- and/or country-based preferences for a user interface.
- name: normalized_channel
  description: The normalized channel the application is being distributed on.
  type: STRING
  aliases:
  - channel
  possible_values:
  - release
  - beta
  - nightly
  - aurora
  - esr
  - Other
- name: normalized_os
  type: STRING
  description: The normalized name of the operating system running at the client.
  aliases:
  - os
- name: os_code
  type: STRING
  mode: NULLABLE
  description: The operating system code based on the Common Platform Enumeration CPE.
- name: os_version
  type: STRING
  description: The operating system version running at the client prior to
    normalization (e.g. "4.18.0-553.97.1.el8_10.aarch64" or
    "6.11+parrot-amd64" for Linux; "10.0" for Windows, "25.3.0" for macOS,
    "26.3.1" for iOS, "16" for Android). Windows 10 and Windows 11 both
    show "10.0". Use `windows_build_number >= 22000` to identify
    Windows 11.
- name: normalized_os_version
  type: STRING
  description: The operating system version normalized to a consistent format
    at ingestion (e.g. "10.0" for Windows, "16" for Android, "26.3.1" for
    iOS, "25.3.0" for macOS, "6.8" for Linux). Windows 10 and Windows 11
    both show "10.0". Use `windows_build_number >= 22000` to identify
    Windows 11.
- name: os_major
  type: INTEGER
  description: Major or first part of the operating system version running at the
    client. E.g. for version "100.9.11", the major is 100.
  aliases:
  - os_major_version
  - os_version_major
- name: os_minor
  type: INTEGER
  description: Minor part of the operating system version running at the client. E.g.
    for version "100.9.11", the minor is 9.
  aliases:
  - os_minor_version
  - os_version_minor
- name: profile_group_id
  type: STRING
  description: A UUID uniquely identifying the profile group, not shared with other telemetry data.
- name: sample_id
  type: INTEGER
  description: A number, 0-99, that samples by client_id and allows filtering data for analysis.
    It is a pipeline-generated artifact that should match between pings.
- name: source_column
  type: STRING
  description: Column name in the source used to ingest the data.
- name: source_report
  type: STRING
  description: Name of the report file used to ingest the data.
  aliases:
  - source_file
- name: submission_date
  type: DATE
  description: The date when the telemetry ping is received on the server side.
- name: submission_hour
  type: TIMESTAMP
  description: The submission_timestamp truncated to the hour.
- name: submission_month
  type: DATE
  description: First calendar day of the month extracted from submission_date or
    submission_timestamp.
- name: submission_timestamp
  type: TIMESTAMP
  description: Timestamp when the ping is received on the server side.
- name: telemetry_sdk_build
  type: STRING
  description: The version of the Glean SDK at the time the ping was collected (e.g. 25.0.0).
- name: updated_at
  type: TIMESTAMP
  description: Most recent date and time when the row was updated.
  aliases:
  - updated_timestamp
  - updated_date
- name: normalized_app_name
  description: The normalized name of the Mozilla browser application, e.g. 'Firefox Desktop', 'Fenix', 'Firefox iOS', 'Focus Android'. BrowserStack
    clients are suffixed with ' BrowserStack'.
- name: legacy_telemetry_client_id
  description: The legacy Telemetry client_id UUID for this client. Null (~1.1%) when legacy telemetry was not yet initialized.
- name: additional_properties
  description: A JSON string containing any extra fields present in the original ping payload that were not mapped to typed schema columns during ingestion.
    Useful for accessing fields not yet promoted to the main schema.
- name: event_timestamp
  description: The timestamp of the last sync of this subscription record from Stripe (sourced from the stripe_subscriptions_history synced_at field),
    indicating when the data was last updated.
- name: event_name
  description: Name of the 'urlbar' event represented by this row- 'engagement', 'abandonment', 'bounce', or 'disable'.
- name: event_category
  description: The category of the legacy telemetry event, grouping related events by functional area (e.g. 'normandy', 'navigation'). Corresponds
    to the category field in the main ping events schema.
- name: event
  description: The telemetry event name within its category, identifying the specific action recorded (e.g., 'trigger.reason', 'uptake.normandy').
    Null for rows representing only property-level indices.
- name: city
  description: The city associated with the client's IP address as determined by IP geolocation. Null or '??' when city cannot be determined.
- name: event_id
  description: Row identifier UUID. When unnesting the results column, use 'COUNT(DISTINCT event_id)' to count events.
- name: reason
  description: The low-level crash reason code (e.g., 'EXCEPTION_BREAKPOINT', 'SIGSEGV / SEGV_MAPERR').
- name: days_seen_bits
  description: A bit pattern representing the days within a 28-day window on which the client was seen active (had at least one URI visit for desktop,
    or any qualifying activity for mobile). The least significant bit represents the submission_date.
- name: event_extra
  description: JSON object containing additional event-specific key-value pairs parsed from the raw EVENT_EXTRAS field, providing supplementary context
    for the event such as item IDs, positions, or experiment flags.
- name: experiments
  description: An array of key-value pairs listing the Nimbus experiments and rollouts the client was enrolled in on the submission date, where key
    is the experiment slug and value is the branch name (e.g. 'control', 'treatment-a').
- name: device_manufacturer
  description: The manufacturer of the device the application is running on. Not set if the device manufacturer cannot be determined.
- name: app_channel
  description: The release channel for this application entry, e.g. 'release', 'beta', or 'nightly'.
- name: device_model
  description: The device model identifier for mobile clients (e.g. 'iPhone14,5', 'SM-G955U'). Null for Firefox Desktop clients.
- name: is_new_profile
  description: True if submission_date equals first_seen_date, indicating the client was first observed on this day and is a new profile.
- name: policies_is_enterprise
  description: True if the client is determined to be an enterprise user based on various signals. Fully null in the sampled data for this Android
    Fenix table.
- name: active_hours_sum
  description: Total hours the browser was actively used by the client on the submission date (desktop only), derived from subsession_hours_sum. Null
    for mobile clients.
- name: app_build
  description: The build identifier generated by the CI system (e.g. '2016160439'). If not provided through configuration, set to 'Unknown'.
- name: attribution_dltoken
  description: A token identifying the specific download that led to this Firefox installation, used for download attribution. Null when attribution
    data was not captured at install time (100% null in sampled data 2026-06-02).
- name: days_active_bits
  description: A 28-bit integer bitmask representing the days the client was active in the 28-day window ending on submission_date; bit 0 corresponds
    to submission_date and higher bits to earlier days.
- name: days_created_profile_bits
  description: A bit pattern tracking on which days within a 28-day window the client's profile was first created. Used to identify new profile creation
    trends over time.
- name: durations
  description: Total browsing session duration in hours for the client on the submission date. For desktop, derived from subsession_hours_sum; for
    mobile, derived from equivalent session duration metrics.
- name: install_source
  description: The install source identifier for mobile clients (e.g., 'com.android.vending' for Google Play). Null for ~88% of rows.
- name: windows_build_number
  description: The Windows OS build number (e.g. 19041 for Windows 10 2004); null for non-Windows clients.
- name: android_sdk_version
  description: The optional Android SDK version of the software running on this hardware device (e.g. '35' for Android 15).
- name: geo_subdivision
  description: The first-level administrative subdivision code for the client's IP-geolocated location. Fully null in the sampled data for this joined
    view.
- name: attribution_dlsource
  description: The download source that served the Firefox installer (e.g. 'mozorg', 'mozillaci', 'fxdotcom', 'desktoplauncher'), as recorded in the
    attribution data.
- name: attribution_ua
  description: The browser user agent used to download the Firefox installer, recorded at first seen. Common values include 'chrome', 'edge', 'firefox',
    'other', 'ie'.
- name: days_seen_session_end_bits
  description: A 28-bit integer bitmask recording the days within the last 28 days on which this client ended a session; bit 0 (rightmost) represents
    the current submission_date.
- name: days_seen_session_start_bits
  description: A 28-bit integer bitmask recording the days within the last 28 days on which this client started a session; bit 0 (rightmost) represents
    the current submission_date. Zero indicates no session starts in the window.
- name: distribution_version
  description: The version string of the Firefox distribution (e.g. '1.0', '2023.6'); null in 81.1% of rows where no distribution is set.
- name: browser_engagement_active_ticks
  description: Count of active ticks (5-second intervals with user activity) during the browser session. Observed as 0 for all sampled clients, indicating
    this metric may not be populated for Fenix.
- name: browser_engagement_uri_count
  description: Count of URIs engaged with during the browser session, sourced from browser engagement telemetry. Observed as 0 for all sampled clients,
    indicating this metric may not be populated for Fenix.
- name: distributor
  description: The name of the organisation or channel that distributed this Firefox build (e.g. 'canonical', 'mozillaonline', 'mint'); null in 90.7%
    of rows for standard Mozilla builds.
- name: distributor_channel
  description: The distribution channel identifier for the Firefox install (e.g. 'mainWinStub', 'ubuntu', 'zena'); null in 90.8% of rows for standard
    builds.
- name: startup_profile_selection_reason_first
  description: The reason the Firefox profile was selected when the browser first launched (e.g. 'default', 'firstrun-created-default', 'argument-profile');
    null in 21.8% of rows.
- name: attribution_msclkid
  description: The Microsoft Click ID (msclkid) from Microsoft/Bing attribution for this Firefox install. Fully null in the sampled data.
- name: distribution_partner_id
  description: The partner ID associated with the distribution of this Firefox install. Fully null in the sampled data.
- name: metrics
  description: Nested struct containing smoot usage metrics computed at different lag windows (day 0, day 6, day 13) for this non-desktop dimension
    combination.
- name: days_visited_1_uri_bits
  description: A 28-bit integer encoding the days within the past 28 days on which the client visited at least 1 URI (normal + private mode combined);
    used for Active DAU calculations.
- name: days_since_seen
  description: The number of days since the client was last seen active, relative to submission_date. A value of 0 means the client was active on the
    submission date itself.
- name: days_since_created_profile
  description: Number of days since the profile was created, derived from profile_creation_date. Null for ~95% of clients where creation date is unavailable.
- name: days_since_active
  description: Number of days since this client was last considered active. Null for ~9% of clients who have never been recorded as active.
- name: days_since_seen_session_end
  description: Number of days since this client last recorded a session end event. Null for ~1% of clients where no session end has been recorded.
- name: days_since_seen_session_start
  description: Number of days since this client last recorded a session start event. Null for ~9% of clients where no session start has been recorded.
- name: days_since_visited_1_uri
  description: Number of days since this client visited at least one URI. Fully null in the sampled data, indicating URI visit tracking is not currently
    populated for Fenix.
- name: experiment_branch
  description: The experiment branch this data is associated with.
- name: normalized_app_id
  description: The normalized application identifier (e.g. 'org_mozilla_firefox', 'org_mozilla_fenix'). Null for ~96.5% of rows which are desktop Firefox
    crashes.
- name: experiment
  description: Unique slug identifier of the experiment for which search activity is aggregated (e.g. 'smart-shortcuts-v4p1'). Null in ~0.1% of rows.
- name: total_events
  description: Total Events - The total number of non-page view events.
- name: window_end
  description: End timestamp of the 5-minute aggregation window during which experiment search events were collected.
- name: window_start
  description: Start timestamp of the 5-minute aggregation window during which experiment search events were collected.
- name: days_sent_metrics_ping_bits
  description: A 28-bit integer bitmask recording days the client sent a metrics ping. Fully null in the sampled data, indicating this field is not
    currently populated.
- name: n_metrics_ping
  description: The number of metrics pings sent by this client in the last-seen window. Fully null in the sampled data, indicating this field is not
    currently populated.
- name: date
  description: The full timestamp (ISO 8601) when the crash report was processed by the Socorro pipeline.
- name: id
  description: The ping type identifier for this main ping, as defined in the Firefox legacy telemetry schema (e.g. 'main').
- name: type
  description: The ping type string as reported in the ping's URI, indicating the category of telemetry data (e.g. 'main' for the main Firefox Desktop
    telemetry ping).
- name: is_active
  description: Indicates whether the advertiser has at least one campaign running during the month.
- name: days_seen_bytes
  description: A 365-bit (46-byte) binary representation of the days this client was active over the past year, where the rightmost bit represents
    the current day. Used to compute rolling activity windows without requiring a full history scan.
- name: status
  description: 'Current Stripe subscription status: ''active'' (paying), ''canceled'' (ended), or ''past_due'' (payment overdue). Excludes ''incomplete''
    and ''incomplete_expired'' records.'
- name: baseline_profile_group_id
  description: A UUID identifying the profile group from the baseline ping. Fully null in the sampled data, indicating this field is not currently
    populated.
- name: search_count
  description: Total number of searches performed by the client on the submission date, across all search engines and access points. Null when no search
    data is available.
- name: name
  description: Human-readable display name of the add-on (e.g. 'uBlock Origin', 'Form Autofill').
- name: days_active_bytes
  description: Days Active Bytes.
- name: region
  description: ISO country/region code indicating the geographic market for which this recommendation data was collected (e.g., 'US', 'DE', 'GB').
    Null for ~12% of rows.
- name: source
  description: The identifier of the remote content source being tracked for uptake (e.g., a Remote Settings collection name).
- name: app_id
  description: Unique application identifier in dot notation (e.g. 'firefox.desktop', 'org.mozilla.fenix'), as defined in the Glean application registry.
- name: platform
  description: The operating system platform where the crash occurred (e.g., 'Windows NT', 'Android', 'Linux', 'Mac OS X').
- name: usage_profile_id
  description: A UUID of the usage_profile.
- name: value
  description: The numeric value of the KPI metric for the given submission_date, measure, and forecast run. For historical rows (source='historical',
    measure='observed'), this is the actual DAU count.
- name: url
  description: URL of the application's source code repository (e.g. 'https://github.com/mozilla-firefox/firefox').
- name: created
  description: bq-datetime.
- name: state
  description: The current state of the email address in Campaign Monitor. All observed values are 'Suppressed', indicating the address is actively
    suppressed.
- name: partition_date
  description: The date used to partition this table, typically matching submission_date and used for efficient query filtering.
- name: product
  description: The Mozilla product that crashed (e.g., 'Firefox', 'Fenix', 'Thunderbird').
- name: campaign_id
  description: Google Ads campaign ID from GA4 attribution.
- name: impressions
  description: Total number of impressions observed at this (position, tile_format) slot over the modelling window, used to weight the propensity estimate.
- name: campaign_name
  description: Human-readable name of the campaign for the email marked as spam. Null for ~2% of Canvas-originated records.
- name: description
  description: 'Optional human-readable description providing additional context for the release, such as a CVE reference or blog post link. Null for
    most releases (sampled 2026-06-02: ~99.8% null).'
- name: end_date
  description: 'The effective end date of this subscription record: the actual ended_at timestamp for canceled subscriptions, or the current date for
    active subscriptions.'
- name: device_type
  description: The device type category. Observed as 'Android' for all sampled rows in this Fenix-specific table.
- name: category
  description: Release category describing the type of Firefox release. Observed values include 'dev' (developer/beta builds), 'stability' (dot releases),
    'major' (major version releases), and 'esr' (Extended Support Releases).
- name: language
  description: User's language.
- name: metric
  description: The name of the scalar or keyed-scalar metric being aggregated (e.g., 'browser_ui_toolbar_widgets'). High-cardinality — 482 distinct
    values observed.
- name: start_date
  description: start_date.
- name: user_id
  description: Braze internal user identifier (24-character hex string) for the user whose global subscription state changed.
- name: active_metric_date
  description: Number of profiles active on the retention_metric_date.
- name: country_name
  description: Full standardized country name (e.g. 'USA', 'Germany') corresponding to the country code, sourced from the static standardized country
    names reference table. Null for ~4% of subscriptions.
- name: first_submission_timestamp
  description: Timestamp of the first submission.
- name: new_profiles
  description: Count of new profiles created matching the usage type and dimension combination on this submission_date.
- name: retained_week_4
  description: True if the client returned to use the browser approximately 4 weeks after first_seen_date. Null in ~91% of rows where not yet applicable.
- name: timestamp
  description: Unix timestamp (in nanoseconds or milliseconds) when the IP privacy event was recorded.
- name: update_count
  description: Number of experiment update events in this aggregation window; always 0 in v2.
- name: criteria
  description: Event-specific filtering conditions (implemented in templated config file).
- name: device
  description: The device type or form factor reported by the client.
- name: event_type
  description: High-level category of the subscription lifecycle event (e.g. 'New', 'Cancelled', 'Upgraded', 'Renewed').
- name: exposure_count
  description: Number of experiment exposure events in this aggregation window, recording when a client encountered the experimental feature.
- name: first_event_timestamp
  description: Timestamp of the first event.
- name: first_seen_city
  description: The city name where this client was first seen, as determined by IP geolocation.
- name: first_seen_city_date
  description: The date on which this client was first seen in the first_seen_city.
- name: first_seen_country
  description: The ISO 3166-1 alpha-2 country code where this client was first seen, as determined by IP geolocation.
- name: first_seen_subdivision1
  description: The first-level administrative subdivision (e.g. state or province code) where this client was first seen, as determined by IP geolocation.
    Null for ~1% of clients where subdivision cannot be determined.
- name: first_seen_subdivision2
  description: The second-level administrative subdivision where this client was first seen, as determined by IP geolocation. Null for ~91% of clients.
- name: last_seen_city
  description: The city name where this client was most recently seen, as determined by IP geolocation. Updated each time the client is seen in a new
    city.
- name: last_seen_city_date
  description: The date on which this client was most recently seen in last_seen_city.
- name: last_seen_country
  description: The ISO 3166-1 alpha-2 country code where this client was most recently seen, as determined by IP geolocation.
- name: last_seen_subdivision1
  description: The first-level administrative subdivision (e.g. state or province code) where this client was most recently seen, as determined by
    IP geolocation. Null for ~1% of clients.
- name: last_seen_subdivision2
  description: The second-level administrative subdivision where this client was most recently seen, as determined by IP geolocation. Null for ~91%
    of clients.
- name: ad_clicks_count
  description: Number of ad clicks on search results pages for enrolled experiment clients. Null for ~60.9% of rows.
- name: clicks
  description: number of clicks.
- name: disqualification_count
  description: Number of disqualification events in this aggregation window, where a client was removed from an experiment due to targeting rule failure.
- name: enroll_count
  description: Number of experiment enrollment events observed in this 5-minute window for the given experiment, branch, and channel.
- name: enroll_failed_count
  description: Number of failed enrollment attempts in this aggregation window; always 0 in v2.
- name: first_seen_year
  description: The calendar year when the client profile was first seen by Mozilla telemetry.
- name: graduate_count
  description: Number of experiment graduation events in this aggregation window; always 0 in v2 as graduation was removed from later Nimbus versions.
- name: new_profiles_metric_date
  description: Number of new profiles on the retention_metric_date.
- name: provider
  description: Payment provider used for the subscription ('Stripe' or 'Paypal'). Null for ~4% of subscriptions where the provider could not be determined.
- name: repeat_profiles
  description: Number of new profiles on the metric date that were DAU at least twice in the next 28 days.
- name: retained_week_4_new_profiles
  description: Number of new profiles on the metric date that were DAU between days 22 and 28 after the metric date.
- name: search_with_ads_count
  description: Number of searches that included ads in the results, as recorded for enrolled experiment clients. Null for ~54.5% of rows.
- name: title
  description: The title of an ad, as shown to the user.
- name: unenroll_count
  description: Number of experiment unenrollment events observed in this aggregation window.
- name: unenroll_failed_count
  description: Number of failed unenrollment attempts in this aggregation window; always 0 in v2.
- name: update_failed_count
  description: Number of failed experiment update attempts in this aggregation window; always 0 in v2.
- name: ad_clicks
  description: Key-value map of search access point identifiers to the number of ad clicks recorded for the client during the aggregation period.
- name: attributed
  description: True if the client has attribution data. Always false for non-desktop clients in this table.
- name: daily_users
  description: Count of daily users from telemetry.active_users for this app name and submission_date, based on ping-sending behavior.
- name: metric_date
  description: reporting date for feature usage, aligned with DAU.
- name: monthly_users
  description: Count of monthly users from telemetry.active_users for this app name and submission_date.
- name: uri_count
  description: Total number of URIs visited by the client on the submission date. For desktop, derived from the browser engagement scalar; null for
    Focus Android and some mobile platforms.
- name: validation_failed_count
  description: Number of validation failure events in this aggregation window; always 0 in v2.
- name: weekly_users
  description: Count of weekly users from telemetry.active_users for this app name and submission_date.
- name: ad_click
  description: Total number of ad clicks recorded for the client on the submission date, aggregated across all search engines. Null when no search
    data is available.
- name: search_with_ads
  description: Total number of search result pages that contained ads, seen by the client on the submission date. Null when no search data is available.
- name: count
  description: The number of Relay subscription events matching this row's dimension combination (event type, plan, country, provider, etc.) on the
    event_date.
- name: event_date
  description: The calendar date on which the subscription lifecycle event occurred.
- name: ping_sent_metric_date
  description: Number of profiles that sent a ping on the metric date.
- name: ping_sent_week_4
  description: Number of profiles that sent a ping between days 22 and 28 after the metric date.
- name: product_id
  description: The Stripe product identifier (e.g. 'prod_KGizMiBqUJdYoY') for the Relay or bundled product the subscriber has purchased.
- name: active
  description: 'Whether the account is active. Account is considered active if it is not

    disabled and has a verified email address.'
- name: browser
  description: Browser or proxy used to open the email, parsed from the user agent. Null for ~14% of records; common values include 'GoogleImageProxy',
    'ApplePrivacyProxy', and 'Chrome'.
- name: content
  description: The attribution content (UTM content) for the Firefox installation; null when the client is not attributed.
- name: currency
  description: Currency code (e.g., usd).
- name: email
  description: Lowercased email address of the contact on the suppression list. This field contains PII and is used as the unique identifier — one
    row is retained per email address, representing the earliest suppression event across all sources.
- name: sessions
  description: The total number of browsing sessions recorded by the client on their most recent active day.
- name: activations
  description: The count of new profiles that met the activation criterion (returning to use the browser within the first week) within this row's dimensions.
- name: campaign
  description: The attribution campaign (UTM campaign) for the Firefox installation; null when the client is not attributed.
- name: client_count
  description: Number of distinct Firefox clients with this combination of hardware attributes in the reporting window.
- name: default_search_engine
  description: The identifier or name of the default search engine configured in the browser, e.g. 'google-b-d', 'baidu'. Null for approximately 0.9%
    of records.
- name: duration
  description: Time elapsed since start until end of task's exeuction (seconds).
- name: is_dau
  description: Flag indicating if the client was considered as dau on the submission_date.
- name: is_mau
  description: Flag indicating if the client was considered as mau on the submission_date.
- name: is_wau
  description: Flag indicating if the client was considered as wau on the submission_date.
- name: os_name
  description: Name of the operating system used by the client.
- name: paid_vs_organic
  description: Is the client attribution organic or paid.
- name: priority
  description: Priority level of the issue as assigned by Bigeye (ISSUE_PRIORITY_LOW, ISSUE_PRIORITY_MED, or ISSUE_PRIORITY_HIGH).
- name: slug
  description: URL-safe slug for the article, used as the last path segment of the SUMO article URL.
- name: active_hours
  description: Total active browsing hours recorded by active clients on the submission_date.
- name: app_version_is_major_release
  description: True if the app version corresponds to a major release build (patch revision is 0); false for point releases.
- name: app_version_patch_revision
  description: The patch or revision number of the app version string (e.g. for '142.1.3', the patch revision is 3). Null for major releases without
    a patch component.
- name: early_engagements
  description: Number of early_engagements for the first seen date.
- name: num_days_active_day_2_7
  description: Number of days the client was active between day 2 and 7 since first_seen_date.
- name: num_days_seen_day_2_7
  description: Number of days we saw the client in between 2nd and 7th days since first_seen_date.
- name: os_grouped
  description: Grouped operating system name (e.g., 'Windows', 'Mac', 'Android', 'Linux', 'iOS', 'Other').
- name: paid_vs_organic_gclid
  description: Classification of the install as 'Paid' (driven by a Google Click ID / gclid) or 'Organic' (not paid). Null for ~11% of clients where
    classification is unavailable.
- name: position
  description: 0-indexed position of the tile in the newtab grid (0–200). Used with tile_format to look up the propensity weight for debiasing impression
    counts.
- name: sap
  description: Search Access Point.
- name: subdivision1
  description: First-level administrative subdivision (e.g. state, province) from IP geolocation, using ISO 3166-2 subdivision codes. Null for ~5%
    of rows.
- name: activity_date
  description: The date that the conversion action took place.
- name: clients
  description: Count of distinct newtab clients opening the Newtab page for submission_month. Calculated from Newtab.
- name: geo_country
  description: ISO 3166-1 alpha-2 country code inferred from the client's IP address.
- name: organic_search_count
  description: Total number of organic (non-ad) searches performed by the client on the submission date. Null when no search data is available.
- name: surface
  description: Surface in which the client operating system runs, e.g. Desktop, Mobile.
- name: total_downloads
  description: Number of distinct clients that triggered an install_stats event.
- name: updated
  description: bq-datetime.
- name: as_of_date
  description: The date for which row counts are captured across FxA database tables, used as the partition column.
- name: creation_date
  description: The ISO 8601 timestamp string recorded by the client at the moment the ping was created, before it was submitted to the server.
- name: events
  description: Array of Telemetry event records captured during this subsession, each with a timestamp, category, method, object, optional string value,
    and extra key-value pairs.
- name: expires
  description: Expires. Can be "never", a date or a version number.
- name: fxa_uid
  description: The Firefox Accounts (FxA) user ID (SHA-256 hex string) associated with the subscriber, used to link the subscription to an FxA account.
- name: index
  description: A compact string encoding of numeric_index using Unicode code points, used to represent the event type in compressed event strings stored
    in events_daily.
- name: is_activated
  description: Indicates whether the advertiser launched their first campaign in the month.
- name: new_profile_metric_date
  description: Flag to indicate if the profile was a new profile on the retention_metric_date.
- name: plan_id
  description: The Stripe price/plan identifier (e.g. 'price_1JmRSRJNcmPzuWtRN9MG5cBy') for the billing plan the subscriber is currently enrolled in.
- name: price
  description: Price.
- name: product_name
  description: Human-readable name of the subscribed product (e.g. 'Relay Premium', 'Mozilla VPN & Firefox Relay', 'Relay - Phones').
- name: repeat_profile
  description: 'Indicates if a new profile from the metric date

    was classified as dau at least twice in their first 28 days.'
- name: retained_week_4_new_profile
  description: Retained Week 4 New Profile.
- name: subscription_id
  description: The Stripe subscription identifier (e.g. 'sub_1LZXOfJNcmPzuWtRX6qIHqHA') uniquely identifying this subscription record. For plan changes,
    a sequence suffix (e.g. '-2') is appended to distinguish successive plan segments.
- name: _fivetran_synced
  description: The timestamp when Fivetran last synced this record from the Meta Ads source.
- name: activated
  description: True if the client met the new-profile activation criterion (returned to use the browser within the first week). False in ~99.8% of
    sampled rows, as activation is rare on any given day.
- name: addon_id
  description: Unique identifier string for the add-on (e.g. 'uBlock0@raymondhill.net', 'formautofill@mozilla.org').
- name: addon_version
  description: The version of the addon.
- name: app
  description: For now always "Desktop".
- name: customer_id
  description: The Stripe customer identifier (e.g. 'cus_MFFy4ibodsAQ0Z') uniquely identifying the billing customer account associated with this subscription.
- name: ended_at
  description: The timestamp when the subscription actually ended. Null for currently active subscriptions (~44% of rows sampled 2026-06-02).
- name: first_reported_country
  description: First reported country for the client installation.
- name: installs
  description: Count of successful new Firefox installations from Windows installer telemetry. Excludes silent installs, upgrades/reinstalls, non-release
    channels, and partner distributions. Only available for 'mozorg windows funnel'.
- name: is_daily_user
  description: Flag indicating if client is considered a daily user on the submission date.
- name: is_monthly_user
  description: Flag indicating if client is considered a monthly user on the submission date.
- name: is_weekly_user
  description: Flag indicating if client is considered a weekly user on the submission date.
- name: medium
  description: The attribution medium (UTM medium) for the Firefox installation; null when the client is not attributed.
- name: model
  description: An identifier for the machine learning model used to generate the recommendations.
- name: release_channel
  description: The Firefox release channel at the time of the crash (e.g., 'release', 'esr', 'nightly', 'beta').
- name: time
  description: The date (truncated to midnight UTC) for which the daily active population count is reported.
- name: appVersion
  description: The user-visible version string of the application at the time the crash or event was recorded (e.g. "128.0"). This is the camelCase
    alias of app_version as sourced from Socorro crash reports.
- name: crash_count
  description: The number of crash events recorded for a given combination of dimensions (e.g. date, process type, channel). Used in aggregate crash-reporting
    tables to summarise crash volume.
- name: crash_process_type
  description: The Firefox multi-process component in which the crash occurred (e.g. "content", "gpu", "main", "utility"). Distinguishes crashes by
    their originating process for triage and trend analysis.
- name: crash_signature
  description: A Socorro-computed string that identifies and groups crash reports by their most representative stack frame(s) (e.g. "OOM | large |
    mozalloc_abort"). Used for crash deduplication and triage across products.
- name: document_event_number
  description: The ordinal position of this event row within its source telemetry document. Used to order or deduplicate events that are unnested from
    a single ping into a flat events table.
- name: event_extra_key
  description: The key name for a single entry in a legacy telemetry event's extra map, produced when event extra key-value pairs are unnested into
    separate rows. Pair with event_extra_value to reconstruct the full extra context for an event.
- name: project
  description: A namespace or grouping identifier for the Mozilla product, repository, or Taskcluster project associated with the row (e.g. "firefox",
    "fenix", "gecko"). Scopes metrics and CI results to a specific engineering project.
