- name: reason
  type: STRING
  mode: NULLABLE
  description: The reason the events ping was submitted; 'startup', 'inactive', 'max_capacity', or 'background'.
- name: experiments
  type: JSON
  mode: NULLABLE
  description: A JSON object mapping Nimbus experiment slugs to their assigned branch and optional enrollment metadata, reflecting the active experiments
    at the time of ping submission.
- name: event_timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The absolute UTC timestamp of when this event occurred, derived by adding the Glean event's relative timestamp to the ping start time.
- name: event_category
  type: STRING
  mode: NULLABLE
  description: The Glean event category portion of the event identifier (e.g. 'onboarding', 'media_state', 'nimbus_events'), identifying the feature
    area.
- name: event_name
  type: STRING
  mode: NULLABLE
  description: The Glean event name portion of the event identifier (e.g. 'play', 'enrollment', 'terms_of_service_accepted'), identifying the specific
    action.
- name: event
  type: STRING
  mode: NULLABLE
  description: The fully-qualified event identifier in 'category.name' format (e.g. 'media_state.play'), combining event_category and event_name.
- name: event_extra
  type: JSON
  mode: NULLABLE
  description: A JSON object containing additional key-value metadata associated with the event, such as addon_id, source, or step. Keys vary by event
    type. Null for events with no extra data.
