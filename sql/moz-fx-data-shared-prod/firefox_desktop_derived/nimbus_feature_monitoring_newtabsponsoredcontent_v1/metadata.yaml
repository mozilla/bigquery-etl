friendly_name: Nimbus feature monitoring - newtabSponsoredContent
description: |-
  Metrics for monitoring the rollout of newtabSponsoredContent via nimbus
owners:
- project-nimbus@mozilla.com
labels:
  dag: bqetl_nimbus_feature_monitoring
  schedule: daily
  owner1: project-nimbus
  table_type: aggregate
scheduling:
  dag_name: bqetl_nimbus_feature_monitoring
