  type: STRING
  mode: NULLABLE
  description: The profile selection reason from the first ping of the day (e.g., 'default', 'restart').
- name: first_document_id
  type: STRING
  mode: NULLABLE
  description: The document ID of the first ping received from this client on the submission date.
- name: partner_id
  type: STRING
  mode: NULLABLE
  description: The partner identifier from the Firefox distribution configuration. Null if no partner.
- name: distribution_version
  type: STRING
  mode: NULLABLE
  description: The version string of the Firefox distribution package. Null for standard builds.
- name: distributor
  type: STRING
  mode: NULLABLE
  description: The name of the organization that distributed this Firefox build (e.g., 'canonical', 'mozillaonline').
- name: distributor_channel
  type: STRING
  mode: NULLABLE
  description: The channel through which the distributor released this Firefox build.
- name: env_build_platform_version
  type: STRING
  mode: NULLABLE
  description: The XULRunner platform version string from the build environment.
- name: env_build_xpcom_abi
  type: STRING
  mode: NULLABLE
  description: The binary ABI string from the build environment (e.g., 'x86_64-msvc', 'aarch64-gcc3').
- name: geo_db_version
  type: STRING
  mode: NULLABLE
  description: The version of the IP geolocation database used to resolve the client's location.
- name: apple_model_id
  type: STRING
  mode: NULLABLE
  description: The hw.model of the hardware running this software. Mac only. e.g.
    "MacBookPro14,1"
- name: max_subsession_counter
  type: INTEGER
  mode: NULLABLE
  description: The highest subsession counter seen from this client on the submission date, indicating total subsession count.
- name: min_subsession_counter
  type: INTEGER
  mode: NULLABLE
  description: The lowest subsession counter seen from this client on the submission date.
- name: startup_profile_selection_first_ping_only
  type: STRING
  mode: NULLABLE
  description: The profile selection reason from the very first ping of the day.
- name: profile_group_id
  type: STRING
  mode: NULLABLE
  description: A UUID uniquely identifying the profile group, not shared with other
    telemetry data.
- name: browser_backup_scheduler_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: 'The value of payload.processes.parent.scalars.browser_backup_scheduler_enabled
    most frequently seen on the submission date.

    If there is a tie, the value seen last according to submission_timestamp.

    True if the BackupService is configured to automatically create backups in the
    background.'
- name: browser_backup_archive_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: True if the user can create backups, i.e. it has not been disabled
    by a pref or otherwise deemed incompatible.
