fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: normalized_country_code
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code representing the country associated
    with the client's IP address at the time of submission, such as 'US', 'DE', or
    'BR'.
- name: nbr_unique_fx_release_channel_clients_with_uninstalls
  type: INTEGER
  mode: NULLABLE
  description: Count of unique client IDs with uninstalls for Firefox release channel
- name: avg_profile_creation_date
  type: FLOAT
  mode: NULLABLE
  description: The average profile creation date for those uninstalling, expressed
    numerically
- name: nbr_unique_clients_with_uninstalls
  type: INTEGER
  mode: NULLABLE
  description: Count of unique clients with uninstalls
