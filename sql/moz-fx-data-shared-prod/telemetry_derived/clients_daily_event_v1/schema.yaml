fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- name: n_logged_event
  type: INTEGER
  mode: NULLABLE
  description: The total number of events logged for a client or session during the
    observation period. Reflects the volume of tracked user interactions or system
    events recorded.
- name: n_created_pictureinpicture
  type: INTEGER
  mode: NULLABLE
  description: The number of times a Picture-in-Picture video window was created during
    the observation period. A value of 0 indicates the feature was not used; null
    indicates the data was not collected.
- name: n_viewed_protection_report
  type: INTEGER
  mode: NULLABLE
  description: The number of times the Firefox Privacy Protections report was viewed
    during the observation period. A value of 0 indicates the report was not opened.
- name: profile_group_id
  type: STRING
  mode: NULLABLE
  description: A UUID that identifies a group of profiles belonging to the same user
    or installation context. Null when profile group information is unavailable.
