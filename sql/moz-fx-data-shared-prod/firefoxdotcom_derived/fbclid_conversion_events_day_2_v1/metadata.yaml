friendly_name: fbclid Conversions
description: |-
  Keeps track of each fbclid and related conversion events calculated 2 days after a client is first seen.
  This includes the following events:
  - firefox_first_run
  - firefox_first_ad_click
  - firefox_first_search
  - returned_second_day

  Expected grain: max 1 row per fbclid + conversion_name combination.

owners:
- kik@mozilla.com

labels:
  incremental: true
  table_type: client_level

scheduling:
  dag_name: bqetl_ga4_firefoxdotcom
  date_partition_parameter: activity_date
  date_partition_offset: -2
  parameters: null
  depends_on_past: true

bigquery:
  time_partitioning:
    type: day
    field: activity_date
    require_partition_filter: false
    expiration_days: 775

monitoring:
  enabled: true
