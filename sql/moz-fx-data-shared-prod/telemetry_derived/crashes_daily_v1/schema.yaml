- description: An array of per-process-type crash counts, where each entry's key is the process type (e.g.,
    'main', 'content', 'gpu') and value is the number of detected crashes of that process type, excluding
    shutdown-kill crashes.
  mode: REPEATED
  type: RECORD
  name: process_crash_counts
  fields:
  - mode: NULLABLE
    name: key
    type: STRING
    description: The Firefox process type (e.g., 'main', 'content', 'gpu') for which crashes are counted.
  - mode: NULLABLE
    name: value
    type: INTEGER
    description: The number of detected crashes of the corresponding process type, excluding shutdown-kill
      crashes.
- description: An array of per-process-type counts of shutdown-kill crashes, where each entry's key is the
    process type (e.g., 'main', 'content', 'gpu') and value is the number of crashes of that process type
    attributed to a shutdown kill.
  mode: REPEATED
  type: RECORD
  name: process_shutdown_kill_crash_counts
  fields:
  - mode: NULLABLE
    name: key
    type: STRING
    description: The Firefox process type (e.g., 'main', 'content', 'gpu') for which shutdown-kill crashes
      are counted.
  - mode: NULLABLE
    name: value
    type: INTEGER
    description: The number of shutdown-kill crashes of the corresponding process type.
