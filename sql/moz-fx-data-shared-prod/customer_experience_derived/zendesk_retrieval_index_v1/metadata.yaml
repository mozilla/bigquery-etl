friendly_name: Zendesk Retrieval Index
description: "AI-enriched retrieval table derived from Zendesk customer support tickets,\
  \ containing embeddings\n and semantic features to support grounded question answering\
  \ over Mozilla support data.\n\nGrain: one row per Zendesk ticket.\n\nLLM generated\
  \ fields:\n- ticket_summary_llm\n- ticket_category_llm\n- ticket_language_llm\n\
  - ticket_entities_llm\n- ticket_topics_llm\n- embedding based on [title, content]\n\
  - ticket_sentiment_score based on [title, content]\n\nRead-time fields (computed\
  \ on the `customer_experience.zendesk_retrieval_index` view, not stored here):\n\
  - recency_score = `EXP(-DATE_DIFF(CURRENT_DATE(), creation_date, DAY) / 30)` \u2014\
  \ 30-day exponential decay,\n  1.0 today, ~0.37 after 30 days. Always reflects freshness\
  \ at query time.\n\nMetadata\n- Additional data to support technical processes,\
  \ such as backfills or investigations.\n- The prompt version is a self-managed version\
  \ for changes in the prompt given to the LLM."
owners:
- lvargas@mozilla.com
- mozilla/customer_experience
labels:
  level: gold
  incremental: true
  change_controlled: true
  dag: bqetl_analytics_tables
  owner1: lvargas
scheduling:
  dag_name: bqetl_analytics_tables
bigquery:
  time_partitioning:
    type: day
    field: creation_date
    require_partition_filter: true
    expiration_days: null
  clustering:
    fields:
    - product
    - locale
schema:
  allow_field_addition: true
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  query.sql:
  - moz-fx-data-shared-prod.zendesk_syndicate.ticket
  - moz-fx-data-shared-prod.zendesk_syndicate.ticket_tag
  - moz-fx-data-shared-prod.zendesk_syndicate.ticket_field_history
  - moz-fx-data-shared-prod.zendesk_syndicate.group
  - moz-fx-data-shared-prod.zendesk_syndicate.user
monitoring:
  enabled: true
require_column_descriptions: true
