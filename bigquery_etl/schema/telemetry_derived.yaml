  description: Count of times the CSS Grid Inspector panel was opened during this subsession.
- name: scalar_parent_devtools_grid_showGridAreasOverlay_checked
  description: Count of times the 'Show Grid Areas' overlay option was toggled on in the Grid Inspector.
- name: scalar_parent_devtools_grid_showGridLineNumbers_checked
  description: Count of times the 'Show Grid Line Numbers' option was toggled on in the Grid Inspector.
- name: scalar_parent_devtools_grid_showInfiniteLines_checked
  description: Count of times the 'Show Infinite Lines' option was toggled on in the Grid Inspector.
- name: scalar_parent_devtools_onboarding_is_devtools_user
  description: True if the user was classified as an existing DevTools user during the onboarding flow.
- name: scalar_parent_devtools_responsive_open_trigger
  description: Keyed count of how the Responsive Design Mode was opened (e.g. 'menu', 'shortcut') during this subsession.
- name: scalar_parent_devtools_responsive_toolbox_opened_first
  description: Count of times Responsive Design Mode was the first DevTools panel opened during this subsession.
- name: scalar_parent_devtools_rules_gridinspector_opened
  description: Count of times the Grid Inspector was opened from the CSS Rules panel during this subsession.
- name: scalar_parent_devtools_tool_registered
  description: Keyed boolean map of DevTools tool IDs to whether the tool was registered during this subsession.
- name: scalar_parent_devtools_toolbar_eyedropper_opened
  description: Count of times the color eyedropper tool was opened from the DevTools toolbar during this subsession.
- name: scalar_parent_dom_contentprocess_troubled_due_to_memory
  description: Count of content processes that became troubled (potentially killed) due to low memory conditions.
- name: scalar_parent_formautofill_addresses_fill_type_autofill
  description: Count of address fields automatically filled by the Form Autofill feature during this subsession.
- name: scalar_parent_formautofill_addresses_fill_type_autofill_update
  description: Count of address autofill events that also triggered an update to a saved address profile.
- name: scalar_parent_formautofill_addresses_fill_type_manual
  description: Count of address fields manually filled by the user (rather than via autofill) during this subsession.
- name: scalar_parent_formautofill_availability
  description: True if the Form Autofill feature is available (enabled) for this client during this subsession.
- name: scalar_parent_formautofill_creditCards_fill_type_autofill
  description: Count of credit card fields automatically filled by the Form Autofill feature during this subsession.
- name: scalar_parent_formautofill_creditCards_fill_type_autofill_modified
  description: Count of credit card autofill events where the user modified the autofilled data before submission.
- name: scalar_parent_formautofill_creditCards_fill_type_manual
  description: Count of credit card fields manually filled by the user (rather than via autofill) during this subsession.
- name: scalar_parent_gfx_advanced_layers_failure_id
  description: Keyed count of Advanced Layers failure IDs recorded during this subsession, indicating what caused the feature to be disabled.
- name: scalar_parent_idb_type_persistent_count
  description: Count of persistent-type IndexedDB database opens in the parent process during this subsession.
- name: scalar_parent_idb_type_temporary_count
  description: Count of temporary-type IndexedDB database opens in the parent process during this subsession.
- name: scalar_parent_mediarecorder_recording_count
  description: Count of MediaRecorder API recording sessions started in the parent process during this subsession.
- name: scalar_parent_navigator_storage_estimate_count
  description: Count of navigator.storage.estimate() calls made in the parent process during this subsession.
- name: scalar_parent_navigator_storage_persist_count
  description: Count of navigator.storage.persist() calls made in the parent process during this subsession.
- name: scalar_parent_network_tcp_overlapped_io_canceled_before_finished
  description: Count of TCP overlapped I/O operations that were canceled before completion in the parent process.
- name: scalar_parent_network_tcp_overlapped_result_delayed
  description: Count of TCP overlapped I/O operations that returned a delayed result in the parent process.
- name: scalar_parent_preferences_browser_home_page_change
  description: Keyed count of changes to the browser home page setting, broken down by the new page URL or category.
- name: scalar_parent_preferences_browser_home_page_count
  description: Keyed count of home page URLs configured in Firefox preferences during this subsession.
- name: scalar_parent_preferences_created_new_user_prefs_file
  description: True if a new user preferences file (prefs.js) was created during this subsession.
- name: scalar_parent_preferences_prefs_file_was_invalid
  description: True if the existing prefs.js file was found to be invalid or corrupt at startup during this subsession.
- name: scalar_parent_preferences_prevent_accessibility_services
  description: True if the user preference to prevent external accessibility services from connecting to Firefox is enabled.
- name: scalar_parent_preferences_read_user_js
  description: True if a user.js override file was found and read during Firefox startup for this subsession.
- name: scalar_parent_preferences_search_query
  description: Keyed count of user search queries made within the Firefox Preferences UI during this subsession.
- name: scalar_parent_preferences_use_bookmark
  description: Keyed count of times a bookmark URL was set as the home page via Firefox Preferences.
- name: scalar_parent_preferences_use_current_page
  description: Keyed count of times 'Use Current Page' was selected for the home page in Firefox Preferences.
- name: scalar_parent_sandbox_no_job
  description: Keyed boolean indicating whether each sandboxed process type was running without a Windows Job Object restriction.
- name: scalar_parent_screenshots_copy
  description: Count of times the Firefox Screenshots feature was used to copy a screenshot to the clipboard.
- name: scalar_parent_screenshots_download
  description: Count of times the Firefox Screenshots feature was used to download a screenshot.
- name: scalar_parent_screenshots_upload
  description: Count of times the Firefox Screenshots feature was used to upload a screenshot to screenshots.firefox.com.
- name: scalar_parent_security_pkcs11_modules_loaded
  description: Keyed boolean map of PKCS#11 security module names to whether they were loaded during this subsession.
- name: scalar_parent_security_webauthn_used
  description: Keyed count of WebAuthn API usage by operation type (e.g. 'RegisterRk', 'SignRk') during this subsession.
- name: scalar_parent_services_sync_fxa_verification_method
  description: The Firefox Accounts verification method used for Sync authentication (e.g. 'email-otp', 'email').
- name: scalar_parent_services_sync_sync_login_state_transitions
  description: Keyed boolean map of Firefox Sync login state transitions observed during this subsession.
- name: scalar_parent_storage_sync_api_usage_extensions_using
  description: Count of extensions actively using the browser.storage.sync API during this subsession.
- name: scalar_parent_storage_sync_api_usage_items_stored
  description: Keyed count of items stored via browser.storage.sync per extension during this subsession.
- name: scalar_parent_storage_sync_api_usage_storage_consumed
  description: Keyed count of storage bytes consumed via browser.storage.sync per extension during this subsession.
- name: scalar_parent_sw_alternative_body_used_count
  description: Count of Service Worker responses where an alternative response body was used in the parent process.
- name: scalar_parent_sw_cors_res_for_so_req_count
  description: Count of cross-origin Service Worker responses served for same-origin requests in the parent process.
- name: scalar_parent_sw_synthesized_res_count
  description: Count of synthesized Service Worker responses served in the parent process during this subsession.
- name: scalar_parent_telemetry_accumulate_clamped_values
  description: Keyed count of histogram accumulations where the value was clamped to the histogram's defined range.
- name: scalar_parent_telemetry_accumulate_unknown_histogram_keys
  description: Keyed count of accumulations to unknown histogram keys in the parent process; indicates telemetry instrumentation issues.
- name: scalar_parent_telemetry_event_counts
  description: Keyed count of Telemetry events recorded in the parent process, grouped by event category and method.
- name: scalar_parent_telemetry_profile_directory_scans
  description: Scalar (parent process) counting the number of times the telemetry system scanned the profile directory during the session.
- name: scalar_parent_timestamps_first_paint
  description: Timestamp (milliseconds since epoch) of the first paint event in this browser session.
- name: scalar_parent_webrtc_nicer_stun_retransmits
  description: Count of STUN packet retransmissions in the parent process WebRTC stack during this subsession.
- name: scalar_parent_webrtc_nicer_turn_401s
  description: Count of TURN 401 (Unauthorized) responses received by WebRTC in the parent process.
- name: scalar_parent_webrtc_nicer_turn_403s
  description: Count of TURN 403 (Forbidden) responses received by WebRTC in the parent process.
- name: scalar_parent_webrtc_nicer_turn_438s
  description: Count of TURN 438 (Stale Nonce) responses received by WebRTC in the parent process.
- name: search_counts
  description: Array of search count records, each with an engine identifier, the source (e.g. 'urlbar', 'searchbar'), and a count of searches performed during this
    subsession.
- name: session_length
  description: Total length of the browser session in seconds, from session start to when this ping was generated.
- name: session_restored
  description: Time in milliseconds from session start until the session restore process completed loading previously open tabs.
- name: session_start_date
  description: The date on which the session began, truncated to the hour in ISO-8601 format.
- name: shutdown_kill
  description: Number of processes that had to be forcefully killed (rather than gracefully shut down) during browser shutdown.
- name: ssl_handshake_result
  description: Keyed count of TLS/SSL handshake results by result code, where keys are error/success codes and values are counts.
- name: ssl_handshake_result_failure
  description: Count of failed TLS/SSL handshakes during this subsession.
- name: ssl_handshake_result_success
  description: Count of successful TLS/SSL handshakes performed during this subsession.
- name: string_addon_scalars
  description: String scalar values contributed by installed add-ons, keyed by a combined add-on ID and scalar name.
- name: subsession_counter
  description: Counter for this subsession within the current session; increments by 1 for each new subsession.
- name: subsession_length
  description: Length of this subsession in seconds; negative values indicate clock issues.
- name: sync_count_desktop
  description: Number of desktop devices registered to the Firefox Sync account of this client.
- name: sync_count_mobile
  description: Number of mobile devices registered to the Firefox Sync account of this client.
- name: total_time
  description: Total time in seconds from subsession start to the time this ping was generated.
- name: uint_addon_scalars
  description: Unsigned integer scalar values contributed by installed add-ons, keyed by a combined add-on ID and scalar name.
- name: user_pref_browser_search_widget_innavbar
  description: User preference value for browser.search.widget.inNavBar; true if the search widget is displayed in the navigation bar.
- name: user_pref_dom_ipc_processcount
  description: User preference value for dom.ipc.processCount, specifying the maximum number of content processes Firefox is allowed to spawn.
- name: user_pref_extensions_allow_non_mpc_extensions
  description: User preference value for extensions.allow-non-mpc-extensions; true allows extensions that are not multi-process compatible.
- name: user_pref_extensions_legacy_enabled
  description: User preference value for extensions.legacy.enabled; true if legacy (non-WebExtension) add-ons are permitted.
- name: user_pref_general_config_filename
  description: User preference value for general.config.filename, indicating an enterprise or managed configuration file is in use when non-null.
- name: user_prefs
  description: Struct containing selected user preference values recorded in the ping, including e10s process count and add-on compatibility settings.
- name: web_notification_shown
  description: Number of Web Notifications shown to the user during this subsession.
- name: additional_properties
  description: A JSON string containing any extra fields present in the ping that did not map to a known schema column, preserved for completeness and forward-compatibility.
- name: subsample_id
  description: A stable hash-based identifier in the range 0–99 derived from client_id via FARM_FINGERPRINT, enabling efficient filtering to a 0.01% subsample of
    the 1% table. Unlike sample_id, this value is deliberately computed with a different hash to avoid correlation.
- name: browser_name
  description: The name of the browser generating this data. Always 'Firefox Desktop' for this table (sampled 2026-06-02).
- name: browser_version
  description: The user-visible Firefox version string for the client (e.g. '151.0.1'). Derived from the Glean app_display_version metric.
- name: client_count
  description: Number of distinct Glean client IDs that contributed to this aggregated row.
- name: follow_on_search_ad_clicks
  description: Total number of ad clicks on a SERP that originated from a follow-on search starting from the newtab page, across all clients in this row.
- name: follow_on_search_ad_impressions
  description: Total number of SERP pages with ad impressions originating from follow-on newtab searches across all clients in this row.
- name: is_new_profile
  description: True if the client's first-seen date equals the submission date, indicating a newly created profile. Null when activity segment data is unavailable.
- name: legacy_telemetry_client_count
  description: Number of distinct legacy telemetry client IDs (legacy_telemetry_client_id) that contributed to this aggregated row.
- name: newtab_homepage_category
  description: Category of the client's home page (about:home) setting as of newtab init. Values include 'enabled' (default Firefox home), 'disabled', 'extension',
    or a SiteClassifier value such as 'social-media' or 'known-hijacker-v3'.
- name: newtab_newtab_category
  description: Category of the client's new-tab page (about:newtab) setting as of newtab init. Values include 'enabled' (default Firefox newtab), 'disabled', 'extension',
    or a SiteClassifier value.
- name: newtab_visit_count
  description: Total number of newtab visits recorded across all clients in this row for the submission date.
- name: organic_pocket_clicks
  description: Total number of organic Pocket tile clicks across all clients and visits in this row.
- name: organic_pocket_dismissals
  description: Total number of organic (non-sponsored) Pocket tile dismissals across all clients and visits in this row.
- name: organic_pocket_impressions
  description: Total number of organic (non-sponsored) Pocket tile impressions across all clients and visits in this row.
- name: organic_pocket_saves
  description: Total number of organic Pocket tile saves across all clients and visits in this row.
- name: organic_topsite_tile_clicks
  description: Total number of clicks on organic (non-sponsored) top-site tiles across all clients and visits in this row.
- name: organic_topsite_tile_dismissals
  description: Total number of organic top-site tile dismissals via the three-dots menu across all clients and visits in this row.
- name: organic_topsite_tile_impressions
  description: Total number of organic (non-sponsored) top-site tile impressions across all clients and visits in this row.
- name: pocket_clicks
  description: Total number of Pocket tile clicks across all clients and visits in this row.
- name: pocket_enabled
  description: Whether the Pocket ('Recommended by Pocket') section was enabled on the newtab for this client on this day. Corresponds to the browser.newtabpage.activity-stream.feeds.section.topstories
    pref.
- name: pocket_impressions
  description: Total number of Pocket tile impressions (tiles visible to the user) across all clients and visits in this row.
- name: pocket_is_signed_in
  description: Whether the client was signed in to Pocket on the newtab during this day. True if any visit had a signed-in session; null when no Pocket sign-in state
    was sampled (~73% null). Derived from the pocket.is_signed_in probe.
- name: pocket_saves
  description: Total number of Pocket tile saves (via the 'Save to Pocket' option in the tile menu) across all clients and visits in this row.
- name: pocket_sponsored_stories_enabled
  description: Whether Pocket sponsored stories were enabled on the newtab for this client. Corresponds to the browser.newtabpage.activity-stream.showSponsored pref;
    can be true even when pocket_enabled is false.
- name: pocket_thumb_voting_events
  description: Total number of thumbs-up or thumbs-down vote interactions on Pocket tiles across all clients and visits in this row.
- name: searches
  description: Total number of searches issued from the newtab search box across all clients and visits in this row.
- name: sponsored_pocket_clicks
  description: Total number of sponsored Pocket tile clicks across all clients and visits in this row.
- name: sponsored_pocket_dismissals
  description: Total number of sponsored Pocket tile dismissals across all clients and visits in this row.
- name: sponsored_pocket_impressions
  description: Total number of sponsored Pocket tile impressions across all clients and visits in this row.
- name: sponsored_pocket_saves
  description: Total number of sponsored Pocket tile saves across all clients and visits in this row. Always 0 in sampled data (2026-06-02).
- name: sponsored_topsite_tile_clicks
  description: Total number of clicks on sponsored top-site tiles across all clients and visits in this row.
- name: sponsored_topsite_tile_dismissals
  description: Total number of sponsored top-site tile dismissals via the three-dots menu across all clients and visits in this row.
- name: sponsored_topsite_tile_impressions
  description: Total number of sponsored top-site tile impressions across all clients and visits in this row.
- name: tagged_follow_on_search_ad_clicks
  description: Total number of ad clicks on SERPs originating from tagged follow-on searches starting from the newtab, across all clients in this row.
- name: tagged_follow_on_search_ad_impressions
  description: Total number of SERP pages with ad impressions from tagged follow-on newtab searches across all clients in this row.
- name: tagged_search_ad_clicks
  description: Total number of clicks on search ads on a SERP that originated from a tagged newtab search across all clients in this row.
- name: tagged_search_ad_impressions
  description: Total number of SERP pages with ad impressions that originated from a tagged newtab search across all clients in this row.
- name: topic_selection_dismissals
  description: Total number of times the topic selection modal was dismissed without saving topics, across all clients and visits in this row.
- name: topic_selection_opened
  description: Total number of times the topic selection modal was opened across all clients and visits in this row. Always 0 in sampled data (2026-06-02).
- name: topic_selection_selected_topics_first_time_count
  description: Number of clients in this row who saved topic preferences for the very first time. Always 0 in sampled data (2026-06-02).
- name: topic_selection_updates
  description: Total number of topic preference updates made via the topic selection modal across all clients and visits in this row. Always 0 in sampled data (2026-06-02).
- name: topsite_tile_clicks
  description: Total number of clicks on any top-site tile (sponsored or organic) across all clients and visits in this row.
- name: topsite_tile_dismissals
  description: Total number of top-site tile dismissals via the three-dots menu across all clients and visits in this row.
- name: topsite_tile_impressions
  description: Total number of top-site tile impressions (times tiles were visible) across all clients and visits in this row.
- name: topsites_enabled
  description: Whether the Shortcuts (Top Sites) section was enabled on the newtab for this client. Corresponds to the browser.newtabpage.activity-stream.feeds.topsites
    pref.
- name: topsites_rows
  description: The number of top-site tile rows configured for the client's newtab page. Corresponds to the browser.newtabpage.activity-stream.topSitesRows pref;
    most commonly 1 (sampled 2026-06-02).
- name: topsites_sponsored_enabled
  description: Whether sponsored top-site shortcuts (Sponsored Shortcuts) were enabled on the newtab for this client. Corresponds to the browser.newtabpage.activity-stream.showSponsoredTopSites
    pref.
- name: visits_with_default_ui
  description: Number of newtab visits where the default Firefox home/newtab UI was active (i.e. about:home with 'enabled' homepage category, or about:newtab with
    'enabled' newtab category).
- name: visits_with_non_impression_engagement
  description: Number of newtab visits where the client performed at least one non-impression engagement action (click, search, or save) across all clients in this
    row.
- name: visits_with_non_search_engagement
  description: Number of newtab visits where the client performed at least one non-search engagement action (click or save) across all clients in this row.
- name: wallpaper_clicks
  description: Total number of wallpaper selection clicks on the newtab page across all clients and visits in this row.
- name: weather_widget_change_display_to_detailed
  description: Total number of times the weather widget display was switched to detailed view across all clients and visits in this row.
- name: weather_widget_change_display_to_simple
  description: Total number of times the weather widget display was switched to simple view across all clients and visits in this row.
- name: weather_widget_clicks
  description: Total number of clicks on the weather widget's provider link across all clients and visits in this row.
- name: experiments.value.extra.enrollment_id
  description: A UUID identifying the specific enrollment event for each experiment entry in the experiments array. Null in ~99.8% of rows.
- name: experiments.value.extra.type
  description: The enrollment type for each experiment entry in the experiments array (e.g. 'nimbus-rollout', 'nimbus-nimbus').
- name: legacy_telemetry_client_id
  description: The legacy Telemetry client_id UUID for this client. Null (~1.4%) when legacy telemetry was not yet initialized. May be the canary value c0ffeec0-ffee-c0ff-eec0-ffeec0ffeec0
    near data-upload pref changes.
- name: list_card_clicks
  description: Total number of list-card tile clicks by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: list_card_dismissals
  description: Total number of list-card tile dismissals by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: list_card_impressions
  description: Total number of list-card tile impressions for this client on the submission date. Near-zero in sampled data (2026-06-02).
- name: list_card_saves
  description: Total number of list-card tile saves by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: newtab_dismissal_count
  description: Total number of tile dismissal actions (topsite, pocket, and topic selection dismissals) by this client on the submission date.
- name: newtab_weather_widget_enabled
  description: Whether the weather widget was enabled on the newtab for this client (LOGICAL_AND across all visits). Null (~6.5%) when no weather pref data was received.
    Corresponds to the browser.newtabpage.activity-stream.showWeather pref.
- name: non_search_engagement_count
  description: Total count of non-search engagement actions (clicks, saves, dismissals, wallpaper and weather interactions, topic selection events) by this client
    on the submission date.
- name: organic_list_card_clicks
  description: Total number of organic list-card tile clicks by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: organic_list_card_dismissals
  description: Total number of organic list-card tile dismissals by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: organic_list_card_impressions
  description: Total number of organic list-card tile impressions for this client on the submission date. Near-zero in sampled data (2026-06-02).
- name: organic_list_card_saves
  description: Total number of organic list-card saves by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: pocket_thumbs_down
  description: Total number of thumbs-down votes cast on Pocket tiles by this client on the submission date.
- name: pocket_thumbs_up
  description: Total number of thumbs-up votes cast on Pocket tiles by this client on the submission date.
- name: sponsored_list_card_clicks
  description: Total number of sponsored list-card tile clicks by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: sponsored_list_card_dismissals
  description: Total number of sponsored list-card tile dismissals by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: sponsored_list_card_impressions
  description: Total number of sponsored list-card tile impressions for this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: sponsored_list_card_saves
  description: Total number of sponsored list-card saves by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: topic_preferences_set
  description: True if this client has saved at least one topic preference via the topic selection modal on any newtab visit during the day.
- name: topic_selection_selected_topics_first_time
  description: True if this client saved topic preferences for the very first time during the day. Always False in sampled data (2026-06-02).
- name: visits_with_default_ui_with_non_impression_engagement
  description: Number of newtab visits with the default UI where the client also performed at least one non-impression engagement action.
- name: visits_with_default_ui_with_non_search_engagement
  description: Number of newtab visits with the default UI where the client also performed at least one non-search engagement action.
- name: visits_with_non_default_ui
  description: Number of newtab visits this client had where the newtab or home page was showing a non-default UI (e.g. an extension override).
- name: wallpaper_category_clicks
  description: Total number of wallpaper category selection clicks by this client on the submission date.
- name: wallpaper_clicks_first_selected_wallpaper
  description: Number of wallpaper clicks where the client selected a wallpaper for the first time (no prior wallpaper set).
- name: wallpaper_clicks_had_previous_wallpaper
  description: Number of wallpaper clicks where the client already had a wallpaper selected prior to clicking (i.e. changing from one wallpaper to another).
- name: wallpaper_highlight_cta_clicks
  description: Total number of wallpaper feature-highlight CTA clicks by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: wallpaper_highlight_dismissals
  description: Total number of wallpaper feature-highlight dismissals by this client on the submission date. Always 0 in sampled data (2026-06-02).
- name: weather_widget_impressions
  description: Total number of weather widget impressions (times the widget was visible) for this client on the submission date.
- name: weather_widget_load_errors
  description: Total number of times the weather widget failed to load data for this client on the submission date.
- name: weather_widget_location_selected
  description: Total number of times a location was selected for the weather widget by this client on the submission date.
- name: home_default_client_count
  description: Number of release-channel clients who opened about:home with the Firefox default home page enabled.
- name: home_default_visit_count
  description: Number of newtab visits from release-channel clients who opened about:home with the Firefox default home page enabled.
- name: home_nondefault_client_count
  description: Number of release-channel clients who opened about:home with a non-default (e.g. extension-overridden) home page.
- name: home_nondefault_visit_count
  description: Number of newtab visits from release-channel clients who opened about:home with a non-default home page.
- name: homepage_category_client_count
  description: Number of release-channel clients whose home page (about:home) was in the 'enabled' (default Firefox) category.
- name: homepage_category_visit_count
  description: Number of newtab visits from release-channel clients whose home page was in the 'enabled' (default Firefox) category.
- name: newtab_category_client_count
  description: Number of release-channel clients whose new-tab page (about:newtab) was in the 'enabled' (default Firefox) category.
- name: newtab_category_visit_count
  description: Number of newtab visits from release-channel clients whose new-tab page was in the 'enabled' (default Firefox) category.
- name: newtab_default_client_count
  description: Number of release-channel clients who opened about:newtab with the Firefox default newtab page enabled.
- name: newtab_default_visit_count
  description: Number of newtab visits from release-channel clients who opened about:newtab with the default newtab page enabled.
- name: newtab_nondefault_client_count
  description: Number of release-channel clients who opened about:newtab with a non-default newtab page.
- name: newtab_nondefault_visit_count
  description: Number of newtab visits from release-channel clients who opened about:newtab with a non-default newtab page.
- name: organic_pocket_clicked_client_count
  description: Number of release-channel clients who clicked at least one organic Pocket tile.
- name: organic_pocket_clicked_visit_count
  description: Number of newtab visits from release-channel clients where at least one organic Pocket tile was clicked.
- name: organic_pocket_impressed_client_count
