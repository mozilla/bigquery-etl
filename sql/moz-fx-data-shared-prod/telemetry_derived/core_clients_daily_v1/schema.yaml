fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- name: profile_date
  type: DATE
  mode: NULLABLE
  description: The date on which the Firefox profile was created, stored as a DATE
    type. Used to determine profile age and segment users into cohorts by profile
    creation time.
- name: sessions
  type: INTEGER
  mode: NULLABLE
  description: The total number of browser sessions recorded for the client during
    the period. Higher values indicate more frequent browser restarts or usage intervals.
- name: durations
  type: INTEGER
  mode: NULLABLE
  description: The total duration, in seconds, associated with a session, event, or
    activity during the reporting period. A value of zero indicates no measurable
    duration was recorded.
- name: flash_usage
  type: INTEGER
  mode: NULLABLE
  description: The count of Flash plugin usage events recorded for the client. A value
    of 0 indicates Flash was present or configured but not actively used during the
    session.
- name: app_name
  type: STRING
  mode: NULLABLE
  description: The name of the Mozilla application that generated the telemetry event
    (e.g., 'firefox_desktop', 'fenix', 'firefox_ios', 'mozilla_vpn'). Used to distinguish
    telemetry across Mozilla's suite of products.
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: country
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- name: city
  type: STRING
  mode: NULLABLE
  description: The city associated with the client's IP address or profile geography
    at the time of the record. May be null when city-level geolocation is unavailable
    or suppressed.
- name: app_build_id
  type: STRING
  mode: NULLABLE
  description: 'The build identifier string for the application, encoding the date
    and time when the specific build was compiled (format: YYYYMMDDHHmmSS).'
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- name: locale
  type: STRING
  mode: NULLABLE
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- name: osversion
  type: STRING
  mode: NULLABLE
  description: The operating system version as reported in an alternate or legacy
    telemetry field, typically expressed as a short version string (e.g., '28', '26.5').
    May differ in format from os_version depending on the ping source or platform.
- name: device
  type: STRING
  mode: NULLABLE
  description: A string identifying the device on which the browser is running, typically
    in 'Manufacturer-Model' format (e.g., 'iPhone14,5', 'MediaTek-SMART TV'). This
    field is used to distinguish hardware types across the client population.
- name: arch
  type: STRING
  mode: NULLABLE
  description: The CPU architecture of the device running the application (e.g., 'arm64-v8a',
    'armeabi-v7a', 'x86_64'). Commonly used for mobile platform analysis to distinguish
    ARM and x86 device types.
- name: default_search
  type: STRING
  mode: NULLABLE
  description: The identifier of the user's default search engine, as reported by
    the client. Values such as 'unknown' indicate cases where the engine could not
    be identified or mapped to a known engine.
- name: distribution_id
  type: STRING
  mode: NULLABLE
  description: An identifier for the Firefox distribution package the client is running,
    such as 'default' for the standard Mozilla build or partner-specific identifiers
    like 'canonical-002' or 'mozilla-MSIX'. This field is null when no distribution
    identifier is available.
- name: campaign
  type: STRING
  mode: NULLABLE
  description: The marketing campaign name associated with a user's acquisition or
    install event (e.g., 'SET_DEFAULT_BROWSER', 'non-fx-button'). Null when no campaign
    attribution is available.
- name: campaign_id
  type: STRING
  mode: NULLABLE
  description: The unique identifier of the marketing campaign associated with a user's
    acquisition event, which may include platform-specific campaign codes (e.g., Google
    Ads or Facebook campaign IDs). Null when no campaign ID is available.
- name: default_browser
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether Firefox is set as the user's default browser. True
    means Firefox is the default browser; false means it is not; null indicates the
    status could not be determined.
- name: show_tracker_stats_share
  type: BOOLEAN
  mode: NULLABLE
  description: A boolean flag indicating whether the user has enabled the option to
    share tracker blocking statistics. A value of true means sharing is enabled; false
    means it is disabled. This field is predominantly null, indicating the setting
    was not recorded.
- name: metadata_app_version
  type: STRING
  mode: NULLABLE
  description: The version string of the application that submitted the ping, as reported
    in the submission metadata. This may differ from the user-facing display version.
- name: bug_1501329_affected
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the client was affected by the Firefox bug tracked
    as bug 1501329 (true) or confirmed unaffected (false). Null when the affected
    status could not be determined.
- name: first_seen_date
  type: DATE
  mode: NULLABLE
  description: The calendar date on which the client profile was first observed in
    telemetry data. This is used to determine client tenure and cohort assignment.
- name: is_new_profile
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the Firefox profile associated with the client was
    newly created. True means the profile was created recently; false means it is
    an existing profile.
