fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: !include-field-description
    field: submission_date
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- name: user_id
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    field: user_id
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- name: service
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    field: service
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- name: country
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    field: country
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- name: language
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    field: language
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- name: app_version
  type: STRING
  mode: NULLABLE
  description: FxA application version most recently observed for this user-service combination on the submission
    date (e.g., '333.6').
- name: os_name
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    field: os_name
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- name: os_version
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    field: os_version
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- name: seen_in_tier1_country
  type: BOOLEAN
  mode: NULLABLE
  description: True if the user was active in one of the Tier 1 countries (United States, France, Germany,
    United Kingdom, or Canada) for this service on submission_date.
- name: registered
  type: BOOLEAN
  mode: NULLABLE
  description: True if the user completed a new account registration ('fxa_reg - complete') for this service
    on submission_date.
