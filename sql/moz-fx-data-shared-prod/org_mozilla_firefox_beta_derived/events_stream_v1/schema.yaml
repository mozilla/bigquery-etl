- name: document_event_number
  type: INT64
  mode: NULLABLE
  description: The sequential position of this event within its source ping document, used together with document_id to construct event_id and preserve
    event ordering.
- name: event_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier for this individual event row, constructed as '<document_id>-<document_event_number>'.
