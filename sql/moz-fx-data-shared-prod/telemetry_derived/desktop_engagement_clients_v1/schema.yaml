fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: client_id
  type: STRING
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- mode: NULLABLE
  name: sample_id
  type: INTEGER
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- mode: NULLABLE
  name: distribution_id
  type: STRING
  description: An identifier for the Firefox distribution package the client is running,
    such as 'default' for the standard Mozilla build or partner-specific identifiers
    like 'canonical-002' or 'mozilla-MSIX'. This field is null when no distribution
    identifier is available.
- mode: NULLABLE
  name: locale
  type: STRING
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- mode: NULLABLE
  name: app_version
  type: STRING
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- mode: NULLABLE
  name: isp
  type: STRING
  description: The name of the Internet Service Provider associated with the client's
    IP address. This field provides a granular ISP identification and may include
    regional carriers.
- mode: NULLABLE
  name: first_seen_date
  type: DATE
  description: The calendar date on which the client profile was first observed in
    telemetry data. This is used to determine client tenure and cohort assignment.
- mode: NULLABLE
  name: attribution_campaign
  type: STRING
  description: The marketing campaign name associated with the Firefox installation,
    sourced from attribution parameters (e.g., 'SET_DEFAULT_BROWSER'). Null when attribution
    data is unavailable.
- mode: NULLABLE
  name: attribution_content
  type: STRING
  description: The content variant or creative identifier from the marketing attribution
    parameters, used to distinguish specific ad placements or page elements (e.g.,
    'body-download-button'). Null when attribution data is unavailable.
- mode: NULLABLE
  name: attribution_dlsource
  type: STRING
  description: The download source identifier from attribution parameters, indicating
    the platform or property from which Firefox was downloaded (e.g., 'mozorg', 'fxdotcom',
    'mozillaci'). Null when attribution data is unavailable.
- mode: NULLABLE
  name: attribution_medium
  type: STRING
  description: The marketing medium from attribution parameters describing how the
    user arrived at the download (e.g., 'referral', 'firefox-desktop'). Null when
    attribution data is unavailable.
- mode: NULLABLE
  name: attribution_ua
  type: STRING
  description: The user agent type of the browser the user was using when they downloaded
    Firefox, as captured in attribution parameters (e.g., 'chrome', 'edge', 'firefox').
    Null when attribution data is unavailable.
- mode: NULLABLE
  name: attribution_experiment
  type: STRING
  description: The experiment identifier from attribution parameters, indicating whether
    the install was part of a specific marketing experiment (e.g., 'download-privacy').
    Null when no experiment was associated with the attribution.
- mode: NULLABLE
  name: attribution_variation
  type: STRING
  description: The A/B test variation from attribution parameters that the user was
    assigned to during the download funnel (e.g., 'treatment', 'control'). Null when
    no variation was recorded.
- mode: NULLABLE
  name: normalized_channel
  type: STRING
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- mode: NULLABLE
  name: normalized_os
  type: STRING
  description: The standardized operating system name for the client device, such
    as 'Windows', 'Mac', or 'Linux'. This normalizes raw OS strings into a consistent
    set of values.
- mode: NULLABLE
  name: normalized_os_version
  type: STRING
  description: The standardized version string of the client's operating system, such
    as '10.0' for Windows 10 or '6.8.0' for a Linux kernel version. Provides a normalized
    representation across different OS reporting formats.
- mode: NULLABLE
  name: startup_profile_selection_reason
  type: STRING
  description: The reason or method by which a Firefox profile was selected at the
    start of a session. Common values include 'firstrun-created-default' (a new default
    profile was created on first run) and 'default' (the existing default profile
    was selected).
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: is_desktop
  type: BOOLEAN
  description: Indicates whether the client is running on a desktop platform as opposed
    to a mobile device. True means the client is on desktop; false means it is on
    a mobile platform.
- mode: NULLABLE
  name: is_dau
  type: BOOLEAN
  description: Indicates whether the client qualifies as a Daily Active User (DAU)
    for the given date. True means the client meets the DAU criteria; false means
    it does not.
- mode: NULLABLE
  name: is_wau
  type: BOOLEAN
  description: WAU - Weekly Active User
- mode: NULLABLE
  name: is_mau
  type: BOOLEAN
  description: MAU - Monthly Active User
- mode: NULLABLE
  name: profile_group_id
  type: STRING
  description: A UUID that identifies a group of profiles belonging to the same user
    or installation context. Null when profile group information is unavailable.
