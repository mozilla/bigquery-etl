fields:
- mode: NULLABLE
  name: submission_date_pacific
  type: DATE
  description: The Pacific Time date for which this user record is computed and exported to Amplitude.
- mode: NULLABLE
  name: user_id
  type: STRING
  description: !include-field-description
    field: user_id
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- mode: NULLABLE
  name: insert_id
  type: STRING
  description: Unique identifier for this Amplitude export record, constructed from the insertId of the
    first qualifying event for the user on this day.
- mode: NULLABLE
  name: region
  type: STRING
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/firefox_accounts_derived/firefox_accounts_derived.yaml
    field: region
- mode: NULLABLE
  name: country
  type: STRING
  description: !include-field-description
    field: country
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- mode: NULLABLE
  name: language
  type: STRING
  description: !include-field-description
    field: language
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- mode: REPEATED
  name: services
  type: STRING
- mode: REPEATED
  name: oauth_client_ids
  type: STRING
- mode: REPEATED
  name: fxa_services_used
  type: STRING
- fields:
  - mode: NULLABLE
    name: key
    type: STRING
  - mode: NULLABLE
    name: value
    type: INTEGER
  mode: REPEATED
  name: os_used_month
  type: RECORD
- mode: NULLABLE
  name: sync_device_count
  type: INTEGER
  description: Maximum number of Sync-connected devices observed for this user during the export window.
- mode: NULLABLE
  name: sync_active_devices_day
  type: INTEGER
  description: Maximum count of active Sync devices for this user in the current day.
- mode: NULLABLE
  name: sync_active_devices_week
  type: INTEGER
  description: Maximum count of active Sync devices for this user in the current 7-day window.
- mode: NULLABLE
  name: sync_active_devices_month
  type: INTEGER
  description: Maximum count of active Sync devices for this user in the current 28-day window.
- mode: NULLABLE
  name: ua_version
  type: STRING
  description: !include-field-description
    field: ua_version
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- mode: NULLABLE
  name: ua_browser
  type: STRING
  description: !include-field-description
    field: ua_browser
    file: bigquery_etl/schema/firefox_accounts_derived.yaml
- mode: NULLABLE
  name: app_version
  type: FLOAT
  description: Maximum FxA application version observed for this user on this date, as a float.
- mode: NULLABLE
  name: days_seen_bits
  type: INTEGER
  description: Bit field encoding user activity over the past 28 days. The rightmost bit (value 1) indicates
    whether the user was active on submission_date_pacific.
- mode: REPEATED
  name: rollup_events
  type: STRING
- mode: NULLABLE
  name: timestamp
  type: DATETIME
  description: Datetime representation of submission_date_pacific used when exporting events to Amplitude.
