fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: submission_date
- name: country
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: country
- name: placement
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: placement
- name: partner
  type: STRING
  mode: NULLABLE
  description: The name of the advertising partner associated with the engagement (e.g., 'amazon' for Amazon-sponsored
    search redirects).
- name: version
  type: STRING
  mode: NULLABLE
  description: The major version number of the application, extracted as the first dot-separated component
    of app_version (e.g., '128').
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: normalized_channel
- name: n_engagements
  type: INT64
  mode: NULLABLE
  description: The count of user engagements (clicks or search redirects) with the partner placement for
    this combination of dimensions on the submission date.
- name: interaction
  type: STRING
  mode: NULLABLE
  description: The type of user interaction with the partner placement, such as 'click' for top-site tiles
    or 'redirect' for search engine replacements.
- name: phase
  type: STRING
  mode: NULLABLE
  description: The rollout or experiment phase that the engagement belongs to, such as 'phase2', 'phase3',
    or 'rollout'. Null for engagements not associated with a tracked experiment.
