fields:
- name: submission_date
  type: TIMESTAMP
  mode: NULLABLE
  description: The date when the telemetry ping is received on the server side.
- name: first_seen_year
  type: INTEGER
  mode: NULLABLE
  description: Year of the client's first seen date.
- name: channel
  type: STRING
  mode: NULLABLE
  description: The normalized channel the application is being distributed on.
- name: app_name
  type: STRING
  mode: NULLABLE
  description: The name of the application.
- name: country
  type: STRING
  mode: NULLABLE
  description: Name of the country in which the activity took place, as determined by
    the IP geolocation.
- name: locale
  type: STRING
  mode: NULLABLE
  description: Set of language- and/or country-based preferences for a user interface.
- name: os
  type: STRING
  mode: NULLABLE
  description: The normalized name of the operating system running at the client.
- name: os_grouped
  type: STRING
  mode: NULLABLE
  description: Operating system group reported by the client.
- name: os_version
  type: STRING
  mode: NULLABLE
  description: Version of the operating system running at the client, e.g. "100.9.11".
- name: os_version_major
  type: INTEGER
  mode: NULLABLE
  description: Major or first part of the operating system version running at the client.
    E.g. for version "100.9.11", the major is 100.
- name: os_version_minor
  type: INTEGER
  mode: NULLABLE
  description: Minor part of the operating system version running at the client. E.g.
    for version "100.9.11", the minor is 9.
- name: os_version_build
  type: STRING
  mode: NULLABLE
  description: OS version build reported by the client.
- name: windows_build_number
  type: INTEGER
  mode: NULLABLE
  description: The optional Windows build number, reported by Windows (e.g. 22000) and
    not set for other platforms (Windows only).
- name: app_version
  type: STRING
  mode: NULLABLE
  description: User visible version string (e.g. "1.0.3") for the browser.
- name: app_version_major
  type: NUMERIC
  mode: NULLABLE
  description: The major version of the user visible app version string for the browser,
    e.g. "142.1.3", has major version 142.
- name: app_version_minor
  type: NUMERIC
  mode: NULLABLE
  description: The minor version of the user visible app version string for the browser,
    e.g. "142.1.3" has minor version 1.
- name: app_version_patch_revision
  type: NUMERIC
  mode: NULLABLE
  description: The patch revision number of the app version.
- name: app_version_is_major_release
  type: BOOLEAN
  mode: NULLABLE
  description: Boolean flag indicating if the app version was a major release.
- name: is_default_browser
  type: BOOLEAN
  mode: NULLABLE
  description: A flag indicating whether the browser is set as the default browser on
    the client side.
- name: distribution_id
  type: STRING
  mode: NULLABLE
  description: The distribution id associated with the install of Firefox.
- name: activity_segment
  type: STRING
  mode: NULLABLE
  description: Classification of users based on their browsing activity. E.g., infrequent,
    casual, regular.
- name: attribution_medium
  type: STRING
  mode: NULLABLE
  description: The attribution medium; similar or the same as UTM medium.
- name: attribution_source
  type: STRING
  mode: NULLABLE
  description: The attribution source; similar or the same as UTM source.
- name: daily_users
  type: INTEGER
  mode: NULLABLE
  description: Number of daily users on the submission_date (based on sending the ping).
- name: weekly_users
  type: INTEGER
  mode: NULLABLE
  description: Number of weekly users on the submission_date (based on sending the ping).
- name: monthly_users
  type: INTEGER
  mode: NULLABLE
  description: Number of monthly users on the submission_date (based on sending the ping).
- name: dau
  type: INTEGER
  mode: NULLABLE
  description: The number of daily active users, corresponding to the count of clients
    that reported at least one ping on the submission_date and qualify as active.
- name: wau
  type: INTEGER
  mode: NULLABLE
  description: The number of weekly active users, corresponding to the count of clients
    that reported at least one ping on the previous 7 days from the submission_date
    and qualify as active.
- name: mau
  type: INTEGER
  mode: NULLABLE
  description: The number of monthly active users, corresponding to the count of clients
    that reported at least one ping on the previous 28 days from the submission_date
    and qualify as active.
- name: tou_daily_active_users
  type: INTEGER
  mode: NULLABLE
  description: The number of daily active users who have accepted the Terms of Use,
    corresponding to the count of clients that reported at least one ping on the
    submission_date and qualify as active.
- name: tou_weekly_active_users
  type: INTEGER
  mode: NULLABLE
  description: The number of weekly active users who have accepted the Terms of Use,
    corresponding to the count of clients that reported at least one ping on the
    previous 7 days from the submission_date and qualify as active.
- name: tou_monthly_active_users
  type: INTEGER
  mode: NULLABLE
  description: The number of monthly active users who have accepted the Terms of Use,
    corresponding to the count of clients that reported at least one ping on the
    previous 28 days from the submission_date and qualify as active.
