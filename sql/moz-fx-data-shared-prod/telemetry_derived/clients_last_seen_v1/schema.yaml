fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: first_seen_date
  type: DATE
  description: The calendar date on which the client profile was first observed in
    telemetry data. This is used to determine client tenure and cohort assignment.
- mode: NULLABLE
  name: second_seen_date
  type: DATE
  description: The calendar date on which the client was observed for the second time.
    A null value indicates the client has not yet been seen a second time within the
    tracked period.
- mode: NULLABLE
  name: days_seen_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which the
    client submitted a telemetry ping and was therefore 'seen'. Each bit corresponds
    to one day in the window.
- mode: NULLABLE
  name: days_visited_1_uri_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which the
    user visited at least 1 URI. Each bit corresponds to one day; a value of 0 indicates
    no URI visits were recorded.
- mode: NULLABLE
  name: days_visited_5_uri_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which the
    user visited 5 or more distinct URIs. Each bit corresponds to one day; a value
    of 0 indicates the threshold was never reached.
- mode: NULLABLE
  name: days_visited_10_uri_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which the
    user visited 10 or more distinct URIs. Each bit corresponds to one day; a value
    of 0 indicates the threshold was never reached.
- mode: NULLABLE
  name: days_had_8_active_ticks_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which the
    user had at least 8 active ticks, used as a proxy for meaningful engagement. Each
    bit corresponds to one day in the window.
- mode: NULLABLE
  name: days_opened_dev_tools_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which the
    user opened browser developer tools. Each bit corresponds to one day in the window;
    a value of 0 indicates developer tools were never opened.
- mode: NULLABLE
  name: days_interacted_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which the
    user had at least one interaction with the browser UI. Each bit corresponds to
    one day in the window.
- mode: NULLABLE
  name: days_visited_1_uri_normal_mode_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which the
    user visited at least 1 URI in a normal (non-private) browsing window. Each bit
    corresponds to one day.
- mode: NULLABLE
  name: days_visited_1_uri_private_mode_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which the
    user visited at least 1 URI in a private browsing window. Each bit corresponds
    to one day; a value of 0 indicates private browsing was not used.
- mode: NULLABLE
  name: days_created_profile_bits
  type: INTEGER
  description: A bitmask representing the days within a rolling window on which a
    new browser profile was created. Each bit corresponds to one day in the window.
- fields:
  - mode: NULLABLE
    name: experiment
    type: STRING
    description: The slug or identifier of a Nimbus or Normandy experiment the client
      was enrolled in at the time of the ping. This field is null when the client
      was not enrolled in any experiment.
  - mode: NULLABLE
    name: branch
    type: STRING
    description: The experiment branch to which a client was assigned (e.g., 'control',
      'treatment-a', 'rollout'). Used to segment clients for A/B test and rollout
      analyses.
  - mode: NULLABLE
    name: bits
    type: INTEGER
  mode: REPEATED
  name: days_seen_in_experiment
  type: RECORD
  description: An array of structs recording, for each experiment and branch the user
    was enrolled in, a bitmask of the days within the rolling window on which the
    user was seen. Each struct contains the experiment ID, branch name, and a bits
    integer.
- mode: NULLABLE
  name: client_id
  type: STRING
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- mode: NULLABLE
  name: aborts_content_sum
  type: INTEGER
  description: The total number of content-process abort events recorded during a
    session or aggregation period. A null value indicates no data was collected for
    this metric.
- mode: NULLABLE
  name: aborts_gmplugin_sum
  type: INTEGER
  description: The total number of Gecko Media Plugin (GMP) process abort events recorded
    during a session or aggregation period. A null value indicates no data was collected
    for this metric.
- mode: NULLABLE
  name: aborts_plugin_sum
  type: INTEGER
  description: The total number of legacy plugin process abort events recorded during
    a session or aggregation period. A null value indicates no data was collected
    for this metric.
- mode: NULLABLE
  name: active_addons_count_mean
  type: FLOAT
  description: The mean number of active add-ons installed across the client's sessions
    within the aggregation period.
- fields:
  - mode: NULLABLE
    name: addon_id
    type: STRING
    description: The unique identifier string for a Firefox browser add-on or extension,
      typically in the format of a UUID or a reverse-DNS email-style string (e.g.,
      'formautofill@mozilla.org').
  - mode: NULLABLE
    name: blocklisted
    type: BOOLEAN
    description: null
  - mode: NULLABLE
    name: name
    type: STRING
    description: A human-readable name string associated with the entity being described,
      such as an add-on or extension name. May be null or a placeholder string when
      the name is unavailable or not yet resolved.
  - mode: NULLABLE
    name: user_disabled
    type: BOOLEAN
    description: null
  - mode: NULLABLE
    name: app_disabled
    type: BOOLEAN
    description: null
  - mode: NULLABLE
    name: version
    type: STRING
    description: The version string of the software, add-on, or component being measured.
      Follows standard versioning conventions such as major.minor.patch.
  - mode: NULLABLE
    name: scope
    type: INTEGER
    description: null
  - mode: NULLABLE
    name: type
    type: STRING
    description: The category of a browser add-on or extension, indicating its nature.
      Common values include 'extension', 'locale', 'dictionary', and 'service'.
  - mode: NULLABLE
    name: foreign_install
    type: BOOLEAN
    description: null
  - mode: NULLABLE
    name: has_binary_components
    type: BOOLEAN
    description: null
  - mode: NULLABLE
    name: install_day
    type: INTEGER
    description: null
  - mode: NULLABLE
    name: update_day
    type: INTEGER
    description: null
  - mode: NULLABLE
    name: signed_state
    type: INTEGER
    description: null
  - mode: NULLABLE
    name: is_system
    type: BOOLEAN
    description: Indicates whether the add-on or component is a system-level (built-in)
      item rather than a user-installed one. True means it is a system item; false
      means it is user-installed.
  - mode: NULLABLE
    name: is_web_extension
    type: BOOLEAN
    description: null
  - mode: NULLABLE
    name: multiprocess_compatible
    type: BOOLEAN
    description: null
  mode: REPEATED
  name: active_addons
  type: RECORD
  description: A structured array of metadata about all active browser add-ons installed
    on the client, including identifiers, versioning, installation details, and compatibility
    flags.
- mode: NULLABLE
  name: active_experiment_branch
  type: STRING
  description: The branch of an active experiment the client was enrolled in (e.g.,
    'control' or 'treatment'). Null when the client was not part of any active experiment.
- mode: NULLABLE
  name: active_experiment_id
  type: STRING
  description: The identifier of the active experiment the client was enrolled in.
    Null when the client was not enrolled in any experiment.
- mode: NULLABLE
  name: active_hours_sum
  type: FLOAT
  description: The sum of active browser usage hours across all sessions or clients
    within the aggregation period.
- mode: NULLABLE
  name: addon_compatibility_check_enabled
  type: BOOLEAN
  description: Indicates whether the browser's add-on compatibility checking feature
    is enabled. True means compatibility checks are active; false means they have
    been disabled.
- mode: NULLABLE
  name: app_build_id
  type: STRING
  description: 'The build identifier string for the application, encoding the date
    and time when the specific build was compiled (format: YYYYMMDDHHmmSS).'
- mode: NULLABLE
  name: app_display_version
  type: STRING
  description: The human-readable version string of the application as displayed to
    users, including major, minor, and patch components (e.g., '151.0.1' or '115.36.0esr').
- mode: NULLABLE
  name: app_name
  type: STRING
  description: The name of the Mozilla application that generated the telemetry event
    (e.g., 'firefox_desktop', 'fenix', 'firefox_ios', 'mozilla_vpn'). Used to distinguish
    telemetry across Mozilla's suite of products.
- mode: NULLABLE
  name: app_version
  type: STRING
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- fields:
  - mode: NULLABLE
    name: source
    type: STRING
    description: The referring domain or source URL from which a user navigated to
      a Mozilla property. Null indicates the source was not captured or not applicable.
  - mode: NULLABLE
    name: medium
    type: STRING
    description: The marketing or traffic medium through which a user arrived, such
      as 'referral', 'cpc', or 'firefox-desktop'. Used to classify the acquisition
      channel for attribution purposes.
  - mode: NULLABLE
    name: campaign
    type: STRING
    description: The marketing campaign name associated with a user's acquisition
      or install event (e.g., 'SET_DEFAULT_BROWSER', 'non-fx-button'). Null when no
      campaign attribution is available.
  - mode: NULLABLE
    name: content
    type: STRING
    description: A string representing the UTM content parameter or creative identifier
      associated with a marketing touchpoint or link. May be null or URL-encoded when
      not explicitly set.
  - mode: NULLABLE
    name: experiment
    type: STRING
    description: The slug or identifier of a Nimbus or Normandy experiment the client
      was enrolled in at the time of the ping. This field is null when the client
      was not enrolled in any experiment.
  - mode: NULLABLE
    name: variation
    type: STRING
  - mode: NULLABLE
    name: dltoken
    type: STRING
  - mode: NULLABLE
    name: dlsource
    type: STRING
  - name: ua
    type: STRING
    mode: NULLABLE
  - mode: NULLABLE
    name: msstoresignedin
    type: BOOLEAN
    description: Whether the user was signed in to the Microsoft Store at install
      time, when Firefox was installed via the Microsoft Store
  mode: NULLABLE
  name: attribution
  type: RECORD
  description: null
- mode: NULLABLE
  name: blocklist_enabled
  type: BOOLEAN
  description: Indicates whether the Firefox blocklist (used to block known malicious
    add-ons and plugins) is enabled (true) or disabled (false) on the client.
- mode: NULLABLE
  name: channel
  type: STRING
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- mode: NULLABLE
  name: client_clock_skew_mean
  type: FLOAT
  description: The mean difference, in hours, between the client's local clock and
    the server-side reference time across submissions in the aggregation window. Values
    near zero indicate accurate client clocks; positive or negative values indicate
    forward or backward skew, respectively.
- mode: NULLABLE
  name: client_submission_latency_mean
  type: FLOAT
  description: The mean latency, in seconds, between when a ping was created on the
    client and when it was received by the ingestion pipeline. Higher values indicate
    delayed or batched submissions from the client.
- mode: NULLABLE
  name: cpu_cores
  type: INTEGER
  description: The number of logical CPU cores available on the client device as reported
    by the Firefox telemetry environment. Used to segment performance and hardware
    capability data.
- mode: NULLABLE
  name: cpu_count
  type: INTEGER
  description: The total number of logical CPU cores available on the client device.
    Higher values indicate multi-core or hyperthreaded processors.
- mode: NULLABLE
  name: cpu_family
  type: INTEGER
  description: The processor family identifier as reported by the CPU's CPUID instruction.
    This numeric code corresponds to a specific generation or architectural family
    of the processor.
- mode: NULLABLE
  name: cpu_l2_cache_kb
  type: INTEGER
  description: The size of the CPU's L2 cache in kilobytes. A value of 0 may indicate
    the cache size could not be determined.
- mode: NULLABLE
  name: cpu_l3_cache_kb
  type: INTEGER
  description: The size of the CPU's L3 cache in kilobytes. A value of 0 may indicate
    no L3 cache is present or the size could not be determined; null indicates the
    value was not reported.
- mode: NULLABLE
  name: cpu_model
  type: INTEGER
  description: The processor model number as reported by the CPU's CPUID instruction.
    This numeric identifier distinguishes specific processor models within a family.
- mode: NULLABLE
  name: cpu_speed_mhz
  type: INTEGER
  description: The clock speed of the CPU in megahertz (MHz). A value of 0 indicates
    the speed could not be determined or was not reported.
- mode: NULLABLE
  name: cpu_stepping
  type: INTEGER
  description: The stepping (revision) number of the processor as reported by CPUID.
    This identifies a specific hardware revision within a CPU model; null indicates
    the value was not available.
- mode: NULLABLE
  name: cpu_vendor
  type: STRING
  description: The CPU vendor string as reported by the CPUID instruction (e.g., 'GenuineIntel',
    'AuthenticAMD'). An empty string or null indicates the vendor could not be identified.
- mode: NULLABLE
  name: crashes_detected_content_sum
  type: INTEGER
  description: The total number of detected content process crashes during the reporting
    period. Null indicates no content process crashes were detected.
- mode: NULLABLE
  name: crashes_detected_gmplugin_sum
  type: INTEGER
  description: The total number of detected Gecko Media Plugin (GMP) process crashes
    during the reporting period. Null indicates no GMP process crashes were detected.
- mode: NULLABLE
  name: crashes_detected_plugin_sum
  type: INTEGER
  description: The total number of detected plugin process crashes during the reporting
    period. Null indicates no plugin process crashes were detected.
- mode: NULLABLE
  name: crash_submit_attempt_content_sum
  type: INTEGER
  description: The total number of crash report submission attempts for content process
    crashes during the reporting period. Null indicates no content process crash submissions
    were attempted.
- mode: NULLABLE
  name: crash_submit_attempt_main_sum
  type: INTEGER
  description: The total number of crash report submission attempts for main process
    crashes during the reporting period. Null indicates no main process crash submissions
    were attempted.
- mode: NULLABLE
  name: crash_submit_attempt_plugin_sum
  type: INTEGER
  description: The total number of crash report submission attempts for plugin process
    crashes during the reporting period. Null indicates no plugin process crash submissions
    were attempted.
- mode: NULLABLE
  name: crash_submit_success_content_sum
  type: INTEGER
  description: The total number of successfully submitted crash reports for content
    process crashes during the reporting period. A value of 0 means submissions were
    attempted but none succeeded; null indicates no attempts were made.
- mode: NULLABLE
  name: crash_submit_success_main_sum
  type: INTEGER
  description: The total number of successfully submitted crash reports for main process
    crashes during the reporting period. A value of 0 means submissions were attempted
    but none succeeded; null indicates no attempts were made.
- mode: NULLABLE
  name: crash_submit_success_plugin_sum
  type: INTEGER
  description: The total number of successfully submitted crash reports for plugin
    process crashes during the reporting period. Null indicates no plugin crash submission
    successes were recorded.
- mode: NULLABLE
  name: default_search_engine
  type: STRING
  description: The internal identifier of the user's default search engine (e.g.,
    'google-b-d', 'baidu'), which encodes both the engine and any partner or distribution-specific
    configuration. This field represents the engine key as recognized by Firefox's
    search service.
- mode: NULLABLE
  name: default_search_engine_data_load_path
  type: STRING
  description: The load path indicating how and from where the default search engine
    definition was loaded, such as from the built-in application bundle ('[app]')
    or an add-on ('[addon]'). This field helps distinguish between pre-packaged, extension-provided,
    and other engine sources.
- mode: NULLABLE
  name: default_search_engine_data_name
  type: STRING
  description: "The human-readable display name of the user's default search engine\
    \ as reported by the browser (e.g., 'Google', 'DuckDuckGo', '\u767E\u5EA6'). This\
    \ field reflects the localized name of the engine as configured on the client."
- mode: NULLABLE
  name: default_search_engine_data_origin
  type: STRING
  description: Indicates how the default search engine was established, with values
    such as 'default' (set by the application), 'verified' (confirmed via policy or
    signature), 'unverified', or 'invalid'. This field is predominantly null when
    origin information is not captured or applicable.
- mode: NULLABLE
  name: default_search_engine_data_submission_url
  type: STRING
  description: The base URL template used to submit queries to the user's default
    search engine, including any partner or distribution-specific tracking parameters
    (e.g., 'client=firefox-b-d'). This URL is constructed by the browser when initiating
    a search.
- mode: NULLABLE
  name: devtools_toolbox_opened_count_sum
  type: INTEGER
  description: The total number of times the Firefox Developer Tools toolbox was opened
    during the reporting period. A null value indicates the metric was not collected
    or the toolbox was never opened for that record.
- mode: NULLABLE
  name: distribution_id
  type: STRING
  description: An identifier for the Firefox distribution package the client is running,
    such as 'default' for the standard Mozilla build or partner-specific identifiers
    like 'canonical-002' or 'mozilla-MSIX'. This field is null when no distribution
    identifier is available.
- mode: NULLABLE
  name: e10s_enabled
  type: BOOLEAN
  description: Indicates whether the Electrolysis (e10s) multi-process architecture
    was enabled for the Firefox session. A value of true means the browser was running
    in multi-process mode; false means it was running in single-process mode.
- mode: NULLABLE
  name: env_build_arch
  type: STRING
  description: The CPU architecture for which the Firefox binary was compiled (e.g.,
    'x86-64', 'aarch64', 'x86'). This field describes the instruction set architecture
    of the build, not necessarily the host hardware.
- mode: NULLABLE
  name: env_build_id
  type: STRING
  description: The build ID of the Firefox application, expressed as a timestamp string
    in the format 'YYYYMMDDHHmmSS' (e.g., '20260520211922'). This uniquely identifies
    the specific compiled build of the browser.
- mode: NULLABLE
  name: env_build_version
  type: STRING
  description: The version string of the Firefox build as reported by the environment
    (e.g., '151.0.1', '115.36.0'). This field represents the application version associated
    with the compiled binary.
- mode: REPEATED
  name: environment_settings_intl_accept_languages
  type: STRING
  description: The list of languages specified in the browser's Accept-Language header
    preference setting, indicating the user's preferred languages for web content
    in order of priority.
- mode: REPEATED
  name: environment_settings_intl_app_locales
  type: STRING
  description: The list of locale codes representing the active application locales
    in use by the Firefox browser (e.g., ['en-US', 'fr']). These are the locales actually
    applied to the browser UI.
- mode: REPEATED
  name: environment_settings_intl_available_locales
  type: STRING
  description: The list of locale codes for all languages available in the Firefox
    installation. This represents the full set of locales packaged with the browser
    build.
- mode: REPEATED
  name: environment_settings_intl_requested_locales
  type: STRING
  description: The list of locale codes that the user has explicitly requested for
    the Firefox UI. These represent the user's preferred language settings before
    locale resolution and fallback logic is applied.
- mode: REPEATED
  name: environment_settings_intl_system_locales
  type: STRING
  description: The list of locale codes configured at the operating system level on
    the user's device. These system locales may influence browser behavior and default
    language selection.
- mode: REPEATED
  name: environment_settings_intl_regional_prefs_locales
  type: STRING
  description: The list of locale codes representing the user's regional preferences
    as configured in the browser settings. These locales influence formatting of dates,
    numbers, and other region-specific content.
- fields:
  - mode: NULLABLE
    name: key
    type: STRING
    description: A string identifier representing the specific action, search engine,
      or event type associated with a record, such as a search entry point or provider
      key. An empty string indicates no specific key was recorded.
  - mode: NULLABLE
    name: value
    type: STRING
    description: null
  mode: REPEATED
  name: experiments
  type: RECORD
  description: An array of key-value pairs representing all active experiment enrollments
    for the client at the time of the ping, where the key is the experiment slug and
    the value is the assigned branch. This captures the full set of concurrent experiment
    enrollments.
- mode: NULLABLE
  name: first_paint_mean
  type: FLOAT
  description: The mean time in milliseconds from browser start to first paint, averaged
    over the relevant aggregation period. A null value indicates no first-paint timing
    data was available for the record.
- mode: NULLABLE
  name: flash_version
  type: STRING
  description: The version string of the Adobe Flash plugin installed in the browser
    (e.g. '32.0.0.465'). This field is null when no Flash plugin is detected or when
    version information is unavailable.
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: city
  type: STRING
  description: The city associated with the client's IP address or profile geography
    at the time of the record. May be null when city-level geolocation is unavailable
    or suppressed.
- mode: NULLABLE
  name: geo_subdivision1
  type: STRING
  description: The first-level administrative subdivision (e.g. state, province, or
    region) of the client's location, derived from the GeoIP database. This field
    may be null when subdivision-level data is unavailable for the client's geography.
- mode: NULLABLE
  name: geo_subdivision2
  type: STRING
  description: The second-level administrative subdivision (e.g. county, department,
    or district) of the client's location, derived from the GeoIP database. This field
    is null for the majority of records where fine-grained subdivision data is not
    available.
- mode: NULLABLE
  name: isp_name
  type: STRING
  description: The canonical name of the Internet Service Provider associated with
    the client's network connection. This is a normalized or deduplicated version
    of the ISP identifier.
- mode: NULLABLE
  name: isp_organization
  type: STRING
  description: The organization name associated with the client's IP address block,
    as registered with regional internet registries. This may differ from the ISP
    name when the organization is a reseller or enterprise.
- mode: NULLABLE
  name: gfx_features_advanced_layers_status
  type: STRING
  description: The status of the Advanced Layers graphics feature in Firefox, indicating
    whether it is available, disabled, blocked, or unavailable on the client's hardware
    and software configuration. Blocked statuses often include a reason code explaining
    why the feature was prevented from running.
- mode: NULLABLE
  name: gfx_features_d2d_status
  type: STRING
  description: The status of the Direct2D (D2D) hardware acceleration feature in Firefox,
    indicating whether it is available, disabled, blocked, or unavailable on the client's
    system. Blocked or unavailable statuses typically include a reason code identifying
    the specific failure or blocklist entry responsible.
- mode: NULLABLE
  name: gfx_features_d3d11_status
  type: STRING
  description: The status of the Direct3D 11 graphics feature on the client, indicating
    whether it is available, unavailable, or blocklisted along with a reason code
    (e.g., 'available', 'unavailable:FEATURE_FAILURE_D3D11_NEED_HWCOMP', 'blocklisted:FEATURE_FAILURE_UNKNOWN_DEVICE_VENDOR').
    A null value indicates the status could not be determined.
- mode: NULLABLE
  name: gfx_features_gpu_process_status
  type: STRING
  description: The status of the GPU process graphics feature on the client, indicating
    whether it is available, unused, or unavailable along with a reason code (e.g.,
    'available', 'unused', 'unavailable:FEATURE_FAILURE_OLD_WINDOWS'). A null value
    indicates the status could not be determined.
- mode: NULLABLE
  name: histogram_parent_devtools_aboutdebugging_opened_count_sum
  type: INTEGER
  description: The total number of times the 'about:debugging' DevTools panel was
    opened during the reporting period, summed across all subsessions. A null value
    indicates the panel was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_animationinspector_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Animation Inspector panel was
    opened during the reporting period, summed across all subsessions. A null value
    indicates the panel was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_browserconsole_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Browser Console was opened during
    the reporting period, summed across all subsessions. A null value indicates it
    was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_canvasdebugger_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Canvas Debugger panel was opened
    during the reporting period, summed across all subsessions. A null value indicates
    the panel was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_computedview_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Computed View (CSS computed
    styles) panel was opened during the reporting period, summed across all subsessions.
    A null value indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_custom_opened_count_sum
  type: INTEGER
  description: The total number of times a custom DevTools panel was opened during
    the reporting period, summed across all subsessions. A null value indicates no
    custom panel was opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_developertoolbar_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Developer Toolbar was opened
    during the reporting period, summed across all subsessions. A null value indicates
    it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_dom_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools DOM panel was opened during
    the reporting period, summed across all subsessions. A null value indicates it
    was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_eyedropper_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Eyedropper color picker tool
    was opened during the reporting period, summed across all subsessions. A null
    value indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_fontinspector_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Font Inspector panel was opened
    during the reporting period, summed across all subsessions. A null value indicates
    it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_inspector_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Inspector (HTML/DOM inspector)
    panel was opened during the reporting period, summed across all subsessions. A
    null value indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_jsbrowserdebugger_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools JavaScript Browser Debugger
    was opened during the reporting period, summed across all subsessions. A null
    value indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_jsdebugger_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools JavaScript Debugger panel was
    opened during the reporting period, summed across all subsessions. A null value
    indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_jsprofiler_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools JavaScript Profiler panel was
    opened during the reporting period, summed across all subsessions. A null value
    indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_layoutview_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Layout View panel (CSS layout
    inspection) was opened during the reporting period, summed across all subsessions.
    A null value indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_memory_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Memory panel was opened during
    the reporting period, summed across all subsessions. A null value indicates it
    was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_menu_eyedropper_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Eyedropper was opened via the
    menu entry during the reporting period, summed across all subsessions. A null
    value indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_netmonitor_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Network Monitor panel was opened
    during the reporting period, summed across all subsessions. A null value indicates
    it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_options_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Options/Settings panel was opened
    during the reporting period, summed across all subsessions. A null value indicates
    it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_paintflashing_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Paint Flashing tool was opened
    during the reporting period, summed across all subsessions. A null value indicates
    it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_picker_eyedropper_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Eyedropper was opened via the
    color picker UI during the reporting period, summed across all subsessions. A
    null value indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_responsive_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Responsive Design Mode was opened
    during the reporting period, summed across all subsessions. A null value indicates
    it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_ruleview_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Rule View (CSS rules inspector)
    panel was opened during the reporting period, summed across all subsessions. A
    null value indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_scratchpad_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Scratchpad JavaScript editor
    was opened during the reporting period, summed across all subsessions. A null
    value indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_scratchpad_window_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Scratchpad was opened as a detached
    window during the reporting period, summed across all subsessions. A null value
    indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_shadereditor_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Shader Editor panel was opened
    during the reporting period, summed across all subsessions. A null value indicates
    it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_storage_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Storage Inspector panel was
    opened during the reporting period, summed across all subsessions. A null value
    indicates it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_styleeditor_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Style Editor panel was opened
    during the reporting period, summed across all subsessions. A null value indicates
    it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_webaudioeditor_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Web Audio Editor panel was opened
    during the reporting period, summed across all subsessions. A null value indicates
    it was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_webconsole_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Web Console was opened during
    the reporting period, summed across all subsessions. A null value indicates it
    was not opened or the metric was not recorded.
- mode: NULLABLE
  name: histogram_parent_devtools_webide_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools WebIDE panel was opened during
    the reporting period, summed across all subsessions. A null value indicates it
    was not opened or the metric was not recorded.
- mode: NULLABLE
  name: install_year
  type: INTEGER
  description: The calendar year in which the application was first installed on the
    device. A null value indicates the installation year could not be determined.
- mode: NULLABLE
  name: is_default_browser
  type: BOOLEAN
  description: Indicates whether Firefox is set as the default browser on the client's
    device. True means it is the default; false means another browser is set as default.
- mode: NULLABLE
  name: is_wow64
  type: BOOLEAN
  description: Indicates whether the Firefox process is running as a 32-bit application
    under the 64-bit Windows-on-Windows (WoW64) compatibility layer. True means WoW64
    is in use; false means it is not.
- mode: NULLABLE
  name: locale
  type: STRING
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- mode: NULLABLE
  name: memory_mb
  type: INTEGER
  description: The total amount of physical memory available on the client device,
    expressed in megabytes. Used to characterize device hardware capability at finer
    granularity than memory_gb.
- mode: NULLABLE
  name: normalized_channel
  type: STRING
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- mode: NULLABLE
  name: normalized_os_version
  type: STRING
  description: The standardized version string of the client's operating system, such
    as '10.0' for Windows 10 or '6.8.0' for a Linux kernel version. Provides a normalized
    representation across different OS reporting formats.
- mode: NULLABLE
  name: os
  type: STRING
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- mode: NULLABLE
  name: os_service_pack_major
  type: INTEGER
  description: The major version number of the Windows Service Pack installed on the
    client, such as 0 (no service pack), 1, or 2. Null indicates the value was not
    available, typically for non-Windows platforms.
- mode: NULLABLE
  name: os_service_pack_minor
  type: INTEGER
  description: The minor version number of the Windows Service Pack installed on the
    client. This is almost always 0, with null indicating the value was unavailable,
    typically for non-Windows platforms.
- mode: NULLABLE
  name: os_version
  type: STRING
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- mode: NULLABLE
  name: pings_aggregated_by_this_row
  type: INTEGER
  description: The number of individual telemetry pings that were collapsed into this
    single aggregated row. Higher values indicate that multiple pings from the same
    client were merged during aggregation.
- mode: NULLABLE
  name: places_bookmarks_count_mean
  type: FLOAT
  description: The mean number of bookmarks stored in the user's Places database,
    averaged over the reporting period. Null when bookmark count data was not available
    for the client.
- mode: NULLABLE
  name: places_pages_count_mean
  type: FLOAT
  description: The mean number of pages stored in the user's browsing history (Places
    database), averaged over the reporting period. Null when page count data was not
    available for the client.
- mode: NULLABLE
  name: plugin_hangs_sum
  type: INTEGER
  description: The total number of plugin hang events recorded during the reporting
    period. Null when no plugin hang data was reported, which is common as plugin
    usage has become rare in modern Firefox.
- mode: NULLABLE
  name: plugins_infobar_allow_sum
  type: INTEGER
  description: The total number of times the user clicked 'Allow' on a plugin activation
    infobar during the reporting period. Null across all records, reflecting the deprecation
    of NPAPI plugin support in Firefox.
- mode: NULLABLE
  name: plugins_infobar_block_sum
  type: INTEGER
  description: The total number of times the user clicked 'Block' on a plugin activation
    infobar during the reporting period. Null across all records, reflecting the deprecation
    of NPAPI plugin support in Firefox.
- mode: NULLABLE
  name: plugins_infobar_shown_sum
  type: INTEGER
  description: The total number of times a plugin activation infobar was displayed
    to the user during the reporting period. Null when no infobar events were recorded,
    consistent with the deprecation of legacy plugin support.
- mode: NULLABLE
  name: plugins_notification_shown_sum
  type: INTEGER
  description: The total number of times a plugin-related notification was shown to
    the user during the reporting period. Null when no such notifications were recorded,
    consistent with the near-complete removal of plugin support.
- mode: NULLABLE
  name: previous_build_id
  type: STRING
  description: The Firefox build ID that was installed before the most recent update,
    formatted as a timestamp string (YYYYMMDDHHmmss). Null when no prior build is
    known, such as on a fresh installation.
- mode: NULLABLE
  name: profile_age_in_days
  type: INTEGER
  description: The age of the Firefox profile in days, calculated as the difference
    between the current date and the profile creation date. A value of 0 indicates
    the profile was created on the same day.
- mode: NULLABLE
  name: profile_creation_date
  type: STRING
  description: The date on which the Firefox profile was created, formatted as a YYYYMMDD
    string. Used to determine profile age and cohort membership.
- mode: NULLABLE
  name: push_api_notify_sum
  type: INTEGER
  description: The total number of Web Push API notifications delivered to a client
    during the reporting period. Null when no push notifications were received.
- mode: NULLABLE
  name: sample_id
  type: INTEGER
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- mode: NULLABLE
  name: sandbox_effective_content_process_level
  type: INTEGER
  description: The effective sandbox security level applied to Firefox content processes,
    represented as an integer where higher values indicate stricter sandboxing. Null
    when the sandbox level could not be determined.
- mode: NULLABLE
  name: scalar_combined_webrtc_nicer_stun_retransmits_sum
  type: INTEGER
  description: The total number of STUN packet retransmissions observed during WebRTC
    sessions using the NICEr library. Currently always null, indicating this metric
    is not yet being collected.
- mode: NULLABLE
  name: scalar_combined_webrtc_nicer_turn_401s_sum
  type: INTEGER
  description: The total number of 401 (Unauthorized) error responses received from
    TURN servers during WebRTC sessions using the NICEr library. Currently always
    null, indicating this metric is not yet being collected.
- mode: NULLABLE
  name: scalar_combined_webrtc_nicer_turn_403s_sum
  type: INTEGER
  description: The total number of 403 (Forbidden) error responses received from TURN
    servers during WebRTC sessions using the NICEr library. Currently always null,
    indicating this metric is not yet being collected.
- mode: NULLABLE
  name: scalar_combined_webrtc_nicer_turn_438s_sum
  type: INTEGER
  description: The total number of 438 (Stale Nonce) error responses received from
    TURN servers during WebRTC sessions using the NICEr library. Currently always
    null, indicating this metric is not yet being collected.
- mode: NULLABLE
  name: scalar_content_navigator_storage_estimate_count_sum
  type: INTEGER
  description: The total number of times the navigator.storage.estimate() API was
    called in content processes during the reporting period. Currently always null,
    indicating this metric is not yet being collected.
- mode: NULLABLE
  name: scalar_content_navigator_storage_persist_count_sum
  type: INTEGER
  description: The total number of times the navigator.storage.persist() API was called
    in content processes during the reporting period. Currently always null, indicating
    this metric is not yet being collected.
- mode: NULLABLE
  name: scalar_parent_aushelper_websense_reg_version
  type: STRING
  description: The version string of the Websense endpoint security software detected
    in the Windows registry by the AUS (Application Update Service) helper. Null when
    Websense is not installed or the version could not be read.
- mode: NULLABLE
  name: scalar_parent_browser_engagement_max_concurrent_tab_count_max
  type: INTEGER
  description: The maximum number of browser tabs open simultaneously in any single
    session during the reporting period, as recorded by the parent process engagement
    scalar. Null when the metric was not collected.
- mode: NULLABLE
  name: scalar_parent_browser_engagement_max_concurrent_window_count_max
  type: INTEGER
  description: The maximum number of browser windows open simultaneously in any single
    session during the reporting period, as recorded by the parent process engagement
    scalar. Null when the metric was not collected.
- mode: NULLABLE
  name: scalar_parent_browser_engagement_tab_open_event_count_sum
  type: INTEGER
  description: The total number of new tab open events recorded in the browser during
    the reporting period. A higher value indicates more frequent tab-opening activity
    by the user.
- mode: NULLABLE
  name: scalar_parent_browser_engagement_total_uri_count_sum
  type: INTEGER
  description: The total number of URIs visited in normal (non-private) browsing mode
    during the reporting period. This is a key measure of user browsing engagement.
- mode: NULLABLE
  name: scalar_parent_browser_engagement_unfiltered_uri_count_sum
  type: INTEGER
  description: The total count of URIs visited without applying engagement filters
    (e.g., excluding chrome or about pages) during the reporting period. This unfiltered
    count includes all navigations, including internal browser pages.
- mode: NULLABLE
  name: scalar_parent_browser_engagement_unique_domains_count_max
  type: INTEGER
  description: The maximum number of unique domains visited in any single browsing
    session during the reporting period. This reflects the breadth of a user's browsing
    activity at its peak.
- mode: NULLABLE
  name: scalar_parent_browser_engagement_unique_domains_count_mean
  type: FLOAT
  description: The average number of unique domains visited per browsing session during
    the reporting period. This provides a normalized measure of how broadly users
    browse across different sites.
- mode: NULLABLE
  name: scalar_parent_browser_engagement_window_open_event_count_sum
  type: INTEGER
  description: The total number of new browser window open events recorded during
    the reporting period. A higher value indicates more frequent use of multiple windows.
- mode: NULLABLE
  name: scalar_parent_devtools_accessibility_node_inspected_count_sum
  type: INTEGER
  description: The total number of times an accessibility node was inspected using
    the DevTools Accessibility panel during the reporting period. A null value indicates
    the feature was not used.
- mode: NULLABLE
  name: scalar_parent_devtools_accessibility_opened_count_sum
  type: INTEGER
  description: The total number of times the DevTools Accessibility panel was opened
    during the reporting period. A null value indicates the panel was not opened.
- mode: NULLABLE
  name: scalar_parent_devtools_accessibility_picker_used_count_sum
  type: INTEGER
  description: The total number of times the accessibility picker tool within DevTools
    was activated during the reporting period. A null value indicates the picker was
    not used.
- fields:
  - mode: NULLABLE
    name: key
    type: STRING
    description: A string identifier representing the specific action, search engine,
      or event type associated with a record, such as a search entry point or provider
      key. An empty string indicates no specific key was recorded.
  - mode: NULLABLE
    name: value
    type: INTEGER
    description: null
  mode: REPEATED
  name: scalar_parent_devtools_accessibility_select_accessible_for_node_sum
  type: RECORD
  description: A keyed map of counts representing how many times the 'select accessible
    object for node' action was triggered in the DevTools Accessibility panel, broken
    down by node type or context.
- mode: NULLABLE
  name: scalar_parent_devtools_accessibility_service_enabled_count_sum
  type: INTEGER
  description: The total number of times the accessibility service was enabled via
    DevTools during the reporting period. A null value indicates the service was not
    enabled through this path.
- mode: NULLABLE
  name: scalar_parent_devtools_copy_full_css_selector_opened_sum
  type: INTEGER
  description: The total number of times the 'Copy Full CSS Selector' action was triggered
    in DevTools during the reporting period. A null value indicates this action was
    not used.
- mode: NULLABLE
  name: scalar_parent_devtools_copy_unique_css_selector_opened_sum
  type: INTEGER
  description: The total number of times the 'Copy Unique CSS Selector' action was
    triggered in DevTools during the reporting period. A null value indicates this
    action was not used.
- mode: NULLABLE
  name: scalar_parent_devtools_toolbar_eyedropper_opened_sum
  type: INTEGER
  description: The total number of times the eyedropper color picker tool was opened
    from the DevTools toolbar during the reporting period. A null value indicates
    the tool was not used.
- mode: NULLABLE
  name: scalar_parent_dom_contentprocess_troubled_due_to_memory_sum
  type: INTEGER
  description: The total number of times a DOM content process was flagged as troubled
    due to low memory conditions during the reporting period. A null value indicates
    no such events occurred.
- mode: NULLABLE
  name: scalar_parent_navigator_storage_estimate_count_sum
  type: INTEGER
  description: The total number of times the Navigator Storage Estimate API was called
    during the reporting period. A null value indicates the API was not invoked.
- mode: NULLABLE
  name: scalar_parent_navigator_storage_persist_count_sum
  type: INTEGER
  description: The total number of times the Navigator Storage Persist API was called
    during the reporting period. A null value indicates the API was not invoked.
- mode: NULLABLE
  name: scalar_parent_storage_sync_api_usage_extensions_using_sum
  type: INTEGER
  description: The total number of extensions that used the Storage Sync API during
    the reporting period. A null value indicates no extensions invoked this API.
- mode: NULLABLE
  name: search_cohort
  type: STRING
  description: An identifier for a search experiment cohort that the client was enrolled
    in, used to track search behavior changes across specific experiment groups. A
    null value indicates the client was not part of any tracked search cohort.
- mode: NULLABLE
  name: search_count_abouthome
  type: INTEGER
  description: The number of searches initiated from the Firefox about:home page during
    the period. A value of zero indicates no searches from this entry point.
- mode: NULLABLE
  name: search_count_contextmenu
  type: INTEGER
  description: The number of searches initiated via the browser context menu (e.g.,
    right-click search) during the period. A value of zero indicates no context menu
    searches.
- mode: NULLABLE
  name: search_count_newtab
  type: INTEGER
  description: The number of searches initiated from the new tab page during the period.
    A value of zero indicates no searches from this entry point.
- mode: NULLABLE
  name: search_count_searchbar
  type: INTEGER
  description: The number of searches initiated from the dedicated browser search
    bar during the period. A value of zero indicates no searches from this entry point.
- mode: NULLABLE
  name: search_count_system
  type: INTEGER
  description: The number of searches initiated by system-level actions (e.g., OS-level
    search integration) during the period. A value of zero indicates no system-triggered
    searches.
- mode: NULLABLE
  name: search_count_urlbar
  type: INTEGER
  description: The number of searches initiated from the URL bar (address bar) during
    the period. A value of zero indicates no URL bar searches were recorded.
- mode: NULLABLE
  name: search_count_all
  type: INTEGER
  description: The total number of searches across all entry points and sources during
    the period. A value of zero indicates no searches were recorded.
- mode: NULLABLE
  name: search_count_tagged_sap
  type: INTEGER
  description: The number of searches tagged as Search Access Point (SAP) searches,
    indicating searches attributed to a partner-configured entry point. A value of
    zero indicates no tagged SAP searches.
- mode: NULLABLE
  name: search_count_tagged_follow_on
  type: INTEGER
  description: The number of follow-on searches that were tagged, meaning the user
    continued searching after an initial tagged search access point. A value of zero
    indicates no tagged follow-on searches.
- mode: NULLABLE
  name: search_count_organic
  type: INTEGER
  description: The number of organic (non-tagged, non-partner) searches performed
    during the period. A value of zero indicates no organic searches were recorded.
- mode: NULLABLE
  name: search_count_urlbar_handoff
  type: INTEGER
  description: The number of searches initiated via a URL bar handoff, where a search
    typed on the new tab page is handed off to the URL bar. A value of zero indicates
    no handoff searches.
- mode: NULLABLE
  name: search_count_urlbar_persisted
  type: INTEGER
  description: The number of searches initiated from the URL bar while a previously
    selected search engine was persisted in the search mode. A value of zero indicates
    no such searches.
- mode: NULLABLE
  name: session_restored_mean
  type: FLOAT
  description: The average time in milliseconds for the browser session to be restored.
    A null value indicates that session restore timing data was not available or not
    applicable.
- mode: NULLABLE
  name: sessions_started_on_this_day
  type: INTEGER
  description: The number of new browser sessions that began on the specific day represented
    by the record. A value of zero indicates no new sessions were started on that
    day.
- mode: NULLABLE
  name: shutdown_kill_sum
  type: INTEGER
  description: The total number of times the browser process was forcibly killed during
    shutdown rather than exiting cleanly. Higher values indicate repeated unclean
    shutdowns for a client.
- mode: NULLABLE
  name: subsession_hours_sum
  type: NUMERIC
  description: The total number of hours spent in active Firefox subsessions for a
    client or cohort over the aggregation period. Values near 24 indicate nearly continuous
    daily usage.
- mode: NULLABLE
  name: ssl_handshake_result_failure_sum
  type: INTEGER
  description: The total number of failed SSL/TLS handshake attempts recorded for
    a client over a period. A value of zero indicates all handshakes completed successfully
    with no failures.
- mode: NULLABLE
  name: ssl_handshake_result_success_sum
  type: INTEGER
  description: The total number of successful SSL/TLS handshake completions recorded
    for a client over a period. Null values indicate the metric was not collected
    or not applicable.
- mode: NULLABLE
  name: sync_configured
  type: BOOLEAN
  description: Indicates whether Firefox Sync was enabled and configured on the client's
    browser. True means Sync was active; false means it was explicitly disabled; null
    indicates the state was not reported.
- mode: NULLABLE
  name: sync_count_desktop_mean
  type: FLOAT
  description: The average number of desktop devices connected to Firefox Sync accounts,
    computed across users in an aggregation group. Null indicates no Sync data was
    available for the group.
- mode: NULLABLE
  name: sync_count_mobile_mean
  type: FLOAT
  description: The average number of mobile devices connected to Firefox Sync accounts,
    computed across users in an aggregation group. A value of zero indicates users
    had Sync configured but no mobile devices linked.
- mode: NULLABLE
  name: sync_count_desktop_sum
  type: INTEGER
  description: The total number of desktop devices connected to Firefox Sync accounts,
    summed across users in an aggregation group. Null indicates no Sync data was available
    for the group.
- mode: NULLABLE
  name: sync_count_mobile_sum
  type: INTEGER
  description: The total number of mobile devices connected to Firefox Sync accounts,
    summed across users in an aggregation group. A value of zero indicates no mobile
    devices were linked to Sync accounts in the group.
- mode: NULLABLE
  name: telemetry_enabled
  type: BOOLEAN
  description: Indicates whether the user has opted into Firefox telemetry data collection.
    False means the user has explicitly disabled telemetry; true means it is enabled;
    null indicates the value was not reported.
- mode: NULLABLE
  name: timezone_offset
  type: INTEGER
  description: The client's local timezone offset from UTC, expressed in minutes.
    For example, 120 represents UTC+2 and -300 represents UTC-5.
- mode: NULLABLE
  name: total_hours_sum
  type: NUMERIC
  description: The total number of hours aggregated across a reporting period for
    the relevant metric. This field is currently unpopulated and always null.
- mode: NULLABLE
  name: update_auto_download
  type: BOOLEAN
  description: Indicates whether automatic update downloads are enabled for the browser.
    True means updates are downloaded automatically; false means the user has disabled
    automatic downloads.
- mode: NULLABLE
  name: update_channel
  type: STRING
  description: The release channel from which the browser receives updates, such as
    'release', 'beta', 'nightly', or 'esr'. This reflects the user's update track
    and may include custom or misconfigured values.
- mode: NULLABLE
  name: update_enabled
  type: BOOLEAN
  description: Indicates whether automatic browser updates are enabled for the client.
    True means updates are turned on; false means they have been disabled.
- mode: NULLABLE
  name: vendor
  type: STRING
  description: The organization that produced the browser or software being measured.
    In this dataset the value is consistently 'Mozilla'.
- mode: NULLABLE
  name: web_notification_shown_sum
  type: INTEGER
