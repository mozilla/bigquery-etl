fields:
- name: creation_date
  type: DATE
  mode: NULLABLE
  description: Date when the Zendesk support ticket was originally created.
- name: ticket_id
  type: INTEGER
  mode: NULLABLE
  description: Zendesk ticket ID.
- name: title
  type: STRING
  mode: NULLABLE
  description: Subject line of the Zendesk support ticket as submitted by the user.
- name: content
  type: STRING
  mode: NULLABLE
  description: Full text body of the Zendesk support ticket as submitted by the user.
- name: status
  type: STRING
  mode: NULLABLE
  description: Zendesk lifecycle status of the ticket (e.g., new, open, pending, hold,
    solved, closed) as observed when this partition was written. Re-runs/backfills may
    record a later state. Deleted tickets are excluded upstream.
- name: last_solved_at
  type: TIMESTAMP
  mode: NULLABLE
  description: Timestamp of the most recent transition into the `solved` state, derived
    from `zendesk_syndicate.ticket_field_history`. For reopened-then-resolved tickets this
    is the latest solve; for never-reopened tickets it equals the first solve. NULL when
    the ticket has never been solved.
- name: closed_at
  type: TIMESTAMP
  mode: NULLABLE
  description: Timestamp of the most recent transition into the `closed` state, derived
    from `zendesk_syndicate.ticket_field_history`. NULL when the ticket has never been closed.
- name: resolution_latency_seconds
  type: INTEGER
  mode: NULLABLE
  description: Seconds elapsed between `ticket.created_at` and the FIRST transition
    into the `solved` state. For tickets later reopened and re-solved, this measures
    time-to-first-resolution (not time to the most recent solve). NULL when the ticket
    has never been solved.
- name: star_rating
  type: STRING
  mode: NULLABLE
  description: Appbot star rating recorded on the ticket (1–5). NULL when no rating
    was submitted.
- name: product
  type: STRING
  mode: NULLABLE
  description: Raw upstream Zendesk `custom_product` value.
      Normalized at read time by the `customer_experience.zendesk_retrieval_index` view.
- name: product_version
  type: STRING
  mode: NULLABLE
  description: Product version reported on the ticket, from the Zendesk
    `custom_product_version` custom field. User-supplied; NULL when not provided.
- name: locale
  type: STRING
  mode: NULLABLE
  description: Locale of the ticket submitter (e.g., en-US), taken from the Zendesk user record.
- name: custom_country
  type: STRING
  mode: NULLABLE
  description: Country reported in the Zendesk ticket `custom_country` custom field.
    User-supplied; values may include free-text or legacy entries.
- name: group_name
  type: STRING
  mode: NULLABLE
  description: Name of the Zendesk group the ticket is assigned to.
- name: via_channel
  type: STRING
  mode: NULLABLE
  description: Channel through which the ticket entered Zendesk (e.g., email, web_form, api).
- name: custom_category
  type: STRING
  mode: NULLABLE
  description: Customer-reported category from the Zendesk `custom_category` custom field.
- name: automation_category
  type: INTEGER
  mode: NULLABLE
  description: Flag indicating whether the ticket was resolved through automation (1) or
    handled by an agent (0). Tickets initially marked as automated but later reopened
    are re-categorized as agent-handled. NULL when the ticket has no tags (the
    automation classifier has no input to evaluate).
- name: type
  type: STRING
  mode: NULLABLE
  description: Type of the Zendesk content record; currently always set to "ticket".
- name: ticket_summary_llm
  type: STRING
  mode: NULLABLE
  description: AI-generated summary of the support ticket, limited to a maximum of 8 words.
    Produced by the Gemini model.
- name: ticket_category_llm
  type: STRING
  mode: NULLABLE
  description: AI-generated classification label for the support ticket, consisting of one to two words.
    Produced by the Gemini model.
- name: ticket_language_llm
  type: STRING
  mode: NULLABLE
  description: AI-detected BCP 47 language tag (e.g., en-US, es-MX) for the support ticket content.
    Produced by the Gemini model.
- name: ticket_entities_llm
  type: STRING
  mode: REPEATED
  description: Array of up to three AI-extracted normalized entities from the support ticket.
    Produced by the Gemini model.
- name: ticket_topics_llm
  type: STRING
  mode: REPEATED
  description: Array of up to three AI-generated normalized topic labels for the support ticket.
    Produced by the Gemini model.
- name: ticket_sentiment_score
  type: FLOAT
  mode: NULLABLE
  description: AI-generated sentiment score ranging from -1.0 (very negative) to 1.0 (very positive),
    with 0 as neutral. Produced by the Gemini model. NULLed at write time when the model returns a value
    outside [-1, 1]; out-of-range values are still tracked in `metadata.failure_reasons`.
- name: embedding
  type: FLOAT
  mode: REPEATED
  description: Vector embedding of the concatenated title and content.
    Generated by the Gemini embedding model (gemini-embedding-001).
- name: metadata
  type: RECORD
  mode: NULLABLE
  description: Technical metadata about the AI analysis pipeline, including model versions and processing status.
  fields:
  - name: input_fields
    type: STRING
    mode: REPEATED
    description: List of source field names used as input for the AI analysis (e.g., title, content).
  - name: input_char_count
    type: INTEGER
    mode: NULLABLE
    description: Total character count of the input text provided to the AI model.
  - name: model_version
    type: STRING
    mode: NULLABLE
    description: Version identifier of the generative AI model used for analysis (e.g., gemini-2.5-pro).
  - name: embedding_version
    type: STRING
    mode: NULLABLE
    description: Version identifier of the embedding model used to generate the vector embedding (e.g., gemini-embedding-001).
  - name: prompt_version
    type: STRING
    mode: NULLABLE
    description: Version identifier of the prompt used for the AI analysis (e.g., v1).
  - name: analysis_timestamp
    type: TIMESTAMP
    mode: NULLABLE
    description: Ingestion timestamp — captures the actual wall-clock time when this row's
      AI analysis was produced (`CURRENT_TIMESTAMP()` at query run). Distinct from the
      partition date (`creation_date`), which reflects when the ticket itself was
      created. Backfills and re-runs will record their own run time here.
  - name: embedding_succeeded
    type: BOOLEAN
    mode: NULLABLE
    description: TRUE when `embedding IS NOT NULL`. **This is the sole driver for reprocessing today** —
      partitions are re-run for rows where `embedding_succeeded = FALSE`. LLM-field issues are tracked in
      `failure_reasons` for visibility but do **not** trigger reruns.
  - name: failure_reasons
    type: STRING
    mode: REPEATED
    description: Diagnostic tags for any quality check that failed on this row. Empty array when every check passes.
      Possible tags - `embedding_missing`, `ticket_summary_llm_missing`, `ticket_category_llm_missing`, `ticket_language_llm_missing`,
      `ticket_sentiment_score_missing`, `ticket_sentiment_score_out_of_range`, `ticket_entities_llm_missing`,
      `ticket_entities_llm_has_empty_elements`, `ticket_topics_llm_missing`, `ticket_topics_llm_has_empty_elements`.
      Use for triage (`SELECT reason, COUNT(*) FROM ..., UNNEST(metadata.failure_reasons) reason GROUP BY 1`).
