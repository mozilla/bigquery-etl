fields:
- name: country
  description: The two-letter ISO 3166-1 alpha-2 country code of the client, as inferred from their IP address at submission time.
- name: country_name
  description: The full human-readable country name corresponding to the `country` code, resolved via a static country codes lookup table. Null if the country code
    is unrecognized.
- name: dau
  description: The count of unique clients in this dimension group who had a CFR event recorded within the last 1 day relative to the submission_date (Daily Active
    Users).
- name: locale
  description: The browser locale of the client at the time of the CFR impression (e.g. "en-US", "fr", "es-ES"). Used to segment engagement by language.
- name: mau
  description: The count of unique clients (by client_id or impression_id) in this dimension group who had a CFR event recorded within the last 28 days relative to
    the submission_date (Monthly Active Users).
- name: release_channel
  description: The Firefox release channel of the client (e.g. "release", "beta", "nightly", "esr"). Used to segment engagement metrics by update channel.
- name: submission_date
  description: The date for which this aggregation row was computed. Each row represents activity counts for a specific combination of dimensions on this date.
- name: version
  description: The Firefox application version string of the client at the time of the CFR impression (e.g. "115.0.3").
- name: wau
  description: The count of unique clients in this dimension group who had a CFR event recorded within the last 7 days relative to the submission_date (Weekly Active
    Users).
- name: client_id
  description: The Telemetry client identifier for the Firefox profile. Used together with impression_id to deduplicate CFR pings to one row per user per day; may
    be null when not present in the source ping.
- name: numeric_index
  description: The integer form of the screen or position index associated with this event, equivalent to the `index` column cast to INT64 for numeric comparisons
    and ordering.
- name: impression_id
  description: A UUID (formatted with curly braces) that identifies the Firefox browser instance for CFR purposes. Used together with client_id to uniquely identify
    a user-day record; may be null when not set on the client.
- name: index
  description: A string representation of the screen or position index associated with this event, identifying where in a sequence of screens the event occurred (e.g.
    "0" for the first screen).
- name: first_timestamp
  description: The earliest timestamp at which this event type (identified by the combination of event, category, and index) was first observed in the messaging-system
    data.
- name: event_properties
  description: An array of key-value structs capturing additional properties associated with the event. Each entry includes a string key, an index indicating its
    position, and an array of nested value structs.
- name: days_seen_bits
  description: A 28-bit integer representing the days on which the user was seen sending CFR pings over the past 28 days. Each bit corresponds to one day, with the
    rightmost bit representing the most recent day; a set bit indicates the user was active on that day.
- name: category
  description: The Glean event category grouping for this event type, reflecting the metric category under which the event is registered (e.g. "messaging_system").
- name: seen_whats_new
  description: Indicates whether the user saw a What's New CFR recommendation at any point during the submission day. True when at least one CFR ping for the user
    on that day had a bucket_id matching the pattern '%WHATS_NEW%'.
- name: event_properties.index
  description: The ordinal position of this entry within the `event_properties` array, used to preserve the original ordering of event property entries.
- name: event
  description: The type of messaging-system event that was recorded, such as "IMPRESSION", "CLICK_BUTTON", or "SESSION_END". This is a user-defined string identifying
    the action that occurred.
- name: event_properties.key
  description: The name of an event property within the `event_properties` array, identifying which attribute of the event this entry describes (e.g. a parameter
    name from the event context).
