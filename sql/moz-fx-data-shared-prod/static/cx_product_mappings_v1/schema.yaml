fields:
- name: product
  type: STRING
  mode: REQUIRED
  description: Raw product identifier as it appears in the source system.
- name: product_mapping
  type: STRING
  mode: REQUIRED
  description: Normalized product name used across CX datasets.
- name: source
  type: STRING
  mode: REQUIRED
  description: The source system this mapping applies to (e.g. GA4, Zendesk, Kitsune).
