---
fields:
  - name: submission_date
    type: DATE
    mode: NULLABLE
    description: Date this row was first inserted (partition key).
  - name: stable_trace_id
    type: INT64
    mode: NULLABLE
    description: FK to gecko_trace_traces_v1. Stable ID of the trace pattern.
  - name: stable_event_id
    type: INT64
    mode: NULLABLE
    description: FK to gecko_trace_events_v1. Stable ID of the event type.
  - name: hit_count
    type: INT64
    mode: NULLABLE
    description: Number of times this event occurred in this trace pattern.
  - name: event_position
    type: INT64
    mode: NULLABLE
    description: Position of this event in the trace's Merkle chain (1-based, first to last).
