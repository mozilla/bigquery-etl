fields:
- name: source_project
  type: STRING
  mode: REQUIRED
  description: GCP project of the source table.
- name: source_dataset
  type: STRING
  mode: REQUIRED
  description: BigQuery dataset of the source table.
- name: source_table
  type: STRING
  mode: REQUIRED
  description: Table name (without project or dataset).
- name: column_name
  type: STRING
  mode: REQUIRED
  description: Field path using dot notation for nested fields (e.g. client_info.app_channel).
- name: data_type
  type: STRING
  mode: NULLABLE
  description: BigQuery data type as reported by INFORMATION_SCHEMA.
- name: source_ping
  type: STRING
  mode: NULLABLE
  description: Source telemetry ping resolved via DataHub lineage.
- name: ping_platform
  type: STRING
  mode: NULLABLE
  description: Telemetry platform of the source ping, either 'glean' or 'legacy_telemetry'.
- name: matched_probe
  type: STRING
  mode: NULLABLE
  description: Probe name matched to this column via the Glean Dictionary or probe metadata.
- name: probe_description
  type: STRING
  mode: NULLABLE
  description: Description from the source probe or metric artifact.
- name: final_description
  type: STRING
  mode: NULLABLE
  description: Reconciled column description combining profiling statistics with probe context. Generated by an LLM.
- name: contradiction
  type: STRING
  mode: NULLABLE
  description: Note describing any conflict between observed profiling data and the probe definition. Null when no contradiction is detected.
- name: routing_hint
  type: STRING
  mode: NULLABLE
  description: Recommended base schema scope for this column, one of 'global', 'app', 'dataset', or 'unknown'.
- name: promotion_target
  type: STRING
  mode: NULLABLE
  description: Target base schema file for promotion (e.g. app_fenix.yaml, telemetry_derived.yaml). Null when routing_hint is 'global' or 'unknown'.
- name: sampled_date
  type: DATE
  mode: NULLABLE
  description: Date (YYYY-MM-DD) when the profiling statistics referenced in this description were collected. Null for fields described without profiling data.
- name: processed_at
  type: TIMESTAMP
  mode: REQUIRED
  description: Timestamp when this row was generated by the description pipeline.
