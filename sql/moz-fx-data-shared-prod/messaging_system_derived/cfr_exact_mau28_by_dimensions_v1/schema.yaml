- name: whats_new_mau
  type: INT64
  mode: NULLABLE
  description: Count of clients that had a CFR What's New panel interaction within the past 28 days of the submission date (i.e. days_since_seen_whats_new
    < 28). Represents the monthly active user count scoped to What's New CFR activity.
- name: whats_new_wau
  type: INT64
  mode: NULLABLE
  description: Count of clients that had a CFR What's New panel interaction within the past 7 days of the submission date (i.e. days_since_seen_whats_new
    < 7). Represents the weekly active user count scoped to What's New CFR activity.
- name: whats_new_dau
  type: INT64
  mode: NULLABLE
  description: Count of clients that had a CFR What's New panel interaction on the submission date (i.e. days_since_seen_whats_new < 1). Represents the
    daily active user count scoped to What's New CFR activity.
