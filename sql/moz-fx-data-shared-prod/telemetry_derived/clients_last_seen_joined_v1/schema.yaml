  name: attribution
  type: RECORD
  description: Struct containing install attribution parameters identifying the marketing channel and campaign that sourced this Firefox installation.
- mode: NULLABLE
  name: blocklist_enabled
  type: BOOLEAN
  description: Whether the Firefox add-on/plugin blocklist was enabled on this client on the most recent active day.
- mode: NULLABLE
  name: channel
  type: STRING
  description: The normalized channel the application is being distributed on.
- mode: NULLABLE
  name: client_clock_skew_mean
  type: FLOAT
  description: Mean clock skew in hours between the client clock and server time on the most recent active day.
- mode: NULLABLE
  name: client_submission_latency_mean
  type: FLOAT
  description: Mean latency in hours between ping creation and server receipt on the most recent active day.
- mode: NULLABLE
  name: cpu_cores
  type: INTEGER
  description: Number of physical CPU cores in the client's processor on the most recent active day.
- mode: NULLABLE
  name: cpu_count
  type: INTEGER
  description: Number of logical CPU threads (including hyperthreading) in the client's processor on the most recent active day.
- mode: NULLABLE
  name: cpu_family
  type: INTEGER
  description: The CPU family identifier of the client's processor on the most recent active day.
- mode: NULLABLE
  name: cpu_l2_cache_kb
  type: INTEGER
  description: The L2 cache size in kilobytes of the client's CPU on the most recent active day.
- mode: NULLABLE
  name: cpu_l3_cache_kb
  type: INTEGER
  description: The L3 cache size in kilobytes of the client's CPU on the most recent active day.
- mode: NULLABLE
  name: cpu_model
  type: INTEGER
  description: The CPU model identifier number of the client's processor on the most recent active day.
- mode: NULLABLE
  name: cpu_speed_mhz
  type: INTEGER
  description: The clock speed of the client's CPU in megahertz on the most recent active day.
- mode: NULLABLE
  name: cpu_stepping
  type: INTEGER
  description: The CPU stepping revision identifier of the client's processor on the most recent active day.
- mode: NULLABLE
  name: cpu_vendor
  type: STRING
  description: The CPU vendor string of the client's processor on the most recent active day (e.g., 'GenuineIntel', 'AuthenticAMD').
- mode: NULLABLE
  name: crashes_detected_content_sum
  type: INTEGER
  description: Total number of content process crashes detected for this client on the most recent active day.
- mode: NULLABLE
  name: crashes_detected_gmplugin_sum
  type: INTEGER
  description: Total number of Gecko Media Plugin process crashes detected for this client on the most recent active day.
- mode: NULLABLE
  name: crashes_detected_plugin_sum
  type: INTEGER
  description: Total number of plugin process crashes detected for this client on the most recent active day.
- mode: NULLABLE
  name: crash_submit_attempt_content_sum
  type: INTEGER
  description: Total number of content crash report submission attempts made by this client on the most recent active day.
- mode: NULLABLE
  name: crash_submit_attempt_main_sum
  type: INTEGER
  description: Total number of main process crash report submission attempts made by this client on the most recent active day.
- mode: NULLABLE
  name: crash_submit_attempt_plugin_sum
  type: INTEGER
  description: Total number of plugin crash report submission attempts made by this client on the most recent active day.
- mode: NULLABLE
  name: crash_submit_success_content_sum
  type: INTEGER
  description: Total number of successfully submitted content crash reports for this client on the most recent active day.
- mode: NULLABLE
  name: crash_submit_success_main_sum
  type: INTEGER
  description: Total number of successfully submitted main process crash reports for this client on the most recent active day.
- mode: NULLABLE
  name: crash_submit_success_plugin_sum
  type: INTEGER
  description: Total number of successfully submitted plugin crash reports for this client on the most recent active day.
- mode: NULLABLE
  name: default_search_engine
  type: STRING
  description: The identifier of the client's default search engine on the most recent active day (e.g., 'google-b-d', 'baidu').
- mode: NULLABLE
  name: default_search_engine_data_load_path
  type: STRING
  description: The anonymized file path of the default search engine configuration on the most recent active day (e.g., '[app]google').
- mode: NULLABLE
  name: default_search_engine_data_name
  type: STRING
  description: The display name of the client's default search engine on the most recent active day (e.g., 'Google', 'DuckDuckGo').
- mode: NULLABLE
  name: default_search_engine_data_origin
  type: STRING
  description: The origin classification of the default search engine on the most recent active day; 'default', 'verified', 'unverified', or 'invalid'.
- mode: NULLABLE
  name: default_search_engine_data_submission_url
  type: STRING
  description: The HTTP search submission URL for the client's default search engine on the most recent active day.
- mode: NULLABLE
  name: devtools_toolbox_opened_count_sum
  type: INTEGER
  description: Total number of times the Firefox Developer Tools toolbox was opened on the most recent active day.
- mode: NULLABLE
  name: distribution_id
  type: STRING
  description: The distribution id associated with the install of Firefox.
- mode: NULLABLE
  name: e10s_enabled
  type: BOOLEAN
  description: Whether Electrolysis (multi-process Firefox) was enabled on this client on the most recent active day. True for the vast majority of modern
    Firefox clients.
- mode: NULLABLE
  name: env_build_arch
  type: STRING
  description: The CPU architecture of the Firefox binary on the most recent active day (e.g., 'x86-64', 'aarch64', 'x86').
- mode: NULLABLE
  name: env_build_id
  type: STRING
  description: The build ID of the Firefox environment on the most recent active day, matching the build datestamp (e.g., '20260511200624').
- mode: NULLABLE
  name: env_build_version
  type: STRING
  description: The version string of the Firefox environment on the most recent active day (e.g., '151.0').
- mode: REPEATED
  name: environment_settings_intl_accept_languages
  type: STRING
  description: Array of language codes from the browser's Accept-Language header preference on the most recent active day.
- mode: REPEATED
  name: environment_settings_intl_app_locales
  type: STRING
  description: Array of locales available in the Firefox application package on the most recent active day.
- mode: REPEATED
  name: environment_settings_intl_available_locales
  type: STRING
  description: Array of all locales available in the current Firefox installation on the most recent active day.
- mode: REPEATED
  name: environment_settings_intl_requested_locales
  type: STRING
  description: Array of locales explicitly requested by the user in Firefox's language preferences on the most recent active day.
- mode: REPEATED
  name: environment_settings_intl_system_locales
  type: STRING
  description: Array of locale codes reported by the operating system on the most recent active day.
- mode: REPEATED
  name: environment_settings_intl_regional_prefs_locales
  type: STRING
  description: Array of locale codes used for regional formatting preferences (e.g., date and number formats) on the most recent active day.
- fields:
  - mode: NULLABLE
    name: key
    type: STRING
  - mode: NULLABLE
    name: value
    type: STRING
  mode: REPEATED
  name: experiments
  type: RECORD
  description: Array of key-value pairs representing active Nimbus/Normandy experiment enrollments on the most recent active day, where each key is the
    experiment slug and value is the assigned branch.
- mode: NULLABLE
  name: first_paint_mean
  type: FLOAT
  description: Mean time in milliseconds from browser start to first paint, averaged across sessions on the most recent active day. Measures perceived
    startup performance.
- mode: NULLABLE
  name: flash_version
  type: STRING
  description: The version of Adobe Flash Player installed on this client on the most recent active day. Typically null for modern Firefox as Flash support
    has been removed.
- mode: NULLABLE
  name: country
  type: STRING
  description: Name of the country in which the activity took place, as determined
    by the IP geolocation.
- mode: NULLABLE
  name: city
  type: STRING
  description: The city associated with the client's IP address as determined by IP geolocation on the most recent active day.
- mode: NULLABLE
  name: geo_subdivision1
  type: STRING
  description: The primary administrative subdivision (e.g., state, province) of the client's geographic location, derived from IP geolocation on the
    most recent active day.
- mode: NULLABLE
  name: geo_subdivision2
  type: STRING
  description: The secondary administrative subdivision of the client's geographic location, derived from IP geolocation on the most recent active day.
- mode: NULLABLE
  name: isp_name
  type: STRING
  description: The name of the Internet Service Provider associated with the client's IP address on the most recent active day.
- mode: NULLABLE
  name: isp_organization
  type: STRING
  description: The name of the organization associated with the client's IP address on the most recent active day; may be more specific than isp_name
    for business accounts.
- mode: NULLABLE
  name: gfx_features_advanced_layers_status
