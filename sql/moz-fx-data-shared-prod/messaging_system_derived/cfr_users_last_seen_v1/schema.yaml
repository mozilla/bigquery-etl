- name: days_seen_whats_new_bits
  type: INTEGER
  mode: NULLABLE
  description: A 28-bit integer representing the history of days on which the user saw the "What's New" panel, with the rightmost bit corresponding to
    the current submission date and each bit to the left representing one day further in the past. Built by casting the boolean `seen_whats_new` flag
    for the current day and combining it with the shifted previous day's value using `combine_adjacent_days_28_bits`.
