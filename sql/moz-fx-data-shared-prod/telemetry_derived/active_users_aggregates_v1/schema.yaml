fields:
- mode: NULLABLE
  name: segment
  type: STRING
  description: A categorical label classifying a user's engagement level based on
    usage frequency, such as 'core_user', 'regular_user', 'casual_user', 'infrequent_user',
    or 'other'. This segmentation is used to group users by activity patterns.
- mode: NULLABLE
  name: app_version
  type: STRING
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- mode: NULLABLE
  name: attribution_medium
  type: STRING
  description: The marketing medium from attribution parameters describing how the
    user arrived at the download (e.g., 'referral', 'firefox-desktop'). Null when
    attribution data is unavailable.
- mode: NULLABLE
  name: attribution_source
  type: STRING
  description: The referring source from attribution parameters, typically the website
    or property that directed the user to download Firefox (e.g., 'www.google.com',
    'www.bing.com'). Null when attribution data is unavailable.
- mode: NULLABLE
  name: city
  type: STRING
  description: The city associated with the client's IP address or profile geography
    at the time of the record. May be null when city-level geolocation is unavailable
    or suppressed.
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: distribution_id
  type: STRING
  description: An identifier for the Firefox distribution package the client is running,
    such as 'default' for the standard Mozilla build or partner-specific identifiers
    like 'canonical-002' or 'mozilla-MSIX'. This field is null when no distribution
    identifier is available.
- mode: NULLABLE
  name: is_default_browser
  type: BOOLEAN
  description: Indicates whether Firefox is set as the default browser on the client's
    device. True means it is the default; false means another browser is set as default.
- mode: NULLABLE
  name: app_name
  type: STRING
  description: The name of the Mozilla application that generated the telemetry event
    (e.g., 'firefox_desktop', 'fenix', 'firefox_ios', 'mozilla_vpn'). Used to distinguish
    telemetry across Mozilla's suite of products.
- mode: NULLABLE
  name: channel
  type: STRING
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- mode: NULLABLE
  name: os
  type: STRING
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- mode: NULLABLE
  name: os_version
  type: STRING
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- mode: NULLABLE
  name: os_version_major
  type: INTEGER
  description: "The major version number component of the operating system. For example,\
    \ a value of 10 corresponds to Windows 10 or macOS 10.x, while values like 13\u2013\
    16 correspond to major iOS/macOS releases."
- mode: NULLABLE
  name: os_version_minor
  type: INTEGER
  description: The minor version number component of the operating system, representing
    the second numeric segment of the full OS version string. A value of 0 is by far
    the most common, indicating that most clients are on a base major release with
    no minor increment.
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: dau
  type: INTEGER
  description: Daily Active Users (DAU). The count of distinct clients active on a
    given day. See detailed DAU definitions for Desktop and Mobile in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#Definitions.
- mode: NULLABLE
  name: wau
  type: INTEGER
  description: Weekly Active Users (WAU). In aggregate tables this is the count of
    distinct clients active at least one day in the previous 7 days. See detailed
    definition in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#WAU-and-MAU.
- mode: NULLABLE
  name: mau
  type: INTEGER
  description: Monthly Active Users (MAU). The count of distinct clients that were
    active at least one day within the previous 28 days. See detailed MAU definition
    in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#WAU-and-MAU.
- mode: NULLABLE
  name: new_profiles
  type: INTEGER
  description: The number of newly created Firefox profiles observed within the aggregation
    period. A value of 0 indicates no new profiles were created for that record's
    segment.
- mode: NULLABLE
  name: ad_clicks
  type: INTEGER
  description: The total number of times the user clicked on an advertisement during
    the measurement period. Null when no ad click data was collected.
- mode: NULLABLE
  name: organic_search_count
  type: INTEGER
  description: The number of organic (non-paid) searches performed by the client within
    the aggregation period. Null indicates the value was not available for the record,
    while 0 indicates the client performed no organic searches.
- mode: NULLABLE
  name: search_count
  type: INTEGER
  description: The total number of searches performed during the period. A null value
    indicates that no search count data was recorded.
- mode: NULLABLE
  name: search_with_ads
  type: INTEGER
  description: The total number of search result pages that contained advertisements
    during the period. A null value indicates this metric was not recorded; higher
    values indicate more ad-bearing search sessions.
- mode: NULLABLE
  name: uri_count
  type: INTEGER
  description: The total number of URIs visited by the client during the reporting
    period. Null values indicate the metric was not recorded for that row.
- mode: NULLABLE
  name: active_hours
  type: FLOAT
  description: The total number of hours the browser was actively used (i.e., the
    user was interacting with it) during the measurement period. Null when usage data
    was not available.
- mode: NULLABLE
  name: first_seen_year
  type: INTEGER
  description: The calendar year in which the client profile was first observed in
    telemetry data, derived from the first_seen_date. This is used for coarser cohort
    analyses and long-term retention reporting.
- mode: NULLABLE
  name: attributed
  type: BOOLEAN
  description: Indicates whether the client or install event has a known marketing
    attribution source (true) or was not attributed to any campaign or referral (false).
- mode: NULLABLE
  name: language_name
  type: STRING
  description: The human-readable name of the browser locale language (e.g., 'English',
    'German').
- description: The count of qualified daily active users on desktop for a given segment
    or dimension. A value of 0 indicates no qualifying activity was observed.
  mode: NULLABLE
  name: qdau_desktop
  type: INTEGER
