friendly_name: Events Stream Nimbus Enrollments
description: |-
  This table contains the enrollment events for Nimbus, which is a feature experimentation platform used by Firefox.
  The data is sourced from the accounts_frontend.events_stream table and joined with the accounts_cirrus.enrollment view
  to get the Nimbus experiment and branch information. The table is partitioned by submission_date for efficient querying.

  Jira ticket: [DENG-10290]https://mozilla-hub.atlassian.net/browse/DENG-10290
owners:
- mhirose@mozilla.com
labels:
  incremental: true
  owner1: mhirose
  dag: bqetl_accounts_derived
scheduling:
  dag_name: bqetl_accounts_derived
bigquery:
  time_partitioning:
    type: day
    field: submission_timestamp
    require_partition_filter: false
    expiration_days: null
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  query.sql:
  - moz-fx-data-shared-prod.accounts_cirrus.enrollment
  - moz-fx-data-shared-prod.accounts_frontend.events_stream
require_column_descriptions: true
