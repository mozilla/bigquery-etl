fields:
- name: account_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the user's logged in to an FxA account.
- name: activity_segment
  type: STRING
  mode: NULLABLE
  description: Classification of users based on their browsing activity.
    E.g., infrequent, casual, regular.
  aliases:
  - segment
  possible_values:
  - casual_user
  - core_user
  - infrequent_user
  - regular_user
  - other
- name: activated
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the client has met the activation criteria, indicating meaningful
    engagement with the product beyond initial installation.
- name: adjust_network
  type: STRING
  mode: NULLABLE
  description: The name of the Adjust Network that sourced the installation.
- name: android_sdk_version
  type: STRING
  mode: NULLABLE
  description: The version of the Android SDK running on the device (e.g. "33"). Only
    populated for Android clients.
- name: app_build
  type: STRING
  mode: NULLABLE
  description: The build identifier of the application, typically a numeric string
    representing the specific build of the app binary.
- name: app_build_id
  type: STRING
  mode: NULLABLE
  description: The build ID of the application.
- name: app_channel
  type: STRING
  mode: NULLABLE
  description: The release channel of the application (e.g. "release", "beta", "nightly").
    Similar to normalized_channel but may contain unnormalized values.
- name: app_version
  type: STRING
  mode: NULLABLE
  description: User visible version string (e.g. "1.0.3") for the browser.
  aliases:
  - version
  - app_display_version
- name: app_version_major
  type: INTEGER
  mode: NULLABLE
  description: The major version of the user visible app version string for the browser,
    e.g. "142.1.3", has major version 142.
- name: app_version_minor
  type: INTEGER
  mode: NULLABLE
  description: The minor version of the user visible app version string for the browser,
    e.g. "142.1.3" has minor version 1.
- name: app_name
  type: STRING
  mode: NULLABLE
  description: The name of the browser.
- name: architecture
  type: STRING
  mode: NULLABLE
  description: The architecture of the device, (e.g. "arm", "x86").
- name: attribution_campaign
  type: STRING
  mode: NULLABLE
  description: The attribution campaign; similar or the same as UTM campaign.
- name: attribution_content
  type: STRING
  mode: NULLABLE
  description: The attribution content; similar or the same as UTM content.
- name: attribution_experiment
  type: STRING
  mode: NULLABLE
  description: The attribution experiment key.
- name: attribution_medium
  type: STRING
  mode: NULLABLE
  description: The attribution medium; similar or the same as UTM medium.
- name: attribution_source
  type: STRING
  mode: NULLABLE
  description: The attribution source; similar or the same as UTM source.
- name: attribution_variation
  type: STRING
  mode: NULLABLE
  description: The attribution variation key.
- name: city
  type: STRING
  mode: NULLABLE
  description: Name of the city in which the activity took place, as determined by
    IP geolocation. May be null or empty for clients whose city cannot be resolved.
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier (UUID) for the client.
- name: context_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier (UUID) for clients in contextual services user
    interaction pings, e.g. top-sites ping.
- name: country
  type: STRING
  mode: NULLABLE
  description: Name of the country in which the activity took place, as determined by
    the IP geolocation.
  aliases:
  - normalized_country
  - geo
- name: country_code
  type: STRING
  mode: NULLABLE
  description: Code of the country in which the activity took place, as determined by
    the IP geolocation. Unknown or NULL values are normally stored as '??'.
  aliases:
  - normalized_country_code
- name: created_at
  type: TIMESTAMP
  mode: NULLABLE
  description: Timestamp when the row was created.
  aliases:
  - created_timestamp
  - created_date
- name: days_since_first_seen
  type: INTEGER
  mode: NULLABLE
  description: Number of days elapsed since the client was first seen (first_seen_date)
    up to the current submission_date.
- name: days_since_seen
  type: INTEGER
  mode: NULLABLE
  description: Number of days elapsed since the client last sent a ping, measured from the
    most recent active day to the current submission_date. A value of 0 means the client
    was active on the submission_date itself.
- name: dau
  type: INTEGER
  mode: NULLABLE
  description: The number of daily active users, corresponding to the count of clients that reported
    at least one ping on the submission_date and qualify as active.
- name: default_search_engine
  type: STRING
  mode: NULLABLE
  description: The identifier of the user's default search engine, representing the
    search engine that is used when a user performs a search from the address bar or
    search bar without explicitly selecting a different engine.
- name: device_manufacturer
  type: STRING
  mode: NULLABLE
  description: The manufacturer of the device on which the application is running
    (e.g. "Samsung", "Apple", "Google").
- name: device_model
  type: STRING
  mode: NULLABLE
  description: The model name of the device on which the application is running
    (e.g. "Pixel 7", "iPhone 14").
- name: first_run_date
  type: DATE
  mode: NULLABLE
  description: The date of the first run of the application.
- name: first_seen_date
  type: DATE
  mode: NULLABLE
  description: Date when the server first received a ping from this client.
- name: wau
  type: INTEGER
  mode: NULLABLE
  description: The number of weekly active users, corresponding to the count of clients that reported
    at least one ping on the previous 7 days from the submission_date and qualify as active.
- name: mau
  type: INTEGER
  mode: NULLABLE
  description: The number of monthly active users, corresponding to the count of clients that reported
    at least one ping on the previous 28 days from the submission_date and qualify as active.
- name: metric_date
  type: DATE
  mode: NULLABLE
  description: The reference date for the metric being reported, which may differ from
    submission_date when reporting on a window of activity (e.g. retention metrics
    that look back over multiple days).
- name: distribution_id
  type: STRING
  mode: NULLABLE
  description: The distribution id associated with the install of Firefox.
- name: document_id
  type: STRING
  mode: NULLABLE
  description: The document ID specified in the URI when the client sent this message.
- name: is_default_browser
  type: BOOLEAN
  mode: NULLABLE
  description: A flag indicating whether the browser is set as the default browser on the client side.
- name: is_new_profile
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the client profile was created on the current submission_date,
    indicating a new installation or profile creation event.
- name: is_desktop
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates if the client is included in the desktop KPI.
- name: is_mobile
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates if the client is included in the mobile KPI.
- name: isp_name
  type: STRING
  mode: NULLABLE
  description: The name of the internet service provider associated with the client's IP address.
  aliases:
  - isp
- name: locale
  type: STRING
  mode: NULLABLE
  description: Set of language- and/or country-based preferences for a user interface.
- name: new_profiles
  type: INTEGER
  mode: NULLABLE
  description: The count of new client profiles created on the submission_date,
    representing new installations or profile creation events.
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The normalized channel the application is being distributed on.
  aliases:
  - channel
  possible_values:
  - release
  - beta
  - nightly
  - aurora
  - esr
  - Other
- name: normalized_os
  type: STRING
  mode: NULLABLE
  description: The normalized name of the operating system running at the client.
  aliases:
  - os
- name: os_code
  type: STRING
  mode: NULLABLE
  description: The operating system code based on the Common Platform Enumeration CPE.
- name: os_version
  type: STRING
  mode: NULLABLE
  description: Version of the operating system running at the client, e.g. "100.9.11".
  aliases:
  - normalized_os_version
- name: os_major
  type: INTEGER
  mode: NULLABLE
  description: Major or first part of the operating system version running at the
    client. E.g. for version "100.9.11", the major is 100.
  aliases:
  - os_major_version
  - os_version_major
- name: os_minor
  type: INTEGER
  mode: NULLABLE
  description: Minor part of the operating system version running at the client. E.g.
    for version "100.9.11", the minor is 9.
  aliases:
  - os_minor_version
  - os_version_minor
- name: profile_group_id
  type: STRING
  mode: NULLABLE
  description: A UUID uniquely identifying the profile group, not shared with other telemetry data.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: A number, 0-99, that samples by client_id and allows filtering data for analysis.
    It is a pipeline-generated artifact that should match between pings.
- name: source_column
  type: STRING
  mode: NULLABLE
  description: Column name in the source used to ingest the data.
- name: source_report
  type: STRING
  mode: NULLABLE
  description: Name of the report file used to ingest the data.
  aliases:
  - source_file
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The date when the telemetry ping is received on the server side.
- name: submission_hour
  type: TIMESTAMP
  mode: NULLABLE
  description: The submission_timestamp truncated to the hour.
- name: submission_month
  type: DATE
  mode: NULLABLE
  description: First calendar day of the month extracted from submission_date or
    submission_timestamp.
- name: submission_timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: Timestamp when the ping is received on the server side.
- name: telemetry_sdk_build
  type: STRING
  mode: NULLABLE
  description: The version of the Glean SDK at the time the ping was collected (e.g. 25.0.0).
- name: updated_at
  type: TIMESTAMP
  mode: NULLABLE
  description: Most recent date and time when the row was updated.
  aliases:
  - updated_timestamp
  - updated_date
