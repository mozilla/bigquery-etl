fields:
- name: additional_properties
  type: STRING
  mode: NULLABLE
  description: A JSON string containing any payload properties not present in the
    schema
- name: client_info
  type: RECORD
  mode: NULLABLE
  fields:
  - name: android_sdk_version
    type: STRING
    mode: NULLABLE
    description: The optional Android specific SDK version of the software running
      on this hardware device.
  - name: app_build
    type: STRING
    mode: NULLABLE
    description: The build identifier generated by the CI system (e.g. "1234/A").
      For language bindings that provide automatic detection for this value, (e.g.
      Android/Kotlin), in the unlikely event that the build identifier can not be
      retrieved from the OS, it is set to "inaccessible". For other language bindings,
      if the value was not provided through configuration, this metric gets set to
      `Unknown`.
  - name: app_channel
    type: STRING
    mode: NULLABLE
    description: The channel the application is being distributed on.
  - name: app_display_version
    type: STRING
    mode: NULLABLE
    description: The user visible version string (e.g. "1.0.3").  In the unlikely
      event that the display version can not be retrieved, it is set to "inaccessible".
  - name: architecture
    type: STRING
    mode: NULLABLE
    description: The architecture of the device, (e.g. "arm", "x86").
  - name: attribution
    type: RECORD
    mode: NULLABLE
    fields:
    - name: campaign
      type: STRING
      mode: NULLABLE
      description: The attribution campaign (e.g. 'mozilla-org').
    - name: content
      type: STRING
      mode: NULLABLE
      description: The attribution content (e.g. 'firefoxview').
    - name: medium
      type: STRING
      mode: NULLABLE
      description: The attribution medium (e.g. 'organic' for a search engine).
    - name: source
      type: STRING
      mode: NULLABLE
      description: The attribution source (e.g. 'google-play').
    - name: term
      type: STRING
      mode: NULLABLE
      description: The attribution term (e.g. 'browser with developer tools for android').
    - name: ext
      type: JSON
      mode: NULLABLE
  - name: build_date
    type: STRING
    mode: NULLABLE
    description: The date & time the application was built
  - name: client_id
    type: STRING
    mode: NULLABLE
    description: A UUID uniquely identifying the client.
  - name: device_manufacturer
    type: STRING
    mode: NULLABLE
    description: The manufacturer of the device the application is running on. Not
      set if the device manufacturer can't be determined (e.g. on Desktop).
  - name: device_model
    type: STRING
    mode: NULLABLE
    description: The model of the device the application is running on. On Android,
      this is Build.MODEL, the user-visible marketing name, like "Pixel 2 XL". Not
      set if the device model can't be determined (e.g. on Desktop).
  - name: distribution
    type: RECORD
    mode: NULLABLE
    fields:
    - name: name
      type: STRING
      mode: NULLABLE
      description: The distribution name (e.g. 'MozillaOnline').
    - name: ext
      type: JSON
      mode: NULLABLE
  - name: first_run_date
    type: STRING
    mode: NULLABLE
    description: The date of the first run of the application.
  - name: locale
    type: STRING
    mode: NULLABLE
    description: The locale of the application during initialization (e.g. "es-ES").
      If the locale can't be determined on the system, the value is ["und"](https://unicode.org/reports/tr35/#Unknown_or_Invalid_Identifiers),
      to indicate "undetermined".
  - name: os
    type: STRING
    mode: NULLABLE
    description: 'The name of the operating system. Possible values: Android, iOS,
      Linux, Darwin, Windows, FreeBSD, NetBSD, OpenBSD, Solaris, unknown'
  - name: os_version
    type: STRING
    mode: NULLABLE
    description: The user-visible version of the operating system (e.g. "1.2.3").
      If the version detection fails, this metric gets set to `Unknown`.
  - name: session_count
    type: INTEGER
    mode: NULLABLE
    description: An optional running counter of the number of sessions for a client.
  - name: session_id
    type: STRING
    mode: NULLABLE
    description: An optional UUID uniquely identifying the client's current session.
  - name: telemetry_sdk_build
    type: STRING
    mode: NULLABLE
    description: The version of the Glean SDK
  - name: windows_build_number
    type: INTEGER
    mode: NULLABLE
    description: The optional Windows build number, reported by Windows (e.g. 22000)
      and not set for other platforms
- name: document_id
  type: STRING
  mode: NULLABLE
  description: The document ID specified in the URI when the client sent this message
- name: events
  type: RECORD
  mode: REPEATED
  fields:
  - name: category
    type: STRING
    mode: NULLABLE
  - name: extra
    type: RECORD
    mode: REPEATED
    fields:
    - name: key
      type: STRING
      mode: NULLABLE
    - name: value
      type: STRING
      mode: NULLABLE
  - name: name
    type: STRING
    mode: NULLABLE
  - name: session
    type: RECORD
    mode: NULLABLE
    fields:
    - name: event_seq
      type: INTEGER
      mode: NULLABLE
      description: Per-session event counter, reset at each new session.
    - name: session_id
      type: STRING
      mode: NULLABLE
      description: The unique UUID for this session.
    - name: session_sample_rate
      type: FLOAT
      mode: NULLABLE
      description: The sampling rate in effect for this session.
    - name: session_seq
      type: INTEGER
      mode: NULLABLE
      description: Monotonically increasing session counter, persisted across restarts.
    - name: session_start_time
      type: STRING
      mode: NULLABLE
      description: Wall-clock timestamp at session start (RFC 3339). Absent on events
        from before this field was introduced.
    description: Session metadata attached to this event. Absent for out-of-session
      events and events from before sessions were introduced.
  - name: timestamp
    type: INTEGER
    mode: NULLABLE
- name: metadata
  type: RECORD
  mode: NULLABLE
  fields:
  - name: geo
    type: RECORD
    mode: NULLABLE
    fields:
    - name: city
      type: STRING
      mode: NULLABLE
    - name: country
      type: STRING
      mode: NULLABLE
      description: An ISO 3166-1 alpha-2 country code
    - name: db_version
      type: STRING
      mode: NULLABLE
      description: The specific geo database version used for this lookup
    - name: subdivision1
      type: STRING
      mode: NULLABLE
      description: First major country subdivision, typically a state, province, or
        county
    - name: subdivision2
      type: STRING
      mode: NULLABLE
      description: Second major country subdivision; not applicable for most countries
    description: Results of a geographic lookup based on the client's IP address
  - name: header
    type: RECORD
    mode: NULLABLE
    fields:
    - name: date
      type: STRING
      mode: NULLABLE
      description: Date HTTP header
    - name: dnt
      type: STRING
      mode: NULLABLE
      description: DNT (Do Not Track) HTTP header
    - name: x_debug_id
      type: STRING
      mode: NULLABLE
      description: X-Debug-Id HTTP header
    - name: x_foxsec_ip_reputation
      type: STRING
      mode: NULLABLE
      description: X-Foxsec-IP-Reputation header (deprecated, https://mozilla-hub.atlassian.net/browse/DENG-10434)
    - name: x_lb_tags
      type: STRING
      mode: NULLABLE
      description: X-LB-Tags HTTP header
    - name: x_pingsender_version
      type: STRING
      mode: NULLABLE
      description: X-PingSender-Version HTTP header
    - name: x_source_tags
      type: STRING
      mode: NULLABLE
      description: X-Source-Tags HTTP header
    - name: x_telemetry_agent
      type: STRING
      mode: NULLABLE
      description: X-Telemetry-Agent HTTP header
    - name: parsed_date
      type: TIMESTAMP
      mode: NULLABLE
    - name: parsed_x_source_tags
      type: STRING
      mode: REPEATED
    - name: parsed_x_lb_tags
      type: RECORD
      mode: NULLABLE
      fields:
      - name: tls_version
        type: STRING
        mode: NULLABLE
      - name: tls_cipher_hex
        type: STRING
        mode: NULLABLE
    description: Headers included in the client's HTTP request
  - name: isp
    type: RECORD
    mode: NULLABLE
    fields:
    - name: db_version
      type: STRING
      mode: NULLABLE
      description: The specific geo ISP database version used for this lookup
    - name: name
      type: STRING
      mode: NULLABLE
      description: The name of the ISP associated with the client's IP address
    - name: organization
      type: STRING
      mode: NULLABLE
      description: The name of a specific business entity associated with the client's
        IP address when available; otherwise the ISP name
    description: Results of ISP lookup based on the client's IP address
  - name: user_agent
    type: RECORD
    mode: NULLABLE
    fields:
    - name: browser
      type: STRING
      mode: NULLABLE
    - name: os
      type: STRING
      mode: NULLABLE
    - name: version
      type: STRING
      mode: NULLABLE
    description: Parsed components of the client's user agent string
- name: metrics
  type: RECORD
  mode: NULLABLE
  fields:
  - name: labeled_counter
    type: RECORD
    mode: NULLABLE
    fields:
    - name: glean_error_invalid_label
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: INTEGER
        mode: NULLABLE
      description: 'Counts the number of times a metric was set with an invalid label.

        The labels are the `category.name` identifier of the metric.

        '
    - name: glean_error_invalid_overflow
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: INTEGER
        mode: NULLABLE
      description: 'Counts the number of times a metric was set a value that overflowed.

        The labels are the `category.name` identifier of the metric.

        '
    - name: glean_error_invalid_state
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: INTEGER
        mode: NULLABLE
      description: 'Counts the number of times a timing metric was used incorrectly.

        The labels are the `category.name` identifier of the metric.

        '
    - name: glean_error_invalid_value
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: INTEGER
        mode: NULLABLE
      description: 'Counts the number of times a metric was set to an invalid value.

        The labels are the `category.name` identifier of the metric.

        '
  - name: string
    type: RECORD
    mode: NULLABLE
    fields:
    - name: glean_client_annotation_experimentation_id
      type: STRING
      mode: NULLABLE
      description: 'An experimentation identifier derived and provided by the application

        for the purpose of experimentation enrollment.

        '
    - name: broken_site_report_breakage_category
      type: STRING
      mode: NULLABLE
      description: 'The user-selected reason the site is broken (e.g. "media", "load",

        "content"). Serialized as a single value even though the UI presents a

        two-level picker. The option set is UI-driven and may change over time.

        '
    - name: broken_site_report_browser_info_graphics_device_pixel_ratio
      type: STRING
      mode: NULLABLE
      description: 'The device pixel ratio (screen scale) as a decimal string, e.g.
        "3.0".

        '
    - name: broken_site_report_tab_info_antitracking_block_list
      type: STRING
      mode: NULLABLE
      description: 'Which content-blocking rule set is active for the tab: a single
        value,

        one of "basic" or "strict" (not a list of blocked items; those are in

        blocked_origins). Named block_list to match the cross-platform schema.

        '
    - name: broken_site_report_tab_info_antitracking_etp_category
      type: STRING
      mode: NULLABLE
      description: 'The user''s tracking-protection strength setting ("basic" or "strict").

        '
  - name: string_list
    type: RECORD
    mode: NULLABLE
    fields:
    - name: glean_ping_uploader_capabilities
      type: STRING
      mode: REPEATED
      description: 'The list of requested uploader capabilities for the ping this
        is sent in.

        Should be the same as the ones defined for that particular ping.


        This metric is only attached to a ping if it already contains other data.

        '
    - name: broken_site_report_browser_info_app_default_locales
      type: STRING
      mode: REPEATED
      description: 'The app''s preferred locale list (e.g. ["en-US", "en"]).

        '
    - name: broken_site_report_tab_info_antitracking_blocked_origins
      type: STRING
      mode: REPEATED
      description: 'Origins blocked by tracking protection on the reported page. Only

        included when the user keeps the "list of items blocked by tracking

        protection" option on.

        '
    - name: broken_site_report_tab_info_languages
      type: STRING
      mode: REPEATED
      description: 'The languages the reported page actually saw (navigator.languages),

        read from the page context at report time.

        '
  - name: boolean
    type: RECORD
    mode: NULLABLE
    fields:
    - name: broken_site_report_browser_info_graphics_has_touch_screen
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether the device reports a touch screen (navigator.maxTouchPoints
        > 0).

        '
    - name: broken_site_report_browser_info_system_is_tablet
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether the reporting device is a tablet (iPad).

        '
    - name: broken_site_report_tab_info_antitracking_is_private_browsing
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether the reported tab is in private browsing mode.

        '
    - name: broken_site_report_tab_info_frameworks_fastclick
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether the FastClick library was detected on the reported page

        (detected via injected JS at report time).

        '
    - name: broken_site_report_tab_info_frameworks_marfeel
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether the Marfeel framework was detected on the reported page

        (detected via injected JS at report time).

        '
    - name: broken_site_report_tab_info_frameworks_mobify
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether the Mobify framework was detected on the reported page

        (detected via injected JS at report time).

        '
  - name: quantity
    type: RECORD
    mode: NULLABLE
    fields:
    - name: broken_site_report_browser_info_system_memory
      type: INTEGER
      mode: NULLABLE
      description: 'Total physical memory of the device, in megabytes.

        '
  - name: text2
    type: RECORD
    mode: NULLABLE
    fields:
    - name: broken_site_report_browser_info_app_default_useragent_string
      type: STRING
      mode: NULLABLE
      description: 'The app''s default user agent string (the app-level UA, distinct
        from the

        per-page `tab_info.useragent_string`).

        '
    - name: broken_site_report_description
      type: STRING
      mode: NULLABLE
      description: 'Optional free-text "Additional Details" entered by the user. May
        contain

        PII (free-form text).

        '
    - name: broken_site_report_tab_info_useragent_string
      type: STRING
      mode: NULLABLE
      description: 'The user agent string the reported page actually saw

        (navigator.userAgent), read from the page context at report time.

        '
  - name: url2
    type: RECORD
    mode: NULLABLE
    fields:
    - name: broken_site_report_url
      type: STRING
      mode: NULLABLE
      description: 'The URL of the site the user is reporting. The user may edit this
        before

        submitting. May contain PII.

        '
  - name: text
    type: RECORD
    mode: NULLABLE
    fields:
    - name: broken_site_report_browser_info_app_default_useragent_string
      type: STRING
      mode: NULLABLE
    - name: broken_site_report_description
      type: STRING
      mode: NULLABLE
    - name: broken_site_report_tab_info_useragent_string
      type: STRING
      mode: NULLABLE
  - name: url
    type: RECORD
    mode: NULLABLE
    fields:
    - name: broken_site_report_url
      type: STRING
      mode: NULLABLE
- name: normalized_app_name
  type: STRING
  mode: NULLABLE
  description: Set to "Other" if this message contained an unrecognized app name
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: Set to "Other" if this message contained an unrecognized channel name
- name: normalized_country_code
  type: STRING
  mode: NULLABLE
  description: An ISO 3166-1 alpha-2 country code
- name: normalized_os
  type: STRING
  mode: NULLABLE
  description: Set to "Other" if this message contained an unrecognized OS name
- name: normalized_os_version
  type: STRING
  mode: NULLABLE
- name: ping_info
  type: RECORD
  mode: NULLABLE
  fields:
  - name: end_time
    type: STRING
    mode: NULLABLE
  - name: experiments
    type: RECORD
    mode: REPEATED
    fields:
    - name: key
      type: STRING
      mode: NULLABLE
    - name: value
      type: RECORD
      mode: NULLABLE
      fields:
      - name: branch
        type: STRING
        mode: NULLABLE
      - name: extra
        type: RECORD
        mode: NULLABLE
        fields:
        - name: enrollment_id
          type: STRING
          mode: NULLABLE
        - name: type
          type: STRING
          mode: NULLABLE
  - name: ping_type
    type: STRING
    mode: NULLABLE
  - name: reason
    type: STRING
    mode: NULLABLE
  - name: seq
    type: INTEGER
    mode: NULLABLE
  - name: server_knobs_config
    type: RECORD
    mode: NULLABLE
    fields:
    - name: event_threshold
      type: INTEGER
      mode: NULLABLE
      description: Optional threshold for event buffering before an events ping is
        collected and submitted
    - name: metrics_enabled
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: BOOLEAN
        mode: NULLABLE
      description: Map of metric identifiers (category.name) to boolean values indicating
        whether the metric is enabled
    - name: pings_enabled
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: BOOLEAN
        mode: NULLABLE
      description: Map of ping names to boolean values indicating whether the ping
        is enabled
    - name: session_sample_rate
      type: FLOAT
      mode: NULLABLE
      description: "Remote override for the session sampling rate (0.0\u20131.0)."
    description: The Server Knobs configuration applied via applyServerKnobsConfig.
      Contains the complete configuration including metrics_enabled, pings_enabled,
      and event_threshold settings.
  - name: start_time
    type: STRING
    mode: NULLABLE
  - name: parsed_start_time
    type: TIMESTAMP
    mode: NULLABLE
  - name: parsed_end_time
    type: TIMESTAMP
    mode: NULLABLE
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: Hashed version of client_id (if present) useful for partitioning; ranges
    from 0 to 99
- name: submission_timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: Time when the ingestion edge server accepted this message
- name: app_version_major
  type: NUMERIC
  mode: NULLABLE
- name: app_version_minor
  type: NUMERIC
  mode: NULLABLE
- name: app_version_patch
  type: NUMERIC
  mode: NULLABLE
- name: is_bot_generated
  type: BOOLEAN
  mode: NULLABLE
