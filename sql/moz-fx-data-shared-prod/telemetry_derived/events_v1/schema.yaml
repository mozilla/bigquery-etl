fields:
- mode: REQUIRED
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: REQUIRED
  name: doc_type
  type: STRING
  description: The type of telemetry document or ping that generated the record (e.g.,
    'main', 'crash', 'event'). This field identifies the schema and content category
    of the originating ping.
- mode: NULLABLE
  name: document_id
  type: STRING
  description: A unique UUID identifying an individual telemetry ping submission.
    This identifier is used to deduplicate records and trace a specific ping through
    the data pipeline.
- mode: NULLABLE
  name: client_id
  type: STRING
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- mode: NULLABLE
  name: normalized_channel
  type: STRING
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: locale
  type: STRING
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- mode: NULLABLE
  name: app_name
  type: STRING
  description: The name of the Mozilla application that generated the telemetry event
    (e.g., 'firefox_desktop', 'fenix', 'firefox_ios', 'mozilla_vpn'). Used to distinguish
    telemetry across Mozilla's suite of products.
- mode: NULLABLE
  name: app_version
  type: STRING
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- mode: NULLABLE
  name: os
  type: STRING
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- mode: NULLABLE
  name: os_version
  type: STRING
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- mode: NULLABLE
  name: e10s_enabled
  type: BOOLEAN
  description: Indicates whether the Electrolysis (e10s) multi-process architecture
    was enabled for the Firefox session. A value of true means the browser was running
    in multi-process mode; false means it was running in single-process mode.
- mode: NULLABLE
  name: e10s_cohort
  type: STRING
  description: The Electrolysis (e10s) multi-process experiment cohort to which the
    client was assigned. This field is deprecated and is null in all current records,
    as the e10s rollout has been completed.
- mode: NULLABLE
  name: subsession_start_date
  type: STRING
  description: The local date and time at which a Firefox subsession began, formatted
    as an ISO 8601 string including timezone offset. Reflects the client's local time
    rather than UTC.
- mode: NULLABLE
  name: subsession_length
  type: INT64
  description: The duration of a Firefox subsession in seconds, representing the amount
    of time the browser was active during that subsession.
- mode: NULLABLE
  name: sync_configured
  type: BOOLEAN
  description: Indicates whether Firefox Sync was enabled and configured on the client's
    browser. True means Sync was active; false means it was explicitly disabled; null
    indicates the state was not reported.
- mode: NULLABLE
  name: sync_count_desktop
  type: INT64
  description: The number of desktop devices connected to a user's Firefox Sync account.
    Used to understand multi-device desktop usage patterns.
- mode: NULLABLE
  name: sync_count_mobile
  type: INT64
  description: The number of mobile devices connected to a user's Firefox Sync account.
    Used to understand multi-device mobile usage patterns.
- mode: NULLABLE
  name: timestamp
  type: INTEGER
  description: The precise UTC timestamp indicating when the event or record was ingested
    or generated, with microsecond-level precision.
- mode: NULLABLE
  name: sample_id
  type: INTEGER
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- mode: NULLABLE
  name: active_experiment_id
  type: STRING
  description: The identifier of the active experiment the client was enrolled in.
    Null when the client was not enrolled in any experiment.
- mode: NULLABLE
  name: active_experiment_branch
  type: STRING
  description: The branch of an active experiment the client was enrolled in (e.g.,
    'control' or 'treatment'). Null when the client was not part of any active experiment.
- mode: NULLABLE
  name: event_timestamp
  type: INTEGER
  description: The time offset in milliseconds from the start of the browser session
    at which the event occurred. This is a relative timestamp, not an absolute wall-clock
    time.
- mode: NULLABLE
  name: event_category
  type: STRING
  description: The category grouping for a telemetry event, used to classify events
    by feature area or subsystem (e.g., 'address', 'creditcard', 'form_autocomplete').
    This field is the top-level namespace for organizing event data.
- mode: NULLABLE
  name: event_method
  type: STRING
  description: The method or action that triggered the event, describing what occurred
    (e.g. 'detected', 'submitted', 'show'). This categorizes the type of interaction
    or lifecycle step associated with the event.
- mode: NULLABLE
  name: event_object
  type: STRING
  description: The UI element or component that was the target of the event (e.g.
    'address_form', 'cc_form_v2', 'capture_doorhanger'). This identifies which part
    of the product the event is associated with.
- mode: NULLABLE
  name: event_string_value
  type: STRING
  description: An optional free-text string value associated with an event, providing
    additional context such as an error code or identifier (e.g. 'SSL_ERROR_BAD_CERT_DOMAIN').
    This field may be null or contain the literal string 'null' when no value is applicable.
- mode: NULLABLE
  name: event_map_values
  type: RECORD
  description: An array of key-value pairs providing additional metadata or attributes
    associated with a telemetry event. Each entry contains a string key and a string
    value that further describes the context of the event.
  fields:
  - mode: REPEATED
    name: key_value
    type: RECORD
    fields:
    - mode: REQUIRED
      name: key
      type: STRING
      description: A string identifier representing the specific action, search engine,
        or event type associated with a record, such as a search entry point or provider
        key. An empty string indicates no specific key was recorded.
    - mode: NULLABLE
      name: value
      type: STRING
      description: A generic integer value associated with a measurement, event, or
        metric. The specific meaning depends on the context of the surrounding fields.
- mode: NULLABLE
  name: experiments
  type: RECORD
  description: An array of key-value pairs representing all active experiment enrollments
    for the client at the time of the ping, where the key is the experiment slug and
    the value is the assigned branch. This captures the full set of concurrent experiment
    enrollments.
  fields:
  - mode: REPEATED
    name: key_value
    type: RECORD
    fields:
    - mode: REQUIRED
      name: key
      type: STRING
      description: A string identifier representing the specific action, search engine,
        or event type associated with a record, such as a search entry point or provider
        key. An empty string indicates no specific key was recorded.
    - mode: NULLABLE
      name: value
      type: STRING
      description: A generic integer value associated with a measurement, event, or
        metric. The specific meaning depends on the context of the surrounding fields.
- mode: NULLABLE
  name: event_process
  type: STRING
  description: The Firefox process type in which the event was recorded (e.g. 'parent',
    'content', 'extension', 'dynamic'). This indicates the browser process context
    from which the event originated.
- mode: NULLABLE
  name: subsession_id
  type: STRING
  description: A UUID uniquely identifying a single Firefox subsession, which begins
    at browser start or after a previous subsession ends. Used to join or deduplicate
    subsession-level telemetry records.
- mode: NULLABLE
  name: session_start_time
  type: INTEGER
  description: The UTC timestamp marking when a browser session began. This field
    can be used to understand session timing and compute session duration.
- mode: NULLABLE
  name: session_id
  type: STRING
  description: A unique identifier (UUID) representing a single browser session. This
    ID can be used to link events and activity records belonging to the same session.
