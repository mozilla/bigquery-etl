fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: Date of the impression event.
- mode: NULLABLE
  name: country
  type: STRING
  description: Two-letter ISO country code.
- mode: NULLABLE
  name: form_factor
  type: STRING
  description: >-
    Form factor of the client device (e.g. "desktop", "phone").
    Sourced from Merino logs.
- mode: NULLABLE
  name: advertiser
  type: STRING
  description: Advertiser name associated with the suggest result.
- mode: NULLABLE
  name: partial
  type: STRING
  description: >-
    Normalized search query partial typed by the user at the time of the
    impression, lowercased and trimmed. Sourced from Merino logs; rows
    without a Merino match are excluded.
- mode: NULLABLE
  name: position
  type: INTEGER
  description: Position of the suggest result in the Firefox address bar dropdown.
- fields:
  - mode: NULLABLE
    name: slug
    type: STRING
    description: Experiment slug identifier.
  - mode: NULLABLE
    name: branch
    type: STRING
    description: Experiment branch the client was enrolled in.
  mode: REPEATED
  name: experiments
  type: RECORD
  description: >-
    Active experiments the client was enrolled in at the time of the impression.
- mode: NULLABLE
  name: impression_count
  type: INTEGER
  description: >-
    Number of (session_id, advertiser) pairs that produced an impression
    for this (country, form_factor, advertiser, partial, position, experiments) combination on this
    date—each session contributes at most one impression per advertiser,
    attributed to the deepest typed partial.
- mode: NULLABLE
  name: click_count
  type: INTEGER
  description: >-
    Number of clicks for this (country, form_factor, advertiser, partial, position, experiments)
    combination on this date. Counted from the deepest typed partial per
    (session_id, advertiser); clicks on earlier partials in the same session
    are not counted.
