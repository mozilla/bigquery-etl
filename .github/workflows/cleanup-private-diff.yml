name: Cleanup Private Diff Branch
on:
  pull_request:
    types: [closed]

permissions: {}

jobs:
  cleanup:
    name: Delete diff branch in private-bigquery-etl
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Delete bqetl-diff branch
        env:
          TRIGGER_TOKEN: ${{ secrets.PRIVATE_BQETL_TRIGGER_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BRANCH="bqetl-diff/pr-${PR_NUMBER}"
          ENCODED_BRANCH=$(echo "$BRANCH" | sed 's|/|%2F|g')

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${TRIGGER_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -X DELETE \
            "https://api.github.com/repos/mozilla/private-bigquery-etl/git/refs/heads/${ENCODED_BRANCH}")

          if [ "$HTTP_STATUS" = "204" ]; then
            echo "Deleted branch ${BRANCH} in private-bigquery-etl"
          elif [ "$HTTP_STATUS" = "422" ]; then
            echo "Branch ${BRANCH} does not exist in private-bigquery-etl (already cleaned up)"
          else
            echo "::warning::Unexpected status ${HTTP_STATUS} when deleting branch ${BRANCH}"
          fi
