    on this submission date.
- mode: NULLABLE
  name: impression_sponsored_bestmatch_count
  type: INTEGER
  description: Number of times a sponsored best match Firefox Suggest result was displayed to the client
    on this submission date.
- mode: NULLABLE
  name: user_pref_data_collection_enabled
  type: BOOLEAN
  description: True if the client had the Firefox Suggest data collection preference enabled on this submission
    date; false otherwise.
- mode: NULLABLE
  name: user_pref_sponsored_suggestions_enabled
  type: BOOLEAN
  description: True if the client had sponsored Firefox Suggest suggestions enabled on this submission date;
    false otherwise.
- mode: NULLABLE
  name: user_pref_firefox_suggest_enabled
  type: BOOLEAN
  description: True if the client had the Firefox Suggest feature itself enabled on this submission date;
    false otherwise.
