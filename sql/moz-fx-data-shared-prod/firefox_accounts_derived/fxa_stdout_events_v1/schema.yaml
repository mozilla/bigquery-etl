fields:
- name: logName
  type: STRING
  mode: NULLABLE
  description: The resource name of the log to which this log entry belongs.
- name: resource
  type: RECORD
  mode: NULLABLE
  description: The monitored resource that produced this log entry.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: The monitored resource type. For example, the type of a Compute Engine
      VM instance is `gce_instance`.
  - name: labels
    type: RECORD
    mode: NULLABLE
    fields:
    - name: project_id
      type: STRING
      mode: NULLABLE
    - name: namespace_name
      type: STRING
      mode: NULLABLE
    - name: location
      type: STRING
      mode: NULLABLE
    - name: container_name
      type: STRING
      mode: NULLABLE
    - name: pod_name
      type: STRING
      mode: NULLABLE
    - name: cluster_name
      type: STRING
      mode: NULLABLE
- name: textPayload
  type: STRING
  mode: NULLABLE
  description: The log entry payload, represented as a Unicode string (UTF-8).
- name: jsonPayload
  type: RECORD
  mode: NULLABLE
  description: The log entry payload, represented as a structure that is expressed
    as a JSON object.
  fields:
  - name: x_forwarded_proto
    type: STRING
    mode: NULLABLE
  - name: request_time
    type: FLOAT
    mode: NULLABLE
