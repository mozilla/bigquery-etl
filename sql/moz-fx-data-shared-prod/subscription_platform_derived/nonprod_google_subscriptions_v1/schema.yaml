fields:
- mode: NULLABLE
  name: customer_id
  type: STRING
  description: The Firefox Accounts user ID (SHA-256 hashed) of the subscriber, used as the customer identifier
    in this non-production Google Play IAP dataset.
- mode: NULLABLE
  name: subscription_id
  type: STRING
  description: The unique identifier for this Google Play subscription period. For a subscription with multiple
    active date ranges, a suffix (e.g. '-1') is appended to the original document ID to form subsequent
    period IDs.
- mode: NULLABLE
  name: original_subscription_id
  type: STRING
  description: The original Google Play Firestore document ID for this subscription. Null for the first
    (or only) active period; populated for subsequent renewal periods that follow a coverage gap.
- mode: NULLABLE
  name: plan_id
  type: STRING
  description: The Google Play SKU identifier for the subscription plan (e.g. 'org.mozilla.gps.mozillavpn.product.1_month_subscription').
- mode: NULLABLE
  name: event_timestamp
  type: TIMESTAMP
  description: The timestamp of the Google Play IAP event that produced the most recent state of this subscription
    record.
- mode: NULLABLE
  name: subscription_start
  type: TIMESTAMP
  description: The timestamp when the paid subscription period began, after any free trial. Null if the
    subscription period fell entirely within a trial.
- mode: NULLABLE
  name: created
  type: TIMESTAMP
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: created
- mode: NULLABLE
  name: trial_start
  type: TIMESTAMP
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: trial_start
- mode: NULLABLE
  name: trial_end
  type: TIMESTAMP
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: trial_end
- mode: NULLABLE
  name: canceled_for_customer_at
  type: STRING
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: canceled_for_customer_at
- mode: NULLABLE
  name: subscription_end
  type: TIMESTAMP
  description: The timestamp when this subscription period ends or ended (the Google Play expiry time for
    this active date range).
- mode: NULLABLE
  name: fxa_uid
  type: STRING
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
