name: Dependabot auto-merge
on: pull_request

permissions:
  contents: read   # GITHUB_TOKEN stays read-only; the App token does the writes

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.DEPENDABOT_APP_ID }}
          private-key: ${{ secrets.DEPENDABOT_APP_PRIVATE_KEY }}

      - uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0
        id: meta
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}   # read-only is fine for metadata

      # only auto-merge patch/minor; majors fall through to a human
      - if: contains(fromJSON('["version-update:semver-patch","version-update:semver-minor"]'), steps.meta.outputs.update-type)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR"
          gh pr merge --auto --squash "$PR"
