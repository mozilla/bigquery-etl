- name: startup_profile_selection_reason_first
  type: STRING
  mode: NULLABLE
  description: The profile selection reason recorded for the first subsession or ping
    of a client's activity period. Common values include 'default' and 'profile-selector',
    indicating how Firefox chose which profile to load.
- name: first_document_id
  type: STRING
  mode: NULLABLE
  description: The document ID (UUID) of the first ping submitted by a client in the
    relevant period or cohort. This uniquely identifies the initial telemetry submission
    associated with the record.
- name: partner_id
  type: STRING
  mode: NULLABLE
  description: A short identifier for the top-level partner organization associated
    with the browser installation (e.g., 'ubuntu', 'mozillaonline', 'yandex'). Null
    when the client has no partner affiliation.
- name: distribution_version
  type: STRING
  mode: NULLABLE
  description: The version string of the distribution package, which may differ from
    the Firefox application version and indicates the specific release of the partner
    or vendor distribution. This field is frequently null when no distribution versioning
    is applicable.
- name: distributor
  type: STRING
  mode: NULLABLE
  description: The name of the organization or project responsible for distributing
    this Firefox build (e.g., 'canonical', 'mozillaonline', 'mint'). This field is
    null for standard Mozilla-distributed builds where no third-party distributor
    is involved.
- name: distributor_channel
  type: STRING
  mode: NULLABLE
  description: The specific channel or mechanism through which the distributor delivered
    Firefox to the end user (e.g., 'ubuntu', 'mainWinStub', 'firefox'). This field
    complements the distributor field and is null for non-partner distributions.
- name: env_build_platform_version
  type: STRING
  mode: NULLABLE
  description: The version of the underlying Gecko platform on which Firefox was built
    (e.g., '151.0.1', '115.36.0'). This may differ from the application's user-facing
    version in certain release configurations such as ESR.
- name: env_build_xpcom_abi
  type: STRING
  mode: NULLABLE
  description: The XPCOM Application Binary Interface (ABI) string describing the
    target platform and compiler used for the Firefox build (e.g., 'x86_64-msvc',
    'aarch64-gcc3'). This field identifies the binary compatibility target of the
    build.
- name: geo_db_version
  type: STRING
  mode: NULLABLE
  description: The version timestamp of the GeoIP database used to resolve the client's
    geographic location, formatted as an ISO 8601 datetime string. This allows geo
    lookups to be audited and compared across database releases.
- name: apple_model_id
  type: STRING
  mode: NULLABLE
  description: The Apple hardware model identifier for macOS and iOS devices (e.g.,
    'MacBookAir10,1', 'Mac16,12'). Null for non-Apple platforms or when the model
    cannot be determined.
- name: max_subsession_counter
  type: INTEGER
  mode: NULLABLE
  description: The highest subsession counter value recorded for a client within a
    given day, indicating how many browser subsessions occurred. A value of 1 means
    only one subsession was recorded.
- name: min_subsession_counter
  type: INTEGER
  mode: NULLABLE
  description: The minimum subsession counter value observed for a client within the
    aggregation period, indicating the earliest subsession sequence number. A value
    of 1 typically corresponds to the first subsession of a browser session.
- name: startup_profile_selection_first_ping_only
  type: STRING
  mode: NULLABLE
  description: The method by which a Firefox profile was selected at startup, recorded
    only for the first ping of a session. Common values include 'default' (the default
    profile was used) and 'restart' (Firefox restarted with the same profile).
- name: profile_group_id
  type: STRING
  mode: NULLABLE
  description: A UUID that identifies a group of profiles belonging to the same user
    or installation context. Null when profile group information is unavailable.
- name: browser_backup_scheduler_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the Firefox automatic backup scheduler is enabled
    (true) or disabled (false). Null when the feature state could not be determined
    or the feature is unavailable.
- name: browser_backup_archive_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the Firefox browser backup archive feature is enabled
    (true) or disabled (false). Null when the feature state could not be determined
    or the feature is unavailable.
