type: BIGCONFIG_FILE
tag_deployments:
- collection:
    name: Operational Checks
    notification_channels:
    - slack: '#de-bigeye-triage'
  deployments:
  - column_selectors:
    - name: moz-fx-data-shared-prod.moz-fx-data-shared-prod.customer_experience_derived.zendesk_retrieval_index_v1.creation_date
    - name: moz-fx-data-shared-prod.moz-fx-data-shared-prod.customer_experience_derived.zendesk_retrieval_index_v1.ticket_id
    metrics:
    - saved_metric_id: is_not_null
      rct_overrides:
      - creation_date
  - column_selectors:
    - name: moz-fx-data-shared-prod.moz-fx-data-shared-prod.customer_experience_derived.zendesk_retrieval_index_v1.*
    metrics:
    - metric_type:
        type: PREDEFINED
        predefined_metric: FRESHNESS
      metric_name: FRESHNESS
      metric_schedule:
        named_schedule:
          name: Default Schedule - 13:00 UTC
    - metric_type:
        type: PREDEFINED
        predefined_metric: VOLUME
      metric_name: VOLUME
      metric_schedule:
        named_schedule:
          name: Default Schedule - 13:00 UTC
