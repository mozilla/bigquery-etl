fields:
- name: submission_date
  type: TIMESTAMP
  mode: NULLABLE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: mobile_app_name
  type: STRING
  mode: NULLABLE
  description: Name of the mobile app. E.g. "fenix", "ios".
- name: first_seen_year
  type: INTEGER
  mode: NULLABLE
  description: The calendar year in which the client profile was first observed in
    telemetry data, derived from the first_seen_date. This is used for coarser cohort
    analyses and long-term retention reporting.
- name: channel
  type: STRING
  mode: NULLABLE
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- name: app_name
  type: STRING
  mode: NULLABLE
  description: The name of the Mozilla application that generated the telemetry event
    (e.g., 'firefox_desktop', 'fenix', 'firefox_ios', 'mozilla_vpn'). Used to distinguish
    telemetry across Mozilla's suite of products.
- name: country
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- name: locale
  type: STRING
  mode: NULLABLE
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: os_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- name: os_version_major
  type: INTEGER
  mode: NULLABLE
  description: "The major version number component of the operating system. For example,\
    \ a value of 10 corresponds to Windows 10 or macOS 10.x, while values like 13\u2013\
    16 correspond to major iOS/macOS releases."
- name: os_version_minor
  type: INTEGER
  mode: NULLABLE
  description: The minor version number component of the operating system, representing
    the second numeric segment of the full OS version string. A value of 0 is by far
    the most common, indicating that most clients are on a base major release with
    no minor increment.
- name: windows_build_number
  type: INTEGER
  mode: NULLABLE
  description: The Windows OS build number of the client's operating system, such
    as 19045 for a specific Windows 10 release. Null values indicate the client was
    not running a Windows operating system.
- name: app_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- name: app_version_major
  type: NUMERIC
  mode: NULLABLE
  description: The major version number component of the application version (e.g.,
    151 for version '151.0.2'). Increments with each major Firefox release cycle.
- name: app_version_minor
  type: NUMERIC
  mode: NULLABLE
  description: The minor version number component of the application version (e.g.,
    0 for version '151.0'). Typically 0 for major releases and non-zero for extended
    support or point releases.
- name: app_version_patch_revision
  type: NUMERIC
  mode: NULLABLE
  description: The patch revision sub-component of the application version, providing
    additional granularity beyond the patch number. Null when not applicable to the
    release.
- name: app_version_is_major_release
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the application version is a major release (true)
    or a minor/patch release (false). Useful for segmenting analysis by release type.
- name: is_default_browser
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether Firefox is set as the default browser on the client's
    device. True means it is the default; false means another browser is set as default.
- name: distribution_id
  type: STRING
  mode: NULLABLE
  description: An identifier for the Firefox distribution package the client is running,
    such as 'default' for the standard Mozilla build or partner-specific identifiers
    like 'canonical-002' or 'mozilla-MSIX'. This field is null when no distribution
    identifier is available.
- name: activity_segment
  type: STRING
  mode: NULLABLE
  description: A categorical label describing the user's activity level, such as 'core_user',
    'regular_user', 'casual_user', 'infrequent_user', or 'other', based on their engagement
    frequency.
- name: daily_users
  type: INTEGER
  mode: NULLABLE
  description: The count of unique users active on a given day within the reporting
    segment. A value of 0 indicates no active users were recorded for that segment
    on that day.
- name: weekly_users
  type: INTEGER
  mode: NULLABLE
  description: The count of distinct users active within a given 7-day window. A value
    of 0 indicates no users were observed as active during that week.
- name: monthly_users
  type: INTEGER
  mode: NULLABLE
  description: The count of distinct active users observed within a rolling monthly
    window. Used to measure monthly active user (MAU) trends.
- name: dau
  type: INTEGER
  mode: NULLABLE
  description: Daily Active Users (DAU). The count of distinct clients active on a
    given day. See detailed DAU definitions for Desktop and Mobile in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#Definitions.
- name: wau
  type: INTEGER
  mode: NULLABLE
  description: Weekly Active Users (WAU). In aggregate tables this is the count of
    distinct clients active at least one day in the previous 7 days. See detailed
    definition in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#WAU-and-MAU.
- name: mau
  type: INTEGER
  mode: NULLABLE
  description: Monthly Active Users (MAU). The count of distinct clients that were
    active at least one day within the previous 28 days. See detailed MAU definition
    in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#WAU-and-MAU.
- name: tou_daily_active_users
  type: INTEGER
  mode: NULLABLE
  description: The number of Terms of Use (ToU) daily active users recorded for the
    given time period and segment. A value of 0 indicates no active users that day.
- name: tou_weekly_active_users
  type: INTEGER
  mode: NULLABLE
  description: The number of Terms of Use (ToU) weekly active users recorded for the
    given time period and segment. A value of 0 indicates no active users that week.
- name: tou_monthly_active_users
  type: INTEGER
  mode: NULLABLE
  description: The number of Terms of Use (ToU) monthly active users recorded for
    the given time period and segment. A value of 0 indicates no active users that
    month.
