dataset: firefox_desktop
source_tables:
  firefox_desktop_metrics:
    unique_id: metrics.uuid.legacy_telemetry_profile_group_id
    table_name: metrics
    dimensions:
      app_display_version:
        field: client_info.app_display_version
      app_version_major: {}
      app_version_minor: {}
      app_version_patch: {}
      locale:
        field: client_info.locale
      normalized_channel: {}
      normalized_os: {}
      normalized_os_version: {}
      normalized_country_code:
        value_in: [CA, DE, FR, GB, US]
        # for values not in the list above, replace with default
        value_default: OTHER
features:
  address-autofill-feature:
    metrics:
      firefox_desktop_metrics:
        labeled_counter:
          login_autofill:
            field: metrics.labeled_counter.pwmgr_form_autofill_result
            # produces a metric per value suffixed with _{value},
            # e.g. login_autofill_sum, login_autofill_avg
            aggregators: [sum, avg]
            # values not in the list are excluded
            label_in: [filled, filled_username_only_form]
