fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: recommendation_id
  type: STRING
  mode: NULLABLE
  description: A UUID that uniquely identifies a specific content recommendation surfaced
    to a user. Null when no recommendation is associated with the record.
- name: tile_id
  type: INTEGER
  mode: NULLABLE
  description: A numeric identifier for a sponsored or curated tile displayed on the
    New Tab page. A value of -1 typically indicates an unsponsored or organic tile.
- name: position
  type: INTEGER
  mode: NULLABLE
  description: The zero- or one-based ordinal position of an item within a list or
    UI surface (e.g., a recommendation card or menu entry). Lower values indicate
    items displayed earlier or higher in the interface.
- name: product
  type: STRING
  mode: NULLABLE
  description: The Mozilla product name associated with the record, such as 'Fenix',
    'Firefox iOS', 'Focus Android', or 'Fennec'. Identifies the application from which
    the data originates.
- name: placement
  type: STRING
  mode: NULLABLE
  description: The named slot or location within the Firefox New Tab page where a
    sponsored or editorial content item was displayed (e.g., 'newtab_spocs', 'newtab_stories_1').
    Null when no placement is associated with the event.
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: form_factor
  type: STRING
  mode: NULLABLE
  description: The physical form factor of the device running Firefox (e.g. 'desktop',
    'phone', 'tablet', 'other'). This field is null when the form factor could not
    be determined from the telemetry payload.
- name: impression_count
  type: INTEGER
  mode: NULLABLE
  description: The total number of times a UI element, recommendation, or piece of
    content was shown to a user. Higher values indicate repeated exposures.
- name: click_count
  type: INTEGER
  mode: NULLABLE
  description: The total number of click interactions recorded for a given entity
    or surface within the reporting period. A value of zero indicates the entity was
    present but received no clicks.
- name: save_count
  type: INTEGER
  mode: NULLABLE
  description: The total number of times a user saved an item (e.g., saved to Pocket
    or bookmarked) during the reporting period. A value of 0 indicates no saves occurred.
- name: dismiss_count
  type: INTEGER
  mode: NULLABLE
  description: The number of times a user dismissed a prompt, notification, or UI
    element during the reporting period. A value of zero indicates the element was
    never dismissed.
