fields:
- name: addon_id
  type: STRING
  mode: NULLABLE
  description: The unique identifier string for a Firefox browser add-on or extension,
    typically in the format of a UUID or a reverse-DNS email-style string (e.g., 'formautofill@mozilla.org').
- name: addon_name
  type: STRING
  mode: NULLABLE
  description: Name of the add-on.
- name: occurrences
  type: INTEGER
  mode: NULLABLE
  description: Number of occurrences of the add-on.
