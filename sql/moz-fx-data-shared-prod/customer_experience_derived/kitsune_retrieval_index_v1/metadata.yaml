friendly_name: Zendesk Embeddings
description: |-
  AI-enriched retrieval table derived from Kitsune, containing embeddings and semantic features
   to support grounded question answering over Mozilla Support (SUMO) data.
  
  Dimensions:
  - creation_date
  - locale
  - product	
  - topic
  - is_solved
  
  Metrics
  - votes
  
  Generated:
  - summary_generated
  - category_generated
  - language_generated	
  - entities_generated
  - embedding based on [title, content]
  - sentiment_score based on [title, content]
  - recency, assuming 7 days as the time when content begins to lose relevance.
  
  Metadata
  - Additional data to support technical processes, such as backfills or investigations.
owners:
- lvargas@mozilla.com
- mozilla/customer_insights
labels:
  incremental: true
  level: bronze
scheduling:
  dag_name: bqetl_analytics_tables
bigquery:
  time_partitioning:
    type: day
    field: 'creation_date'
    require_partition_filter: true
    expiration_days: null
  clustering:
    fields:
      - product
      - locale
require_column_descriptions: true
