fields:
- mode: NULLABLE
  name: corpus_item_id
  type: STRING
  description: A UUID that uniquely identifies a content item within the Pocket or
    Contextual Services corpus. Used to join engagement metrics back to the canonical
    content catalog.
- mode: NULLABLE
  name: impression_count
  type: INTEGER
  description: The propensity-weight-adjusted number of impressions for this corpus
    item. For section-layout events the raw count is divided by the position-bias
    propensity weight; for non-section events the raw count passes through unchanged.
- mode: NULLABLE
  name: click_count
  type: INTEGER
  description: The total number of click interactions recorded for a given entity
    or surface within the reporting period. A value of zero indicates the entity was
    present but received no clicks.
- mode: NULLABLE
  name: report_count
  type: INTEGER
  description: Total number of times users submitted content reports for the corpus
    item via the report content dialog in the reporting period.
- mode: NULLABLE
  name: region
  type: STRING
  description: The two-letter ISO 3166-1 country code representing the geographic
    region of the client or user. Null when the region could not be determined.
