friendly_name: Firefox-CI Worker Costs (Azure)
description: |-
  Derived Firefox-CI worker cost data from the Azure billing export.
  Mirrors worker_costs_v1 for Azure-hosted workers (Windows / Windows-ARM64).
  Scoped to VM compute cost only (matches worker_costs_v1); disk, NIC, and
  IP costs are not attributed back to the parent VM.
owners:
- ahalberstadt@mozilla.com
- jmoss@mozilla.com
labels:
  incremental: true
  owner1: ahalberstadt
  dag: bqetl_fxci
scheduling:
  dag_name: bqetl_fxci
  task_name: fxci_worker_cost_azure__v1
bigquery:
  time_partitioning:
    type: day
    field: usage_start_date
    require_partition_filter: true
    expiration_days: null
  range_partitioning: null
  clustering:
    fields:
    - project
    - zone
    - instance_id
