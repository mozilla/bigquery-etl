friendly_name: Statcounter Region Browser Market Share
description: |-
  Contains browser market share data by region from Statcounter over time.

  Expected grain: 1 row per date + geography + device + browser combination.
owners:
- kbammarito@mozilla.com
labels:
  incremental: true
  owner1: kbammarito
  table_type: source
  dag: bqetl_statcounter_browser_market_share
scheduling:
  dag_name: bqetl_statcounter_browser_market_share
  date_partition_parameter: date
  arguments:
  - --date-from
  - '{{ds}}'
bigquery:
  time_partitioning:
    type: day
    field: date
    require_partition_filter: false
    expiration_days: null
  clustering:
    fields:
    - geography
    - device
    - browser
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  checks.sql:
  - ..INFORMATION_SCHEMA.PARTITIONS
