fields:
- name: created_date
  type: DATE
  mode: NULLABLE
  description: |
    The UTC date the question was created. Main date column for the table;
    use this to aggregate questions_created, TTFR, and helpful-vote metrics.
- name: first_reply_date
  type: DATE
  mode: NULLABLE
  description: |
    The UTC date the question received its first qualifying reply (excluding
    OP self-replies, spam answers, and answers from deactivated users). NULL
    for questions that have not received a qualifying reply. Use this column
    to aggregate questions_replied by reply date.
- name: solved_date
  type: DATE
  mode: NULLABLE
  description: |
    The UTC date the question was marked as solved. NULL for questions that
    are not solved. Use this column to aggregate questions_solved by solve
    date.
- name: product
  type: STRING
  mode: NULLABLE
  description: |
    Canonicalized Firefox product name:
    - 'Firefox desktop'
    - 'Firefox for Android'
    - 'Firefox for iOS'
    - 'Firefox for Enterprise'
    Non-Firefox products are excluded from this table.
- name: locale
  type: STRING
  mode: NULLABLE
  description: |
    BCP-47 locale code of the question (e.g. 'en-US', 'pt-BR', 'es').
    Sourced from kitsune_questions_plus.locale.
- name: questions_created
  type: INTEGER
  mode: NULLABLE
  description: |
    Number of non-spam, non-locked Firefox questions created on `created_date`
    for this product and locale (counted within each first_reply_date bucket).
- name: questions_replied
  type: INTEGER
  mode: NULLABLE
  description: |
    Number of questions in this (created_date, first_reply_date, product,
    locale) bucket that received a qualifying first reply. A qualifying reply
    excludes OP self-replies, spam answers, and answers from deactivated
    users. To get replies-per-day, aggregate by first_reply_date.
    Reply Rate:
      SUM(questions_replied) / SUM(questions_created)
- name: questions_solved
  type: INTEGER
  mode: NULLABLE
  description: |
    Number of questions in this (created_date, first_reply_date, solved_date,
    product, locale) bucket that have been marked as solved, as of ETL run
    time. To get solves-per-day, aggregate by solved_date.
    Solved Rate:
      SUM(questions_solved) / SUM(questions_created)
- name: avg_ttfr_hrs
  type: FLOAT
  mode: NULLABLE
  description: |
    Average time to first qualifying reply in hours for questions in this
    bucket. NULL when no questions received a first reply. For aggregations
    across multiple dates/products/locales, prefer total_ttfr_hrs so the
    rollup is properly weighted:
      SUM(total_ttfr_hrs) / SUM(questions_replied)
- name: total_ttfr_hrs
  type: FLOAT
  mode: NULLABLE
  description: |
    Sum of time to first qualifying reply, in hours, across questions in this
    bucket. NULL when no questions received a first reply. Pair with
    questions_replied to compute the TTFR (Hrs) Forums KPI as a weighted
    average:
      SUM(total_ttfr_hrs) / SUM(questions_replied)
- name: total_helpful_votes
  type: INTEGER
  mode: NULLABLE
  description: |
    Cumulative helpful votes across all qualifying answers on questions
    created on `created_date` (within this bucket), as of ETL run time. Not
    filtered to votes cast on this date.
    Helpfulness (%):
      SUM(total_helpful_votes) / (SUM(total_helpful_votes) + SUM(total_unhelpful_votes))
- name: total_unhelpful_votes
  type: INTEGER
  mode: NULLABLE
  description: |
    Cumulative unhelpful votes across all qualifying answers on questions
    created on `created_date` (within this bucket), as of ETL run time. Not
    filtered to votes cast on this date.
- name: etl_timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: Timestamp when this record was loaded into BigQuery.
