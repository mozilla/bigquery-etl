friendly_name: Kitsune Forum Questions Base (Daily)
description: |
  Daily metrics aggregated from SUMO forum questions. 
  This metrics are based in data from Kitsune's database, which is the platform that supports SUMO.
  
  The dates are in UTC timezone.

  Grain: Date x Product

  Single source of truth tracking:
  - Forum questions posted each day
  - Product breakdown
  - Quality metrics (spam, locked, archived)
  - Engagement metrics (answers, votes, helpful answers)
  - Locale distribution

  This table supports the same use cases of the following manual queries:
  - daily-sssr-by-product.sql
  - daily-sssr-excl-app-reviews.sql

  Used by:
  - SSSR calculation queries
  - Forum health dashboards
  - Community engagement reports
owners:
  - plee@mozilla.com
labels:
  incremental: false
  application: sumo
  team: support
  type: base_metrics
  schedule: daily
scheduling:
