- name: browser_version_info
  type: RECORD
  mode: NULLABLE
  description: Parsed browser version information broken down into major version, minor version, patch revision,
    and a flag indicating if it is a major release.
  fields:
  - name: is_major_release
    type: BOOLEAN
    mode: NULLABLE
    description: Whether this Firefox version is a major release (i.e., minor_version and patch_revision are
      both 0). True for versions like '152.0', false for '151.0.4'.
  - name: major_version
    type: NUMERIC
    mode: NULLABLE
    description: The major version component of the Firefox version (e.g., 152 for '152.0').
  - name: minor_version
    type: NUMERIC
    mode: NULLABLE
    description: The minor version component of the Firefox version (e.g., 0 for '152.0').
  - name: patch_revision
    type: NUMERIC
    mode: NULLABLE
    description: The patch revision component of the Firefox version (e.g., 4 for '151.0.4'). Zero for major
      releases.
  - name: version
    type: STRING
    mode: NULLABLE
    description: The full Firefox version string (e.g., '152.0', '151.0.4').
