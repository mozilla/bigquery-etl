fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: ping
  type: STRING
  description: The name of the ping the percentiles were computed from (one of 'metrics',
    'baseline', or 'main').
- mode: NULLABLE
  name: channel
  type: STRING
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- mode: NULLABLE
  name: metric_name
  type: STRING
  description: A short, human-readable label identifying the type of metric being
    tracked, such as 'uri_count' or 'active_ticks'. Used to distinguish among different
    measurement concepts within the same dataset.
- mode: REPEATED
  name: percentiles
  type: INTEGER
  description: An array of approximate quantile boundaries of the metric value, computed
    with APPROX_QUANTILES into 20 buckets (21 values spanning the 0th to 100th percentile
    in 5-point increments).
- mode: NULLABLE
  name: mean
  type: FLOAT
  description: The arithmetic mean of the metric value across the metric's observations
    for the given channel and metric_name.
- mode: NULLABLE
  name: std_dev
  type: FLOAT
  description: The standard deviation of the metric value across the metric's observations
    for the given channel and metric_name.
- mode: NULLABLE
  name: median
  type: INTEGER
  description: The median (50th percentile, via PERCENTILE_DISC) of the metric value
    across the metric's observations for the given channel and metric_name.
