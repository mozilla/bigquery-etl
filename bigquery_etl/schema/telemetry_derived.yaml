  description: Number of newtab visits from release-channel clients where at least one top-site tile was shown.
- name: total_client_count
  description: Total number of distinct clients across all channels for this country/settings combination.
- name: total_visit_count
  description: Total number of distinct newtab visits across all channels for this country/settings combination.
- name: visit_count
  description: Number of distinct newtab visits from release-channel clients for this country/settings combination.
- name: welcome_client_count
  description: Number of release-channel clients who opened about:welcome (first-run onboarding page).
- name: welcome_visit_count
  description: Number of newtab visits from release-channel clients that came from about:welcome.
- name: newtab_interactions_visits
  description: Number of distinct newtab visits contributing to this aggregate row.
- name: newtab_open_source
  description: The URL from which the newtab was opened (e.g. 'about:newtab', 'about:home', 'about:welcome'). Null (~5.3%) for pings without an opened event.
- name: newtab_search_enabled
  description: Whether the search input box was enabled on the newtab for clients in this aggregate row. Null (~0.2%) when pref data was not received.
- name: organic_topsite_clicks
  description: Total number of organic (non-sponsored) top-site tile clicks across all visits in this aggregate row.
- name: organic_topsite_dismissals
  description: Total number of organic top-site tile dismissals across all visits in this aggregate row.
- name: organic_topsite_impressions
  description: Total number of organic top-site tile impressions across all visits in this aggregate row.
- name: pocket_story_position
  description: 0-indexed position of a Pocket story tile on the newtab grid. Null (~33.2%) for rows that are not broken out by story position.
- name: search_access_point
  description: The search access point where the search was initiated (e.g. 'urlbar_handoff', 'urlbar_persisted'). Null (~91.7%) for non-search rows.
- name: search_engine
  description: The normalized search engine name used for a search-initiated from the newtab (e.g. 'google-b-d', 'DuckDuckGo'). Null (~91.7%) for non-search rows.
- name: sponsored_topsite_clicks
  description: Total number of sponsored top-site tile clicks across all visits in this aggregate row.
- name: sponsored_topsite_dismissals
  description: Total number of sponsored top-site tile dismissals across all visits in this aggregate row.
- name: sponsored_topsite_impressions
  description: Total number of sponsored top-site tile impressions across all visits in this aggregate row.
- name: topsite_clicks
  description: Total number of top-site tile clicks (sponsored and organic) across all visits in this aggregate row.
- name: topsite_dismissals
  description: Total number of top-site tile dismissals across all visits in this aggregate row.
- name: topsite_impressions
  description: Total number of top-site tile impressions (tiles loaded/visible) across all visits in this aggregate row.
- name: recommendation_id
  description: A UUID identifying the specific Pocket recommendation shown to the user. Populated for Glean-sourced rows; null (~70.2%) for legacy telemetry rows
    and UAPI rows where no recommendation_id is available.
- name: newtab_visit_ended_at
  description: Timestamp (in milliseconds since ping start) when the newtab was closed. 0 for visits closed instantly; null (~1.3%) when no closed event was recorded.
- name: newtab_visit_id
  description: A UUID identifying a single newtab visit session, used to join interaction events from different pings that belong to the same visit.
- name: newtab_visit_started_at
  description: Timestamp (in milliseconds since ping start) when the newtab was opened/made visible. 0 for a large fraction of visits (~91%) indicating preloaded
    tabs or missing opened events; null (~0.8%) when no opened event was recorded.
- name: click_count
  description: Total number of clicks on this corpus item across all newtab impressions over the trailing ~24 hours.
- name: corpus_item_id
  description: UUID identifying a content item in the Pocket/Merino corpus (e.g. an article recommended on the newtab). Used to match this row back to Merino ranking
    data.
- name: impression_count
  description: Total number of newtab impressions for this corpus item (optionally propensity-adjusted for section events) over the trailing ~24 hours.
- name: region
  description: ISO 3166-1 alpha-2 country code of the Merino feed region (e.g. 'US', 'DE', 'GB'). Null for the global (all-country) aggregate row.
- name: report_count
  description: Total number of content-reporting submissions (via the context menu) for this corpus item over the trailing ~24 hours.
- name: average_ctr_top10_items
  description: Average click-through rate of the top 10 corpus items ranked by click count for this region over the look-back window. Used as a prior for Merino's
    CTR estimation.
- name: average_ctr_top2_items
  description: Average click-through rate of the top 2 corpus items ranked by click count for this region over the look-back window. Used as a prior for Merino's
    CTR estimation.
- name: impressions_per_item
  description: Average number of impressions per corpus item for this region over the look-back window, rounded to the nearest integer.
- name: total_impressions_per_day
  description: Average daily total impressions across all corpus items for this region over the look-back window, rounded to the nearest integer.
- name: impressions
  description: Total number of impressions observed at this (position, tile_format) slot over the modelling window, used to weight the propensity estimate.
- name: position
  description: 0-indexed position of the tile in the newtab grid (0–200). Used with tile_format to look up the propensity weight for debiasing impression counts.
- name: section_position
  description: Position of the content item within a sections layout on the newtab. Null for non-section (grid) layout rows; reserved for future use in section-based
    propensity modelling.
- name: tile_format
  description: 'The tile format category for which this weight applies: ''small-card'', ''medium-card'', ''large-card'', or ''any'' (impression-weighted average across
    all formats for this position).'
- name: weight
  description: Propensity weight for this (position, tile_format) slot, derived via Alternating Least Squares lattice decomposition. Divide raw impression counts
    by this weight to remove position-format bias from CTR estimates.
- name: had_non_impression_engagement
  description: True if at least one non-impression action (click, search, or save) occurred during this newtab visit; false otherwise.
- name: had_non_search_engagement
  description: True if at least one non-search action (click or save) occurred during this newtab visit; false otherwise.
- name: newtab_default_ui
  description: Whether the newtab was opened with the default Firefox UI ('default') or a non-default UI such as an extension override ('non-default'). Derived from
    newtab_open_source and the homepage/newtab categories.
- name: newtab_window_inner_height
  description: Inner height of the browser window in pixels at the time the newtab was opened. Null (~6.8%) when no opened event was received.
- name: newtab_window_inner_width
  description: Inner width of the browser window in pixels at the time the newtab was opened. Null (~6.8%) when no opened event was received.
- name: pocket_interactions.list_card_clicks
  description: Number of list-card tile clicks for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: pocket_interactions.list_card_dismissals
  description: Number of list-card tile dismissals for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: pocket_interactions.list_card_impressions
  description: Number of list-card tile impressions for each pocket_interactions entry. Near-zero in sampled data (2026-06-02).
- name: pocket_interactions.list_card_saves
  description: Number of list-card tile saves for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: pocket_interactions.organic_list_card_clicks
  description: Number of organic list-card tile clicks for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: pocket_interactions.organic_list_card_dismissals
  description: Number of organic list-card tile dismissals for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: pocket_interactions.organic_list_card_impressions
  description: Number of organic list-card tile impressions for each pocket_interactions entry. Near-zero in sampled data (2026-06-02).
- name: pocket_interactions.organic_list_card_saves
  description: Number of organic list-card saves for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: pocket_interactions.organic_pocket_clicks
  description: Number of organic Pocket tile clicks for each pocket_interactions entry.
- name: pocket_interactions.organic_pocket_dismissals
  description: Number of organic Pocket tile dismissals for each pocket_interactions entry.
- name: pocket_interactions.organic_pocket_impressions
  description: Number of organic (non-sponsored) Pocket tile impressions for each pocket_interactions entry.
- name: pocket_interactions.organic_pocket_saves
  description: Number of organic Pocket tile saves for each pocket_interactions entry.
- name: pocket_interactions.pocket_clicks
  description: Number of clicks on each Pocket story entry in the pocket_interactions array.
- name: pocket_interactions.pocket_impressions
  description: Number of impressions (times the tile was visible) for each Pocket story entry in the pocket_interactions array.
- name: pocket_interactions.pocket_matches_selected_topic
  description: 'Whether the Pocket tile''s topic matches the user''s selected topic preferences: ''true'', ''false'', ''not-set'' (topics not configured), or ''topic-not-selectable''.
    Null (~99.7%) when topic matching is not applicable.'
- name: pocket_interactions.pocket_received_rank
  description: Ranking position of the Pocket item as received from the recommendation service for each pocket_interactions entry. Null (~20.9%) when not provided.
- name: pocket_interactions.pocket_recommendation_id
  description: UUID identifying the specific Pocket recommendation for each pocket_interactions entry. Null (~99.8%) for legacy rows and non-recommendation content.
- name: pocket_interactions.pocket_saves
  description: Number of Pocket tile saves for each pocket_interactions entry.
- name: pocket_interactions.pocket_scheduled_corpus_item_id
  description: UUID identifying the scheduled corpus slot for each Pocket tile in the pocket_interactions array. Null (~96%) for non-corpus tiles.
- name: pocket_interactions.pocket_story_position
  description: 0-indexed position of the Pocket story in the newtab grid for each entry in the pocket_interactions array.
- name: pocket_interactions.pocket_thumbs_down
  description: Number of thumbs-down votes cast on each Pocket tile entry in the pocket_interactions array.
- name: pocket_interactions.pocket_thumbs_up
  description: Number of thumbs-up votes cast on each Pocket tile entry in the pocket_interactions array.
- name: pocket_interactions.pocket_tile_id
  description: Numeric identifier for each Pocket tile in the pocket_interactions array. Null (~77.1%) for rows where the tile ID was not provided.
- name: pocket_interactions.pocket_topic
  description: Editorial topic category of each Pocket tile (e.g. 'arts', 'tech', 'health') in the pocket_interactions array. Null (~95.9%) when not classified.
- name: pocket_interactions.sponsored_list_card_clicks
  description: Number of sponsored list-card tile clicks for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: pocket_interactions.sponsored_list_card_dismissals
  description: Number of sponsored list-card tile dismissals for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: pocket_interactions.sponsored_list_card_impressions
  description: Number of sponsored list-card tile impressions for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: pocket_interactions.sponsored_list_card_saves
  description: Number of sponsored list-card saves for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: pocket_interactions.sponsored_pocket_clicks
  description: Number of sponsored Pocket tile clicks for each pocket_interactions entry.
- name: pocket_interactions.sponsored_pocket_dismissals
  description: Number of sponsored Pocket tile dismissals for each pocket_interactions entry.
- name: pocket_interactions.sponsored_pocket_impressions
  description: Number of sponsored Pocket tile impressions for each pocket_interactions entry.
- name: pocket_interactions.sponsored_pocket_saves
  description: Number of sponsored Pocket tile saves for each pocket_interactions entry. Always 0 in sampled data (2026-06-02).
- name: search_interactions.follow_on_search_ad_clicks
  description: Number of ad clicks from follow-on searches for each search_interactions entry.
- name: search_interactions.follow_on_search_ad_impressions
  description: Number of follow-on search SERP ad impressions for each search_interactions entry.
- name: search_interactions.search_access_point
  description: The access point from which this search was issued within the search_interactions array (e.g. 'urlbar_handoff', 'urlbar_persisted', 'unknown').
- name: search_interactions.search_engine
  description: Normalized search engine name for each search interaction entry in the search_interactions array (e.g. 'Google', 'DuckDuckGo').
- name: search_interactions.searches
  description: Number of searches issued at this access point during this visit, within each entry of the search_interactions array.
- name: search_interactions.tagged_follow_on_search_ad_clicks
  description: Number of tagged follow-on search ad clicks for each search_interactions entry.
- name: search_interactions.tagged_follow_on_search_ad_impressions
  description: Number of tagged follow-on search SERP ad impressions for each search_interactions entry.
- name: search_interactions.tagged_search_ad_clicks
  description: Number of ad clicks on tagged-search SERPs for each search_interactions entry.
- name: search_interactions.tagged_search_ad_impressions
  description: Number of tagged-search SERP pages with ad impressions for each search_interactions entry.
- name: topic_selection_interactions.previous_topics
  description: The previously selected topics before the topic selection update, for each topic_selection_interactions entry. Null in all sampled data (2026-06-02).
- name: topic_selection_interactions.topic_selection_dismiss
  description: Number of times the topic selection modal was dismissed without saving for each topic_selection_interactions entry.
- name: topic_selection_interactions.topic_selection_open
  description: Number of times the topic selection modal was opened for each topic_selection_interactions entry.
- name: topic_selection_interactions.topic_selection_topics_first_saved
  description: Number of times topics were saved for the first time for each topic_selection_interactions entry.
- name: topic_selection_interactions.topic_selection_topics_updated
  description: Number of times existing topic selections were updated (non-first save) for each topic_selection_interactions entry.
- name: topic_selection_interactions.topics
  description: The newly selected topics after the topic selection update, for each topic_selection_interactions entry. Null in all sampled data (2026-06-02).
- name: topsite_tile_interactions.organic_topsite_tile_clicks
  description: Number of organic (non-sponsored) top-site tile clicks for each entry in the topsite_tile_interactions array.
- name: topsite_tile_interactions.organic_topsite_tile_dismissals
  description: Number of organic top-site tile dismissals for each entry in the topsite_tile_interactions array.
- name: topsite_tile_interactions.organic_topsite_tile_impressions
  description: Number of organic top-site tile impressions for each entry in the topsite_tile_interactions array.
- name: topsite_tile_interactions.sponsored_topsite_tile_clicks
  description: Number of sponsored top-site tile clicks for each entry in the topsite_tile_interactions array.
- name: topsite_tile_interactions.sponsored_topsite_tile_dismissals
  description: Number of sponsored top-site tile dismissals for each entry in the topsite_tile_interactions array.
- name: topsite_tile_interactions.sponsored_topsite_tile_impressions
  description: Number of sponsored top-site tile impressions for each entry in the topsite_tile_interactions array.
- name: topsite_tile_interactions.topsite_tile_advertiser_name
  description: Advertiser name for each sponsored top-site tile entry in the topsite_tile_interactions array. Null (~82.9%) for organic (non-sponsored) tiles.
- name: topsite_tile_interactions.topsite_tile_assigned_sov_branch
  description: The Share-of-Voice (SOV) branch assigned to this tile position for sponsored tiles, encoded as a JSON string (e.g. '"amp"', '"moz-sales"'). Null (~99.9%)
    when SOV is not active for this position.
- name: topsite_tile_interactions.topsite_tile_clicks
  description: Number of clicks on each top-site tile entry in the topsite_tile_interactions array.
- name: topsite_tile_interactions.topsite_tile_dismissals
  description: Number of dismissals of each top-site tile entry in the topsite_tile_interactions array.
- name: topsite_tile_interactions.topsite_tile_displayed_sov_branch
  description: The SOV branch that was actually displayed for this tile position, which may differ from the assigned branch. Null (~99.9%) when SOV is not active.
- name: topsite_tile_interactions.topsite_tile_id
  description: Identifier for each top-site tile in the topsite_tile_interactions array. For sponsored tiles this is a base64-encoded advertiser key; for organic
    tiles it is a legacy numeric string. Null (~82.9%) for organic tiles.
- name: topsite_tile_interactions.topsite_tile_impressions
  description: Number of impressions (times the tile was visible) for each top-site tile entry in the topsite_tile_interactions array.
- name: topsite_tile_interactions.topsite_tile_position
  description: 0-indexed position of each top-site tile entry in the topsite_tile_interactions array on the newtab grid.
- name: topsites_sponsored_tiles_configured
  description: Number of sponsored top-site tile slots configured for the client (e.g. 3 or 4). Null (~20.6%) for clients on Firefox < 123 where this metric was not
    yet collected.
- name: wallpaper_interactions.wallpaper_category_clicks
  description: Number of wallpaper category selection clicks for each wallpaper_interactions entry.
- name: wallpaper_interactions.wallpaper_clicks
  description: Number of wallpaper selection clicks for each wallpaper_interactions entry.
- name: wallpaper_interactions.wallpaper_clicks_first_selected_wallpaper
  description: Number of wallpaper clicks where the client selected a wallpaper for the first time (no prior wallpaper set), for each wallpaper_interactions entry.
- name: wallpaper_interactions.wallpaper_clicks_had_previous_wallpaper
  description: Number of wallpaper clicks where the client already had a wallpaper set prior to the selection, for each wallpaper_interactions entry.
- name: wallpaper_interactions.wallpaper_highlight_cta_clicks
  description: Number of wallpaper feature-highlight CTA clicks for each wallpaper_interactions entry. Always 0 in sampled data (2026-06-02).
- name: wallpaper_interactions.wallpaper_highlight_dismissals
  description: Number of wallpaper feature-highlight dismissals for each wallpaper_interactions entry. Always 0 in sampled data (2026-06-02).
- name: wallpaper_interactions.wallpaper_selected_wallpaper
  description: The identifier of the wallpaper selected during this visit for each wallpaper_interactions entry (e.g. 'dark-sky', 'eclipse-time-lapse', 'custom').
    Null (~15%) when no wallpaper was selected in this interaction.
- name: weather_interactions.weather_widget_change_display_to_detailed
  description: Number of times the weather widget was switched to detailed view for each weather_interactions entry.
- name: weather_interactions.weather_widget_change_display_to_simple
  description: Number of times the weather widget was switched to simple view for each weather_interactions entry.
- name: weather_interactions.weather_widget_clicks
  description: Number of weather widget provider-link clicks for each weather_interactions entry.
- name: weather_interactions.weather_widget_impressions
  description: Number of weather widget impressions (times the widget was visible) for each weather_interactions entry.
- name: weather_interactions.weather_widget_load_errors
  description: Number of weather widget load failures for each weather_interactions entry.
- name: weather_interactions.weather_widget_location_selected
  description: Number of times a location was selected for the weather widget for each weather_interactions entry.
- name: browser_arch
  description: The build architecture of the Firefox browser (e.g. 'x86', 'x86-64'). Derived from environment.build.architecture in the main ping.
- name: cpu_speed
  description: The CPU clock speed in GHz, rounded to one decimal place as a string (e.g. '3.6'). 'Other' when speed data is unavailable.
- name: date_from
  description: Start date of the 7-day reporting window over which hardware aggregates are computed.
- name: date_to
  description: End date (exclusive) of the 7-day reporting window, i.e. date_from + 7 days.
- name: gfx0_device_id
  description: PCI device ID of the primary graphics adapter, identifying the specific GPU model. Null when no GPU adapter is detected.
- name: gfx0_vendor_id
  description: PCI vendor ID of the primary graphics adapter (e.g. '0x8086' for Intel, '0x10de' for NVIDIA). Null when no GPU adapter is detected.
- name: has_flash
  description: True if the 'Shockwave Flash' plugin was active on the client, false otherwise.
- name: memory_gb
  description: System RAM rounded to the nearest gigabyte (e.g. 8, 16). Derived from environment.system.memory_mb / 1024.
- name: os
  description: Operating system name and version concatenated as '<name>-<version>' (e.g. 'Windows_NT-10.0', 'Darwin-24.x'). Derived from the environment.system.os
    fields.
- name: resolution
  description: Screen resolution of the primary monitor expressed as '<width>x<height>' pixels (e.g. '1920x1080'). Derived from the first GFX monitor entry.
- name: ad_click
  description: Total number of ad clicks recorded for the client on the submission date, aggregated across all search engines. Null when no search data is available
    (sampled 2026-06-02).
- name: durations
  description: Total browsing session duration in hours for the client on the submission date. For desktop, derived from subsession_hours_sum; for mobile, derived
    from equivalent session duration metrics.
- name: count_picked_by_position
  description: An array of key-value pairs mapping each 1-indexed position in the urlbar dropdown to the count of times the client picked a result at that position
    on the submission date. Position -1 (index 0) represents results picked outside the standard dropdown.
- name: count_picked_by_type
  description: An array of key-value pairs mapping each urlbar result type (e.g. 'searchengine', 'history', 'bookmark', 'topsite', 'searchsuggestion') to the total
    count of times the client picked a result of that type on the submission date.
- name: count_picked_total
  description: Total number of urlbar result items picked (selected) by the client across all result types and positions on the submission date. Null for ~96% of
    clients who made no picks (sampled 2026-06-02).
- name: in_navbar
  description: Whether the search bar is integrated in the navigation bar (browser.widget.in-navbar pref). True means no separate search box is shown; false means
    the dedicated search bar is visible (sampled 2026-06-02).
- name: quicksuggest_data_collection_enabled
  description: Whether the user has opted into data collection for Firefox Suggest (browser.urlbar.quicksuggest.dataCollection.enabled pref). Values are 'true' or
    'false' as strings; null for ~87% of clients where the pref was not sampled (sampled 2026-06-02).
- name: quicksuggest_onboarding_dialog_choice
  description: The user's choice in the Firefox Suggest onboarding dialog, e.g. 'accept_2', 'reject_2', 'not_now_2', 'close_1', 'dismiss_1'. Null for nearly all clients
    who have not seen the dialog (sampled 2026-06-02).
- name: search_region
  description: The browser search region pref (browser.search.region) representing the region configured for search. Null when not set by the client (sampled 2026-06-02).
- name: show_search_suggestions_first
  description: Whether search suggestions are shown before browsing history in the urlbar dropdown (browser.urlbar.showSearchSuggestionsFirst pref). Null for most
    clients where the pref was not sampled (sampled 2026-06-02).
- name: suggest_enabled
  description: Whether the browser urlbar suggest feature is enabled (browser.search.suggest.enabled pref). True means suggestions are shown in the urlbar. Null for
    most clients where the pref was not sampled (sampled 2026-06-02).
- name: suggest_quicksuggest
  description: Whether the deprecated browser.urlbar.suggest.quicksuggest pref is enabled. Null for nearly all clients as this pref was replaced by suggest_quicksuggest_nonsponsored
    and suggest_quicksuggest_sponsored (sampled 2026-06-02).
- name: suggest_quicksuggest_nonsponsored
  description: Whether the urlbar is configured to show non-sponsored Firefox Suggest results (browser.urlbar.suggest.quicksuggest.nonsponsored pref). Null for ~87%
    of clients where the pref was not sampled (sampled 2026-06-02).
- name: suggest_quicksuggest_sponsored
  description: Whether the urlbar is configured to show sponsored Firefox Suggest results (browser.urlbar.suggest.quicksuggest.sponsored pref). True for approximately
    31% of clients (sampled 2026-06-02).
- name: suggest_searches
  description: Whether the urlbar is configured to suggest search terms (browser.urlbar.suggest.searches pref). Null for the majority of clients where the pref was
    not sampled (sampled 2026-06-02).
- name: urlbar_picked_by_type_by_position
  description: An array of structs, one per urlbar result type, each containing the type name and a nested array of key-value pairs mapping 1-indexed dropdown positions
    to pick counts. Types include 'searchengine', 'history', 'bookmark', 'topsite', 'searchsuggestion', 'formhistory', 'autofill', 'tip', 'switchtab', 'tabtosearch',
    'visiturl', 'keyword', 'remotetab', 'extension', 'dynamic', and 'unknown'.
