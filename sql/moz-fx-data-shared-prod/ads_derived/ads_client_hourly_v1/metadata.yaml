friendly_name: Ads Client Hourly
description: |-
  Hourly aggregate of ads client metrics pings across iOS and Android platforms.
  Includes operation counts (client_operation_total labeled_counter) and error ping
  counts (client_error, build_cache_error, deserialization_error, http_cache_outcome
  labeled_string metrics) broken down by key, plus total ping count, country,
  app version, and channel dimensions.
  Only pings containing at least one ads_client metric entry are included.
owners:
  - ahanot@mozilla.com
  - mozilla/ads_data_team
scheduling:
  dag_name: bqetl_ads_hourly
  date_partition_parameter: null
  destination_table: >-
    ads_client_hourly_v1${{
    (execution_date - macros.timedelta(hours=1)).strftime("%Y%m%d")
    }}
  parameters:
    - >-
      submission_date:DATE:{{
      (execution_date - macros.timedelta(hours=1)).strftime('%Y-%m-%d')
      }}
  query_file_path: sql/moz-fx-data-shared-prod/ads_derived/ads_client_hourly_v1/query.sql
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: true
    expiration_days: null
  clustering:
    fields:
      - platform
      - normalized_country_code
workgroup_access:
  - role: roles/bigquery.dataViewer
    members:
      - workgroup:mozilla-confidential/data-viewers
