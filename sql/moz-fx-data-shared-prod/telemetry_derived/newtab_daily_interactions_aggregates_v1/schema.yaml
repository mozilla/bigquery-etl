fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: country_code
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code (e.g., 'IN', 'US', 'RU') associated
    with the record. Equivalent in format to the `country` field and used for geographic
    filtering and grouping.
- name: channel
  type: STRING
  mode: NULLABLE
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- name: browser_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the browser (e.g., '151.0.2'). Represents
    the complete, human-readable version of the Firefox browser build.
- name: browser_name
  type: STRING
  mode: NULLABLE
  description: The display name of the browser product (e.g., 'Firefox Desktop').
    Identifies the browser brand and surface as reported by the client.
- name: search_engine
  type: STRING
  mode: NULLABLE
  description: The identifier of the default or active search engine used (e.g., 'google',
    'google-b-d', 'duckduckgo'). A null value indicates no search engine was recorded
    or applicable.
- name: search_access_point
  type: STRING
  mode: NULLABLE
  description: The location or UI surface from which a search was initiated, such
    as 'urlbar', 'searchbar', 'contextmenu', or 'urlbar_handoff'. A null value indicates
    no search access point was recorded for the event.
- name: default_search_engine
  type: STRING
  mode: NULLABLE
  description: The internal identifier of the user's default search engine (e.g.,
    'google-b-d', 'baidu'), which encodes both the engine and any partner or distribution-specific
    configuration. This field represents the engine key as recognized by Firefox's
    search service.
- name: default_private_search_engine
  type: STRING
  mode: NULLABLE
  description: The identifier of the search engine configured as the default for private
    browsing windows (e.g., 'google-b-d', 'ddg'). This corresponds to the engine's
    internal slug as defined in the search configuration.
- name: pocket_story_position
  type: INTEGER
  mode: NULLABLE
  description: The zero-based index position of a Pocket story within the New Tab
    page recommendation grid at the time of the event. Null when no specific story
    position is associated with the record.
- name: newtab_open_source
  type: STRING
  mode: NULLABLE
  description: The URL source from which a new tab was opened, such as 'about:newtab',
    'about:home', or 'about:welcome'. A value of 'other' covers unrecognized sources,
    and null indicates the source was not captured.
- name: pocket_is_signed_in
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the user is signed in to their Pocket account within
    Firefox. True means the user is authenticated; false means Pocket is present but
    the user is not signed in. Null when sign-in state could not be determined.
- name: pocket_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the Pocket integration is enabled in the user's Firefox
    New Tab page settings. True means Pocket content is turned on; false means it
    has been disabled by the user.
- name: pocket_sponsored_stories_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether sponsored story recommendations from Pocket are enabled
    on the user's New Tab page. True means sponsored stories are turned on; false
    means they have been disabled.
- name: topsites_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the Top Sites feature is enabled on the user's New
    Tab page. True means the feature is active; false means the user has disabled
    it.
- name: newtab_homepage_category
  type: STRING
  mode: NULLABLE
  description: A categorical classification of the page configured as the browser
    homepage, such as 'enabled' (the default new tab), 'search-engine', 'disabled',
    'social-media', 'extension', or 'known-hijacker-v3'. Null indicates the value
    was not available or not applicable.
- name: newtab_newtab_category
  type: STRING
  mode: NULLABLE
  description: A categorical classification of the page configured as the new tab
    page, such as 'enabled' (the default Firefox new tab), 'extension', 'disabled',
    or 'other'. Null indicates the value was unavailable.
- name: topsites_rows
  type: INTEGER
  mode: NULLABLE
  description: The number of rows of top site tiles configured to be displayed on
    the New Tab page. Higher values indicate more rows of tiles visible to the user.
- name: is_new_profile
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the Firefox profile associated with the client was
    newly created. True means the profile was created recently; false means it is
    an existing profile.
- name: activity_segment
  type: STRING
  mode: NULLABLE
  description: A categorical label describing the user's activity level, such as 'core_user',
    'regular_user', 'casual_user', 'infrequent_user', or 'other', based on their engagement
    frequency.
- name: client_count
  type: INTEGER
  mode: NULLABLE
  description: The number of distinct clients contributing to a given aggregated row
    or cohort. Useful for understanding the population size behind any aggregated
    metric.
- name: legacy_telemetry_client_count
  type: INTEGER
  mode: NULLABLE
  description: The number of distinct legacy telemetry client IDs associated with
    a given entity or record. Values greater than one may indicate multiple installations
    or ID collisions.
- name: newtab_interactions_visits
  type: INTEGER
  mode: NULLABLE
  description: The number of distinct newtab visits for this dimension group.
- name: topsite_clicks
  type: INTEGER
  mode: NULLABLE
  description: The total number of times the user clicked on any top site entry on
    the New Tab page. A value of 0 indicates no clicks occurred.
- name: sponsored_topsite_clicks
  type: INTEGER
  mode: NULLABLE
  description: The total number of clicks on sponsored top site tiles on the New Tab
    page for a given client or period. A value of zero indicates no sponsored top
    site tiles were clicked.
- name: organic_topsite_clicks
  type: INTEGER
  mode: NULLABLE
  description: The number of times a user clicked on an organic (non-sponsored) top
    site tile on the new tab page within the aggregation period. A value of 0 indicates
    no clicks occurred.
- name: topsite_impressions
  type: INTEGER
  mode: NULLABLE
  description: The total number of times top site tiles were displayed to the user
    on the New Tab page. A value of 0 indicates no impressions were recorded.
- name: sponsored_topsite_impressions
  type: INTEGER
  mode: NULLABLE
  description: The total number of times sponsored top site tiles were displayed to
    the user on the New Tab page. A value of zero indicates the tiles were never shown.
- name: organic_topsite_impressions
  type: INTEGER
  mode: NULLABLE
  description: The number of times organic (non-sponsored) top site tiles were displayed
    to the user on the new tab page within the aggregation period. A value of 0 indicates
    no impressions were recorded.
- name: topsite_dismissals
  type: INTEGER
  mode: NULLABLE
  description: The total number of times the user dismissed a top site tile on the
    New Tab page. A value of 0 indicates no dismissals occurred.
- name: sponsored_topsite_dismissals
  type: INTEGER
  mode: NULLABLE
  description: The total number of times a user dismissed a sponsored top site tile
    on the New Tab page. A value of zero indicates no dismissals occurred.
- name: organic_topsite_dismissals
  type: INTEGER
  mode: NULLABLE
  description: The number of times a user dismissed an organic (non-sponsored) top
    site tile on the new tab page within the aggregation period. A value of 0 indicates
    no dismissals occurred.
- name: searches
  type: INTEGER
  mode: NULLABLE
  description: The total number of searches performed during the period. A value of
    zero indicates no search activity was recorded.
- name: tagged_search_ad_clicks
  type: INTEGER
  mode: NULLABLE
  description: The total number of ad clicks on searches that were tagged with a Mozilla
    partner attribution code, originating directly from the browser's search entry
    points. A value of zero indicates no tagged search ads were clicked.
- name: tagged_search_ad_impressions
  type: INTEGER
  mode: NULLABLE
  description: The total number of ad impressions on searches that were tagged with
    a Mozilla partner attribution code, originating directly from the browser's search
    entry points. A value of zero indicates no tagged search ads were shown.
- name: follow_on_search_ad_clicks
  type: INTEGER
  mode: NULLABLE
  description: The number of times a user clicked on a search advertisement following
    an initial search query originating from the browser's search features. A value
    of 0 indicates the user performed searches but did not click any follow-on ads.
- name: follow_on_search_ad_impressions
  type: INTEGER
  mode: NULLABLE
  description: The number of search advertisement impressions shown to the user as
    a result of follow-on searches initiated from the browser's search features. A
    value of 0 indicates no ad impressions were recorded for the period.
- name: tagged_follow_on_search_ad_clicks
  type: INTEGER
  mode: NULLABLE
  description: The total number of ad clicks on follow-on searches that were tagged
    with a Mozilla partner attribution code. Follow-on searches originate from a search
    results page rather than directly from the browser's search bar.
- name: tagged_follow_on_search_ad_impressions
  type: INTEGER
  mode: NULLABLE
  description: The total number of ad impressions on follow-on searches that were
    tagged with a Mozilla partner attribution code. A value of zero indicates no tagged
    follow-on search ads were shown.
- name: pocket_impressions
  type: INTEGER
  mode: NULLABLE
  description: The total number of Pocket story impressions recorded on the New Tab
    page during the reporting period. An impression is counted each time a Pocket
    recommendation is rendered and visible to the user.
- name: sponsored_pocket_impressions
  type: INTEGER
  mode: NULLABLE
  description: The total number of times sponsored Pocket content tiles were displayed
    to the user on the New Tab page. A value of zero indicates the tiles were never
    shown.
- name: organic_pocket_impressions
  type: INTEGER
  mode: NULLABLE
  description: The number of times organic (non-sponsored) Pocket recommendations
    were displayed to the user on the new tab page within the aggregation period.
    A value of 0 indicates no impressions were recorded.
- name: pocket_clicks
  type: INTEGER
  mode: NULLABLE
  description: The total number of times the user clicked on a Pocket recommendation
    on the New Tab page during the reporting period. A value of 0 indicates the feature
    was visible but no clicks occurred.
- name: sponsored_pocket_clicks
  type: INTEGER
  mode: NULLABLE
  description: The total number of clicks on sponsored Pocket content tiles within
    the New Tab page for a given client or period. A value of zero indicates no sponsored
    Pocket tiles were clicked.
- name: organic_pocket_clicks
  type: INTEGER
  mode: NULLABLE
  description: The number of times a user clicked on an organic (non-sponsored) Pocket
    recommendation on the new tab page within the aggregation period. A value of 0
    indicates no clicks occurred.
- name: pocket_saves
  type: INTEGER
  mode: NULLABLE
  description: The total number of items the user saved to Pocket from the New Tab
    page during the reporting period. A value of 0 indicates no saves occurred.
- name: sponsored_pocket_saves
  type: INTEGER
  mode: NULLABLE
  description: The total number of times a user saved a sponsored Pocket content tile.
    A value of zero indicates no sponsored Pocket items were saved.
- name: organic_pocket_saves
  type: INTEGER
  mode: NULLABLE
  description: The number of times a user saved an organic (non-sponsored) Pocket
    recommendation from the new tab page within the aggregation period. A value of
    0 indicates no saves occurred.
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: os_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- name: newtab_search_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: A boolean flag indicating whether the search bar is enabled on the
    new tab page. True means search is enabled; False means it is disabled. Null indicates
    the setting was not available.
