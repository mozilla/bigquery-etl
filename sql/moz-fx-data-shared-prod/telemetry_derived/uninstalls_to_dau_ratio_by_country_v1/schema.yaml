fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: normalized_country_code
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code representing the country associated
    with the client's IP address at the time of submission, such as 'US', 'DE', or
    'BR'.
- name: total_dau
  type: INTEGER
  mode: NULLABLE
  description: DAU - Daily Active Users
- name: nbr_clients_uninstalling
  type: INTEGER
  mode: NULLABLE
  description: The count of distinct clients that uninstalled the application or a
    component during the observation period. Used to track uninstall volume and churn.
- name: ratio_uninstalls_to_dau
  type: FLOAT
  mode: NULLABLE
  description: Ratio of the number of unique clients uninstalling to daily active
    users
