    type: STRING
    mode: NULLABLE
  - name: x_forwarded_for
    type: STRING
    mode: NULLABLE
  - name: user_agent
    type: STRING
    mode: NULLABLE
  - name: referrer
    type: STRING
    mode: NULLABLE
  - name: request
    type: STRING
    mode: NULLABLE
  - name: remote_addr
    type: STRING
    mode: NULLABLE
  - name: proxy_host
    type: STRING
    mode: NULLABLE
  - name: bytes_sent
    type: FLOAT
    mode: NULLABLE
  - name: remote_user
    type: STRING
    mode: NULLABLE
  - name: type
    type: STRING
    mode: NULLABLE
  - name: envversion
    type: STRING
    mode: NULLABLE
  - name: fields
    type: RECORD
    mode: NULLABLE
    fields:
    - name: remoteaddresschain
      type: STRING
      mode: NULLABLE
    - name: contentlength
      type: STRING
      mode: NULLABLE
    - name: method
      type: STRING
      mode: NULLABLE
    - name: clientaddress
      type: STRING
      mode: NULLABLE
    - name: status
      type: STRING
      mode: NULLABLE
    - name: useragent
