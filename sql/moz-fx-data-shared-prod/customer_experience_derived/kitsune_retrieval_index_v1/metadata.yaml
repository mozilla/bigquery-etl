friendly_name: Kitsune Retrieval Index
description: |-
  AI-enriched retrieval table derived from Kitsune, containing embeddings and semantic features
  to support grounded question answering over Mozilla Support (SUMO) data.

  Grain: one row per date, question_id and answer_id.

  LLM generated fields:
  - question_summary_llm
  - question_category_llm
  - question_language_llm
  - question_entities_llm
  - question_topics_llm
  - embedding based on [title, content]
  - question_sentiment_score based on [title, content]

  Read-time fields (computed on the `customer_experience.kitsune_retrieval_index` view, not stored here):
  - recency_score = `EXP(-DATE_DIFF(CURRENT_DATE(), creation_date, DAY) / 30)` — 30-day exponential decay,
    1.0 today, ~0.37 after 30 days. Always reflects freshness at query time.

  Metadata
  - Additional data to support technical processes, such as backfills or investigations.
  - The prompt version is a self-managed version for changes in the prompt given to the LLM.
owners:
- lvargas@mozilla.com
- mozilla/customer_experience
labels:
  level: gold
  incremental: true
  change_controlled: true
schema:
  allow_field_addition: true
scheduling:
  dag_name: bqetl_analytics_tables
bigquery:
  time_partitioning:
    type: day
    field: 'creation_date'
    require_partition_filter: true
    expiration_days: null
  clustering:
    fields:
    - product
    - locale
require_column_descriptions: true
monitoring:
  enabled: true
references:
  query.sql:
  - moz-fx-data-shared-prod.sumo_syndicate.kitsune_questions_plus
  - moz-fx-data-shared-prod.sumo_syndicate.kitsune_answers_raw
