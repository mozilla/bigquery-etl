fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The date when the telemetry ping is received on the server side.
- mode: NULLABLE
  name: sample_id
  type: INTEGER
  description: A number, 0-99, that samples by client_id and allows filtering data
    for analysis. It is a pipeline-generated artifact that should match between pings.
- mode: NULLABLE
  name: client_id
  type: STRING
  description: A unique identifier (UUID) for the client.
- mode: NULLABLE
  name: activations_count
  type: INTEGER
  description: The number of times this client has completed the activation criteria (e.g., meaningful post-install
    action). A value of 0 means the client has not yet activated.
- mode: NULLABLE
  name: active_day_count
  type: INTEGER
  description: The number of days in the submission window that this client sent a baseline ping (i.e.,
    was active). A value of 0 means the client was not active on this day.
- mode: NULLABLE
  name: searches
  type: INTEGER
- mode: NULLABLE
  name: searches_with_ads
  type: INTEGER
- mode: NULLABLE
  name: ad_clicks
  type: INTEGER
- fields:
  - mode: NULLABLE
    name: sent_baseline_ping
    type: BOOLEAN
  - mode: NULLABLE
    name: sent_metrics_search_data
    type: BOOLEAN
  - mode: NULLABLE
    name: activated_on_this_day
    type: BOOLEAN
  mode: NULLABLE
  name: metadata
  type: RECORD
