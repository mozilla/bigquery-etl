fields:
- name: logName
  type: STRING
  mode: NULLABLE
  description: The resource name of the log to which this log entry belongs.
- name: resource
  type: RECORD
  mode: NULLABLE
  description: The monitored resource that produced this log entry.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: The monitored resource type. For example, the type of a Compute Engine
      VM instance is `gce_instance`.
  - name: labels
    type: RECORD
    mode: NULLABLE
    description: GCP resource metadata labels attached to the log entry by Cloud Logging.
    fields:
    - name: instance_id
      type: STRING
      mode: NULLABLE
      description: Cloud instance identifier of the node that generated the log entry.
    - name: zone
      type: STRING
      mode: NULLABLE
      description: Availability zone of the resource.
    - name: project_id
      type: STRING
      mode: NULLABLE
      description: GCP project ID of the log source.
- name: textPayload
  type: STRING
  mode: NULLABLE
  description: The log entry payload, represented as a Unicode string (UTF-8).
- name: jsonPayload
  type: RECORD
  mode: NULLABLE
  description: The log entry payload, represented as a structure that is expressed
    as a JSON object.
  fields:
  - name: timestamp
    type: FLOAT
    mode: NULLABLE
    description: Application-level event timestamp as a Unix epoch nanoseconds float,
      as reported by the FxA service. Distinct from the top-level Cloud Logging `timestamp`.
  - name: type
    type: STRING
    mode: NULLABLE
    description: Log entry type classifier (e.g., 'amplitudeEvent').
  - name: severity
    type: FLOAT
    mode: NULLABLE
    description: Application-level numeric log severity from the FxA service payload,
      using syslog-style levels (6=informational, 2=critical). Distinct from the top-level
      Cloud Logging `severity` STRING field.
  - name: pid
    type: FLOAT
    mode: NULLABLE
    description: Process ID of the FxA service instance that generated the log entry.
  - name: fields
    type: RECORD
    mode: NULLABLE
    description: Application-level structured event data from the FxA service.
    fields:
    - name: agent
      type: STRING
      mode: NULLABLE
      description: User agent string from the event payload.
    - name: email
      type: STRING
      mode: NULLABLE
      description: Hashed or redacted email identifier associated with the event.
        Present only when the event is tied to a specific account action; null for
        anonymous or pre-login flows. Stored as raw bytes (hashed) in admin server
        tables. Not a raw email address.
    - name: lang
      type: STRING
      mode: NULLABLE
      description: Language code from the event payload. See `jsonPayload.fields.language`
        for the primary language field.
    - name: t
      type: FLOAT
      mode: NULLABLE
      description: Elapsed time in milliseconds for the operation.
    - name: keys
      type: BOOLEAN
      mode: NULLABLE
      description: JSON-encoded account key bundle or key metadata.
    - name: path
      type: STRING
      mode: NULLABLE
      description: URL path of the request.
    - name: remoteaddresschain
      type: STRING
      mode: NULLABLE
      description: Forwarding chain of client IP addresses from X-Forwarded-For headers.
    - name: method
      type: STRING
      mode: NULLABLE
      description: HTTP method associated with the request.
    - name: status
      type: FLOAT
      mode: NULLABLE
      description: HTTP or application status code for the event.
    - name: uid
      type: STRING
      mode: NULLABLE
      description: Raw FxA user identifier. Use `user_id` for the hashed version.
    - name: errno
      type: FLOAT
      mode: NULLABLE
      description: FxA error number. See FxA errno documentation for values.
    - name: time
      type: FLOAT
      mode: NULLABLE
      description: Event time as a Unix epoch milliseconds float.
    - name: event_type
      type: STRING
      mode: NULLABLE
      description: Event type string identifying the category of event (e.g., 'fxa_login
        - complete', 'fxa_email - sent').
    - name: app_version
      type: STRING
      mode: NULLABLE
      description: Firefox Accounts application version at the time of the event (e.g.,
        '333.6').
    - name: op
      type: STRING
      mode: NULLABLE
      description: Operation or action type associated with the event.
    - name: event_properties
      type: STRING
      mode: NULLABLE
      description: Structured event properties for the amplitude event, as a JSON
        string.
    - name: user_properties
      type: STRING
      mode: NULLABLE
      description: Structured user properties for the amplitude event, as a JSON string.
    - name: missingflowid
      type: BOOLEAN
      mode: NULLABLE
      description: Whether the event was missing a flow_id at logging time.
    - name: event
      type: STRING
      mode: NULLABLE
      description: Event name from the FxA service payload. In Amplitude-connected
        tables this is an Amplitude event name; in admin and log tables it is a service-level
        action name.
    - name: region
      type: STRING
      mode: NULLABLE
      description: Geographic region associated with the event (e.g., 'California').
    - name: country
      type: STRING
      mode: NULLABLE
      description: Country associated with the event, as a full country name (e.g.,
        'United States').
    - name: os_version
      type: STRING
      mode: NULLABLE
      description: Operating system version string from the event payload.
    - name: language
      type: STRING
      mode: NULLABLE
      description: BCP 47 language tag for the user's locale at the time of the event
        (e.g., 'en-US', 'de').
    - name: os_name
      type: STRING
      mode: NULLABLE
      description: Operating system name from the event payload (e.g., 'Windows',
        'iOS', 'Android').
    - name: clientid
      type: STRING
      mode: NULLABLE
      description: Client identifier associated with the event.
    - name: useragent
      type: STRING
      mode: NULLABLE
      description: Raw user agent string from the request.
    - name: granttype
      type: STRING
      mode: NULLABLE
      description: OAuth grant type.
    - name: service
      type: STRING
      mode: NULLABLE
      description: Service or relying party identifier associated with the event.
    - name: flowtype
      type: STRING
      mode: NULLABLE
      description: Type classification of the authentication flow.
    - name: flow_time
      type: FLOAT
      mode: NULLABLE
      description: Elapsed time in milliseconds within the current authentication
        flow.
    - name: flow_id
      type: STRING
      mode: NULLABLE
      description: Flow identifier for the authentication or account creation session.
        See top-level `flow_id`.
    - name: flowbegintime
      type: FLOAT
      mode: NULLABLE
      description: Unix epoch timestamp of when the authentication flow began.
    - name: entrypoint
      type: STRING
      mode: NULLABLE
      description: Entry point identifier for the authentication or account creation
        flow.
    - name: flowcompletesignal
      type: STRING
      mode: NULLABLE
      description: Event name that signalled flow completion.
    - name: locale
      type: STRING
      mode: NULLABLE
      description: BCP 47 locale string.
    - name: recency
      type: STRING
      mode: NULLABLE
      description: Recency classification of the user session.
    - name: events
      type: FLOAT
      mode: NULLABLE
      description: JSON-encoded list of sub-events or event sequence associated with
        the log entry.
    - name: session_id
      type: FLOAT
      mode: NULLABLE
      description: Identifier for the user's FxA session, represented as an epoch
        millisecond timestamp.
    - name: sendertype
      type: STRING
      mode: NULLABLE
      description: Type of email sender used for the notification.
    - name: command
      type: STRING
      mode: NULLABLE
      description: Device command name dispatched or received.
    - name: sender
      type: STRING
      mode: NULLABLE
      description: Sender identifier for email or notification events.
    - name: targetos
      type: STRING
      mode: NULLABLE
      description: Target operating system for the event.
    - name: targettype
      type: STRING
      mode: NULLABLE
      description: Type of the target resource for the event.
    - name: index
      type: FLOAT
      mode: NULLABLE
      description: Index position within a list or sequence in the event payload.
    - name: target
      type: STRING
      mode: NULLABLE
      description: Target resource or endpoint associated with the event.
    - name: utm_term
      type: STRING
      mode: NULLABLE
      description: In FxA, repurposed from the standard paid-search UTM term to track
        A/B test cohort assignments (e.g., 'my-experiment-var-a'). Not a paid search
        keyword.
    - name: utm_campaign
      type: STRING
      mode: NULLABLE
      description: UTM campaign parameter from the originating URL.
    - name: utm_source
      type: STRING
      mode: NULLABLE
      description: UTM source parameter from the originating URL.
    - name: utm_medium
      type: STRING
      mode: NULLABLE
      description: UTM medium parameter from the originating URL.
    - name: flowid
      type: STRING
      mode: NULLABLE
      description: Flow identifier. See top-level `flow_id`.
    - name: uaos
      type: STRING
      mode: NULLABLE
      description: Operating system name parsed from the user agent string.
    - name: is_placeholder
      type: BOOLEAN
      mode: NULLABLE
      description: Whether this record is a placeholder entry.
    - name: templateversion
      type: FLOAT
      mode: NULLABLE
      description: Email template version number.
    - name: domain
      type: STRING
      mode: NULLABLE
      description: Domain string associated with the event (e.g., an email domain).
    - name: type
      type: STRING
      mode: NULLABLE
      description: Event type classifier within the fields payload.
    - name: template
      type: STRING
      mode: NULLABLE
      description: Email or notification template identifier.
    - name: reason
      type: STRING
      mode: NULLABLE
      description: Reason associated with the event.
    - name: utm_content
      type: STRING
      mode: NULLABLE
      description: UTM content parameter from the originating URL, used to differentiate
        ads or links.
    - name: newsletters
      type: STRING
      mode: NULLABLE
      description: JSON-encoded list of newsletter subscription identifiers the user
        opted into.
    - name: err
      type: STRING
      mode: NULLABLE
      description: Error details associated with the event, if any.
    - name: senderos
      type: STRING
      mode: NULLABLE
      description: Operating system of the sender in a device command event.
    - name: tokenverificationid
      type: STRING
      mode: NULLABLE
      description: Identifier for a token verification attempt.
    - name: device_model
      type: STRING
      mode: NULLABLE
      description: Device model associated with the event (e.g., 'iPhone', 'iPad').
    - name: id
      type: STRING
      mode: NULLABLE
      description: Unique identifier for the event record.
    - name: emailcode
      type: STRING
      mode: NULLABLE
      description: Verification code sent to the user's email address.
    - name: createdat
      type: FLOAT
      mode: NULLABLE
      description: Unix epoch timestamp of when the account or resource was created.
    - name: verifiedat
      type: STRING
      mode: NULLABLE
      description: Unix epoch timestamp of when the account or email was verified.
    - name: _uuidfields
      type: STRING
      mode: NULLABLE
      description: Comma-separated list of field names containing UUID strings, used
        for schema normalization metadata.
    - name: _intboolfields
      type: STRING
      mode: NULLABLE
      description: Comma-separated list of field names cast from integer to boolean
        during log normalization.
    - name: isprimary
      type: FLOAT
      mode: NULLABLE
      description: Whether the associated email address is the account's primary email.
    - name: normalizedemail
      type: STRING
      mode: NULLABLE
      description: Normalized form of the account email address (lowercased, Gmail
        dots removed).
    - name: isverified
      type: FLOAT
      mode: NULLABLE
      description: Whether the account has been verified.
    - name: body
      type: STRING
      mode: NULLABLE
      description: Request or response body.
    - name: statuscode
      type: FLOAT
      mode: NULLABLE
      description: HTTP or application status code from the event payload.
    - name: productid
      type: STRING
      mode: NULLABLE
      description: Mozilla subscription product identifier. See also product_id.
    - name: planid
      type: STRING
      mode: NULLABLE
      description: Subscription plan identifier.
    - name: numsessions
      type: FLOAT
      mode: NULLABLE
      description: Number of active sessions for the account.
    - name: error
      type: STRING
      mode: NULLABLE
      description: Error message or details associated with the event.
    - name: ipnmessage
      type: STRING
      mode: NULLABLE
      description: IPN (Instant Payment Notification) message payload for subscription
        billing events.
    - name: customeruid
      type: STRING
      mode: NULLABLE
      description: Unique identifier for the customer in the subscription billing
        system.
    - name: message
      type: STRING
      mode: NULLABLE
      description: Log message from the event payload.
    - name: to
      type: STRING
      mode: NULLABLE
      description: Destination or recipient field.
    - name: code
      type: STRING
      mode: NULLABLE
      description: Code field from the event payload (e.g., OAuth authorization code,
        error code).
    - name: token
      type: STRING
      mode: NULLABLE
      description: Authentication or session token associated with the event.
    - name: disabledat
      type: STRING
      mode: NULLABLE
      description: Unix epoch timestamp of when the account was disabled.
    - name: keyschangedat
      type: FLOAT
      mode: NULLABLE
      description: Unix epoch timestamp of when the account encryption keys were last
        changed.
    - name: lockedat
      type: STRING
      mode: NULLABLE
      description: Unix epoch timestamp of when the account was locked.
    - name: emails
      type: STRING
      mode: NULLABLE
      description: JSON-encoded list of email objects associated with the account.
    - name: ecosystemanonid
      type: STRING
      mode: NULLABLE
      description: Anonymized ecosystem user identifier for cross-product analytics,
        derived without exposing the raw user ID.
    - name: metricsoptoutat
      type: STRING
      mode: NULLABLE
      description: Unix epoch timestamp of when the user opted out of metrics collection.
    - name: authsalt
      type: STRING
      mode: NULLABLE
      description: Authentication salt value used in account credential derivation.
    - name: profilechangedat
      type: FLOAT
      mode: NULLABLE
      description: Unix epoch timestamp of the last profile change for the user.
    - name: verifiersetat
      type: FLOAT
      mode: NULLABLE
      description: Unix epoch timestamp of when the account verifier (password) was
        last set.
    - name: emailverified
      type: FLOAT
      mode: NULLABLE
      description: Whether the account's primary email address has been verified.
    - name: ka
      type: STRING
      mode: NULLABLE
      description: Key agreement value used in FxA account key derivation.
    - name: verifierversion
      type: FLOAT
      mode: NULLABLE
      description: Version of the account verifier (password hashing algorithm) in
        use.
    - name: wrapwrapkb
      type: STRING
      mode: NULLABLE
      description: Double-wrapped kB key value used in FxA sync key exchange.
    - name: primaryemail
      type: STRING
      mode: NULLABLE
      description: Hashed primary email address for the FxA account. Not a raw email
        address.
    - name: accountrecreated
      type: BOOLEAN
      mode: NULLABLE
      description: Whether the account was recreated (deleted and re-registered with
        the same email).
    - name: subscriptionid
      type: STRING
      mode: NULLABLE
      description: Subscription identifier for subscription-related events.
    - name: payload
      type: STRING
      mode: NULLABLE
      description: Raw payload string from the event.
    - name: redirectto
      type: STRING
      mode: NULLABLE
      description: URL the user was redirected to after the authentication flow.
    - name: plan_id
      type: STRING
      mode: NULLABLE
      description: Subscription plan identifier. See also planid.
    - name: product_id
      type: STRING
      mode: NULLABLE
      description: Mozilla subscription product identifier.
    - name: msg
      type: STRING
      mode: NULLABLE
      description: Log message string from the structured event payload.
    - name: dbpath
      type: STRING
      mode: NULLABLE
      description: Database path or connection string identifier.
    - name: enabled
      type: BOOLEAN
      mode: NULLABLE
      description: Whether the feature or configuration option is enabled.
    - name: poolstats
      type: STRING
      mode: NULLABLE
      description: Database connection pool statistics as a JSON string, including
        pool UUID, connection limit, and active/free connection counts.
    - name: data
      type: STRING
      mode: NULLABLE
      description: Generic data field from the event payload.
    - name: unblockcode
      type: STRING
      mode: NULLABLE
      description: One-time code sent to the user to unblock their account after rate
        limiting.
    - name: purchasetoken
      type: STRING
      mode: NULLABLE
      description: Google Play Store purchase token for in-app purchase events.
    - name: remaining
      type: FLOAT
      mode: NULLABLE
      description: Remaining allowed attempts before rate limiting applies.
    - name: zip
      type: STRING
      mode: NULLABLE
      description: Postal ZIP code from the subscription billing address.
    - name: query
      type: STRING
      mode: NULLABLE
      description: URL query parameters associated with the request.
    - name: params
      type: STRING
      mode: NULLABLE
      description: Request parameters from the event.
    - name: entrypoint_variation
      type: STRING
      mode: NULLABLE
      description: A/B variation identifier for the entrypoint experiment.
    - name: entrypoint_experiment
      type: STRING
      mode: NULLABLE
      description: A/B experiment identifier associated with the entrypoint that started
        the authentication flow.
    - name: invoiceid
      type: STRING
      mode: NULLABLE
      description: Invoice identifier for subscription billing events.
    - name: traceid
      type: STRING
      mode: NULLABLE
      description: Distributed tracing identifier for correlating events across services.
    - name: automatic_tax
      type: STRING
      mode: NULLABLE
      description: Whether tax was calculated automatically for a subscription event.
    - name: hostname
      type: STRING
      mode: NULLABLE
      description: Hostname of the server that processed the event.
    - name: syscall
      type: STRING
      mode: NULLABLE
      description: System call name associated with an OS-level error event.
    - name: priceid
      type: STRING
      mode: NULLABLE
      description: Stripe price identifier for a subscription plan.
    - name: ipaddress
      type: STRING
      mode: NULLABLE
      description: Client IP address associated with the event.
    - name: originaltransactionid
      type: STRING
      mode: NULLABLE
      description: Original transaction identifier for subscription or payment events.
    - name: purchase
      type: STRING
      mode: NULLABLE
      description: Purchase identifier or metadata for a subscription purchase.
    - name: originaltransactionids
      type: STRING
      mode: NULLABLE
      description: Stringified list of original transaction identifiers.
    - name: stack
      type: STRING
      mode: NULLABLE
      description: Stack trace string. Populated on error events.
    - name: host
      type: STRING
      mode: NULLABLE
      description: Hostname of the server handling the request.
    - name: port
      type: FLOAT
      mode: NULLABLE
      description: Network port number associated with the request.
    - name: bodysize
      type: FLOAT
      mode: NULLABLE
      description: Size of the HTTP request body in bytes.
    - name: promotioncode
      type: STRING
      mode: NULLABLE
    - name: location
      type: STRING
      mode: NULLABLE
      description: JSON-encoded location object containing city, country, and region
        for the request.
    - name: customerid
      type: STRING
      mode: NULLABLE
    - name: postalcode
      type: STRING
      mode: NULLABLE
      description: Postal code from the subscription billing address.
    - name: countrycode
      type: STRING
      mode: NULLABLE
      description: Two-letter ISO 3166-1 country code associated with the event.
    - name: uabrowserversion
      type: STRING
      mode: NULLABLE
      description: Browser version string parsed from the user agent.
    - name: uabrowser
      type: STRING
      mode: NULLABLE
      description: Browser name parsed from the user agent string.
    - name: clientname
      type: STRING
      mode: NULLABLE
    - name: uaosversion
      type: STRING
      mode: NULLABLE
      description: Operating system version string parsed from the user agent.
    - name: isboom
      type: BOOLEAN
      mode: NULLABLE
      description: Whether the error is a Boom HTTP error object.
    - name: isserver
      type: BOOLEAN
      mode: NULLABLE
      description: Whether the event originated from a server-side operation rather
        than a client request.
    - name: output
      type: STRING
      mode: NULLABLE
      description: Output value or result string from the operation.
    - name: details
      type: STRING
      mode: NULLABLE
      description: Additional detail string associated with the event.
    - name: _original
      type: STRING
      mode: NULLABLE
      description: Original raw value before transformation or normalization.
    - name: param
      type: STRING
      mode: NULLABLE
      description: Parameter field from the event payload.
    - name: rawtype
      type: STRING
      mode: NULLABLE
      description: Type classification of the raw log payload.
    - name: raw
      type: STRING
      mode: NULLABLE
      description: Raw log line or payload before parsing.
    - name: requestid
      type: STRING
      mode: NULLABLE
      description: Unique identifier for the HTTP request.
    - name: headers
      type: STRING
      mode: NULLABLE
      description: JSON-encoded HTTP request headers associated with the event.
    - name: user_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA user identifier, hex-encoded.
    - name: device_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA device identifier, hex-encoded.
    - name: value
      type: STRING
      mode: NULLABLE
    - name: plan
      type: STRING
      mode: NULLABLE
      description: Subscription plan name or identifier associated with the event.
    - name: context
      type: STRING
      mode: NULLABLE
      description: Context string for the event (OAuth flow context).
    - name: deviceid
      type: STRING
      mode: NULLABLE
      description: FxA device identifier. See also device_id for the hashed version.
    - name: result
      type: STRING
      mode: NULLABLE
      description: Result or outcome of the operation.
    - name: eventid
      type: FLOAT
      mode: NULLABLE
    - name: now
      type: STRING
      mode: NULLABLE
    - name: connlimit
      type: FLOAT
      mode: NULLABLE
    - name: grant_type
      type: STRING
      mode: NULLABLE
    - name: emailsender
      type: STRING
      mode: NULLABLE
    - name: emailservice
      type: STRING
      mode: NULLABLE
    - name: phonenumber
      type: STRING
      mode: NULLABLE
    - name: templatename
      type: STRING
      mode: NULLABLE
      description: Name of the email or notification template used for the event.
    - name: acceptlanguage
      type: STRING
      mode: NULLABLE
    - name: messageid
      type: STRING
      mode: NULLABLE
    - name: current
      type: FLOAT
      mode: NULLABLE
    - name: threshold
      type: FLOAT
      mode: NULLABLE
    - name: isbudgetok
      type: BOOLEAN
      mode: NULLABLE
    - name: limit
      type: FLOAT
      mode: NULLABLE
    - name: caller
      type: STRING
      mode: NULLABLE
    - name: key
      type: STRING
      mode: NULLABLE
    - name: nvpdata
      type: STRING
      mode: NULLABLE
    - name: name
      type: STRING
      mode: NULLABLE
      description: Name field from the event payload.
    - name: product
      type: STRING
      mode: NULLABLE
    - name: accuracy_confidence
      type: STRING
      mode: NULLABLE
    - name: accuracy
      type: FLOAT
      mode: NULLABLE
    - name: resp
      type: STRING
      mode: NULLABLE
    - name: languages
      type: STRING
      mode: NULLABLE
    - name: stat
      type: STRING
      mode: NULLABLE
    - name: heapused
      type: FLOAT
      mode: NULLABLE
    - name: rss
      type: FLOAT
      mode: NULLABLE
    - name: numpendinghwm
      type: FLOAT
      mode: NULLABLE
    - name: maxpending
      type: FLOAT
      mode: NULLABLE
    - name: numpending
      type: FLOAT
      mode: NULLABLE
    - name: marketingoptin
      type: BOOLEAN
      mode: NULLABLE
    - name: valid
      type: BOOLEAN
      mode: NULLABLE
    - name: mysql
      type: FLOAT
      mode: NULLABLE
    - name: bouncedat
      type: FLOAT
      mode: NULLABLE
    - name: config
      type: STRING
      mode: NULLABLE
      description: Configuration metadata associated with the event.
    - name: hasid
      type: BOOLEAN
      mode: NULLABLE
    - name: hastoken
      type: BOOLEAN
      mode: NULLABLE
    - name: hasuid
      type: BOOLEAN
      mode: NULLABLE
    - name: warning
      type: STRING
      mode: NULLABLE
    - name: response
      type: STRING
      mode: NULLABLE
      description: Response data associated with the event.
    - name: options
      type: STRING
      mode: NULLABLE
    - name: client_id
      type: STRING
      mode: NULLABLE
      description: Client identifier for the relying party application that initiated
        the FxA authentication flow (e.g., Firefox Sync, Firefox Monitor). Null in
        tables where `clientid` is used instead.
    - name: scope
      type: STRING
      mode: NULLABLE
    - name: pmt_token
      type: STRING
      mode: NULLABLE
    - name: display_name
      type: STRING
      mode: NULLABLE
    - name: created_at
      type: STRING
      mode: NULLABLE
    - name: expires_at
      type: STRING
      mode: NULLABLE
    - name: user
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed user identifier in bytes format, from the FxA admin
        server logs.
    - name: val
      type: STRING
      mode: NULLABLE
    - name: assertion
      type: STRING
      mode: NULLABLE
      description: Assertion string used in device pairing or browser verification
        flows.
    - name: queuelength
      type: FLOAT
      mode: NULLABLE
    - name: profile_changed_at
      type: FLOAT
      mode: NULLABLE
    - name: client
      type: STRING
      mode: NULLABLE
    - name: sub_id
      type: STRING
      mode: NULLABLE
    - name: resource
      type: STRING
      mode: NULLABLE
    - name: amplitudeevent
      type: STRING
      mode: NULLABLE
    - name: errcode
      type: STRING
      mode: NULLABLE
    - name: doc_url
      type: STRING
      mode: NULLABLE
  - name: logger
    type: STRING
    mode: NULLABLE
    description: Name of the logger or component that emitted the log entry (e.g.,
      'fxa-auth-server', 'fxa-content-server', 'fxa-oauth-server'). Used to derive
      the top-level `fxa_server` field.
  - name: envversion
    type: STRING
    mode: NULLABLE
    description: Log envelope version used by the FxA logging framework.
- name: timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the event described by the log entry occurred, as reported
    by the originating FxA service.
- name: receiveTimestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the log entry was received by Logging.
- name: severity
  type: STRING
  mode: NULLABLE
  description: The severity of the log entry. The default value is `LogSeverity.DEFAULT`.
- name: insertId
  type: STRING
  mode: NULLABLE
  description: A unique identifier for the log entry. Logging considers other log
    entries in the same project, with the same `timestamp`, and with the same `insertId`
    to be duplicates which are removed in a single query result.
- name: httpRequest
  type: RECORD
  mode: NULLABLE
  description: Information about the HTTP request associated with this log entry,
    if applicable.
  fields:
  - name: requestMethod
    type: STRING
    mode: NULLABLE
    description: 'The request method. Examples: "GET", "HEAD", "PUT", "POST".'
  - name: requestUrl
    type: STRING
    mode: NULLABLE
    description: The scheme (http, https), the host name, the path and the query portion
      of the URL that was requested.
  - name: requestSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP request message in bytes, including the request
      headers and the request body.
  - name: status
    type: INTEGER
    mode: NULLABLE
    description: 'The response code indicating the status of response. Examples: 200,
      404.'
  - name: responseSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP response message sent back to the client, in
      bytes.
  - name: userAgent
    type: STRING
    mode: NULLABLE
    description: The user agent sent by the client.
  - name: remoteIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the client that issued the HTTP
      request.
  - name: serverIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the origin server that the request
      was sent to.
  - name: referer
    type: STRING
    mode: NULLABLE
    description: The referer URL of the request, as defined in HTTP/1.1 Header Field
      Definitions.
  - name: cacheLookup
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not a cache lookup was attempted.
  - name: cacheHit
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not an entity was served from cache (with or without validation).
  - name: cacheValidatedWithOriginServer
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not the response was validated with the origin server
      before being served from cache. This field is only meaningful if `cacheHit`
      is True.
  - name: cacheFillBytes
    type: INTEGER
    mode: NULLABLE
    description: The number of HTTP response bytes inserted into cache. Set only when
      a cache fill was attempted.
  - name: protocol
    type: STRING
    mode: NULLABLE
    description: 'Protocol used for the request. Examples: "HTTP/1.1", "HTTP/2".'
