fields:
- name: sample_id
  type: INT64
  mode: NULLABLE
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: app_version
  type: INT64
  mode: NULLABLE
  description: The major version number of the Firefox application (e.g., 151).
- name: app_build_id
  type: STRING
  mode: NULLABLE
  description: 'The build identifier string for the application, encoding the date
    and time when the specific build was compiled (format: YYYYMMDDHHmmSS).'
- name: channel
  type: STRING
  mode: NULLABLE
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- name: histogram_aggregates
  type: RECORD
  mode: REPEATED
  description: An array of aggregated histogram records for one or more metrics, each
    containing bucket configuration, metric metadata, process context, and the aggregated
    bucket counts. Used for rollup-level histogram analysis across clients and versions.
  fields:
  - name: agg_type
    type: STRING
    mode: NULLABLE
    description: Within each histogram_aggregates entry, the aggregation method applied
      to client histogram values. Always 'summed_histogram' in this table.
  - name: aggregates
    type: RECORD
    mode: REPEATED
    description: Within each histogram_aggregates entry, a repeated key-value struct
      where each entry represents a histogram bucket key and its summed count across
      the aggregation period.
    fields:
    - name: key
      type: STRING
      mode: NULLABLE
      description: The histogram bucket label (the bucket's lower bound) for this
        aggregated entry.
    - name: value
      type: INT64
      mode: NULLABLE
      description: The aggregated count of samples that fell into the corresponding
        histogram bucket.
  - name: first_bucket
    type: INT64
    mode: NULLABLE
    description: Within each histogram_aggregates entry, the minimum value of the
      first histogram bucket.
  - name: key
    type: STRING
    mode: NULLABLE
    description: Within each histogram_aggregates entry, the key for keyed histograms
      (e.g., an add-on ID, engine name, or URL). Empty string for non-keyed histograms.
  - name: last_bucket
    type: INT64
    mode: NULLABLE
    description: Within each histogram_aggregates entry, the maximum value of the
      last histogram bucket.
  - name: latest_version
    type: INT64
    mode: NULLABLE
    description: Within each histogram_aggregates entry, the latest Firefox major
      version seen for this client during the aggregation window.
  - name: metric
    type: STRING
    mode: NULLABLE
    description: Within each histogram_aggregates entry, the name of the telemetry
      histogram probe (e.g., 'uptake_remote_content_result_1', 'ssl_time_until_handshake_finished_keyed_by_ka').
  - name: metric_type
    type: STRING
    mode: NULLABLE
    description: Within each histogram_aggregates entry, the type of histogram (e.g.,
      'histogram-exponential', 'histogram-linear', 'histogram-boolean', 'histogram-categorical',
      'histogram-count', 'histogram-flag').
  - name: num_buckets
    type: INT64
    mode: NULLABLE
    description: Within each histogram_aggregates entry, the total number of buckets
      in this histogram.
  - name: process
    type: STRING
    mode: NULLABLE
    description: Within each histogram_aggregates entry, the Firefox process type
      from which the histogram was reported (e.g., 'parent', 'content').
