fields:
- mode: NULLABLE
  name: snapshot_date
  type: DATE
- mode: NULLABLE
  name: snapshot_at
  type: TIMESTAMP
- mode: NULLABLE
  name: layout
  type: STRING
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: section_position
  type: INTEGER
- mode: NULLABLE
  name: position
  type: INTEGER
  description: The zero- or one-based ordinal position of an item within a list or
    UI surface (e.g., a recommendation card or menu entry). Lower values indicate
    items displayed earlier or higher in the interface.
- mode: NULLABLE
  name: tile_format
  type: STRING
- mode: NULLABLE
  name: impressions
  type: INTEGER
- mode: NULLABLE
  name: weight
  type: FLOAT
