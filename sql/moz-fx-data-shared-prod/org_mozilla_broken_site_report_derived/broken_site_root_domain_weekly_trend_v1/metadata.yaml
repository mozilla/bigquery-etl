friendly_name: Broken site Root Domain Weekly Trends
description: |-
  Weekly trend computation for broken site reports.
owners:
  - gkatre@mozilla.com
labels:
  incremental: true
  schedule: daily
  depends_on_past: true
scheduling:
  dag_name: bqetl_default
bigquery:
  time_partitioning:
    type: day
    field: report_date
    require_partition_filter: true
  clustering:
    fields:
    - root_domain
