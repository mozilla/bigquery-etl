fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: normalized_country_code
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code representing the country associated
    with the client's IP address at the time of submission, such as 'US', 'DE', or
    'BR'.
- name: uninstalls_count
  type: INTEGER
  mode: NULLABLE
  description: The total number of uninstall events recorded during the reporting
    period for the relevant software or add-on.
- name: installs_count
  type: INTEGER
  mode: NULLABLE
  description: Count of stub release channel installs
- name: uninstall_to_install_ratio
  type: FLOAT
  mode: NULLABLE
  description: The ratio of uninstall events to install events over a given period.
    A value of 1.0 means uninstalls equal installs; values below 1.0 indicate more
    installs than uninstalls.
