friendly_name: Subscription Platform Backend Cirrus Delete Events
description: |-
  Deletion events for subscription platform backend cirrus, derived from payments-api GKE logs containing pre-derived nimbus_user_id
owners:
- dalvarez@mozilla.com
labels:
  incremental: true
  schedule: daily
  table_type: client_level
  dag: bqetl_fxa_events
  owner1: dalvarez
scheduling:
  dag_name: bqetl_fxa_events
bigquery:
  time_partitioning:
    type: day
    field: submission_timestamp
    require_partition_filter: false
    expiration_days: null
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  query.sql:
  - moz-fx-fxa-prod.gke_fxa_prod_log.stderr
