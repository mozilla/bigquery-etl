friendly_name: Firefox-CI Task Run Costs
description: |-
  Derived Firefox-CI task run cost data attributed from GCP and Azure worker
  cost and usage data.
owners:
- ahalberstadt@mozilla.com
- jmoss@mozilla.com
labels:
  incremental: true
  owner1: ahalberstadt
  owner2: jmoss
  dag: bqetl_fxci
scheduling:
  dag_name: bqetl_fxci
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: true
    expiration_days: null
  range_partitioning: null
  clustering:
    fields:
    - task_id
    - run_id
