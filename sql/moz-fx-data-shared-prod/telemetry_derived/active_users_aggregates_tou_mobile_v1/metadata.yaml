friendly_name: Active Users Aggregates ToU Mobile
description: |-
  Aggregated table of daily, weekly, and monthly active users segmented by Terms of Use
  acceptance status, built to support the Terms of Use acceptance rate dashboard. This
  derived table replaces a Looker PDT that was causing inflated aggregates, providing
  performant, pre-aggregated data without relying on Looker-side caching.

  As of 2026-03-09, this table only looks at the fenix and ios apps for mobile.
  Focus and klar are not in scope as of this date.

  Jira ticket: https://mozilla-hub.atlassian.net/browse/DO-2122

  The table is labeled as "change_controlled", which implies
  that changes require the approval of at least one owner.

  The label "shredder mitigation" indicates that this table is set up for
  managed backfill with shredder mitigation, as described in
  https://mozilla.github.io/bigquery-etl/cookbooks/creating_a_derived_dataset/#initiating-the-backfill.
owners:
- rbaffourawuah@mozilla.com
- mhirose@mozilla.com
- mozilla/kpi_table_reviewers
labels:
  level: gold
  incremental: true
  change_controlled: true
  shredder_mitigation: true
  owner1: rbaffourawuah
  owner2: mhirose
  dag: bqetl_analytics_aggregations
scheduling:
  dag_name: bqetl_analytics_aggregations
  task_name: active_users_aggregates_tou_mobile_v1
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: true
    expiration_days: null
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  query.sql:
  - moz-fx-data-shared-prod.fenix.active_users
  - moz-fx-data-shared-prod.fenix.terms_of_use_status
  - moz-fx-data-shared-prod.firefox_ios.active_users
  - moz-fx-data-shared-prod.firefox_ios.terms_of_use_status
require_column_descriptions: true
