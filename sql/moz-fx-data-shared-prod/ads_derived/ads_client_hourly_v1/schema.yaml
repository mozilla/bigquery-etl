fields:
  - name: submission_date
    type: DATE
    mode: NULLABLE
    description: Date of the submission (partition field).
  - name: submission_hour
    type: TIMESTAMP
    mode: NULLABLE
    description: Submission timestamp truncated to the hour.
  - name: surface
    type: STRING
    mode: NULLABLE
    description: >-
      Surface in which the client operating system runs, e.g. Desktop, Mobile.
  - name: normalized_os
    type: STRING
    mode: NULLABLE
    description: >-
      The normalized name of the operating system running at the client.
  - name: app_name
    type: STRING
    mode: NULLABLE
    description: >-
      Name of the browser app (e.g. Fenix, Firefox for iOS).
  - name: channel
    type: STRING
    mode: NULLABLE
    description: >-
      The channel the application is being distributed on (e.g. release, nightly).
  - name: normalized_country_code
    type: STRING
    mode: NULLABLE
    description: ISO 3166-1 alpha-2 country code.
  - name: app_version
    type: STRING
    mode: NULLABLE
    description: Application display version (client_info.app_display_version).
  - name: normalized_channel
    type: STRING
    mode: NULLABLE
    description: Normalized release channel (e.g. release, beta, nightly).
  - name: ping_count
    type: INT64
    mode: NULLABLE
    description: Number of metrics pings with at least one ads_client metric entry.
  - name: op_new
    type: INT64
    mode: NULLABLE
    description: >-
      Total count of 'new' operations from ads_client.client_operation_total
      labeled_counter.
  - name: op_request_ads
    type: INT64
    mode: NULLABLE
    description: >-
      Total count of 'request_ads' operations from ads_client.client_operation_total
      labeled_counter.
  - name: op_record_click
    type: INT64
    mode: NULLABLE
    description: >-
      Total count of 'record_click' operations from ads_client.client_operation_total
      labeled_counter.
  - name: op_record_impression
    type: INT64
    mode: NULLABLE
    description: >-
      Total count of 'record_impression' operations from
      ads_client.client_operation_total labeled_counter.
  - name: op_report_ad
    type: INT64
    mode: NULLABLE
    description: >-
      Total count of 'report_ad' operations from ads_client.client_operation_total
      labeled_counter.
  - name: client_error_new
    type: INT64
    mode: NULLABLE
    description: >-
      Total number of 'new' error occurrences from ads_client.client_error labeled_string.
  - name: client_error_request_ads
    type: INT64
    mode: NULLABLE
    description: >-
      Total number of 'request_ads' error occurrences from ads_client.client_error
      labeled_string.
  - name: client_error_record_click
    type: INT64
    mode: NULLABLE
    description: >-
      Total number of 'record_click' error occurrences from ads_client.client_error
      labeled_string.
  - name: client_error_record_impression
    type: INT64
    mode: NULLABLE
    description: >-
      Total number of 'record_impression' error occurrences from ads_client.client_error
      labeled_string.
  - name: client_error_report_ad
    type: INT64
    mode: NULLABLE
    description: >-
      Total number of 'report_ad' error occurrences from ads_client.client_error
      labeled_string.
  - name: build_cache_error
    type: INT64
    mode: NULLABLE
    description: >-
      Total number of error occurrences from ads_client.build_cache_error labeled_string.
  - name: deserialization_error
    type: INT64
    mode: NULLABLE
    description: >-
      Total number of error occurrences from ads_client.deserialization_error
      labeled_string.
  - name: http_cache_outcome
    type: INT64
    mode: NULLABLE
    description: >-
      Total number of outcomes recorded in ads_client.http_cache_outcome labeled_string.
