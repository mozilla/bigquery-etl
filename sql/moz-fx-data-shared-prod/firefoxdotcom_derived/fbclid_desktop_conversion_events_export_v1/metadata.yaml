friendly_name: Facebook Conversion Events (External)
description: |-
  Retrieves data from firefoxdotcom_derived.fbclid_conversion_events_v1
  and transforms it into the correct shape in preparation for pushing it to Conversions API.

  Expected grain: max 1 row per fbclid + conversion_name combination.
owners:
- kik@mozilla.com

labels:
  incremental: true
  table_type: client_level

scheduling:
  dag_name: bqetl_census_feed
  arguments:
  - --submission_date={{ds}}
  depends_on_past: true
  secrets:
  - deploy_target: FB_ACCESS_TOKEN
    key: bqetl_fb_access_token
  - deploy_target: FB_PIXEL_ID
    key: bqetl_fb_pixel_id

  referenced_tables:
  - ['moz-fx-data-shared-prod', 'firefoxdotcom_derived', 'fbclid_desktop_conversion_events_v1']

bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: false
    expiration_days: null

monitoring:
  enabled: true
