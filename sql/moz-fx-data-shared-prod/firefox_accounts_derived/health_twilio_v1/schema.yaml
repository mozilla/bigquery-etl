fields:
- mode: NULLABLE
  name: date
  type: DATE
  description: Event date derived from `DATE(timestamp)`, used as the partition key
    in some log-derived tables. Distinct from `submission_date` (the pipeline ingestion
    date). Use `submission_date` for incremental processing; use this field when you
    need the event's occurrence date.
- mode: NULLABLE
  name: category
  type: STRING
- mode: NULLABLE
  name: count
  type: INTEGER
- mode: NULLABLE
  name: usage
  type: FLOAT
- mode: NULLABLE
  name: usage_unit
  type: STRING
- mode: NULLABLE
  name: price
  type: FLOAT
- mode: NULLABLE
  name: price_unit
  type: STRING
- mode: NULLABLE
  name: description
  type: STRING
