friendly_name: AMO Stats Installs (dev)
description: |-
  Subset of daily install statistics to power addons.mozilla.org stats pages.
owners:
- kik@mozilla.com
- lgreco@mozilla.com
labels:
  application: amo
  incremental: true
  schedule: daily
  table_type: aggregate
  dag: bqetl_amo_stats
  owner1: kik
  owner2: lgreco
scheduling:
  dag_name: bqetl_amo_stats
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: false
    expiration_days: null
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:amo/nonprod
  - workgroup:amo/prod
  - workgroup:mozilla-confidential/data-viewers
references:
  query.sql:
  - moz-fx-data-shared-prod.addons.amo_stats_installs
  - moz-fx-data-shared-prod.addons.dev_amo_stats_dau
