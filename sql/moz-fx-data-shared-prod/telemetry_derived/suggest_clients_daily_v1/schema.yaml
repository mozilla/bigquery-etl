fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: client_id
  type: STRING
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- mode: NULLABLE
  name: block_nonsponsored_count
  type: INTEGER
- mode: NULLABLE
  name: block_sponsored_count
  type: INTEGER
- mode: NULLABLE
  name: block_nonsponsored_bestmatch_count
  type: INTEGER
- mode: NULLABLE
  name: block_sponsored_bestmatch_count
  type: INTEGER
- mode: NULLABLE
  name: click_nonsponsored_count
  type: INTEGER
- mode: NULLABLE
  name: click_sponsored_count
  type: INTEGER
- mode: NULLABLE
  name: click_nonsponsored_bestmatch_count
  type: INTEGER
- mode: NULLABLE
  name: click_sponsored_bestmatch_count
  type: INTEGER
- mode: NULLABLE
  name: help_nonsponsored_count
  type: INTEGER
- mode: NULLABLE
  name: help_sponsored_count
  type: INTEGER
- mode: NULLABLE
  name: help_nonsponsored_bestmatch_count
  type: INTEGER
- mode: NULLABLE
  name: help_sponsored_bestmatch_count
  type: INTEGER
- mode: NULLABLE
  name: impression_nonsponsored_count
  type: INTEGER
- mode: NULLABLE
  name: impression_sponsored_count
  type: INTEGER
- mode: NULLABLE
  name: impression_nonsponsored_bestmatch_count
  type: INTEGER
- mode: NULLABLE
  name: impression_sponsored_bestmatch_count
  type: INTEGER
- mode: NULLABLE
  name: user_pref_data_collection_enabled
  type: BOOLEAN
- mode: NULLABLE
  name: user_pref_sponsored_suggestions_enabled
  type: BOOLEAN
- mode: NULLABLE
  name: user_pref_firefox_suggest_enabled
  type: BOOLEAN
- fields:
  - mode: NULLABLE
    name: version
    type: STRING
    description: The version string of the software, add-on, or component being measured.
      Follows standard versioning conventions such as major.minor.patch.
  - mode: NULLABLE
    name: major_version
    type: NUMERIC
    description: The major version number of the Firefox browser (e.g., 128, 151),
      representing the primary release train. Used to segment clients by their browser
      generation.
  - mode: NULLABLE
    name: minor_version
    type: NUMERIC
  - mode: NULLABLE
    name: patch_revision
    type: NUMERIC
  - mode: NULLABLE
    name: is_major_release
    type: BOOLEAN
  mode: NULLABLE
  name: browser_version_info
  type: RECORD
- fields:
  - mode: NULLABLE
    name: key
    type: STRING
    description: A string identifier representing the specific action, search engine,
      or event type associated with a record, such as a search entry point or provider
      key. An empty string indicates no specific key was recorded.
  - mode: NULLABLE
    name: value
    type: STRING
  mode: REPEATED
  name: experiments
  type: RECORD
  description: An array of key-value pairs representing all active experiment enrollments
    for the client at the time of the ping, where the key is the experiment slug and
    the value is the assigned branch. This captures the full set of concurrent experiment
    enrollments.
- mode: NULLABLE
  name: locale
  type: STRING
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- mode: NULLABLE
  name: normalized_channel
  type: STRING
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- mode: NULLABLE
  name: normalized_os_version
  type: STRING
  description: The standardized version string of the client's operating system, such
    as '10.0' for Windows 10 or '6.8.0' for a Linux kernel version. Provides a normalized
    representation across different OS reporting formats.
- mode: NULLABLE
  name: sample_id
  type: INTEGER
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: profile_group_id
  type: STRING
  description: A UUID that identifies a group of profiles belonging to the same user
    or installation context. Null when profile group information is unavailable.
