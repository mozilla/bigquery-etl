fields:
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- name: activity_date_week
  type: DATE
  mode: NULLABLE
  description: The Monday-aligned start date of the ISO week in which the user activity
    occurred, used for weekly aggregations.
