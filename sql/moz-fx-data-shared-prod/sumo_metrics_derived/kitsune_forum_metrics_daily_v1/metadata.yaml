friendly_name: Kitsune Forum Metrics Daily
description: |
  Daily Kitsune support forum question and reply metrics, broken down by product
  and locale.

  Grain: Daily x Product x Locale (UTC timezone)

  Supports three Tier 1 KPIs:
    reply_rate       = SUM(questions_replied) / SUM(questions_created)
    avg_ttfr_hrs     = AVG(avg_ttfr_hrs) weighted by questions_replied
    helpfulness_rate = SUM(total_helpful_votes)
                     / (SUM(total_helpful_votes) + SUM(total_unhelpful_votes))

  A row is included on @submission_date if the question was created on that date
  OR if the question received its first qualifying reply on that date. This allows
  both questions_created and questions_replied to be tracked in a single partition.

  Product mapping (matching kitsune_forum_posts.sql):
    firefox            → Firefox desktop
    mobile             → Firefox for Android
    ios                → Firefox for iOS
    firefox-enterprise → Firefox for Enterprise
  Non-Firefox products are excluded.

  Exclusions (matching kitsune_forum_posts.sql source logic):
  - Spam questions and locked questions
  - Non-Firefox products
  - Self-replies (OP answering their own question) for TTFR and reply rate
  - Spam answers
  - Answers from deactivated users (kitsune_auth_user.is_active = FALSE)

  Note: total_helpful_votes and total_unhelpful_votes are cumulative vote totals
  on a question's answers as of ETL run time — not votes cast on @submission_date.
  Helpfulness rate is most meaningful when aggregated over a rolling window.

  Replaces the reply rate, TTFR, and helpfulness CTEs in:
  - kitsune_forum_posts.sql (dashboard queries)

owners:
