friendly_name: App-specific view for Glean ping "nimbus-targeting-context"
description: |-
  This a view that UNIONs the stable ping tables
  across all channels of the Glean application "Firefox Focus for Android"
  (org_mozilla_focus.nimbus_targeting_context, org_mozilla_focus_beta.nimbus_targeting_context, org_mozilla_focus_nightly.nimbus_targeting_context).

  It is used by Looker.
owners: []
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  view.sql:
  - moz-fx-data-shared-prod.org_mozilla_focus.nimbus_targeting_context
  - moz-fx-data-shared-prod.org_mozilla_focus_beta.nimbus_targeting_context
  - moz-fx-data-shared-prod.org_mozilla_focus_nightly.nimbus_targeting_context
