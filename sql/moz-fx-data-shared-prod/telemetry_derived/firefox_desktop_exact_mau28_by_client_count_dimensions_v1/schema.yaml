fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: mau
  type: INTEGER
  description: Monthly Active Users (MAU). The count of distinct clients that were
    active at least one day within the previous 28 days. See detailed MAU definition
    in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#WAU-and-MAU.
- mode: NULLABLE
  name: wau
  type: INTEGER
  description: Weekly Active Users (WAU). In aggregate tables this is the count of
    distinct clients active at least one day in the previous 7 days. See detailed
    definition in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#WAU-and-MAU.
- mode: NULLABLE
  name: dau
  type: INTEGER
  description: Daily Active Users (DAU). The count of distinct clients active on a
    given day. See detailed DAU definitions for Desktop and Mobile in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#Definitions.
- mode: NULLABLE
  name: visited_5_uri_mau
  type: INTEGER
  description: The number of distinct users who visited 5 or more URIs within the
    past 28 days, used as a monthly active user engagement metric. A value of 0 indicates
    no qualifying users were observed that month.
- mode: NULLABLE
  name: visited_5_uri_wau
  type: INTEGER
  description: The number of distinct users who visited 5 or more URIs within a 7-day
    window, used as a weekly active user engagement metric. A value of 0 indicates
    no qualifying users were observed that week.
- mode: NULLABLE
  name: visited_5_uri_dau
  type: INTEGER
  description: The number of distinct users who visited 5 or more URIs on a given
    day, used as a daily active user engagement metric. A value of 0 indicates no
    qualifying users were observed that day.
- mode: NULLABLE
  name: dev_tools_mau
  type: INTEGER
  description: Dev Tools MAU
- mode: NULLABLE
  name: dev_tools_wau
  type: INTEGER
  description: Dev Tools WAU
- mode: NULLABLE
  name: dev_tools_dau
  type: INTEGER
  description: Dev Tools DAU
- mode: NULLABLE
  name: app_name
  type: STRING
  description: The name of the Mozilla application that generated the telemetry event
    (e.g., 'firefox_desktop', 'fenix', 'firefox_ios', 'mozilla_vpn'). Used to distinguish
    telemetry across Mozilla's suite of products.
- mode: NULLABLE
  name: app_version
  type: STRING
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: locale
  type: STRING
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- mode: NULLABLE
  name: normalized_channel
  type: STRING
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- mode: NULLABLE
  name: os
  type: STRING
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- mode: NULLABLE
  name: os_version
  type: STRING
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- mode: NULLABLE
  name: distribution_id
  type: STRING
  description: An identifier for the Firefox distribution package the client is running,
    such as 'default' for the standard Mozilla build or partner-specific identifiers
    like 'canonical-002' or 'mozilla-MSIX'. This field is null when no distribution
    identifier is available.
- mode: NULLABLE
  name: country_name
  type: STRING
  description: The full human-readable name of the country associated with the record
    (e.g., 'United States', 'India', 'Brazil'). Provides a display-friendly alternative
    to ISO country code fields.
