friendly_name: Workgroup Subgroup Members
description: |-
  MozCloud workgroup memberships exported from the github.com/mozilla/global-platform-admin
  repository. Each row represents a membership in a MozCloud workgroup. The `member_type`
  column can be one of: user, workgroup, google-group, service-account.
owners:
- wstuckey@mozilla.com
- wdawson@mozilla.com
labels:
  owner1: wstuckey
  owner2: wdawson
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:finops/billingetl-bq-scheduled
  - workgroup:mozilla-confidential/data-viewers
  - workgroup:platform/backstage-gke
  - workgroup:platform/platform-tf
references:
  view.sql:
  - moz-fx-data-shared-prod.mozcloud_workgroups_syndicate.subgroup_members
