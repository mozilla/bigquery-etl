friendly_name: SUMO Zendesk SLA KPIs (CSAT, FCR, TTFR, TRT)
description: "Daily SLA KPI view for SUMO Zendesk support tickets, aggregated from\n\
  zendesk_ticket_sla_v1. All metrics are attributed to the ticket's resolution\ndate\
  \ and mirror Zendesk Explore.\n\nGrain: resolved_date x product x automation_category.\n\
  \nTickets where is_excluded_from_sla = TRUE in the base table are filtered out\n\
  (Appbot non-English, Sumo Test / VPN QA groups, %test% tags). Unresolved\ntickets\
  \ are also excluded \u2014 these KPIs are about resolved-ticket outcomes.\n\nExposes\
  \ sum/count component columns rather than precomputed rates so KPIs\nremain correct\
  \ under any downstream filter or grouping. Compute as:\n  FCR %        = SUM(one_touch_tickets)\
  \                    / NULLIF(SUM(tickets_resolved), 0) * 100\n  CSAT %       =\
  \ SUM(satisfied_surveys)                    / NULLIF(SUM(rated_surveys),     0)\
  \ * 100\n  Avg TTFR min = SUM(first_reply_business_minutes_sum)     / NULLIF(SUM(replied_tickets),\
  \   0)\n  Avg TRT min  = SUM(full_resolution_business_minutes_sum) / NULLIF(SUM(tickets_resolved),\
  \ 0)\n\nKPI definitions:\n- FCR: one-touch tickets (resolved with fewer than two\
  \ agent replies) divided\n  by total resolved tickets. Mirrors \"% One-touch tickets\"\
  \ in Zendesk Explore.\n- CSAT: 'good' ratings divided by rated tickets ('good' +\
  \ 'bad'). Tickets\n  without a rating are excluded from the denominator.\n- TTFR\
  \ (Time to First Response): business minutes between ticket creation and\n  the\
  \ first public agent/admin reply, computed against Mozilla Support Hours\n  with\
  \ holiday subtraction. Tickets auto-solved without an agent reply are\n  excluded\
  \ from the average via replied_tickets.\n- TRT (Total Resolution Time): business\
  \ minutes between ticket creation and\n  full resolution (last 'solved' timestamp,\
  \ falling back to 'closed').\n"
