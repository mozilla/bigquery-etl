fields:
- name: fxa_server
  type: STRING
  mode: NULLABLE
- name: logName
  type: STRING
  mode: NULLABLE
  description: The resource name of the log to which this log entry belongs.
- name: resource
  type: RECORD
  mode: NULLABLE
  description: The monitored resource that produced this log entry.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: The monitored resource type. For example, the type of a Compute Engine
      VM instance is `gce_instance`.
  - name: labels
    type: RECORD
    mode: NULLABLE
    description: GCP resource metadata labels attached to the log entry by Cloud Logging.
    fields:
    - name: project_id
      type: STRING
      mode: NULLABLE
      description: GCP project ID of the log source.
    - name: cluster_name
      type: STRING
      mode: NULLABLE
      description: Kubernetes cluster name where the FxA service is running (e.g.,
        'fxa-prod').
    - name: namespace_name
      type: STRING
      mode: NULLABLE
      description: Kubernetes namespace of the pod that generated the log entry (e.g.,
        'fxa').
    - name: container_name
      type: STRING
      mode: NULLABLE
      description: Container name within the pod that generated the log entry.
    - name: pod_name
      type: STRING
      mode: NULLABLE
      description: Kubernetes pod name that generated the log entry.
    - name: location
      type: STRING
      mode: NULLABLE
      description: GCP region of the log source (e.g., 'us-west1').
- name: textPayload
  type: STRING
  mode: NULLABLE
  description: The log entry payload, represented as a Unicode string (UTF-8).
- name: jsonPayload
  type: RECORD
  mode: NULLABLE
  description: The log entry payload, represented as a structure that is expressed
    as a JSON object.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: Log entry type classifier (e.g., 'amplitudeEvent').
  - name: fields
    type: RECORD
    mode: NULLABLE
    description: Application-level structured event data from the FxA service.
    fields:
    - name: errno
      type: FLOAT
      mode: NULLABLE
      description: FxA error number. See FxA errno documentation for values (e.g.,
        102 for unknown account, 110 for invalid auth token).
    - name: path
      type: STRING
      mode: NULLABLE
      description: URL path of the request (e.g., '/v1/account/login').
    - name: method
      type: STRING
      mode: NULLABLE
      description: HTTP method associated with the request (e.g., 'GET', 'POST').
    - name: t
      type: FLOAT
      mode: NULLABLE
      description: Elapsed time in milliseconds for the operation.
    - name: traceid
      type: STRING
      mode: NULLABLE
    - name: remoteaddresschain
      type: STRING
      mode: NULLABLE
      description: Forwarding chain of client IP addresses from X-Forwarded-For headers.
    - name: keys
      type: BOOLEAN
      mode: NULLABLE
    - name: status
      type: FLOAT
      mode: NULLABLE
      description: HTTP or application status code for the event.
    - name: uid
      type: STRING
      mode: NULLABLE
      description: Raw FxA user identifier. Use `user_id` for the hashed version.
    - name: agent
      type: STRING
      mode: NULLABLE
      description: User agent string from the event payload.
    - name: domain
      type: STRING
      mode: NULLABLE
      description: Domain string associated with the event (e.g., an email domain).
    - name: template
      type: STRING
      mode: NULLABLE
      description: Email or notification template identifier (e.g., 'verifyEmail',
        'newDeviceLogin').
    - name: processingtimemillis
      type: FLOAT
      mode: NULLABLE
    - name: email
      type: STRING
      mode: NULLABLE
      description: Hashed or redacted email identifier associated with the event.
        Present only when the event is tied to a specific account action; null for
        anonymous or pre-login flows. Stored as raw bytes (hashed) in admin server
        tables. Not a raw email address.
    - name: templatename
      type: STRING
      mode: NULLABLE
    - name: currenttime
      type: FLOAT
      mode: NULLABLE
    - name: flowid
      type: STRING
      mode: NULLABLE
      description: Flow identifier. See top-level `flow_id`.
    - name: flowbegintime
      type: STRING
      mode: NULLABLE
      description: Unix epoch timestamp of when the authentication flow began.
    - name: type
      type: STRING
      mode: NULLABLE
      description: Event type classifier within the fields payload.
    - name: templateversion
      type: STRING
      mode: NULLABLE
      description: Email template version number.
    - name: locale
      type: STRING
      mode: NULLABLE
      description: BCP 47 locale string (e.g., 'en-US', 'fr-FR').
    - name: event
      type: STRING
      mode: NULLABLE
      description: Amplitude event name.
    - name: flow_id
      type: STRING
      mode: NULLABLE
      description: Flow identifier for the authentication or account creation session.
        See top-level `flow_id`.
    - name: time
      type: FLOAT
      mode: NULLABLE
      description: Event time as a Unix epoch milliseconds float.
    - name: flow_time
      type: FLOAT
      mode: NULLABLE
      description: Elapsed time in milliseconds within the current authentication
        flow.
    - name: lang
      type: STRING
      mode: NULLABLE
      description: Language code from the event payload. See `jsonPayload.fields.language`
        for the primary language field.
    - name: bouncesubtype
      type: STRING
      mode: NULLABLE
    - name: bouncetype
      type: STRING
      mode: NULLABLE
    - name: action
      type: STRING
      mode: NULLABLE
      description: Action type associated with the event.
    - name: bounce
      type: BOOLEAN
      mode: NULLABLE
    - name: diagnosticcode
      type: STRING
      mode: NULLABLE
    - name: user_properties
      type: STRING
      mode: NULLABLE
      description: Structured user properties for the amplitude event, as a JSON string.
    - name: app_version
      type: STRING
      mode: NULLABLE
      description: Firefox Accounts application version at the time of the event (e.g.,
        '152.1', '195.0').
    - name: language
      type: STRING
      mode: NULLABLE
      description: BCP 47 language tag for the user's locale at the time of the event
        (e.g., 'en-US', 'de').
    - name: device_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA device identifier, hex-encoded.
    - name: user_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA user identifier, hex-encoded.
    - name: event_type
      type: STRING
      mode: NULLABLE
      description: Event type string identifying the category of event (e.g., 'fxa_email
        - bounced', 'fxa_login - complete').
    - name: op
      type: STRING
      mode: NULLABLE
      description: Operation or action type associated with the event.
    - name: session_id
      type: STRING
      mode: NULLABLE
      description: Identifier for the user's FxA session, represented as an epoch
        millisecond timestamp.
    - name: event_properties
      type: STRING
      mode: NULLABLE
      description: Structured event properties for the amplitude event, as a JSON
        string.
    - name: err
      type: STRING
      mode: NULLABLE
      description: Error details associated with the event, if any.
    - name: bounced
      type: BOOLEAN
      mode: NULLABLE
    - name: missingflowid
      type: BOOLEAN
      mode: NULLABLE
    - name: stack
      type: STRING
      mode: NULLABLE
      description: Stack trace string. Populated on error events.
    - name: os_version
      type: STRING
      mode: NULLABLE
      description: Operating system version string from the event payload.
    - name: os_name
      type: STRING
      mode: NULLABLE
      description: Operating system name from the event payload (e.g., 'Windows',
        'iOS', 'Android').
    - name: region
      type: STRING
      mode: NULLABLE
      description: Geographic region associated with the event (e.g., 'California').
    - name: country
      type: STRING
      mode: NULLABLE
      description: Country associated with the event, as a full country name (e.g.,
        'United States').
    - name: service
      type: STRING
      mode: NULLABLE
