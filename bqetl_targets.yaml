# target_name:
#   project_id: moz-fx-data-shared-dev # or personal sandbox
#   dataset_prefix: dev_{{ account.username }}_{{ git.branch }}_{{ git.commit}}_ # optional prefix; git.branch, git.commit, artifact.project_id, and account.username are available

stage:
  project_id: moz-fx-data-integration-tests
  dataset: "{{ artifact.dataset_id }}_{{ artifact.project_id }}_{{ git.branch }}_{{ git.commit }}"
  # Stage is shared / CI: dry-run service accounts need read access, datasets
  # are ephemeral, and pytest runs against staged artifacts.
  grant_dryrun_access: true
  expire_after_hours: 12
  rewrite_tests: true
