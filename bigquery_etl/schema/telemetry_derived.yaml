  description: Whether automatic update downloads are enabled for this client. True if updates download automatically.
- name: update_background
  description: Whether background updates (downloading updates when Firefox is not running) are enabled. True if enabled.
- name: update_channel
  description: The Firefox update channel as reported by the environment (may include partner-specific suffixes, unlike normalized_channel).
- name: update_enabled
  description: Whether automatic updates are enabled for this client. True if update checks are active.
- name: user_pref_app_shield_optoutstudies_enabled
  description: User preference controlling whether the client participates in Shield studies ('true'/'false' as string). Null if not explicitly set.
- name: user_pref_browser_newtabpage_enabled
  description: User preference controlling whether the Firefox new tab page is enabled ('true'/'false' as string). Null if not explicitly set.
- name: user_pref_browser_search_region
  description: The client's configured browser search region code (e.g., 'US', 'DE'), used to determine region-specific default search settings.
- name: user_pref_browser_search_suggest_enabled
  description: User preference controlling whether search suggestions appear in the URL bar ('true'/'false' as string). Null if not explicitly set.
- name: user_pref_browser_urlbar_quicksuggest_data_collection_enabled
  description: User preference controlling whether interaction data with Firefox Suggest is collected ('true'/'false' as string).
- name: user_pref_browser_urlbar_quicksuggest_onboarding_dialog_choice
  description: The user's response to the Firefox Suggest onboarding dialog (e.g., 'close_1', 'not_now_2', 'reject_2'). Null if not shown.
- name: user_pref_browser_urlbar_show_search_suggestions_first
  description: User preference controlling whether search suggestions appear before browsing history in URL bar results ('false' if user disabled). Null if not set.
- name: user_pref_browser_urlbar_suggest_bestmatch
  description: The user's preference for showing Best Match results in the URL bar suggestions ('true' to enable). Null if not set.
- name: user_pref_browser_urlbar_suggest_quicksuggest
  description: User preference controlling whether Firefox Suggest (Quicksuggest) results appear in the URL bar. Null if not set.
- name: user_pref_browser_urlbar_suggest_quicksuggest_nonsponsored
  description: User preference controlling whether non-sponsored Firefox Suggest results appear in the URL bar ('true'/'false' as string).
- name: user_pref_browser_urlbar_suggest_quicksuggest_sponsored
  description: User preference controlling whether sponsored Firefox Suggest results appear in the URL bar ('true'/'false' as string).
- name: user_pref_browser_urlbar_suggest_searches
  description: User preference controlling whether URL bar search suggestions are shown ('true'/'false' as string). Null if not explicitly set.
- name: user_pref_browser_widget_in_navbar
  description: User preference controlling whether a specific widget is shown in the navigation bar ('true'/'false' as string). Null if not explicitly set.
- name: utility_crash_count
  description: Number of utility process crashes detected for this client on the submission date.
- name: vr_crash_count
  description: Number of VR process crashes detected for this client on the submission date.
- name: web_notification_shown_sum
  description: Total number of Web Notifications displayed to the user on the submission date.
- name: windows_ubr
  description: The Windows Update Build Revision number, identifying the specific cumulative update applied. Windows 10 and 11 only.
- name: scalar_aggregates.agg_type
  description: The aggregation type applied to the scalar values across subsessions (e.g., 'sum', 'max', 'mean').
- name: scalar_aggregates.key
  description: For keyed scalars, the string key identifying the specific sub-metric. Null for non-keyed scalars.
- name: scalar_aggregates.metric
  description: The name of the scalar metric being aggregated (e.g., 'browser_engagement_total_uri_count').
- name: scalar_aggregates.metric_type
  description: The type of the scalar metric (e.g., 'scalar', 'keyed-scalar').
- name: scalar_aggregates.process
  description: The Firefox process (e.g., 'parent', 'content', 'gpu') from which this scalar was collected.
- name: scalar_aggregates.value
  description: The aggregated scalar value computed according to agg_type for this metric on the submission date.
- name: days_interacted_bits
  description: A bitmask encoding the days (within the first 28) on which the client had at least one user interaction event.
- name: days_seen_bits
  description: A bitmask encoding the days (within the first 28) on which the client sent at least one ping. Bit 0 = first seen date, bit 27 = 27 days later.
- name: days_visited_1_uri_bits
  description: A bitmask encoding the days (within the first 28) on which the client visited at least 1 URI, indicating active browsing.
- name: app_display_version
  description: The user-visible version string of the Firefox application, which may include a suffix such as 'esr' (e.g. '140.11.0esr') (sampled 2026-05-29).
- name: channel
  description: The Firefox update channel as reported by the client (e.g. 'release', 'beta', 'nightly', 'esr'); may differ from normalized_channel for unrecognized
    values (sampled 2026-05-29).
- name: metadata
  description: A struct capturing which telemetry pings were observed for this client on or before first_seen_date, including which ping type was the source of the
    first-seen date.
- name: histogram_aggregates
  description: Array of per-metric histogram aggregates for this client, each describing one histogram probe across a specific process, key, and bucket configuration.
- name: histogram_aggregates.agg_type
  description: The aggregation method applied to the histogram values for each entry in histogram_aggregates; always 'summed_histogram' in this table.
- name: histogram_aggregates.first_bucket
  description: The lower bound of the first bucket in the histogram's bucket range for each entry in histogram_aggregates.
- name: histogram_aggregates.key
  description: An optional keyed-histogram key for each entry in histogram_aggregates; empty string for non-keyed histograms.
- name: histogram_aggregates.last_bucket
  description: The upper bound of the last bucket in the histogram's bucket range for each entry in histogram_aggregates.
- name: histogram_aggregates.latest_version
  description: The most recent Firefox major version observed for this client's histogram entry within histogram_aggregates, used to determine version currency.
- name: histogram_aggregates.metric
  description: The name of the telemetry histogram probe (e.g. 'network_dns_end_to_connect_start_exp_ms') for each entry in histogram_aggregates.
- name: histogram_aggregates.metric_type
  description: The histogram type for each entry in histogram_aggregates, e.g. 'histogram-exponential', 'histogram-enumerated', 'histogram-boolean', 'histogram-categorical',
    'histogram-linear', or 'histogram-count'.
- name: histogram_aggregates.num_buckets
  description: The total number of buckets in the histogram for each entry in histogram_aggregates.
- name: histogram_aggregates.process
  description: The Firefox process type from which the histogram was recorded (e.g. 'parent', 'content', 'gpu') for each entry in histogram_aggregates.
- name: join_key
  description: A composite string key used to join this table with clients_histogram_aggregates_v2; formed by concatenating client_id, os, app_version, app_build_id,
    and channel.
- name: histogram_aggregates.aggregates
  description: Repeated array of key-value pairs within each histogram_aggregates entry, where key is the histogram bucket index (as a string) and value is the aggregated
    count for that bucket across submissions.
- name: agg_type
  description: The client-level aggregation method; always 'summed_histogram', indicating that histogram bucket counts are summed across a client's submissions.
- name: first_bucket
  description: The lower bound of the first bucket in this histogram's bucket range.
- name: key
  description: The keyed-histogram key; empty string for non-keyed histograms. For keyed histograms, identifies the specific sub-metric (e.g. an add-on ID or a domain
    name).
- name: last_bucket
  description: The upper bound of the last bucket in this histogram's bucket range.
- name: metric
  description: The name of the telemetry histogram probe being aggregated (e.g. 'webext_extension_startup_ms_by_addonid').
- name: metric_type
  description: The histogram type, one of 'histogram-exponential', 'histogram-enumerated', 'histogram-boolean', 'histogram-categorical', 'histogram-linear', or 'histogram-count'.
- name: non_norm_record
  description: A struct holding the raw (non-normalized) bucket count for a single histogram bucket, where key is the bucket index as a string and value is the raw
    summed count across all clients.
- name: non_norm_record.key
  description: The histogram bucket index (as a string) within the non_norm_record struct.
- name: non_norm_record.value
  description: The raw (non-normalized) summed count for this histogram bucket within the non_norm_record struct, expressed as a float.
- name: num_buckets
  description: The total number of buckets in the histogram.
- name: process
  description: The Firefox process type from which the histogram was recorded, one of 'parent', 'content', or 'gpu'.
- name: record
  description: A struct holding the normalized (Dirichlet-smoothed) bucket count for a single histogram bucket, where key is the bucket index as a string and value
    is the aggregated normalized count across all clients.
- name: record.key
  description: The histogram bucket index (as a string) within the record struct.
- name: record.value
  description: The normalized (Dirichlet-smoothed) aggregated count for this histogram bucket within the record struct, expressed as a float.
- name: aggregates
  description: Repeated array of normalized (Dirichlet-smoothed) histogram bucket proportions, where key is the bucket index as a string and value is the population-level
    proportion for that bucket.
- name: aggregates.key
  description: The histogram bucket index as a string within the aggregates array.
- name: aggregates.value
  description: The Dirichlet-normalized proportion of clients in this bucket within the aggregates array; values sum to approximately 1.0 across all buckets for a
    given row.
- name: client_agg_type
  description: The aggregation type applied at the per-client level before population aggregation; always 'summed_histogram' in this table.
- name: non_norm_aggregates
  description: Repeated array of raw (non-normalized) histogram bucket counts, where key is the bucket index as a string and value is the summed raw count across
    all clients for that bucket.
- name: non_norm_aggregates.key
  description: The histogram bucket index as a string within the non_norm_aggregates array.
- name: non_norm_aggregates.value
  description: The raw (non-normalized) summed count for this bucket across all contributing clients within the non_norm_aggregates array.
- name: total_users
  description: The total number of clients contributing to this row's aggregated histogram, used as the denominator for normalized proportions.
- name: days_logged_event_bits
  description: A 28-bit integer bitmask representing the days in the last 28 days on which the client had at least one logged telemetry event; bit 0 (LSB) corresponds
    to submission_date and bit 27 to 27 days prior.
- name: days_used_pictureinpicture_bits
  description: A 28-bit integer bitmask representing the days in the last 28 days on which the client created at least one picture-in-picture window; bit 0 corresponds
    to submission_date.
- name: days_viewed_protection_report_bits
  description: A 28-bit integer bitmask representing the days in the last 28 days on which the client viewed the Privacy Protections report; bit 0 corresponds to
    submission_date.
- name: attribution.campaign
  description: Marketing campaign identifier that led to the Firefox download (e.g. 'SET_DEFAULT_BROWSER', '%2528not%2Bset%2529'); null when attribution is unavailable
    (sampled 2026-05-29).
- name: attribution.content
  description: Specific link or content identifier within a marketing campaign that drove the Firefox download; null when attribution is unavailable (sampled 2026-05-29).
- name: attribution.dlsource
  description: Identifier indicating where the Firefox installation originated (e.g. 'mozillaci', 'mozorg', 'fxdotcom'); null for ~52% of clients where attribution
    is unavailable (sampled 2026-05-29).
- name: attribution.dltoken
  description: Unique token assigned at Firefox download time to correlate the install with a specific download event; null when attribution is unavailable (sampled
    2026-05-29).
- name: attribution.experiment
  description: Funnel experiment parameter captured at Firefox download time; null when no experiment was active or attribution is unavailable (sampled 2026-05-29).
- name: attribution.medium
  description: Category of the marketing source that led to the Firefox download (e.g. 'referral', 'paidsearch', 'cpc'); null when attribution is unavailable (sampled
    2026-05-29).
- name: attribution.source
  description: Referring partner domain when the Firefox install originated via a known partner (e.g. 'www.google.com', 'www.bing.com'); null when attribution data
    is unavailable (sampled 2026-05-29).
- name: attribution.ua
  description: Derived user agent type of the browser used when downloading Firefox (e.g. 'edge', 'chrome', 'firefox'); null for ~68% of clients (sampled 2026-05-29).
- name: attribution.variation
  description: Funnel experiment variation parameter captured at Firefox download time (e.g. 'treatment', 'control'); null when no experiment was active (sampled
    2026-05-29).
- name: browser_backup_archive_enabled
  description: Whether the Firefox browser backup archiving feature is enabled; null for ~33% of clients (older Firefox versions) (sampled 2026-05-29).
- name: browser_backup_scheduler_enabled
  description: Whether the Firefox browser backup scheduler is enabled; null for ~43% of clients (older Firefox versions lacking this feature) (sampled 2026-05-29).
- name: days_created_profile_bits
  description: Bit-pattern integer indicating the days in the past 28 on which a new Firefox profile was created on the client; non-zero on profile-creation days
    (sampled 2026-05-29).
- name: days_had_8_active_ticks_bits
  description: Bit-pattern integer for the days in the past 28 on which the client accumulated at least 8 five-second activity ticks, indicating substantive browser
    engagement.
- name: days_opened_dev_tools_bits
  description: Bit-pattern integer for the days in the past 28 on which the client opened Firefox Developer Tools at least once (sampled 2026-05-29).
- name: days_visited_10_uri_bits
  description: Bit-pattern integer for the days in the past 28 on which the client visited at least 10 URIs, a stronger engagement signal than the 5-URI threshold
    (sampled 2026-05-29).
- name: days_visited_1_uri_normal_mode_bits
  description: Bit-pattern integer for the days in the past 28 on which the client visited at least 1 URI in a normal (non-private) browsing window (sampled 2026-05-29).
- name: days_visited_1_uri_private_mode_bits
  description: Bit-pattern integer for the days in the past 28 on which the client visited at least 1 URI in a private browsing window; null-equivalent 0 indicates
    no private browsing on that day (sampled 2026-05-29).
- name: days_visited_5_uri_bits
  description: Bit-pattern integer for the days in the past 28 on which the client visited at least 5 URIs, used as a lightweight engagement threshold (sampled 2026-05-29).
- name: app_build_id
  description: The build ID of the application, identifying the specific Firefox build. The sentinel value '*' indicates an aggregate across all build IDs.
- name: profile_date
  description: The date the client's profile was created, derived as the minimum observed profile creation date across all pings received for this client on the submission
    date.
- name: city
  description: City name derived from IP geolocation, indicating where the client is located. Null for ~17% of rows where city-level geolocation is unavailable.
- name: num_clients_active_atleastonce_in_last_28_days
  description: Count of cohort clients that were active at least once in the 28-day rolling window ending on submission_date, based on the days_seen_bits bitmap.
- name: num_clients_active_atleastonce_in_last_7_days
  description: Count of cohort clients that were active at least once in the 7-day window ending on submission_date, based on the days_seen_bits rolling activity
    bitmap.
- name: num_clients_active_on_day
  description: Count of cohort clients that were seen (days_seen_bits) on the submission_date. A client counts as active if they sent any ping on that day.
- name: num_clients_dau_active_atleastonce_in_last_28_days
  description: Count of cohort clients qualifying as DAU that were active at least once in the 28-day rolling window ending on submission_date, using the DAU activity
    bitmap.
- name: num_clients_dau_active_atleastonce_in_last_7_days
  description: Count of cohort clients qualifying as DAU that were active at least once in the 7-day window ending on submission_date, using the DAU-specific activity
    bitmap.
- name: num_clients_dau_on_day
  description: Count of cohort clients that qualify as Daily Active Users on the submission_date, requiring both a URI visit and user interaction (days_visited_1_uri_bits
    & days_interacted_bits).
- name: num_clients_dau_repeat_first_month_users
  description: Count of cohort clients qualifying as DAU that were active at any point in their first month, measured on the 28th day since first_seen_date. A DAU-qualified
    version of the first-month retention metric.
- name: num_clients_in_cohort
  description: The total number of clients in this cohort grouping (i.e., clients sharing the same first_seen_date and all dimension values). Represents the cohort
    size.
- name: num_clients_repeat_first_month_users
  description: Count of cohort clients that were active in the first 28 days after first_seen_date, counted only on the 28th day of the cohort window. Used as a first-month
    retention metric.
- name: os_version
  description: The truncated (major.minor) version of the operating system on which Firefox was installed, derived from the new-profile ping. Values follow OS-specific
    conventions such as '10' for Windows 10.
- name: build_id
  description: The Firefox build identifier at the time the new profile was created, in YYYYMMDDHHMMSS format. Identifies the exact build binary used for installation.
- name: country_name
  description: Full name of the country in which the new profile was created, as determined by IP geolocation and joined from the country_codes lookup table (e.g.
    'United States', 'Brazil').
- name: date
  description: The date on which the new Firefox profiles were created, derived from the submission_timestamp of the new-profile ping.
- name: days_active_bits
  description: A 28-bit integer bitmask representing the days the client was active in the 28-day window ending on submission_date; bit 0 corresponds to submission_date
    and higher bits to earlier days.
- name: dau
  description: Number of daily active users who opened this DevTools tool at least once on the submission_date, sampled from sample_id=42 of clients_daily and scaled
    accordingly.
- name: tool
  description: The name of the Firefox DevTools panel or tool (e.g., 'inspector', 'webconsole', 'jsdebugger', 'accessibility'); one row per tool per submission_date.
- name: label
  description: The label or bucket associated with the metric value, representing a specific ECH result or category (e.g., success, failure type).
- name: attribution_dltoken
  description: A unique download token assigned at Firefox download time to link installation events back to the original download source. Null for approximately
    70.6% of clients (sampled 2026-06-02).
- name: build_architecture
  description: The CPU architecture of the Firefox build that generated the event (e.g., 'x86-64', 'aarch64', 'x86'). The majority of submissions are 'x86-64' (sampled
    2026-06-02).
- name: event_category
  description: The telemetry event category, grouping related events by functional area (e.g., 'address', 'doh', 'normandy'). Observed top categories include 'address',
    'doh', 'session_restore' (sampled 2026-06-02).
- name: event_map_values
  description: A repeated key-value struct containing supplemental event metadata (e.g., source, trigger, networkID). Each entry in the array is one key-value pair
    for the event.
- name: event_map_values.key
  description: The key for each entry in the event_map_values array, identifying the type of supplemental metadata (e.g., 'source', 'trigger', 'networkID'). Top keys
    include 'source', 'trigger', 'networkID' (sampled 2026-06-02).
- name: event_map_values.value
  description: The value for each entry in the event_map_values array, paired with the corresponding key to describe supplemental event context.
- name: event_method
  description: The telemetry event method, describing the action taken (e.g., 'detected', 'state', 'saw_toggle'). Top values include 'detected' and 'state' (sampled
    2026-06-02).
- name: event_object
  description: The telemetry event object, identifying the UI or browser element the action was performed on (e.g., 'nimbus_experiment', 'toggle', 'address_form').
    Top values include 'nimbus_experiment' and 'toggle' (sampled 2026-06-02).
- name: event_process
  description: The Firefox process type in which the event was recorded (e.g., 'parent', 'content', 'extension'). The majority of events originate in 'parent' (sampled
    2026-06-02).
- name: event_string_value
  description: An optional string value associated with the event, providing additional context such as an experiment ID or status string. Null for approximately
    25.7% of events (sampled 2026-06-02).
- name: event_timestamp
  description: Milliseconds elapsed since the session start at which the event was recorded on the client.
- name: experiments
  description: Array of active Nimbus/Normandy experiments the client was enrolled in at the time of the event. Each entry contains the experiment slug (key) and
    branch/enrollment_id/type (value).
- name: experiments.key
  description: The experiment slug (identifier) for each active experiment entry in the experiments array.
- name: experiments.value.branch
  description: The experiment branch the client was assigned to for each active experiment entry in the experiments array (e.g., 'control', 'treatment-a').
- name: experiments.value.enrollment_id
  description: A UUID identifying the specific enrollment of the client in the experiment for each entry in the experiments array. Null for approximately 99.5% of
    entries (sampled 2026-06-02).
- name: experiments.value.type
  description: The type of experiment system for each entry in the experiments array (e.g., 'nimbus-rollout', 'nimbus-nimbus', 'normandy-prefrollout') (sampled 2026-06-02).
- name: session_id
  description: A UUID identifying the browser session during which the event occurred, allowing session-level grouping of events.
- name: session_start_time
  description: The timestamp when the browser session started, in UTC, with minute precision.
- name: subsession_id
  description: A UUID identifying the specific subsession of the browser within a session; a new subsession starts when the environment changes.
- name: system_is_wow64
  description: Indicates whether the Firefox process is running under the WoW64 subsystem (64-bit Windows hosting a 32-bit process). Null for approximately 16.5%
    of clients; true for ~5% (sampled 2026-06-02).
- name: system_memory_mb
  description: Total RAM installed on the client machine in megabytes, as reported by the operating system (e.g., 8192, 16384) (sampled 2026-06-02).
- name: timestamp
  description: The ingestion timestamp when the telemetry server received the event ping.
- name: category
  description: The telemetry event category grouping related events by functional area (e.g., 'devtools.main', 'doh', 'addonsManager'). Null for rows representing
    only property-level indices.
- name: event
  description: The telemetry event name within its category, identifying the specific action recorded (e.g., 'trigger.reason', 'uptake.normandy'). Null for rows representing
    only property-level indices.
- name: event_properties
  description: Array of event property definitions for this event type, where each entry describes one known property key, its own compact index, and an array of
    observed values with their own sub-indices.
- name: event_properties.index
  description: The compact integer index assigned to this event property key within its parent event type, used for encoding in events_daily strings.
- name: event_properties.key
  description: The name of the event property key for each entry in the event_properties array (e.g., 'event_value', 'session_id', 'source').
- name: first_timestamp
  description: The earliest timestamp at which this event type (category + event combination) was first observed in the telemetry pipeline.
- name: index
  description: A compact string encoding of numeric_index using Unicode code points, used to represent the event type in compressed event strings stored in events_daily.
- name: numeric_index
  description: A stable integer index assigned to each unique event type (category + event pair) in ascending order of first occurrence, used for compact encoding
    in events_daily.
- name: branch
  description: Experiment branch the client is enrolled in (e.g. 'control', 'treatment-a', 'treatment-b'). Null for ~39% of rows, typically corresponding to experiment-level
    aggregates with no branch breakdown (sampled 2026-06-02).
- name: disqualification_count
  description: Number of disqualification events observed in this aggregation window, where a client was removed from an experiment due to rule failure.
- name: enroll_count
  description: Number of experiment enrollment events observed in this aggregation window for this experiment/branch/channel combination.
- name: enroll_failed_count
  description: Number of failed enrollment attempts observed in this aggregation window.
- name: experiment
  description: Unique slug identifier of the Nimbus or legacy experiment (e.g. 'desktop-address-autofill-spain-release-rollout'). Null in ~1.5% of rows (sampled 2026-06-02).
- name: exposure_count
  description: Number of experiment exposure events in this aggregation window, recording when a client actually encountered the experimental feature.
- name: graduate_count
  description: Number of experiment graduation events observed in this aggregation window, indicating a client successfully completed the experiment.
- name: unenroll_count
  description: Number of experiment unenrollment events observed in this aggregation window.
- name: unenroll_failed_count
  description: Number of failed unenrollment attempts observed in this aggregation window.
- name: update_count
  description: Number of experiment update events observed in this aggregation window.
- name: update_failed_count
  description: Number of failed experiment update attempts observed in this aggregation window.
- name: validation_failed_count
  description: Number of validation failure events in this aggregation window, where experiment metadata could not be validated against the manifest.
- name: ad_clicks_count
  description: Number of ad clicks on search results pages for enrolled experiment clients. Null for ~60.9% of rows (sampled 2026-06-02).
- name: search_with_ads_count
  description: Number of searches that included ads in the results, as recorded for enrolled experiment clients. Null for ~54.5% of rows (sampled 2026-06-02).
- name: experiment_id
  description: Unique slug identifier of the experiment (e.g. 'e10sCohort', 'smart-shortcuts-v4p1'). Covers both legacy and Nimbus experiments (sampled 2026-06-02).
- name: activitystream_highlight_clicks
  description: Number of Highlights section clicks on the Activity Stream page (sampled 2026-06-02).
- name: activitystream_organic_pocket_clicks
  description: Number of organic (non-sponsored) Pocket story clicks from the Activity Stream page (sampled 2026-06-02).
- name: activitystream_organic_topsite_clicks
  description: Number of clicks on organic (non-sponsored) Top Sites tiles from the Activity Stream page (sampled 2026-06-02).
- name: activitystream_pocket_clicks
  description: Total Pocket story clicks (sponsored + organic) from the Activity Stream page (sampled 2026-06-02).
- name: activitystream_reported_3rdparty_abouthome
  description: True if the client's about:home is served by a third-party new tab replacement. Null for ~99.4% of clients (sampled 2026-06-02).
- name: activitystream_reported_3rdparty_aboutnewtab
  description: True if the client's new tab page is served by a third-party extension. Null for ~99.4% of clients (sampled 2026-06-02).
- name: activitystream_reported_3rdparty_both
  description: True if both about:home and the new tab page are replaced by third-party extensions. Null for ~99.4% of clients (sampled 2026-06-02).
- name: activitystream_reported_highlights_off
  description: True if the client has disabled the Highlights section on the new tab page. Null for ~99.5% of clients (sampled 2026-06-02).
- name: activitystream_reported_newtab_search_off
  description: True if the client has disabled the search box on the new tab page via Activity Stream preferences. Null for ~99.5% of clients where no Activity Stream
    preference data exists (sampled 2026-06-02).
- name: activitystream_reported_pocket_off
  description: True if the client has disabled Pocket recommendations on the new tab page. Null for ~99.5% of clients (sampled 2026-06-02).
- name: activitystream_reported_sponsored_topsites_off
  description: True if the client has opted out of sponsored Top Sites on the new tab page. Null for ~99.5% of clients (sampled 2026-06-02).
- name: activitystream_reported_sponsored_topstories_off
  description: True if the client has opted out of sponsored Pocket top stories on the new tab page. Null for ~99.5% of clients (sampled 2026-06-02).
- name: activitystream_reported_topsites_off
  description: True if the client has disabled Top Sites on the new tab page via Activity Stream preferences. Null for ~99.5% of clients (sampled 2026-06-02).
- name: activitystream_sessions_abouthome
