fields:
- name: additional_properties
  type: STRING
  mode: NULLABLE
  description: A JSON string containing any payload properties not present in the
    schema
- name: client_info
  type: RECORD
  mode: NULLABLE
  fields:
  - name: android_sdk_version
    type: STRING
    mode: NULLABLE
    description: The optional Android specific SDK version of the software running
      on this hardware device.
  - name: app_build
    type: STRING
    mode: NULLABLE
    description: The build identifier generated by the CI system (e.g. "1234/A").
      For language bindings that provide automatic detection for this value, (e.g.
      Android/Kotlin), in the unlikely event that the build identifier can not be
      retrieved from the OS, it is set to "inaccessible". For other language bindings,
      if the value was not provided through configuration, this metric gets set to
      `Unknown`.
  - name: app_channel
    type: STRING
    mode: NULLABLE
    description: The channel the application is being distributed on.
  - name: app_display_version
    type: STRING
    mode: NULLABLE
    description: The user visible version string (e.g. "1.0.3").  In the unlikely
      event that the display version can not be retrieved, it is set to "inaccessible".
  - name: architecture
    type: STRING
    mode: NULLABLE
    description: The architecture of the device, (e.g. "arm", "x86").
  - name: attribution
    type: RECORD
    mode: NULLABLE
    fields:
    - name: campaign
      type: STRING
      mode: NULLABLE
      description: The attribution campaign (e.g. 'mozilla-org').
    - name: content
      type: STRING
      mode: NULLABLE
      description: The attribution content (e.g. 'firefoxview').
    - name: medium
      type: STRING
      mode: NULLABLE
      description: The attribution medium (e.g. 'organic' for a search engine).
    - name: source
      type: STRING
      mode: NULLABLE
      description: The attribution source (e.g. 'google-play').
    - name: term
      type: STRING
      mode: NULLABLE
      description: The attribution term (e.g. 'browser with developer tools for android').
    - name: ext
      type: JSON
      mode: NULLABLE
  - name: build_date
    type: STRING
    mode: NULLABLE
    description: The date & time the application was built
  - name: client_id
    type: STRING
    mode: NULLABLE
    description: A UUID uniquely identifying the client.
  - name: device_manufacturer
    type: STRING
    mode: NULLABLE
    description: The manufacturer of the device the application is running on. Not
      set if the device manufacturer can't be determined (e.g. on Desktop).
  - name: device_model
    type: STRING
    mode: NULLABLE
    description: The model of the device the application is running on. On Android,
      this is Build.MODEL, the user-visible marketing name, like "Pixel 2 XL". Not
      set if the device model can't be determined (e.g. on Desktop).
  - name: distribution
    type: RECORD
    mode: NULLABLE
    fields:
    - name: name
      type: STRING
      mode: NULLABLE
      description: The distribution name (e.g. 'MozillaOnline').
    - name: ext
      type: JSON
      mode: NULLABLE
  - name: first_run_date
    type: STRING
    mode: NULLABLE
    description: The date of the first run of the application.
  - name: locale
    type: STRING
    mode: NULLABLE
    description: The locale of the application during initialization (e.g. "es-ES").
      If the locale can't be determined on the system, the value is ["und"](https://unicode.org/reports/tr35/#Unknown_or_Invalid_Identifiers),
      to indicate "undetermined".
  - name: os
    type: STRING
    mode: NULLABLE
    description: 'The name of the operating system. Possible values: Android, iOS,
      Linux, Darwin, Windows, FreeBSD, NetBSD, OpenBSD, Solaris, unknown'
  - name: os_version
    type: STRING
    mode: NULLABLE
    description: The user-visible version of the operating system (e.g. "1.2.3").
      If the version detection fails, this metric gets set to `Unknown`.
  - name: session_count
    type: INTEGER
    mode: NULLABLE
    description: An optional running counter of the number of sessions for a client.
  - name: session_id
    type: STRING
    mode: NULLABLE
    description: An optional UUID uniquely identifying the client's current session.
  - name: telemetry_sdk_build
    type: STRING
    mode: NULLABLE
    description: The version of the Glean SDK
  - name: windows_build_number
    type: INTEGER
    mode: NULLABLE
    description: The optional Windows build number, reported by Windows (e.g. 22000)
      and not set for other platforms
- name: document_id
  type: STRING
  mode: NULLABLE
  description: The document ID specified in the URI when the client sent this message
- name: events
  type: RECORD
  mode: REPEATED
  fields:
  - name: category
    type: STRING
    mode: NULLABLE
  - name: extra
    type: RECORD
    mode: REPEATED
    fields:
    - name: key
      type: STRING
      mode: NULLABLE
    - name: value
      type: STRING
      mode: NULLABLE
  - name: name
    type: STRING
    mode: NULLABLE
  - name: timestamp
    type: INTEGER
    mode: NULLABLE
  - name: session
    type: RECORD
    mode: NULLABLE
    fields:
    - name: event_seq
      type: INTEGER
      mode: NULLABLE
      description: Per-session event counter, reset at each new session.
    - name: session_id
      type: STRING
      mode: NULLABLE
      description: The unique UUID for this session.
    - name: session_sample_rate
      type: FLOAT
      mode: NULLABLE
      description: The sampling rate in effect for this session.
    - name: session_seq
      type: INTEGER
      mode: NULLABLE
      description: Monotonically increasing session counter, persisted across restarts.
    - name: session_start_time
      type: STRING
      mode: NULLABLE
      description: Wall-clock timestamp at session start (RFC 3339). Absent on events
        from before this field was introduced.
    description: Session metadata attached to this event. Absent for out-of-session
      events and events from before sessions were introduced.
- name: metadata
  type: RECORD
  mode: NULLABLE
  fields:
  - name: geo
    type: RECORD
    mode: NULLABLE
    fields:
    - name: city
      type: STRING
      mode: NULLABLE
    - name: country
      type: STRING
      mode: NULLABLE
      description: An ISO 3166-1 alpha-2 country code
    - name: db_version
      type: STRING
      mode: NULLABLE
      description: The specific geo database version used for this lookup
    - name: subdivision1
      type: STRING
      mode: NULLABLE
      description: First major country subdivision, typically a state, province, or
        county
    - name: subdivision2
      type: STRING
      mode: NULLABLE
      description: Second major country subdivision; not applicable for most countries
    description: Results of a geographic lookup based on the client's IP address
  - name: header
    type: RECORD
    mode: NULLABLE
    fields:
    - name: date
      type: STRING
      mode: NULLABLE
      description: Date HTTP header
    - name: dnt
      type: STRING
      mode: NULLABLE
      description: DNT (Do Not Track) HTTP header
    - name: x_debug_id
      type: STRING
      mode: NULLABLE
      description: X-Debug-Id HTTP header
    - name: x_foxsec_ip_reputation
      type: STRING
      mode: NULLABLE
      description: X-Foxsec-IP-Reputation header (deprecated, https://mozilla-hub.atlassian.net/browse/DENG-10434)
    - name: x_lb_tags
      type: STRING
      mode: NULLABLE
      description: X-LB-Tags HTTP header
    - name: x_pingsender_version
      type: STRING
      mode: NULLABLE
      description: X-PingSender-Version HTTP header
    - name: x_source_tags
      type: STRING
      mode: NULLABLE
      description: X-Source-Tags HTTP header
    - name: x_telemetry_agent
      type: STRING
      mode: NULLABLE
      description: X-Telemetry-Agent HTTP header
    - name: parsed_date
      type: TIMESTAMP
      mode: NULLABLE
    - name: parsed_x_source_tags
      type: STRING
      mode: REPEATED
    - name: parsed_x_lb_tags
      type: RECORD
      mode: NULLABLE
      fields:
      - name: tls_version
        type: STRING
        mode: NULLABLE
      - name: tls_cipher_hex
        type: STRING
        mode: NULLABLE
    description: Headers included in the client's HTTP request
  - name: isp
    type: RECORD
    mode: NULLABLE
    fields:
    - name: db_version
      type: STRING
      mode: NULLABLE
      description: The specific geo ISP database version used for this lookup
    - name: name
      type: STRING
      mode: NULLABLE
      description: The name of the ISP associated with the client's IP address
    - name: organization
      type: STRING
      mode: NULLABLE
      description: The name of a specific business entity associated with the client's
        IP address when available; otherwise the ISP name
    description: Results of ISP lookup based on the client's IP address
  - name: user_agent
    type: RECORD
    mode: NULLABLE
    fields:
    - name: browser
      type: STRING
      mode: NULLABLE
    - name: os
      type: STRING
      mode: NULLABLE
    - name: version
      type: STRING
      mode: NULLABLE
    description: Parsed components of the client's user agent string
- name: metrics
  type: RECORD
  mode: NULLABLE
  fields:
  - name: boolean
    type: RECORD
    mode: NULLABLE
    fields:
    - name: installation_first_seen_admin_user
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether the installer is running from an elevated admin user

        '
    - name: installation_first_seen_default_path
      type: BOOLEAN
      mode: NULLABLE
      description: '(optional, present if installer_type is "full") Whether the default
        path was used

        '
    - name: installation_first_seen_from_msi
      type: BOOLEAN
      mode: NULLABLE
      description: '(optional, present if installer_type is "full") Whether this was
        an MSI install

        '
    - name: installation_first_seen_install_existed
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether there was already an install in this location

        '
    - name: installation_first_seen_other_inst
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether there was already any non-MSIX install on this system

        '
    - name: installation_first_seen_other_msix_inst
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether there was already any MSIX install on this system

        '
    - name: installation_first_seen_profdir_existed
      type: BOOLEAN
      mode: NULLABLE
      description: 'Whether the top-level profile directory existed

        '
    - name: installation_first_seen_silent
      type: BOOLEAN
      mode: NULLABLE
      description: '(optional, present if installer_type is "full") Whether this was
        a silent install

        '
  - name: labeled_counter
    type: RECORD
    mode: NULLABLE
    fields:
    - name: glean_error_invalid_label
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: INTEGER
        mode: NULLABLE
      description: 'Counts the number of times a metric was set with an invalid label.

        The labels are the `category.name` identifier of the metric.

        '
    - name: glean_error_invalid_overflow
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: INTEGER
        mode: NULLABLE
      description: 'Counts the number of times a metric was set a value that overflowed.

        The labels are the `category.name` identifier of the metric.

        '
    - name: glean_error_invalid_state
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: INTEGER
        mode: NULLABLE
      description: 'Counts the number of times a timing metric was used incorrectly.

        The labels are the `category.name` identifier of the metric.

        '
    - name: glean_error_invalid_value
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: INTEGER
        mode: NULLABLE
      description: 'Counts the number of times a metric was set to an invalid value.

        The labels are the `category.name` identifier of the metric.

        '
    - name: profiles_creation_place
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: INTEGER
        mode: NULLABLE
      description: "Tracking where profiles have been created.  The `legacy_forced`\
        \ refers to\nusage of `MOZ_LEGACY_HOME=1`\_while `legacy_existing` is for\
        \ the case an\nexisting legacy profile was detected. The `xdg_default` accounts\
        \ for lack\nof `XDG_CONFIG_HOME` value defaulting to `$HOME/.config` when\n\
        `xdg_config` refers to existing `XDG_CONFIG_HOME`.\n"
  - name: quantity
    type: RECORD
    mode: NULLABLE
    fields:
    - name: browser_engagement_profile_count
      type: INTEGER
      mode: NULLABLE
      description: 'Windows only count of the browser profiles on the current system.
        This

        counts profiles that have been used across all Windows user accounts on

        machine since this probe was added. The value persists across installs.

        A value of 0 is reported if there is an error determining the correct

        count. Unset on other platforms.

        '
    - name: startup_profile_count
      type: INTEGER
      mode: NULLABLE
      description: 'This records the number of known profiles after startup completes.
        This includes any profiles that were created during startup. This metric was
        generated to correspond to the Legacy Telemetry scalar startup.profile_count.

        '
  - name: string
    type: RECORD
    mode: NULLABLE
    fields:
    - name: glean_client_annotation_experimentation_id
      type: STRING
      mode: NULLABLE
      description: 'An experimentation identifier derived and provided by the application

        for the purpose of experimentation enrollment.

        '
    - name: installation_first_seen_failure_reason
      type: STRING
      mode: NULLABLE
      description: 'Only sent if unable to collect firstSeen data. Can have value
        "NotFoundError" if file not found or other values depending on the failure
        reason.

        '
    - name: installation_first_seen_installer_type
      type: STRING
      mode: NULLABLE
      description: 'The type of installer used to install Firefox. The value is one
        of "stub", "full", or "msix"

        '
    - name: installation_first_seen_version
      type: STRING
      mode: NULLABLE
      description: 'The application version installed by the installer (not necessarily
        the current version)

        '
    - name: profiles_source
      type: STRING
      mode: NULLABLE
      description: "The original creation source of the profile:\n  firstrun-created-default\n\
        \    Matches the meaning in startup.profile_selection_reason\n  firstrun-skipped-default\n\
        \    Matches the meaning in startup.profile_selection_reason\n  restart-skipped-default\n\
        \    Matches the meaning in startup.profile_selection_reason\n  cmdline\n\
        \    Created by the --createprofile command line argument\n  downgrade\n \
        \   Created from the profile downgrade UI\n  legacy\n    Created to support\
        \ versions of Firefox prior to 47\n  aboutprofiles\n    Created from about:profiles\n\
        \  profile-manager\n    Created from the legacy startup profile manager\n\
        \  selector-startup\n    Created from the selectable profiles profile selector\
        \ during startup\n  selector-runtime\n    Created from the selectable profiles\
        \ profile selector at runtime\n  profiles-panel\n    Created from the profiles\
        \ panel in the application menu\n  main-menu\n    Created from the OS main\
        \ menu\n  replace-last\n    Created when deleting the last profile in the\
        \ group of selectable profiles\n  reset\n    Created"
    - name: startup_profile_database_version
      type: STRING
      mode: NULLABLE
      description: 'The version of the profiles.ini database loaded during startup.
        A value of "0" is used to indicate that no file was present during startup.
        This metric was generated to correspond to the Legacy Telemetry scalar startup.profile_database_version.

        '
    - name: startup_profile_selection_reason
      type: STRING
      mode: NULLABLE
      description: "How the profile was selected during startup. One of the following\
        \ reasons:\n  unknown:\n    Generally should not happen, set as a default\
        \ in case no other reason\n    occured.\n  profile-manager:\n    The profile\
        \ was selected by the profile manager.\n  profile-selector:\n    The profile\
        \ was selected by the profile selector window.\n  profile-reset:\n    The\
        \ profile was selected for reset, normally this would mean a restart.\n  restart:\n\
        \    The user restarted the application, the same profile as previous will\n\
        \    be used.\n  argument-profile:\n    The profile was selected by the --profile\
        \ command line argument.\n  argument-p:\n    The profile was selected by the\
        \ -p command line argument.\n  firstrun-claimed-default:\n    A first run\
        \ of a dedicated profiles build chose the old default\n    profile to be the\
        \ default for this install.\n  firstrun-skipped-default:\n    A first run\
        \ of a dedicated profiles build skipped over the old default\n    profile\
        \ and created a new profile.\n  restart-claimed-default:\n    A first run\
        \ of a dedicate"
  - name: string_list
    type: RECORD
    mode: NULLABLE
    fields:
    - name: glean_ping_uploader_capabilities
      type: STRING
      mode: REPEATED
      description: 'The list of requested uploader capabilities for the ping this
        is sent in.

        Should be the same as the ones defined for that particular ping.


        This metric is only attached to a ping if it already contains other data.

        '
  - name: uuid
    type: RECORD
    mode: NULLABLE
    fields:
    - name: legacy_telemetry_client_id
      type: STRING
      mode: NULLABLE
      description: 'The client_id according to Telemetry.

        Might not always have a value due to being too early for it to have

        loaded.

        Value may be the canary client id `c0ffeec0-ffee-c0ff-eec0-ffeec0ffeec0`

        in pings near when the data upload pref is disabled (if Telemetry gets

        to go first), or between when a client_id has been removed and when it

        has been regenerated.

        Does not need to be sent in the Glean "deletion-request" ping.

        '
    - name: legacy_telemetry_profile_group_id
      type: STRING
      mode: NULLABLE
      description: 'The profile_group_id according to Telemetry.

        Might not always have a value due to being too early for it to have

        loaded.

        Does not need to be sent in the Glean "deletion-request" ping.

        '
- name: normalized_app_name
  type: STRING
  mode: NULLABLE
  description: Set to "Other" if this message contained an unrecognized app name
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: Set to "Other" if this message contained an unrecognized channel name
- name: normalized_country_code
  type: STRING
  mode: NULLABLE
  description: An ISO 3166-1 alpha-2 country code
- name: normalized_os
  type: STRING
  mode: NULLABLE
  description: Set to "Other" if this message contained an unrecognized OS name
- name: normalized_os_version
  type: STRING
  mode: NULLABLE
- name: ping_info
  type: RECORD
  mode: NULLABLE
  fields:
  - name: end_time
    type: STRING
    mode: NULLABLE
  - name: experiments
    type: RECORD
    mode: REPEATED
    fields:
    - name: key
      type: STRING
      mode: NULLABLE
    - name: value
      type: RECORD
      mode: NULLABLE
      fields:
      - name: branch
        type: STRING
        mode: NULLABLE
      - name: extra
        type: RECORD
        mode: NULLABLE
        fields:
        - name: enrollment_id
          type: STRING
          mode: NULLABLE
        - name: type
          type: STRING
          mode: NULLABLE
  - name: ping_type
    type: STRING
    mode: NULLABLE
  - name: reason
    type: STRING
    mode: NULLABLE
  - name: seq
    type: INTEGER
    mode: NULLABLE
  - name: server_knobs_config
    type: RECORD
    mode: NULLABLE
    fields:
    - name: event_threshold
      type: INTEGER
      mode: NULLABLE
      description: Optional threshold for event buffering before an events ping is
        collected and submitted
    - name: metrics_enabled
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: BOOLEAN
        mode: NULLABLE
      description: Map of metric identifiers (category.name) to boolean values indicating
        whether the metric is enabled
    - name: pings_enabled
      type: RECORD
      mode: REPEATED
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
      - name: value
        type: BOOLEAN
        mode: NULLABLE
      description: Map of ping names to boolean values indicating whether the ping
        is enabled
    description: The Server Knobs configuration applied via applyServerKnobsConfig.
      Contains the complete configuration including metrics_enabled, pings_enabled,
      and event_threshold settings.
  - name: start_time
    type: STRING
    mode: NULLABLE
  - name: parsed_start_time
    type: TIMESTAMP
    mode: NULLABLE
  - name: parsed_end_time
    type: TIMESTAMP
    mode: NULLABLE
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: Hashed version of client_id (if present) useful for partitioning; ranges
    from 0 to 99
- name: submission_timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: Time when the ingestion edge server accepted this message
- name: app_version_major
  type: NUMERIC
  mode: NULLABLE
- name: app_version_minor
  type: NUMERIC
  mode: NULLABLE
- name: app_version_patch
  type: NUMERIC
  mode: NULLABLE
- name: is_bot_generated
  type: BOOLEAN
  mode: NULLABLE
