- name: sponsored_pocket_impressed_visit_count
  type: INTEGER
  mode: NULLABLE
  description: Number of newtab visits during which at least one sponsored Pocket story was shown.
- name: sponsored_pocket_clicked_client_count
  type: INTEGER
  mode: NULLABLE
  description: Number of distinct clients who clicked a sponsored Pocket story on the newtab.
- name: sponsored_pocket_clicked_visit_count
  type: INTEGER
  mode: NULLABLE
  description: Number of newtab visits during which a sponsored Pocket story was clicked.
- name: organic_pocket_impressed_client_count
  type: INTEGER
  mode: NULLABLE
  description: Number of distinct clients who saw at least one organic (non-sponsored) Pocket story impression.
- name: organic_pocket_impressed_visit_count
  type: INTEGER
  mode: NULLABLE
  description: Number of newtab visits during which at least one organic Pocket story was shown.
- name: organic_pocket_clicked_client_count
  type: INTEGER
  mode: NULLABLE
  description: Number of distinct clients who clicked an organic Pocket story on the newtab.
- name: organic_pocket_clicked_visit_count
  type: INTEGER
  mode: NULLABLE
  description: Number of newtab visits during which an organic Pocket story was clicked.
- name: pocket_impressed_client_count
  type: INTEGER
  mode: NULLABLE
  description: Number of distinct clients who saw at least one Pocket story impression (sponsored or organic).
- name: pocket_impressed_visit_count
  type: INTEGER
  mode: NULLABLE
  description: Number of newtab visits during which at least one Pocket story was shown.
- name: pocket_clicked_client_count
  type: INTEGER
  mode: NULLABLE
  description: Number of distinct clients who clicked any Pocket story (sponsored or organic).
- name: pocket_clicked_visit_count
  type: INTEGER
  mode: NULLABLE
  description: Number of newtab visits during which any Pocket story was clicked.
- name: pocket_signed_in_client_count
  type: INTEGER
  mode: NULLABLE
  description: Number of distinct clients who were signed in to a Pocket account during their newtab visits.
- name: pocket_signed_in_visit_count
  type: INTEGER
  mode: NULLABLE
  description: Number of newtab visits where the client was signed in to a Pocket account.
