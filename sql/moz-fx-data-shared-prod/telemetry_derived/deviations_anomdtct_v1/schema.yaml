fields:
- name: date
  type: DATE
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: date
- name: metric
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: metric
- name: deviation
  type: FLOAT64
  mode: NULLABLE
  description: The deviation of the metric's observed value from its expected (forecast) value for the given date, as produced by the anomaly-detection
    model.
- name: ci_deviation
  type: FLOAT64
  mode: NULLABLE
  description: The deviation of the metric's observed value from the bounds of the forecast confidence interval; zero indicates the value fell within
    the expected confidence interval.
- name: geography
  type: STRING
  mode: NULLABLE
  description: The geographic region the metric is reported for (e.g. a country/region label or 'Worldwide').
