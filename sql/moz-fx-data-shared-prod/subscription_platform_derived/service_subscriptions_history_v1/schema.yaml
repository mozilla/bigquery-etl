fields:
- name: id
  type: STRING
  mode: NULLABLE
  description: |-
    History record ID.
- name: valid_from
  type: TIMESTAMP
  mode: NULLABLE
  description: |-
    Start of the time range this history record is considered valid for (inclusive).
- name: valid_to
  type: TIMESTAMP
  mode: NULLABLE
  description: |-
    End of the time range this history record is considered valid for (non-inclusive).
    Open-ended history records will have this set to the max timestamp value (9999-12-31 23:59:59.999999).
- name: logical_subscriptions_history_id
  type: STRING
  mode: NULLABLE
  description: |-
    ID of the `logical_subscriptions_history_v1` record this history record was derived from.
- name: subscription
  type: RECORD
  mode: NULLABLE
  description: |-
    The service subscription as it ostensibly was during the time range this history record is considered valid for.
  fields: !flatten-lists
  - name: id
    type: STRING
    mode: NULLABLE
    description: |-
      Service subscription ID.
  - !include-fields
    table: moz-fx-data-shared-prod.subscription_platform_derived.logical_subscriptions_history_v1
    parent_field: subscription
    field_names:
    - provider
    - payment_provider
  - name: logical_subscription_id
    type: STRING
    mode: NULLABLE
    description: |-
      ID of the associated logical subscription this service subscription was derived from.
  - !include-fields
    table: moz-fx-data-shared-prod.subscription_platform_derived.logical_subscriptions_history_v1
    parent_field: subscription
    field_names:
    - provider_subscription_id
    - provider_subscription_item_id
    - provider_subscription_created_at
    - provider_subscription_updated_at
    - provider_customer_id
    - mozilla_account_id
    - mozilla_account_id_sha256
  - name: customer_logical_subscription_number
    type: INTEGER
    mode: NULLABLE
    description: |-
      Number of the associated logical subscription in the overall sequence of all of the customer's logical subscriptions.
      For example, this should be `1` for their first logical subscription, `2` for their second logical subscription, etc.
  - name: customer_service_subscription_number
    type: INTEGER
    mode: NULLABLE
    description: |-
      Number of this service subscription in the overall sequence of all of the customer's service subscriptions to this service.
      For example, this should be `1` for their first service subscription to this service, `2` for their second service subscription to this service, etc.
  - !include-fields
    table: moz-fx-data-shared-prod.subscription_platform_derived.logical_subscriptions_history_v1
    parent_field: subscription
    field_names:
    - country_code
    - country_name
  - name: service
    type: RECORD
    mode: NULLABLE
    description: |-
      The service provided by the subscription, as defined in the `services_v1` ETL.
    fields:
    - name: id
      type: STRING
      mode: NULLABLE
      description: |-
        Service ID.
    - name: name
      type: STRING
      mode: NULLABLE
      description: |-
        Service name.
    - name: tier
      type: STRING
      mode: NULLABLE
      description: |-
        Service tier.
  - name: other_services
    type: RECORD
    mode: REPEATED
    description: |-
      Array of zero or more other services provided by the subscription, as defined in the `services_v1` ETL.
    fields:
    - name: id
      type: STRING
      mode: NULLABLE
      description: |-
        Other service ID.
    - name: name
      type: STRING
      mode: NULLABLE
      description: |-
        Other service name.
    - name: tier
      type: STRING
      mode: NULLABLE
      description: |-
        Other service tier.
  - !include-fields
    table: moz-fx-data-shared-prod.subscription_platform_derived.logical_subscriptions_history_v1
    parent_field: subscription
    field_names:
    - provider_product_id
    - product_name
    - provider_plan_id
    - plan_summary
    - plan_interval
    - plan_interval_type
    - plan_interval_count
    - plan_interval_months
    - plan_currency
    - plan_amount
    - is_bundle
    - is_trial
    - is_active
    - provider_status
  - name: logical_subscription_started_at
    type: TIMESTAMP
    mode: NULLABLE
    description: |-
      When the associated logical subscription started.
  - !include-fields
    table: moz-fx-data-shared-prod.subscription_platform_derived.logical_subscriptions_history_v1
    parent_field: subscription
    field_names:
    - started_at
    - ended_at
    - current_period_started_at
    - current_period_ends_at
    - auto_renew
    - auto_renew_disabled_at
    - initial_discount_name
    - initial_discount_promotion_code
    - current_period_discount_name
    - current_period_discount_promotion_code
    - current_period_discount_amount
    - ongoing_discount_name
    - ongoing_discount_promotion_code
    - ongoing_discount_amount
    - ongoing_discount_ends_at
    - has_refunds
    - has_fraudulent_charges
  - name: first_touch_attribution
    type: RECORD
    mode: NULLABLE
    description: |-
      First-touch attribution for the service subscription (if any).
      For Stripe subscriptions created by SubPlat 2 or earlier this will be the earliest (unbounded) attribution impression found in the SubPlat/FxA logs.
      This will be null for Stripe subscriptions created by SubPlat 3 (which launched in June 2025) or later (DENG-8885).
      This will be null for Google and Apple subscriptions.
    fields: !include-fields
      table: moz-fx-data-shared-prod.subscription_platform_derived.logical_subscriptions_history_v1
      parent_field: subscription.first_touch_attribution
  - name: last_touch_attribution
    type: RECORD
    mode: NULLABLE
    description: |-
      Last-touch attribution for the service subscription (if any).
      For Stripe subscriptions created by SubPlat 2 or earlier this will be the most recent (unbounded) attribution impression found in the SubPlat/FxA logs.
      For Stripe subscriptions created by SubPlat 3 (which launched in June 2025) or later this will be the attribution values stored by SubPlat (DENG-8885).
      This will be null for Google and Apple subscriptions.
    fields: !include-fields
      table: moz-fx-data-shared-prod.subscription_platform_derived.logical_subscriptions_history_v1
      parent_field: subscription.last_touch_attribution
  - name: ended_reason
    type: STRING
    mode: NULLABLE
    description: |-
      Reason why the subscription ended.
      Possible values:
        * `Admin Initiated` - An admin at Mozilla ended the subscription, either directly or by deleting the customer's Mozilla Account.
        * `Customer Initiated` - The customer ended their subscription, either directly or by turning off auto-renewal or deleting their Mozilla Account.
        * `Payment Failure` - The subscription was unable to auto-renew due to a payment failure.
        * `Downgrade` - The subscription ended due to the customer moving to a lower tier subscription.
        * `Other` - The subscription ended for some other reason, such as unverified Mozilla Accounts being automatically deleted.
  - name: started_reason
    type: STRING
    mode: NULLABLE
    description: |-
      Reason why the subscription started.
      Possible values:
        * `New Customer` - A new customer started their first subscription to this service.
        * `New Customer Trial` - A new customer started their first subscription to this service and it is a trial plan.
        * `Returning Customer` - A customer started a subsequent subscription to this service.
        * `Returning Customer Trial` - A customer started a subsequent subscription to this service and it is a trial plan.
  - !include-fields
    table: moz-fx-data-shared-prod.subscription_platform_derived.logical_subscriptions_history_v1
    parent_field: subscription
    field_names:
    - payment_method
