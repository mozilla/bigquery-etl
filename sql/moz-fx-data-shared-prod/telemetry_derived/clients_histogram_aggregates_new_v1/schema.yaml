fields:
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: app_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- name: app_build_id
  type: STRING
  mode: NULLABLE
  description: 'The build identifier string for the application, encoding the date
    and time when the specific build was compiled (format: YYYYMMDDHHmmSS).'
- name: channel
  type: STRING
  mode: NULLABLE
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- name: join_key
  type: STRING
  mode: NULLABLE
  description: A synthetic composite key used for joining this table with downstream
    aggregation tables, formed by concatenating client_id, os, app_version, app_build_id,
    and channel.
- name: histogram_aggregates
  type: RECORD
  mode: REPEATED
  description: An array of aggregated histogram records for one or more metrics, each
    containing bucket configuration, metric metadata, process context, and the aggregated
    bucket counts. Used for rollup-level histogram analysis across clients and versions.
  fields:
  - name: first_bucket
    type: INTEGER
    mode: NULLABLE
    description: The lower bound of the first bucket in a histogram, defining the
      minimum value range captured by the histogram's first bin. Different histograms
      use different starting bucket sizes (e.g. 1, 50, 1024).
  - name: last_bucket
    type: INTEGER
    mode: NULLABLE
    description: The upper boundary value of the last bucket in a histogram distribution.
      This defines the maximum range of the histogram's final bin.
  - name: num_buckets
    type: INTEGER
    mode: NULLABLE
    description: The number of buckets in a histogram metric definition. This determines
      the granularity of the histogram and is part of the histogram's structural metadata.
  - name: latest_version
    type: INTEGER
    mode: NULLABLE
    description: The most recent major version number of the Firefox browser available
      or tracked at the time of the record. Used to compare client versions against
      the current release.
  - name: metric
    type: STRING
    mode: NULLABLE
    description: The name of the telemetry metric or histogram being recorded, such
      as 'gc_ms' or 'thread_wakeup'. Used to identify which specific measurement a
      row represents.
  - name: metric_type
    type: STRING
    mode: NULLABLE
    description: The collection methodology or storage format of the metric, such
      as 'histogram-exponential', 'scalar', or 'keyed-scalar'. Determines how the
      metric values should be interpreted and aggregated.
  - name: key
    type: STRING
    mode: NULLABLE
    description: "The aggregation key for the histogram metric \u2014 for a labeled\
      \ (keyed) histogram this is the label, otherwise empty."
  - name: process
    type: STRING
    mode: NULLABLE
    description: The Firefox process type from which a measurement or event originated,
      such as 'parent' (the main browser process), 'content' (a content renderer process),
      or 'gpu' (the GPU process).
  - name: agg_type
    type: STRING
    mode: NULLABLE
    description: The aggregation type used for the metric data, indicating how the
      underlying values were combined. The only observed value is 'histogram'.
  - name: aggregates
    type: RECORD
    mode: REPEATED
    description: A key-value map representing aggregated metric values, where each
      key identifies a histogram bucket or metric dimension and the value holds the
      corresponding aggregated numeric result.
    fields:
    - name: key
      type: STRING
      mode: NULLABLE
      description: The histogram bucket label (the bucket's lower bound) for this
        aggregated entry.
    - name: value
      type: INTEGER
      mode: NULLABLE
      description: The aggregated number of samples that fell into the corresponding
        histogram bucket across the client's submissions.
