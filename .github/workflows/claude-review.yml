name: Claude Code Review

on:
  # Trigger when PR is marked ready for review or updated
  pull_request:
    types: [ready_for_review, opened, synchronize, reopened]

  # Trigger on PR comments with @claude
  issue_comment:
    types: [created]

  # Trigger on PR review comments
  pull_request_review_comment:
    types: [created]

  # Trigger on PR review submissions
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    runs-on: ubuntu-latest

    # Security and draft PR filtering
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        (github.event_name == 'issue_comment' ||
         github.event_name == 'pull_request_review_comment' ||
         github.event_name == 'pull_request_review') &&
        github.event.issue.pull_request != null
      )

    permissions:
      contents: read
      pull-requests: write
      id-token: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Comment-based trigger configuration
          trigger_phrase: "@claude"

          # Progress tracking and sticky comments
          track_progress: true
          use_sticky_comment: true
          include_fix_links: false

          # Minimal prompt - start simple and iterate based on what Claude misses
          prompt: |
            Review this pull request for code quality, best practices, and potential issues.

            Focus on:
            - SQL query quality and BigQuery best practices
            - Security concerns
            - Breaking changes
            - Missing tests or documentation

          # Restrict tools for security and relevance
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"
            --max-turns 10
