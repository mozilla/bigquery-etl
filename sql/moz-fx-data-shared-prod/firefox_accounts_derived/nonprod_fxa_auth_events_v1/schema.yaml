fields:
- name: logName
  type: STRING
  mode: NULLABLE
  description: The resource name of the log to which this log entry belongs.
- name: resource
  type: RECORD
  mode: NULLABLE
  description: The monitored resource that produced this log entry.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: The monitored resource type. For example, the type of a Compute Engine
      VM instance is `gce_instance`.
  - name: labels
    type: RECORD
    mode: NULLABLE
    description: GCP resource metadata labels attached to the log entry by Cloud Logging.
    fields:
    - name: zone
      type: STRING
      mode: NULLABLE
      description: Availability zone of the resource.
    - name: instance_id
      type: STRING
      mode: NULLABLE
      description: Cloud instance identifier of the node that generated the log entry.
    - name: project_id
      type: STRING
      mode: NULLABLE
      description: GCP project ID of the log source.
- name: textPayload
  type: STRING
  mode: NULLABLE
  description: The log entry payload, represented as a Unicode string (UTF-8).
- name: jsonPayload
  type: RECORD
  mode: NULLABLE
  description: The log entry payload, represented as a structure that is expressed
    as a JSON object.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: Log entry type classifier (e.g., 'amplitudeEvent').
  - name: envversion
    type: STRING
    mode: NULLABLE
    description: Log envelope version used by the FxA logging framework.
  - name: severity
    type: FLOAT
    mode: NULLABLE
    description: Application-level numeric log severity from the FxA service payload,
      using syslog-style levels (6=informational, 2=critical). Distinct from the top-level
      Cloud Logging `severity` STRING field.
  - name: fields
    type: RECORD
    mode: NULLABLE
    description: Application-level structured event data from the FxA service.
    fields:
    - name: t
      type: FLOAT
      mode: NULLABLE
      description: Elapsed time in milliseconds for the operation.
    - name: errno
      type: FLOAT
      mode: NULLABLE
      description: FxA error number. See FxA errno documentation for values.
    - name: path
      type: STRING
      mode: NULLABLE
      description: URL path of the request.
    - name: keys
      type: BOOLEAN
      mode: NULLABLE
    - name: agent
      type: STRING
      mode: NULLABLE
      description: User agent string from the event payload.
    - name: email
      type: STRING
      mode: NULLABLE
      description: Hashed or redacted email identifier associated with the event.
        Present only when the event is tied to a specific account action; null for
        anonymous or pre-login flows. Stored as raw bytes (hashed) in admin server
        tables. Not a raw email address.
    - name: method
      type: STRING
      mode: NULLABLE
      description: HTTP method associated with the request.
    - name: uid
      type: STRING
      mode: NULLABLE
      description: Raw FxA user identifier. Use `user_id` for the hashed version.
    - name: remoteaddresschain
      type: STRING
      mode: NULLABLE
      description: Forwarding chain of client IP addresses from X-Forwarded-For headers.
    - name: lang
      type: STRING
      mode: NULLABLE
      description: Language code from the event payload. See `jsonPayload.fields.language`
        for the primary language field.
    - name: status
      type: FLOAT
      mode: NULLABLE
      description: HTTP or application status code for the event.
    - name: country
      type: STRING
      mode: NULLABLE
      description: Country associated with the event, as a full country name (e.g.,
        'United States').
    - name: service
      type: STRING
      mode: NULLABLE
      description: Service or relying party identifier associated with the event.
    - name: locale
      type: STRING
      mode: NULLABLE
      description: BCP 47 locale string.
    - name: region
      type: STRING
      mode: NULLABLE
      description: Geographic region associated with the event (e.g., 'California').
    - name: flowbegintime
      type: FLOAT
      mode: NULLABLE
      description: Unix epoch timestamp of when the authentication flow began.
    - name: flowtype
      type: STRING
      mode: NULLABLE
    - name: flow_time
      type: FLOAT
      mode: NULLABLE
      description: Elapsed time in milliseconds within the current authentication
        flow.
    - name: flowcompletesignal
      type: STRING
      mode: NULLABLE
    - name: flow_id
      type: STRING
      mode: NULLABLE
      description: Flow identifier for the authentication or account creation session.
        See top-level `flow_id`.
    - name: time
      type: FLOAT
      mode: NULLABLE
      description: Event time as a Unix epoch milliseconds float.
    - name: event
      type: STRING
      mode: NULLABLE
      description: Event name from the FxA service payload. In Amplitude-connected
        tables this is an Amplitude event name; in admin and log tables it is a service-level
        action name.
    - name: useragent
      type: STRING
      mode: NULLABLE
      description: Raw user agent string from the request.
    - name: emailcode
      type: STRING
      mode: NULLABLE
    - name: codes
      type: STRING
      mode: NULLABLE
    - name: skew
      type: FLOAT
      mode: NULLABLE
    - name: auth
      type: STRING
      mode: NULLABLE
    - name: type
      type: STRING
      mode: NULLABLE
      description: Event type classifier within the fields payload.
    - name: id
      type: STRING
      mode: NULLABLE
      description: Unique identifier for the event record.
    - name: missingflowid
      type: BOOLEAN
      mode: NULLABLE
    - name: context
      type: STRING
      mode: NULLABLE
      description: Context string for the event (OAuth flow context).
    - name: data
      type: STRING
      mode: NULLABLE
      description: Generic data field from the event payload.
    - name: success
      type: BOOLEAN
      mode: NULLABLE
      description: Indicates whether the operation succeeded; in some tables a count
        of successful operations associated with the event.
    - name: op
      type: STRING
      mode: NULLABLE
      description: Operation or action type associated with the event.
    - name: user_properties
      type: STRING
      mode: NULLABLE
      description: Structured user properties for the amplitude event, as a JSON string.
    - name: app_version
      type: STRING
      mode: NULLABLE
      description: Firefox Accounts application version at the time of the event (e.g.,
        '333.6').
    - name: event_properties
      type: STRING
      mode: NULLABLE
      description: Structured event properties for the amplitude event, as a JSON
        string.
    - name: event_type
      type: STRING
      mode: NULLABLE
      description: Event type string identifying the category of event (e.g., 'fxa_login
        - complete', 'fxa_email - sent').
    - name: isserver
      type: BOOLEAN
      mode: NULLABLE
    - name: _original
      type: STRING
      mode: NULLABLE
    - name: isboom
      type: BOOLEAN
      mode: NULLABLE
    - name: details
      type: STRING
      mode: NULLABLE
    - name: output
      type: STRING
      mode: NULLABLE
    - name: params
      type: STRING
      mode: NULLABLE
      description: Request parameters from the event.
    - name: payload
      type: STRING
      mode: NULLABLE
      description: Raw payload string from the event.
    - name: query
      type: STRING
      mode: NULLABLE
      description: URL query parameters associated with the request.
    - name: language
      type: STRING
      mode: NULLABLE
      description: BCP 47 language tag for the user's locale at the time of the event
        (e.g., 'en-US', 'de').
    - name: scope
      type: STRING
      mode: NULLABLE
    - name: client_id
      type: STRING
      mode: NULLABLE
      description: Client identifier for the relying party application that initiated
        the FxA authentication flow (e.g., Firefox Sync, Firefox Monitor). Null in
        tables where `clientid` is used instead.
    - name: template
      type: STRING
      mode: NULLABLE
      description: Email or notification template identifier.
    - name: headers
      type: STRING
      mode: NULLABLE
    - name: session_id
      type: FLOAT
      mode: NULLABLE
      description: Identifier for the user's FxA session, represented as an epoch
        millisecond timestamp.
    - name: domain
      type: STRING
      mode: NULLABLE
      description: Domain string associated with the event (e.g., an email domain).
    - name: templateversion
      type: FLOAT
      mode: NULLABLE
      description: Email template version number.
    - name: to
      type: STRING
      mode: NULLABLE
      description: Destination or recipient field.
    - name: lastaccesstimeenabled
      type: BOOLEAN
      mode: NULLABLE
    - name: mysql
      type: FLOAT
      mode: NULLABLE
    - name: ecosystemanonid
      type: STRING
      mode: NULLABLE
    - name: profilechangedat
      type: FLOAT
      mode: NULLABLE
      description: Unix epoch timestamp of the last profile change for the user.
    - name: verifiersetat
      type: FLOAT
      mode: NULLABLE
    - name: primaryemail
      type: STRING
      mode: NULLABLE
    - name: authsalt
      type: STRING
      mode: NULLABLE
    - name: _intboolfields
      type: STRING
      mode: NULLABLE
    - name: keyschangedat
      type: FLOAT
      mode: NULLABLE
    - name: metricsoptoutat
      type: STRING
      mode: NULLABLE
    - name: emails
      type: STRING
      mode: NULLABLE
    - name: lockedat
      type: STRING
      mode: NULLABLE
    - name: disabledat
      type: STRING
      mode: NULLABLE
    - name: verifierversion
      type: FLOAT
      mode: NULLABLE
    - name: wrapwrapkb
      type: STRING
      mode: NULLABLE
    - name: createdat
      type: FLOAT
      mode: NULLABLE
    - name: ka
      type: STRING
      mode: NULLABLE
    - name: emailverified
      type: FLOAT
      mode: NULLABLE
    - name: _uuidfields
      type: STRING
      mode: NULLABLE
    - name: normalizedemail
      type: STRING
      mode: NULLABLE
    - name: valid
      type: BOOLEAN
      mode: NULLABLE
    - name: reason
      type: STRING
      mode: NULLABLE
      description: Reason associated with the event.
    - name: verifyhash
      type: STRING
      mode: NULLABLE
    - name: securityevent
      type: STRING
      mode: NULLABLE
    - name: tokenid
      type: STRING
      mode: NULLABLE
    - name: verificationmethod
      type: STRING
      mode: NULLABLE
    - name: newsletters
      type: STRING
      mode: NULLABLE
    - name: flowid
      type: STRING
      mode: NULLABLE
      description: Flow identifier. See top-level `flow_id`.
    - name: recency
      type: STRING
      mode: NULLABLE
    - name: events
      type: FLOAT
      mode: NULLABLE
    - name: tokenverificationid
      type: STRING
      mode: NULLABLE
    - name: hasuid
      type: BOOLEAN
      mode: NULLABLE
    - name: hastoken
      type: BOOLEAN
      mode: NULLABLE
    - name: err
      type: STRING
      mode: NULLABLE
      description: Error details associated with the event, if any.
    - name: hasid
      type: BOOLEAN
      mode: NULLABLE
    - name: granttype
      type: STRING
      mode: NULLABLE
    - name: clientid
      type: STRING
      mode: NULLABLE
      description: Client identifier associated with the event.
    - name: os_version
      type: STRING
      mode: NULLABLE
      description: Operating system version string from the event payload.
    - name: os_name
      type: STRING
      mode: NULLABLE
      description: Operating system name from the event payload (e.g., 'Windows',
        'iOS', 'Android').
    - name: uaos
      type: STRING
      mode: NULLABLE
    - name: uabrowserversion
      type: STRING
      mode: NULLABLE
    - name: uaosversion
      type: STRING
      mode: NULLABLE
    - name: uabrowser
      type: STRING
      mode: NULLABLE
    - name: pushcallback
      type: STRING
      mode: NULLABLE
    - name: errcode
      type: STRING
      mode: NULLABLE
    - name: is_placeholder
      type: BOOLEAN
      mode: NULLABLE
    - name: enabled
      type: BOOLEAN
      mode: NULLABLE
    - name: productid
      type: STRING
      mode: NULLABLE
    - name: planid
      type: STRING
      mode: NULLABLE
    - name: notificationsubtype
      type: STRING
      mode: NULLABLE
    - name: originaltransactionid
      type: STRING
      mode: NULLABLE
      description: Original transaction identifier for subscription or payment events.
    - name: bundleid
      type: STRING
      mode: NULLABLE
    - name: notificationtype
      type: STRING
      mode: NULLABLE
    - name: renewalinfo
      type: STRING
      mode: NULLABLE
    - name: transactioninfo
      type: STRING
      mode: NULLABLE
    - name: device_model
      type: STRING
      mode: NULLABLE
      description: Device model associated with the event (e.g., 'iPhone', 'iPad').
    - name: body
      type: STRING
      mode: NULLABLE
      description: Request or response body.
    - name: error
      type: STRING
      mode: NULLABLE
      description: Error message or details associated with the event.
    - name: plan
      type: STRING
      mode: NULLABLE
    - name: subscriptionid
      type: STRING
      mode: NULLABLE
      description: Subscription identifier for subscription-related events.
    - name: numsessions
      type: FLOAT
      mode: NULLABLE
    - name: automatic_tax
      type: STRING
      mode: NULLABLE
    - name: purchase
      type: STRING
      mode: NULLABLE
    - name: token
      type: STRING
      mode: NULLABLE
    - name: code
      type: STRING
      mode: NULLABLE
      description: Code field from the event payload (e.g., OAuth authorization code,
        error code).
    - name: entrypoint
      type: STRING
      mode: NULLABLE
    - name: command
      type: STRING
      mode: NULLABLE
    - name: originaltransactionids
      type: STRING
      mode: NULLABLE
      description: Stringified list of original transaction identifiers.
    - name: message
      type: STRING
      mode: NULLABLE
      description: Log message from the event payload.
    - name: ipnmessage
      type: STRING
      mode: NULLABLE
    - name: customeruid
      type: STRING
      mode: NULLABLE
    - name: redirectto
      type: STRING
      mode: NULLABLE
    - name: msg
      type: STRING
      mode: NULLABLE
      description: Log message string from the structured event payload.
    - name: traceid
      type: STRING
      mode: NULLABLE
    - name: connlimit
      type: FLOAT
      mode: NULLABLE
    - name: dbpath
      type: STRING
      mode: NULLABLE
    - name: poolstats
      type: STRING
      mode: NULLABLE
      description: Database connection pool statistics as a JSON string, including
        pool UUID, connection limit, and active/free connection counts.
    - name: lastaccesstime
      type: FLOAT
      mode: NULLABLE
    - name: unblockcode
      type: STRING
      mode: NULLABLE
    - name: product_id
      type: STRING
      mode: NULLABLE
    - name: utm_medium
      type: STRING
      mode: NULLABLE
    - name: utm_campaign
      type: STRING
      mode: NULLABLE
    - name: plan_id
      type: STRING
      mode: NULLABLE
    - name: utm_source
      type: STRING
      mode: NULLABLE
    - name: utm_content
      type: STRING
      mode: NULLABLE
    - name: priceid
      type: STRING
      mode: NULLABLE
    - name: ipaddress
      type: STRING
      mode: NULLABLE
    - name: accountrecreated
      type: BOOLEAN
      mode: NULLABLE
    - name: isprimary
      type: FLOAT
      mode: NULLABLE
    - name: verifiedat
      type: STRING
      mode: NULLABLE
    - name: isverified
      type: FLOAT
      mode: NULLABLE
    - name: purchasetoken
      type: STRING
      mode: NULLABLE
      description: Google Play Store purchase token for in-app purchase events.
    - name: refresh_token
      type: STRING
      mode: NULLABLE
    - name: zip
      type: STRING
      mode: NULLABLE
    - name: client
      type: STRING
      mode: NULLABLE
    - name: utm_term
      type: STRING
      mode: NULLABLE
    - name: sender
      type: STRING
      mode: NULLABLE
    - name: senderos
      type: STRING
      mode: NULLABLE
    - name: sendertype
      type: STRING
      mode: NULLABLE
    - name: target
      type: STRING
      mode: NULLABLE
    - name: index
      type: FLOAT
      mode: NULLABLE
    - name: targettype
      type: STRING
      mode: NULLABLE
    - name: targetos
      type: STRING
      mode: NULLABLE
    - name: syscall
      type: STRING
      mode: NULLABLE
    - name: hostname
      type: STRING
      mode: NULLABLE
    - name: registered
      type: STRING
      mode: NULLABLE
    - name: param
      type: STRING
      mode: NULLABLE
      description: Parameter field from the event payload.
    - name: bodysize
      type: FLOAT
      mode: NULLABLE
    - name: stack
      type: STRING
      mode: NULLABLE
      description: Stack trace string. Populated on error events.
    - name: port
      type: FLOAT
      mode: NULLABLE
      description: Network port number associated with the request.
    - name: host
      type: STRING
      mode: NULLABLE
      description: Hostname of the server handling the request.
    - name: statuscode
      type: FLOAT
      mode: NULLABLE
      description: HTTP or application status code from the event payload.
    - name: provider
      type: STRING
      mode: NULLABLE
    - name: remaining
      type: FLOAT
      mode: NULLABLE
    - name: numberremaining
      type: FLOAT
      mode: NULLABLE
    - name: location
      type: STRING
      mode: NULLABLE
    - name: postalcode
      type: STRING
      mode: NULLABLE
    - name: countrycode
      type: STRING
      mode: NULLABLE
      description: Two-letter ISO 3166-1 country code associated with the event.
    - name: customerid
      type: STRING
      mode: NULLABLE
    - name: entrypoint_variation
      type: STRING
      mode: NULLABLE
    - name: entrypoint_experiment
      type: STRING
      mode: NULLABLE
    - name: lastseen
      type: STRING
      mode: NULLABLE
    - name: user_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA user identifier, hex-encoded.
    - name: device_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA device identifier, hex-encoded.
    - name: value
      type: STRING
      mode: NULLABLE
    - name: deviceid
      type: STRING
      mode: NULLABLE
    - name: invoiceid
      type: STRING
      mode: NULLABLE
      description: Invoice identifier for subscription billing events.
  - name: logger
    type: STRING
    mode: NULLABLE
    description: Name of the logger or component that emitted the log entry (e.g.,
      'fxa-auth-server', 'fxa-content-server', 'fxa-oauth-server'). Used to derive
      the top-level `fxa_server` field.
  - name: timestamp
    type: FLOAT
    mode: NULLABLE
    description: Application-level event timestamp as a Unix epoch nanoseconds float,
      as reported by the FxA service. Distinct from the top-level Cloud Logging `timestamp`.
  - name: pid
    type: FLOAT
    mode: NULLABLE
    description: Process ID of the FxA service instance that generated the log entry.
- name: timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the event described by the log entry occurred, as reported
    by the originating FxA service.
- name: receiveTimestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the log entry was received by Logging.
- name: severity
  type: STRING
  mode: NULLABLE
  description: The severity of the log entry. The default value is `LogSeverity.DEFAULT`.
- name: insertId
  type: STRING
  mode: NULLABLE
  description: A unique identifier for the log entry. Logging considers other log
    entries in the same project, with the same `timestamp`, and with the same `insertId`
    to be duplicates which are removed in a single query result.
- name: httpRequest
  type: RECORD
  mode: NULLABLE
  description: Information about the HTTP request associated with this log entry,
    if applicable.
  fields:
  - name: requestMethod
    type: STRING
    mode: NULLABLE
    description: 'The request method. Examples: "GET", "HEAD", "PUT", "POST".'
  - name: requestUrl
    type: STRING
    mode: NULLABLE
    description: The scheme (http, https), the host name, the path and the query portion
      of the URL that was requested.
  - name: requestSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP request message in bytes, including the request
      headers and the request body.
  - name: status
    type: INTEGER
    mode: NULLABLE
    description: 'The response code indicating the status of response. Examples: 200,
      404.'
  - name: responseSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP response message sent back to the client, in
      bytes.
  - name: userAgent
    type: STRING
    mode: NULLABLE
    description: The user agent sent by the client.
  - name: remoteIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the client that issued the HTTP
      request.
  - name: serverIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the origin server that the request
      was sent to.
  - name: referer
    type: STRING
    mode: NULLABLE
    description: The referer URL of the request, as defined in HTTP/1.1 Header Field
      Definitions.
  - name: cacheLookup
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not a cache lookup was attempted.
  - name: cacheHit
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not an entity was served from cache (with or without validation).
  - name: cacheValidatedWithOriginServer
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not the response was validated with the origin server
      before being served from cache. This field is only meaningful if `cacheHit`
      is True.
  - name: cacheFillBytes
    type: INTEGER
    mode: NULLABLE
    description: The number of HTTP response bytes inserted into cache. Set only when
      a cache fill was attempted.
  - name: protocol
    type: STRING
    mode: NULLABLE
    description: 'Protocol used for the request. Examples: "HTTP/1.1", "HTTP/2".'
- name: labels
  type: RECORD
  mode: NULLABLE
  description: A map of key, value pairs that provides additional information about
    the log entry.
  fields:
  - name: compute_googleapis_com_resource_name
    type: STRING
    mode: NULLABLE
    description: GCP Compute resource name (compute.googleapis.com/resource_name),
      identifying the VM or node that generated the log entry.
  - name: env
    type: STRING
    mode: NULLABLE
    description: Deployment environment label.
  - name: stack
    type: STRING
    mode: NULLABLE
    description: Stack label from the log metadata.
  - name: type
    type: STRING
    mode: NULLABLE
    description: Type label from the log metadata indicating the log source category.
  - name: application
    type: STRING
    mode: NULLABLE
    description: Application label identifying the FxA application.
- name: operation
  type: RECORD
  mode: NULLABLE
  description: Information about an operation associated with the log entry, if applicable.
  fields:
  - name: id
    type: STRING
    mode: NULLABLE
    description: An arbitrary operation identifier. Log entries with the same identifier
      are assumed to be part of the same operation.
  - name: producer
    type: STRING
    mode: NULLABLE
    description: An arbitrary producer identifier. The combination of `id` and `producer`
      must be globally unique.
  - name: first
    type: BOOLEAN
    mode: NULLABLE
    description: Set this to True if this is the first log entry in the operation.
  - name: last
    type: BOOLEAN
    mode: NULLABLE
    description: Set this to True if this is the last log entry in the operation.
- name: trace
  type: STRING
  mode: NULLABLE
  description: The trace ID being written to Cloud Trace in association with this
    log entry.
- name: spanId
  type: STRING
  mode: NULLABLE
  description: The ID of the Cloud Trace span associated with the current operation
    in which the log is being written.
- name: traceSampled
  type: BOOLEAN
  mode: NULLABLE
  description: The sampling decision of the span associated with the log entry at
    the time the log entry was created.
- name: sourceLocation
  type: RECORD
  mode: NULLABLE
  description: Source code location information associated with the log entry, if
    any.
  fields:
  - name: file
    type: STRING
    mode: NULLABLE
    description: Source file name. Depending on the runtime environment, this might
      be a simple name or a fully-qualified name.
  - name: line
    type: INTEGER
    mode: NULLABLE
    description: Line within the source file. 1-based; 0 indicates no line number
      available.
  - name: function
    type: STRING
    mode: NULLABLE
    description: Human-readable name of the function or method being invoked, with
      optional context such as the class or package name.
- name: split
  type: RECORD
  mode: NULLABLE
  description: Information indicating this LogEntry is part of a sequence of multiple
    log entries split from a single LogEntry.
  fields:
  - name: uid
    type: STRING
    mode: NULLABLE
    description: A globally unique identifier for all log entries in a sequence of
      split log entries.
  - name: index
    type: INTEGER
    mode: NULLABLE
    description: The index of this LogEntry in the sequence of split log entries.
  - name: totalSplits
    type: INTEGER
    mode: NULLABLE
    description: The total number of log entries that the original LogEntry was split
      into.
