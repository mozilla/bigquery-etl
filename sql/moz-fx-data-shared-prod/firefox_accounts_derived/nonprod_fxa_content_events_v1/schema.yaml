fields:
- name: logName
  type: STRING
  mode: NULLABLE
  description: The resource name of the log to which this log entry belongs.
- name: resource
  type: RECORD
  mode: NULLABLE
  description: The monitored resource that produced this log entry.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: The monitored resource type. For example, the type of a Compute Engine
      VM instance is `gce_instance`.
  - name: labels
    type: RECORD
    mode: NULLABLE
    description: GCP resource metadata labels attached to the log entry by Cloud Logging.
    fields:
    - name: zone
      type: STRING
      mode: NULLABLE
      description: Availability zone of the resource (e.g., 'us-west-1').
    - name: project_id
      type: STRING
      mode: NULLABLE
      description: GCP project ID of the log source.
    - name: instance_id
      type: STRING
      mode: NULLABLE
      description: Cloud instance identifier of the node that generated the log entry
        (e.g., 'i-xxxxxxxxxxxxxxxxx').
    - name: namespace_name
      type: STRING
      mode: NULLABLE
      description: Kubernetes namespace of the pod that generated the log entry (e.g.,
        'fxa').
    - name: location
      type: STRING
      mode: NULLABLE
      description: GCP region of the log source (e.g., 'us-west1').
    - name: pod_name
      type: STRING
      mode: NULLABLE
      description: Kubernetes pod name that generated the log entry.
    - name: container_name
      type: STRING
      mode: NULLABLE
      description: Container name within the pod that generated the log entry.
    - name: cluster_name
      type: STRING
      mode: NULLABLE
      description: Kubernetes cluster name where the FxA service is running (e.g.,
        'fxa-prod').
- name: textPayload
  type: STRING
  mode: NULLABLE
  description: The log entry payload, represented as a Unicode string (UTF-8).
- name: jsonPayload
  type: RECORD
  mode: NULLABLE
  description: The log entry payload, represented as a structure that is expressed
    as a JSON object.
  fields:
  - name: envversion
    type: STRING
    mode: NULLABLE
    description: Log envelope version used by the FxA logging framework.
  - name: type
    type: STRING
    mode: NULLABLE
    description: Log entry type classifier (e.g., 'amplitudeEvent').
  - name: timestamp
    type: FLOAT
    mode: NULLABLE
    description: Application-level event timestamp as a Unix epoch nanoseconds float,
      as reported by the FxA service. Distinct from the top-level Cloud Logging `timestamp`.
  - name: severity
    type: FLOAT
    mode: NULLABLE
    description: Application-level numeric log severity from the FxA service payload,
      using syslog-style levels (6=informational, 2=critical). Distinct from the top-level
      Cloud Logging `severity` STRING field.
  - name: pid
    type: FLOAT
    mode: NULLABLE
    description: Process ID of the FxA service instance that generated the log entry.
  - name: fields
    type: RECORD
    mode: NULLABLE
    description: Application-level structured event data from the FxA service.
    fields:
    - name: status
      type: STRING
      mode: NULLABLE
      description: HTTP or application status code for the event.
    - name: useragent
      type: STRING
      mode: NULLABLE
      description: Raw user agent string from the request.
    - name: method
      type: STRING
      mode: NULLABLE
      description: HTTP method associated with the request (e.g., 'GET', 'POST').
    - name: contentlength
      type: STRING
      mode: NULLABLE
      description: HTTP Content-Length header value in bytes.
    - name: path
      type: STRING
      mode: NULLABLE
      description: URL path of the request (e.g., '/v1/account/login').
    - name: t
      type: STRING
      mode: NULLABLE
      description: Elapsed time in milliseconds for the operation.
    - name: clientaddress
      type: STRING
      mode: NULLABLE
      description: Client IP address as logged by the FxA service.
    - name: remoteaddresschain
      type: STRING
      mode: NULLABLE
      description: Forwarding chain of client IP addresses from X-Forwarded-For headers.
    - name: referer
      type: STRING
      mode: NULLABLE
      description: HTTP referer URL from the event payload.
    - name: event
      type: STRING
      mode: NULLABLE
      description: Amplitude event name.
    - name: context
      type: STRING
      mode: NULLABLE
      description: Context string for the event (e.g., OAuth flow context such as
        'fx_desktop_v3').
    - name: os_name
      type: STRING
      mode: NULLABLE
      description: Operating system name from the event payload (e.g., 'Windows',
        'iOS', 'Android').
    - name: app_version
      type: STRING
      mode: NULLABLE
      description: Firefox Accounts application version at the time of the event (e.g.,
        '152.1', '195.0').
    - name: time
      type: FLOAT
      mode: NULLABLE
      description: Event time as a Unix epoch milliseconds float.
    - name: op
      type: STRING
      mode: NULLABLE
      description: Operation or action type associated with the event.
    - name: user_properties
      type: STRING
      mode: NULLABLE
      description: Structured user properties for the amplitude event, as a JSON string.
    - name: session_id
      type: FLOAT
      mode: NULLABLE
      description: Identifier for the user's FxA session, represented as an epoch
        millisecond timestamp.
    - name: os_version
      type: STRING
      mode: NULLABLE
      description: Operating system version string from the event payload.
    - name: region
      type: STRING
      mode: NULLABLE
      description: Geographic region associated with the event (e.g., 'California').
    - name: language
      type: STRING
      mode: NULLABLE
      description: BCP 47 language tag for the user's locale at the time of the event
        (e.g., 'en-US', 'de').
    - name: country
      type: STRING
      mode: NULLABLE
      description: Country associated with the event, as a full country name (e.g.,
        'United States').
    - name: event_type
      type: STRING
      mode: NULLABLE
      description: Event type string identifying the category of event (e.g., 'fxa_email
        - bounced', 'fxa_login - complete').
    - name: event_properties
      type: STRING
      mode: NULLABLE
      description: Structured event properties for the amplitude event, as a JSON
        string.
    - name: msg
      type: STRING
      mode: NULLABLE
      description: Log message string from the structured event payload.
    - name: device_model
      type: STRING
      mode: NULLABLE
      description: Device model associated with the event (e.g., 'iPhone14,3', 'Pixel
        6').
    - name: agent
      type: STRING
      mode: NULLABLE
      description: User agent string from the event payload.
    - name: referrer
      type: STRING
      mode: NULLABLE
    - name: blocked
      type: STRING
      mode: NULLABLE
    - name: violated
      type: STRING
      mode: NULLABLE
    - name: source
      type: STRING
      mode: NULLABLE
    - name: line
      type: FLOAT
      mode: NULLABLE
    - name: column
      type: FLOAT
      mode: NULLABLE
    - name: sample
      type: STRING
      mode: NULLABLE
    - name: err
      type: STRING
      mode: NULLABLE
      description: Error details associated with the event, if any.
    - name: stack
      type: STRING
      mode: NULLABLE
      description: Stack trace string. Populated on error events.
    - name: error
      type: STRING
      mode: NULLABLE
      description: Error message or details associated with the event.
    - name: joierrors
      type: STRING
      mode: NULLABLE
      description: Joi schema validation error messages, populated when request validation
        fails.
    - name: user_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA user identifier, hex-encoded.
    - name: device_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA device identifier, hex-encoded.
    - name: config
      type: STRING
      mode: NULLABLE
      description: Configuration metadata associated with the event.
    - name: clientcapabilities
      type: STRING
      mode: NULLABLE
    - name: message
      type: STRING
      mode: NULLABLE
      description: Log message from the event payload.
    - name: messageid
      type: STRING
      mode: NULLABLE
    - name: clientid
      type: STRING
      mode: NULLABLE
      description: Client identifier associated with the event.
    - name: statuscode
      type: FLOAT
      mode: NULLABLE
      description: HTTP or application status code from the event payload.
    - name: response
      type: STRING
      mode: NULLABLE
      description: Response data associated with the event.
    - name: webhooks
      type: STRING
      mode: NULLABLE
    - name: changed
      type: STRING
      mode: NULLABLE
    - name: removed
      type: STRING
      mode: NULLABLE
    - name: directory
      type: STRING
      mode: NULLABLE
      description: Directory path from the event payload.
    - name: port
      type: FLOAT
      mode: NULLABLE
      description: Network port number associated with the request.
  - name: logger
    type: STRING
    mode: NULLABLE
    description: Name of the logger or component that emitted the log entry (e.g.,
      'fxa-auth-server', 'fxa-content-server').
  - name: op
    type: STRING
    mode: NULLABLE
    description: Operation type from the log payload.
  - name: flow_id
    type: STRING
    mode: NULLABLE
  - name: v
    type: FLOAT
    mode: NULLABLE
    description: Payload schema version number used by the FxA logging framework.
  - name: useragent
    type: STRING
    mode: NULLABLE
    description: User agent string from the log payload.
  - name: flow_time
    type: FLOAT
    mode: NULLABLE
  - name: region
    type: STRING
    mode: NULLABLE
  - name: hostname
    type: STRING
    mode: NULLABLE
    description: Hostname of the server or container that generated the log entry.
  - name: event
    type: STRING
    mode: NULLABLE
  - name: country
    type: STRING
    mode: NULLABLE
  - name: locale
    type: STRING
    mode: NULLABLE
  - name: service
    type: STRING
    mode: NULLABLE
  - name: context
    type: STRING
    mode: NULLABLE
  - name: entrypoint
    type: STRING
    mode: NULLABLE
  - name: utm_campaign
    type: STRING
    mode: NULLABLE
  - name: utm_medium
    type: STRING
    mode: NULLABLE
  - name: utm_source
    type: STRING
    mode: NULLABLE
  - name: utm_content
    type: STRING
    mode: NULLABLE
  - name: trace
    type: STRING
    mode: NULLABLE
    description: Distributed tracing identifier from the application log payload.
  - name: remote_addr
    type: STRING
    mode: NULLABLE
    description: Remote IP address of the client making the request.
  - name: request
    type: STRING
    mode: NULLABLE
    description: Full HTTP request line (method, path, protocol) from the log payload.
  - name: bytes_sent
    type: FLOAT
    mode: NULLABLE
    description: Number of bytes sent in the HTTP response.
  - name: log_type
    type: STRING
    mode: NULLABLE
    description: Log type classification for the FxA service event.
  - name: user_agent
    type: STRING
    mode: NULLABLE
    description: User agent string identifying the browser and OS making the request.
  - name: status
    type: STRING
    mode: NULLABLE
    description: HTTP or application status value from the log payload.
  - name: x_forwarded_for
    type: STRING
    mode: NULLABLE
    description: X-Forwarded-For header value containing the client IP and any intermediate
      proxy addresses.
  - name: request_time
    type: FLOAT
    mode: NULLABLE
    description: Time taken to process the request, in seconds.
  - name: remote_user
    type: STRING
    mode: NULLABLE
    description: Authenticated remote user identifier from the log payload.
  - name: x_forwarded_proto
    type: STRING
    mode: NULLABLE
    description: X-Forwarded-Proto header value indicating the originating protocol
      (e.g., 'https').
  - name: referrer
    type: STRING
    mode: NULLABLE
    description: HTTP referrer URL from the log payload.
  - name: proxy_host
    type: STRING
    mode: NULLABLE
- name: timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the event described by the log entry occurred, as reported
    by the originating FxA service.
- name: receiveTimestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the log entry was received by Logging.
- name: severity
  type: STRING
  mode: NULLABLE
  description: The severity of the log entry. The default value is `LogSeverity.DEFAULT`.
- name: insertId
  type: STRING
  mode: NULLABLE
  description: A unique identifier for the log entry. Logging considers other log
    entries in the same project, with the same `timestamp`, and with the same `insertId`
    to be duplicates which are removed in a single query result.
- name: httpRequest
  type: RECORD
  mode: NULLABLE
  description: Information about the HTTP request associated with this log entry,
    if applicable.
  fields:
  - name: requestMethod
    type: STRING
    mode: NULLABLE
    description: 'The request method. Examples: "GET", "HEAD", "PUT", "POST".'
  - name: requestUrl
    type: STRING
    mode: NULLABLE
    description: The scheme (http, https), the host name, the path and the query portion
      of the URL that was requested.
  - name: requestSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP request message in bytes, including the request
      headers and the request body.
  - name: status
    type: INTEGER
    mode: NULLABLE
    description: 'The response code indicating the status of response. Examples: 200,
      404.'
  - name: responseSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP response message sent back to the client, in
      bytes.
  - name: userAgent
    type: STRING
    mode: NULLABLE
    description: The user agent sent by the client.
  - name: remoteIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the client that issued the HTTP
      request.
  - name: serverIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the origin server that the request
      was sent to.
  - name: referer
    type: STRING
    mode: NULLABLE
    description: The referer URL of the request, as defined in HTTP/1.1 Header Field
      Definitions.
  - name: cacheLookup
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not a cache lookup was attempted.
  - name: cacheHit
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not an entity was served from cache (with or without validation).
  - name: cacheValidatedWithOriginServer
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not the response was validated with the origin server
      before being served from cache. This field is only meaningful if `cacheHit`
      is True.
  - name: cacheFillBytes
    type: INTEGER
    mode: NULLABLE
    description: The number of HTTP response bytes inserted into cache. Set only when
      a cache fill was attempted.
  - name: protocol
    type: STRING
    mode: NULLABLE
    description: 'Protocol used for the request. Examples: "HTTP/1.1", "HTTP/2".'
- name: labels
  type: RECORD
  mode: NULLABLE
  description: A map of key, value pairs that provides additional information about
    the log entry.
  fields:
  - name: application
    type: STRING
    mode: NULLABLE
    description: Application label identifying the FxA application (e.g., 'fxa').
  - name: stack
    type: STRING
    mode: NULLABLE
    description: Stack label from the log metadata (e.g., 'default').
  - name: env
    type: STRING
    mode: NULLABLE
    description: Deployment environment label (e.g., 'prod', 'stage').
  - name: compute_googleapis_com_resource_name
    type: STRING
    mode: NULLABLE
    description: GCP Compute resource name (compute.googleapis.com/resource_name),
      identifying the VM or node that generated the log entry.
  - name: type
    type: STRING
    mode: NULLABLE
    description: Type label from the log metadata indicating the log source category
      (e.g., 'admin_panel').
  - name: k8s_pod_app_kubernetes_io_name
    type: STRING
    mode: NULLABLE
    description: Kubernetes pod label app.kubernetes.io/name, identifying the application
      name.
  - name: k8s_pod_app_kubernetes_io_managed_by
    type: STRING
    mode: NULLABLE
  - name: k8s_pod_app_kubernetes_io_component
    type: STRING
    mode: NULLABLE
    description: Kubernetes pod label app.kubernetes.io/component, identifying the
      component role within the application (e.g., 'auth', 'content').
  - name: k8s_pod_app_kubernetes_io_version
    type: STRING
    mode: NULLABLE
  - name: k8s_pod_app_kubernetes_io_instance
    type: STRING
    mode: NULLABLE
    description: Kubernetes pod label app.kubernetes.io/instance, identifying the
      specific deployment instance.
  - name: k8s_pod_pod_template_hash
    type: STRING
    mode: NULLABLE
    description: Kubernetes pod template hash label, used to track pod revisions across
      rolling deployments.
  - name: k8s_pod_app_kubernetes_io_part_of
    type: STRING
    mode: NULLABLE
  - name: k8s_pod_jenkins_build_id
    type: STRING
    mode: NULLABLE
  - name: k8s_pod_fullname
    type: STRING
    mode: NULLABLE
- name: operation
  type: RECORD
  mode: NULLABLE
  description: Information about an operation associated with the log entry, if applicable.
  fields:
  - name: id
    type: STRING
    mode: NULLABLE
    description: An arbitrary operation identifier. Log entries with the same identifier
      are assumed to be part of the same operation.
  - name: producer
    type: STRING
    mode: NULLABLE
    description: An arbitrary producer identifier. The combination of `id` and `producer`
      must be globally unique.
  - name: first
    type: BOOLEAN
    mode: NULLABLE
    description: Set this to True if this is the first log entry in the operation.
  - name: last
    type: BOOLEAN
    mode: NULLABLE
    description: Set this to True if this is the last log entry in the operation.
- name: trace
  type: STRING
  mode: NULLABLE
  description: The trace ID being written to Cloud Trace in association with this
    log entry.
- name: spanId
  type: STRING
  mode: NULLABLE
  description: The ID of the Cloud Trace span associated with the current operation
    in which the log is being written.
- name: traceSampled
  type: BOOLEAN
  mode: NULLABLE
  description: The sampling decision of the span associated with the log entry at
    the time the log entry was created.
- name: sourceLocation
  type: RECORD
  mode: NULLABLE
  description: Source code location information associated with the log entry, if
    any.
  fields:
  - name: file
    type: STRING
    mode: NULLABLE
    description: Source file name. Depending on the runtime environment, this might
      be a simple name or a fully-qualified name.
  - name: line
    type: INTEGER
    mode: NULLABLE
    description: Line within the source file. 1-based; 0 indicates no line number
      available.
  - name: function
    type: STRING
    mode: NULLABLE
    description: Human-readable name of the function or method being invoked, with
      optional context such as the class or package name.
- name: split
  type: RECORD
  mode: NULLABLE
  description: Information indicating this LogEntry is part of a sequence of multiple
    log entries split from a single LogEntry.
  fields:
  - name: uid
    type: STRING
    mode: NULLABLE
    description: A globally unique identifier for all log entries in a sequence of
      split log entries.
  - name: index
    type: INTEGER
    mode: NULLABLE
    description: The index of this LogEntry in the sequence of split log entries.
  - name: totalSplits
    type: INTEGER
    mode: NULLABLE
    description: The total number of log entries that the original LogEntry was split
      into.
