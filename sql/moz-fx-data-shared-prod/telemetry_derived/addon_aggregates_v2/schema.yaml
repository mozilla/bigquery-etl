fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- name: app_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- name: locale
  type: STRING
  mode: NULLABLE
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- name: n_self_installed_addons
  type: INTEGER
  mode: NULLABLE
  description: Count of add-ons installed directly by the user (not system-installed
    or foreign-installed) active on this client on the submission date.
- name: n_shield_addons
  type: INTEGER
  mode: NULLABLE
  description: Count of Shield/Normandy experiment add-ons active on this client on
    the submission date.
- name: n_foreign_installed_addons
  type: INTEGER
  mode: NULLABLE
  description: Count of add-ons installed by an external application (not by the user
    directly) active on this client on the submission date.
- name: n_system_addons
  type: INTEGER
  mode: NULLABLE
  description: Count of system add-ons (built-in Mozilla add-ons shipped with Firefox)
    active on this client on the submission date.
- name: n_web_extensions
  type: INTEGER
  mode: NULLABLE
  description: Count of WebExtension-based add-ons active on this client on the submission
    date.
- name: first_addon_install_date
  type: STRING
  mode: NULLABLE
  description: The date the first user-installed add-on was installed on this client,
    formatted as YYYYMMDD. Null if no user-installed add-ons exist.
- name: profile_creation_date
  type: STRING
  mode: NULLABLE
  description: The date on which the Firefox profile was created, formatted as a YYYYMMDD
    string. Used to determine profile age and cohort membership.
- name: profile_group_id
  type: STRING
  mode: NULLABLE
  description: A UUID that identifies a group of profiles belonging to the same user
    or installation context. Null when profile group information is unavailable.
