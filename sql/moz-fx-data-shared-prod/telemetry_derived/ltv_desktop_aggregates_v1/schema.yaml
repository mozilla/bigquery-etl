fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: app_version
  type: INTEGER
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: normalized_os
  type: STRING
  description: The standardized operating system name for the client device, such
    as 'Windows', 'Mac', or 'Linux'. This normalizes raw OS strings into a consistent
    set of values.
- mode: NULLABLE
  name: channel
  type: STRING
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- mode: NULLABLE
  name: locale
  type: STRING
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- mode: NULLABLE
  name: profile_creation_month
  type: DATE
  description: The first calendar day of the month in which the client profiles were
    created, used to group clients by profile age cohort.
- mode: NULLABLE
  name: default_search_engine
  type: STRING
  description: The internal identifier of the user's default search engine (e.g.,
    'google-b-d', 'baidu'), which encodes both the engine and any partner or distribution-specific
    configuration. This field represents the engine key as recognized by Firefox's
    search service.
- mode: NULLABLE
  name: is_default_browser
  type: BOOLEAN
  description: Indicates whether Firefox is set as the default browser on the client's
    device. True means it is the default; false means another browser is set as default.
- mode: NULLABLE
  name: is_sap_monetizable
  type: BOOLEAN
  description: True if the client's search access point (SAP) is one that generates
    ad revenue for Mozilla.
- mode: NULLABLE
  name: has_adblocker_addon
  type: BOOLEAN
  description: True if the client has at least one ad-blocking extension installed.
- mode: NULLABLE
  name: policies_is_enterprise
  type: BOOLEAN
  description: True if the client is identified as an enterprise user based on policy
    signals.
- mode: NULLABLE
  name: stories_enabled
  type: BOOLEAN
  description: True if the Pocket stories (Recommended by Pocket) section is enabled
    on the New Tab page.
- mode: NULLABLE
  name: sponsored_stories_enabled
  type: BOOLEAN
  description: True if sponsored Pocket stories are enabled on the New Tab page.
- mode: NULLABLE
  name: topsites_enabled
  type: BOOLEAN
  description: Indicates whether the Top Sites feature is enabled on the user's New
    Tab page. True means the feature is active; false means the user has disabled
    it.
- mode: NULLABLE
  name: sponsored_topsites_enabled
  type: BOOLEAN
  description: True if sponsored Top Sites tiles are enabled on the New Tab page.
- mode: NULLABLE
  name: topic_preferences_set
  type: BOOLEAN
  description: Indicates whether the user has explicitly configured topic preferences
    for content recommendations. True means preferences have been set; false or null
    means they have not.
- mode: NULLABLE
  name: client_count
  type: INTEGER
  description: The number of distinct clients contributing to a given aggregated row
    or cohort. Useful for understanding the population size behind any aggregated
    metric.
- mode: NULLABLE
  name: clients_with_newtab_and_search_activity
  type: INTEGER
  description: Count of clients that had both New Tab page activity and search activity
    on this submission date.
- mode: NULLABLE
  name: clients_with_ad_engagement
  type: INTEGER
  description: Count of clients that clicked on at least one ad (search ad, sponsored
    topsite tile, or sponsored Pocket story) on this submission date.
- mode: NULLABLE
  name: clients_with_search_ad_engagement
  type: INTEGER
  description: Count of clients that clicked on at least one ad on a Search Engine
    Result Page (SERP) on this submission date.
- mode: NULLABLE
  name: clients_with_newtab_ad_engagement
  type: INTEGER
  description: Count of clients that clicked on at least one sponsored New Tab tile
    or sponsored Pocket story on this submission date.
- mode: NULLABLE
  name: subsession_hours_sum_total
  type: FLOAT
  description: Total sum of active subsession hours across all clients in this cohort
    for the submission date.
- mode: REPEATED
  name: subsession_hours_sum_histogram
  type: FLOAT
  description: Histogram of per-client subsession hours sums across cohort members,
    as approximate quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: NULLABLE
  name: sessions_started_on_this_day_total
  type: INTEGER
  description: Total number of browser sessions started across all clients in this
    cohort on the submission date.
- mode: REPEATED
  name: sessions_started_on_this_day_histogram
  type: INTEGER
  description: Histogram of per-client session counts across cohort members, as approximate
    quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: REPEATED
  name: active_addons_count_mean_histogram
  type: FLOAT
  description: Histogram of mean active add-on counts per client across cohort members,
    as approximate quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: REPEATED
  name: max_concurrent_tab_count_max_histogram
  type: INTEGER
  description: Histogram of maximum concurrent tab counts per client across cohort
    members, as approximate quantile boundaries (100 values from APPROX_QUANTILES(...,
    99)).
- mode: REPEATED
  name: active_hours_sum_histogram
  type: FLOAT
  description: Histogram of per-client active hours sums across cohort members, as
    approximate quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: REPEATED
  name: total_uri_count_histogram
  type: INTEGER
  description: Histogram of total URI counts per client across cohort members, as
    approximate quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: NULLABLE
  name: organic_sum
  type: INTEGER
  description: Total count of organic (non-tagged) search access point visits across
    all clients in this cohort.
- mode: REPEATED
  name: organic_histogram
  type: INTEGER
  description: Histogram of per-client organic search access point counts across cohort
    members, as approximate quantile boundaries (100 values from APPROX_QUANTILES(...,
    99)).
- mode: NULLABLE
  name: tagged_sap_sum
  type: INTEGER
  description: Total count of tagged search access point (SAP) searches that include
    a partner code, across all clients in this cohort.
- mode: REPEATED
  name: tagged_sap_histogram
  type: INTEGER
  description: Histogram of per-client tagged SAP search counts across cohort members,
    as approximate quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: NULLABLE
  name: tagged_follow_on_sum
  type: INTEGER
  description: Total count of follow-on searches (searches that follow a tagged SAP
    search) across all clients in this cohort.
- mode: REPEATED
  name: tagged_follow_on_histogram
  type: INTEGER
  description: Histogram of per-client tagged follow-on search counts across cohort
    members, as approximate quantile boundaries (100 values from APPROX_QUANTILES(...,
    99)).
- mode: NULLABLE
  name: sap_sum
  type: INTEGER
  description: Total count of all search access point (SAP) searches, including both
    tagged and untagged, across all clients in this cohort.
- mode: REPEATED
  name: sap_histogram
  type: INTEGER
  description: Histogram of per-client SAP search counts across cohort members, as
    approximate quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: NULLABLE
  name: ad_click_sum
  type: INTEGER
  description: Total count of ad clicks on Search Engine Result Pages across all clients
    in this cohort.
- mode: REPEATED
  name: ad_click_histogram
  type: INTEGER
  description: Histogram of per-client SERP ad click counts across cohort members,
    as approximate quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: NULLABLE
  name: ad_click_organic_sum
  type: INTEGER
  description: Total count of ad clicks originating from organic (untagged) searches
    across all clients in this cohort.
- mode: REPEATED
  name: ad_click_organic_histogram
  type: INTEGER
  description: Histogram of per-client organic ad click counts across cohort members,
    as approximate quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: NULLABLE
  name: search_with_ads_sum
  type: INTEGER
  description: Total count of Search Engine Result Pages (SERPs) containing ads that
    were loaded by clients in this cohort.
- mode: REPEATED
  name: search_with_ads_histogram
  type: INTEGER
  description: Histogram of per-client SERP with ads counts across cohort members,
    as approximate quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: NULLABLE
  name: newtab_visit_count_sum
  type: INTEGER
  description: Total count of New Tab page visits across all clients in this cohort
    on the submission date.
- mode: REPEATED
  name: newtab_visit_count_histogram
  type: INTEGER
  description: Histogram of per-client New Tab visit counts across cohort members,
    as approximate quantile boundaries (100 values from APPROX_QUANTILES(..., 99)).
- mode: NULLABLE
  name: visits_with_non_search_engagement_sum
  type: INTEGER
  description: Total count of New Tab visits where the user engaged with content (non-search)
