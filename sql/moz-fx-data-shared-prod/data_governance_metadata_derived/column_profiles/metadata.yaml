friendly_name: Column Profiles
description: |-
  Union view over the per-source-dataset column profile tables in
  data_governance_metadata_derived. Each underlying table holds weekly
  per-column profiling statistics (null rate, distinct count, cardinality,
  example value, value/frequency pairs) used by schema enrichment tooling.
  Currently unions column_profiles_telemetry_derived_v1; additional per-dataset
  tables are added via UNION ALL in view.sql.
