friendly_name: Kitsune Retrieval Index
description: "AI-enriched retrieval table derived from Kitsune, containing embeddings\
  \ and semantic features\n to support grounded question answering over Mozilla Support\
  \ (SUMO) data.\n\nGrain: one row per date, question_id and answer_id.\n\nLLM generated\
  \ fields:\n- question_summary_llm\n- question_category_llm\n- question_language_llm\n\
  - question_entities_llm\n- question_topics_llm\n- embedding based on [title, content]\n\
  - question_sentiment_score based on [title, content]\n\nRead-time fields (computed\
  \ by this view, not stored in the underlying table):\n- product = `mozfun.customer_experience.cx_normalize_product(product,\
  \ 'Kitsune')` \u2014 canonical\n  product name; returns 'unclassified' for raw slugs\
  \ the UDF cannot map (monitored, see below).\n- recency_score = `EXP(-DATE_DIFF(CURRENT_DATE(),\
  \ creation_date, DAY) / 30)` \u2014 30-day exponential decay,\n  1.0 today, ~0.37\
  \ after 30 days. Always reflects freshness at query time.\n\nMetadata\n- Additional\
  \ data to support technical processes, such as backfills or investigations.\n- The\
  \ prompt version is a self-managed version for changes in the prompt given to the\
  \ LLM.\n\nUsage\n- The underlying table requires a partition filter. Always include\n\
  \  `WHERE creation_date >= ...` (or an equivalent range) when querying\n  this view,\
  \ otherwise BigQuery will reject the query.\n\nMonitoring\n- A Bigeye metric `has_no_unclassified_value`\
  \ alerts when the `product` contains\n  'unclassified' values over a rolling 7-day\
  \ `creation_date` window, surfacing raw\n  values that need a mapping added to the\
  \ UDF."
