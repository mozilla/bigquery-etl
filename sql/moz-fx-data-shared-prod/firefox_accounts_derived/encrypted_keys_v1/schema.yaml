fields:
- name: key_id
  type: STRING
  mode: NULLABLE
  description: Identifier for the encryption key (e.g., 'fxa_hmac_prod'). Used to look up the correct AEAD-encrypted
    keyset for HMAC operations.
- name: ciphertext
  type: BYTES
  mode: NULLABLE
  description: AEAD-encrypted keyset bytes storing the HMAC key material. Decrypted at query time using
    the GCP-managed keyring to produce HMAC keys for user ID hashing.
