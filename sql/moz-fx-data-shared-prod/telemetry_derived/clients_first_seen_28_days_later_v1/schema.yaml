fields:
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier (UUID) for the client.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: A number, 0-99, that samples by client_id and allows filtering data for analysis. It is a pipeline-generated artifact that should match between pings.
- name: first_seen_date
  type: DATE
  mode: NULLABLE
  description: Date when the server first received a ping from this client, establishing the start of the 28-day observation window.
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The date when the telemetry ping is received on the server side.
- name: country_code
  type: STRING
  mode: NULLABLE
  description: Code of the country in which the activity took place, as determined by the IP geolocation. Unknown or NULL values are normally stored as '??'.
- name: channel
  type: STRING
  mode: NULLABLE
  description: The normalized channel the application is being distributed on.
- name: build_id
  type: STRING
  mode: NULLABLE
  description: The Firefox build ID of the client at the time of first seen, in YYYYMMDDHHMMSS format.
- name: os
  type: STRING
  mode: NULLABLE
  description: The normalized name of the operating system running at the client.
- name: os_version
  type: NUMERIC
  mode: NULLABLE
  description: The operating system version of the client as a numeric value.
- name: distribution_id
  type: STRING
  mode: NULLABLE
  description: The distribution id associated with the install of Firefox.
- name: attribution_source
  type: STRING
  mode: NULLABLE
  description: The attribution source from the install attribution, indicating the referring partner domain that drove the installation.
- name: attribution_ua
  type: STRING
  mode: NULLABLE
  description: The derived user agent type at attribution time (e.g., 'chrome', 'edge', 'firefox').
- name: attribution_medium
  type: STRING
  mode: NULLABLE
  description: The attribution medium from the install (e.g., 'organic', 'referral', 'cpc').
- name: attribution_campaign
  type: STRING
  mode: NULLABLE
  description: The campaign identifier from the install attribution.
- name: attribution_content
  type: STRING
  mode: NULLABLE
  description: The attribution content identifier from the install attribution.
- name: attribution_experiment
  type: STRING
  mode: NULLABLE
  description: The attribution experiment key associated with the install.
- name: attribution_dltoken
  type: STRING
  mode: NULLABLE
  description: A unique token created at Firefox download time to correlate installs with download events.
- name: attribution_dlsource
  type: STRING
  mode: NULLABLE
  description: Identifier indicating where the Firefox installation originated (e.g., 'mozorg', 'fxdotcom').
- name: activated
  description: Whether the profile sent a main ping in at least 5 of their first 7 days.
  type: BOOLEAN
  mode: NULLABLE
- name: returned_second_day
  description: Whether the profile sent a main ping on any day after their first day during their first 28 days.
  type: BOOLEAN
  mode: NULLABLE
- name: qualified_second_day
  description: Whether the profile qualified as DAU on any day after their first day during their first 28 days.
  type: BOOLEAN
  mode: NULLABLE
- name: retained_week4
  description: Whether the profile sent a main ping on any day in their 4th week.
  type: BOOLEAN
  mode: NULLABLE
- name: qualified_week4
  description: Whether the profile qualified as DAU on any day in their 4th week.
  type: BOOLEAN
  mode: NULLABLE
- name: days_seen_bits
  type: INTEGER
  mode: NULLABLE
  description: A bitmask encoding the days (within the first 28) on which the client sent at least one ping. Bit 0 = first seen date, bit 27 = 27 days later.
- name: days_visited_1_uri_bits
  type: INTEGER
  mode: NULLABLE
  description: A bitmask encoding the days (within the first 28) on which the client visited at least 1 URI, indicating active browsing.
- name: days_interacted_bits
  type: INTEGER
  mode: NULLABLE
  description: A bitmask encoding the days (within the first 28) on which the client had at least one user interaction event.
- name: startup_profile_selection_reason
  type: STRING
  mode: NULLABLE
  description: How the profile was selected during startup, as reported by the first ping received.
