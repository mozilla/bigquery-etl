friendly_name: Column Profiles (telemetry_derived)
description: |-
  Per-column profiling statistics (null rate, approximate distinct count,
  cardinality flag, example value, and value/frequency pairs) for base tables in
  the telemetry_derived dataset. Produced weekly by a self-contained Python job
  and consumed by schema enrichment tooling. Each run overwrites its own
  profiled_at date partition.
labels:
  incremental: true
owners:
- gkatre@mozilla.com
scheduling:
  dag_name: bqetl_data_governance_metadata
  arguments: [
    "--date", "{{ ds }}",
    "--source-dataset", "telemetry_derived",
    "--destination-table", "column_profiles_telemetry_derived_v1"
  ]
bigquery:
  time_partitioning:
    type: day
    field: profiled_at
    require_partition_filter: false
    expiration_days: 90
  clustering:
    fields:
    - source_table
    - column_name
