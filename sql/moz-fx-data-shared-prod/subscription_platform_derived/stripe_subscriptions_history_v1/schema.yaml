- name: attribution
  type: RECORD
  mode: NULLABLE
  fields:
  - name: flow_id
    type: STRING
    mode: NULLABLE
  description: The Firefox Accounts session flow ID recorded at subscription time, used to correlate this
    subscription with user funnel events.
  - name: entrypoint
    type: STRING
    mode: NULLABLE
  description: The entrypoint recorded in subscription metadata at the time of the subscription session
    (e.g. "www.mozilla.org-vpn-product-page").
  - name: entrypoint_experiment
    type: STRING
    mode: NULLABLE
  description: The entrypoint experiment identifier recorded in subscription metadata, if an A/B experiment
    was active during the subscription session.
  - name: entrypoint_variation
    type: STRING
    mode: NULLABLE
  description: The variation of the entrypoint experiment that the subscriber was assigned to during the
    subscription session.
  - name: utm_campaign
    type: STRING
    mode: NULLABLE
  description: The UTM campaign parameter recorded in subscription metadata at the time of the subscription
    session.
  - name: utm_content
    type: STRING
    mode: NULLABLE
  description: The UTM content parameter recorded in subscription metadata at the time of the subscription
    session.
  - name: utm_medium
    type: STRING
    mode: NULLABLE
  description: The UTM medium parameter recorded in subscription metadata at the time of the subscription
    session.
  - name: utm_source
    type: STRING
    mode: NULLABLE
  description: The UTM source parameter recorded in subscription metadata at the time of the subscription
    session.
  - name: utm_term
    type: STRING
    mode: NULLABLE
  description: The UTM term parameter recorded in subscription metadata at the time of the subscription
    session.
