fields:
- mode: NULLABLE
  name: segment
  type: STRING
  description: Classification of users based on their browsing activity. E.g., infrequent, casual, regular.
- mode: NULLABLE
  name: app_version
  type: STRING
  description: User visible version string (e.g. "1.0.3") for the browser.
- mode: NULLABLE
  name: attribution_medium
  type: STRING
  description: The attribution medium (UTM medium) from install attribution, such as 'referral' or 'cpc'. Null when unattributed.
- mode: NULLABLE
  name: attribution_source
  type: STRING
  description: The referring partner domain or UTM source from install attribution. Null when the install was unattributed.
- mode: NULLABLE
  name: city
  type: STRING
  description: The city in which the client activity took place, as determined by IP geolocation.
- mode: NULLABLE
  name: country
  type: STRING
  description: Name of the country in which the activity took place, as determined by the IP geolocation.
- mode: NULLABLE
  name: distribution_id
  type: STRING
  description: The distribution id associated with the install of Firefox.
- mode: NULLABLE
  name: is_default_browser
  type: BOOLEAN
  description: A flag indicating whether the browser is set as the default browser on the client side.
- mode: NULLABLE
  name: app_name
  type: STRING
  description: Name of the Mozilla application (e.g. 'Firefox Desktop', 'Fenix', 'Firefox iOS').
- mode: NULLABLE
  name: channel
  type: STRING
  description: The normalized channel the application is being distributed on.
- mode: NULLABLE
  name: os
  type: STRING
  description: The normalized name of the operating system running at the client.
- mode: NULLABLE
  name: os_version
  type: STRING
- mode: NULLABLE
  name: os_version_major
  type: INTEGER
  description: Major or first part of the operating system version running at the client. E.g. for version "100.9.11", the major is 100.
- mode: NULLABLE
  name: os_version_minor
  type: INTEGER
  description: Minor part of the operating system version running at the client. E.g. for version "100.9.11", the minor is 9.
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The date when the telemetry ping is received on the server side.
- mode: NULLABLE
  name: dau
  type: INTEGER
  description: Daily Active Users
- mode: NULLABLE
  name: wau
  type: INTEGER
  description: Weekly Active Users
- mode: NULLABLE
  name: mau
  type: INTEGER
  description: Monthly Active Users
- mode: NULLABLE
  name: new_profiles
  type: INTEGER
  description: Count of new Firefox profiles created on the submission_date for this dimension combination.
- mode: NULLABLE
  name: ad_clicks
  type: INTEGER
  description: Total count of clicks on search advertisements attributed to clients in this row.
- mode: NULLABLE
  name: organic_search_count
  type: INTEGER
  description: Total count of organic (non-SAP) searches performed by clients in this row.
- mode: NULLABLE
  name: search_count
  type: INTEGER
  description: Total number of searches performed by clients in this row.
- mode: NULLABLE
  name: search_with_ads
  type: INTEGER
  description: Total count of search result pages that contained at least one advertisement, as reported by clients in this row.
- mode: NULLABLE
  name: uri_count
  type: INTEGER
  description: Total number of URIs visited by clients in this row.
- mode: NULLABLE
  name: active_hours
  type: FLOAT
  description: Total active browsing hours accumulated by clients in this row on the submission_date.
- mode: NULLABLE
  name: first_seen_year
  type: INTEGER
  description: The calendar year in which the client was first seen by Mozilla's data pipeline.
- mode: NULLABLE
  name: attributed
  type: BOOLEAN
  description: True if the client has install attribution data; false if the install was unattributed.
- mode: NULLABLE
  name: language_name
  type: STRING
  description: The human-readable name of the browser locale language (e.g. 'English', 'Deutsch').
- description: Count of distinct, qualified Desktop clients that we received a main ping from on a given day. In mobile DAU = QDAU.
  mode: NULLABLE
  name: qdau_desktop
  type: INTEGER
