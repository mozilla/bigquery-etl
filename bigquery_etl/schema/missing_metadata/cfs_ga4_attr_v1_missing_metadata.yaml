# Missing metadata for moz-fx-data-shared-prod.firefox_desktop_derived.cfs_ga4_attr_v1
# These columns did not have descriptions in base schemas (global.yaml, app_*.yaml, dataset.yaml)
# and were filled using upstream source schemas (priority 4), query context (priority 5),
# or application context (priority 6).
# Generated: 2026-04-08

table: moz-fx-data-shared-prod.firefox_desktop_derived.cfs_ga4_attr_v1

columns:
  # Priority 4 - From upstream source schema: stub_attribution_service_derived.dl_token_ga_attribution_lookup_v2
  - name: stub_attr_logs_first_seen_date
    source: stub_attribution_service_derived.dl_token_ga_attribution_lookup_v2 (first_seen_date)
    priority: 4
    description: The first date the dl_token, ga_client_id, stub_session_id triplet
      was seen in the stub attribution logs, from dl_token_ga_attribution_lookup_v2.

  - name: stub_attr_logs_ga_client_id
    source: stub_attribution_service_derived.dl_token_ga_attribution_lookup_v2 (ga_client_id)
    priority: 4
    description: The Google Analytics client identifier from the stub attribution logs,
      uniquely identifying a GA client using a cookie on the website the download came from.

  - name: stub_attr_logs_stub_session_id
    source: stub_attribution_service_derived.dl_token_ga_attribution_lookup_v2 (stub_session_id)
    priority: 4
    description: The stub attribution session identifier from the stub attribution logs,
      identifying a single stub attribution session as found in GA logs under the Stub
      Session ID event.

  - name: stub_attr_logs_dl_token
    source: stub_attribution_service_derived.dl_token_ga_attribution_lookup_v2 (dl_token)
    priority: 4
    description: The download token from the stub attribution logs, associated with
      a single Firefox binary generated by the stub attribution service and used to
      join this client record to the corresponding GA4 session.

  - name: stub_attr_logs_download_source
    source: stub_attribution_service_derived.dl_token_ga_attribution_lookup_v2 (download_source)
    priority: 4
    description: A flag from the stub attribution logs indicating which Mozilla website
      the Firefox download came from (e.g. fxdotcom or mozorg).

  # Priority 4 - From upstream source schema: telemetry.ga4_sessions_firefoxcom_mozillaorg_combined
  - name: ga4_website
    source: telemetry.ga4_sessions_firefoxcom_mozillaorg_combined (flag)
    priority: 4
    description: Indicates which Mozilla website the matched GA4 session is from, e.g.
      FIREFOX.COM or MOZILLA.ORG, from the flag field in ga4_sessions_firefoxcom_mozillaorg_combined.

  - name: ga4_ga_client_id
    source: telemetry.ga4_sessions_firefoxcom_mozillaorg_combined (ga_client_id)
    priority: 4
    description: The Google Analytics Client Identifier from the matched GA4 session,
      using a cookie on mozilla.org, used to join stub attribution logs to GA4 session data.

  - name: ga4_session_date
    source: telemetry.ga4_sessions_firefoxcom_mozillaorg_combined (session_date)
    priority: 4
    description: The date the matched Google Analytics 4 session started, from ga4_sessions_firefoxcom_mozillaorg_combined.

  - name: ga4_session_start_timestamp
    source: telemetry.ga4_sessions_firefoxcom_mozillaorg_combined (session_start_timestamp)
    priority: 4
    description: The timestamp of the session_start event for the matched GA4 session.
      If no session_start event exists, the minimum event timestamp for that session.

  - name: ga4_had_download_event
    source: telemetry.ga4_sessions_firefoxcom_mozillaorg_combined (had_download_event)
    priority: 4
    description: Whether the matched GA4 session contained a download event, indicating
      the user initiated a Firefox download during their Mozilla website visit.

  - name: ga4_firefox_desktop_downloads
    source: telemetry.ga4_sessions_firefoxcom_mozillaorg_combined (firefox_desktop_downloads)
    priority: 4
    description: The count of Firefox Desktop download events recorded in the matched
      GA4 session on the Mozilla website.

  - name: ga4_last_reported_install_target
    source: telemetry.ga4_sessions_firefoxcom_mozillaorg_combined (last_reported_install_target)
    priority: 4
    description: The most recently reported install target from the matched GA4 session,
      indicating the Firefox edition or platform the user was directed to install.

  - name: ga4_all_reported_install_targets
    source: telemetry.ga4_sessions_firefoxcom_mozillaorg_combined (all_reported_install_targets)
    priority: 4
    description: All install targets reported across events in the matched GA4 session,
      capturing every Firefox edition or platform the user was directed to install.

  # Priority 5 - From query context (query.sql derived columns)
  - name: attribution_dlsource
    source: query.sql (JSON_VALUE(cfs.attribution_ext.dlsource))
    priority: 5
    description: The download source extracted from attribution_ext, indicating which
      Mozilla website (e.g. fxdotcom or mozorg) the Firefox installer was downloaded from.

  - name: attribution_dltoken
    source: query.sql (JSON_VALUE(cfs.attribution_ext.dltoken))
    priority: 5
    description: The download token extracted from attribution_ext, a unique identifier
      generated by the stub attribution service that links this Firefox install to a
      specific download session and GA4 session.

  - name: attribution_ua
    source: query.sql (JSON_VALUE(cfs.attribution_ext.ua))
    priority: 5
    description: The user agent string extracted from attribution_ext, captured at the
      time of the Firefox download from the stub attribution service.

  - name: windows_version
    source: query.sql (mozfun.norm.glean_windows_version_info(...))
    priority: 5
    description: The human-readable Windows version string (e.g. "Windows 11") derived
      from normalized_os, normalized_os_version, and windows_build_number using the
      mozfun.norm.glean_windows_version_info function.

  - name: ga4_stub_session_id
    source: query.sql (ga4.stub_session_id)
    priority: 5
    description: The stub attribution session identifier from the matched GA4 session,
      used as the join key between the stub attribution service logs and the GA4 session
      data.

  # Priority 6 - Application context (fields from baseline_clients_first_seen and GA4 sessions with no upstream description)
  - name: attribution
    source: application context (Firefox stub installer attribution record)
    priority: 6
    description: Attribution information extracted from the Firefox stub installer, capturing
      the marketing channel and campaign parameters that led to the Firefox download.

  - name: attribution.campaign
    source: application context (UTM campaign from Firefox installer)
    priority: 6
    description: The attribution campaign parameter from the Firefox installer, identifying
      the marketing campaign that drove the download.

  - name: attribution.content
    source: application context (UTM content from Firefox installer)
    priority: 6
    description: The attribution content parameter from the Firefox installer, used
      to differentiate between ads or links in the same campaign.

  - name: attribution.medium
    source: application context (UTM medium from Firefox installer)
    priority: 6
    description: The attribution medium parameter from the Firefox installer, indicating
      the marketing medium (e.g. cpc, email, organic).

  - name: attribution.source
    source: application context (UTM source from Firefox installer)
    priority: 6
    description: The attribution source parameter from the Firefox installer, identifying
      the referrer (e.g. google, bing, mozilla.org).

  - name: attribution.term
    source: application context (UTM term from Firefox installer)
    priority: 6
    description: The attribution term parameter from the Firefox installer, capturing
      the search keywords associated with the download.

  - name: distribution
    source: application context (Firefox distribution partner record)
    priority: 6
    description: Information about the Firefox distribution channel, identifying the
      partner or OEM that bundled or distributed Firefox.

  - name: distribution.name
    source: application context (distribution partner name)
    priority: 6
    description: The name of the distribution partner or OEM that bundled or distributed
      this instance of Firefox.

  - name: attribution_ext
    source: application context (extended JSON attribution from stub installer)
    priority: 6
    description: Extended attribution data as a JSON object containing additional download
      attribution parameters such as dlsource, dltoken, ua, experiment, and variation
      extracted from the Firefox stub installer.

  - name: distribution_ext
    source: application context (extended JSON distribution metadata)
    priority: 6
    description: Extended distribution metadata as a JSON object containing additional
      fields about the Firefox distribution channel beyond the standard distribution record.

  - name: legacy_telemetry_client_id
    source: application context (pre-Glean telemetry client identifier)
    priority: 6
    description: The client identifier from the legacy Firefox telemetry system (pre-Glean),
      used to link this Glean client to historical telemetry records.

  - name: legacy_telemetry_profile_group_id
    source: application context (pre-Glean telemetry profile group identifier)
    priority: 6
    description: The profile group identifier from the legacy Firefox telemetry system,
      used to associate this Glean profile with legacy telemetry profile group data.

  - name: windows_build_number
    source: application context (Windows OS build number for version resolution)
    priority: 6
    description: The Windows build number of the operating system running on the client,
      used to determine the specific Windows version via the norm.glean_windows_version_info
      function.

  - name: ga4_country
    source: application context (GA4 session geographic data)
    priority: 6
    description: The country associated with the matched GA4 session as reported by
      Google Analytics 4, based on the user's IP address at the time of the session.

  - name: ga4_region
    source: application context (GA4 session geographic data)
    priority: 6
    description: The geographic region (sub-national area) associated with the matched
      GA4 session as reported by Google Analytics 4.

  - name: ga4_city
    source: application context (GA4 session geographic data)
    priority: 6
    description: The city associated with the matched GA4 session as reported by Google
      Analytics 4, based on the user's IP address at the time of the session.

  - name: ga4_device_category
    source: application context (GA4 session device data)
    priority: 6
    description: The device category (e.g. desktop, mobile, tablet) of the visitor
      during the matched GA4 session as reported by Google Analytics 4.

  - name: ga4_mobile_device_model
    source: application context (GA4 session device data)
    priority: 6
    description: The mobile device model name of the visitor during the matched GA4
      session as reported by Google Analytics 4 (null for desktop visitors).

  - name: ga4_mobile_device_string
    source: application context (GA4 session device data)
    priority: 6
    description: The full mobile device string of the visitor during the matched GA4
      session as reported by Google Analytics 4 (null for desktop visitors).

  - name: ga4_operating_system
    source: application context (GA4 session device data)
    priority: 6
    description: The operating system of the visitor during the matched GA4 session
      as reported by Google Analytics 4 (e.g. Windows, Macintosh, Android).

  - name: ga4_operating_system_version
    source: application context (GA4 session device data)
    priority: 6
    description: The operating system version of the visitor during the matched GA4
      session as reported by Google Analytics 4.

  - name: ga4_language
    source: application context (GA4 session browser data)
    priority: 6
    description: The browser language setting of the visitor during the matched GA4
      session as reported by Google Analytics 4.

  - name: ga4_browser
    source: application context (GA4 session browser data)
    priority: 6
    description: The browser used by the visitor during the matched GA4 session as
      reported by Google Analytics 4 (e.g. Chrome, Firefox, Safari).

  - name: ga4_browser_version
    source: application context (GA4 session browser data)
    priority: 6
    description: The browser version used by the visitor during the matched GA4 session
      as reported by Google Analytics 4.

  - name: ga4_first_campaign_from_event_params
    source: application context (GA4 UTM event params)
    priority: 6
    description: The first UTM campaign parameter value observed across events in the
      matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_distinct_campaigns_from_event_params
    source: application context (GA4 UTM event params)
    priority: 6
    description: All distinct UTM campaign parameter values observed across events in
      the matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_first_source_from_event_params
    source: application context (GA4 UTM event params)
    priority: 6
    description: The first UTM source parameter value observed across events in the
      matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_distinct_sources_from_event_params
    source: application context (GA4 UTM event params)
    priority: 6
    description: All distinct UTM source parameter values observed across events in
      the matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_first_medium_from_event_params
    source: application context (GA4 UTM event params)
    priority: 6
    description: The first UTM medium parameter value observed across events in the
      matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_distinct_mediums_from_event_params
    source: application context (GA4 UTM event params)
    priority: 6
    description: All distinct UTM medium parameter values observed across events in
      the matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_first_content_from_event_params
    source: application context (GA4 UTM event params)
    priority: 6
    description: The first UTM content parameter value observed across events in the
      matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_distinct_contents_from_event_params
    source: application context (GA4 UTM event params)
    priority: 6
    description: All distinct UTM content parameter values observed across events in
      the matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_first_term_from_event_params
    source: application context (GA4 UTM event params)
    priority: 6
    description: The first UTM term (keyword) parameter value observed across events
      in the matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_distinct_terms_from_event_params
    source: application context (GA4 UTM event params)
    priority: 6
    description: All distinct UTM term (keyword) parameter values observed across events
      in the matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_first_experiment_id_from_event_params
    source: application context (GA4 experiment event params)
    priority: 6
    description: The first experiment identifier observed across events in the matched
      GA4 session, extracted from GA4 event parameters.

  - name: ga4_distinct_experiment_ids_from_event_params
    source: application context (GA4 experiment event params)
    priority: 6
    description: All distinct experiment identifiers observed across events in the matched
      GA4 session, extracted from GA4 event parameters.

  - name: ga4_first_experiment_branch_from_event_params
    source: application context (GA4 experiment event params)
    priority: 6
    description: The first experiment branch (variant) observed across events in the
      matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_distinct_experiment_branches_from_event_params
    source: application context (GA4 experiment event params)
    priority: 6
    description: All distinct experiment branch (variant) values observed across events
      in the matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_first_gad_campaignid_from_event_params
    source: application context (GA4 Google Ads event params)
    priority: 6
    description: The first Google Ads campaign ID (gad_campaignid) observed across
      events in the matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_distinct_gad_campaignid_from_event_params
    source: application context (GA4 Google Ads event params)
    priority: 6
    description: All distinct Google Ads campaign IDs (gad_campaignid) observed across
      events in the matched GA4 session, extracted from GA4 event parameters.

  - name: ga4_manual_campaign_id
    source: application context (GA4 manual campaign tagging)
    priority: 6
    description: The manual campaign ID from GA4 traffic source data, set via UTM parameters
      or manual campaign tagging on the Mozilla website session that led to the download.

  - name: ga4_manual_campaign_name
    source: application context (GA4 manual campaign tagging)
    priority: 6
    description: The manual campaign name from GA4 traffic source data, set via UTM
      parameters or manual campaign tagging on the Mozilla website session that led
      to the download.

  - name: ga4_manual_source
    source: application context (GA4 manual campaign tagging)
    priority: 6
    description: The manual traffic source from GA4, set via UTM source parameter on
      the Mozilla website session that led to the Firefox download.

  - name: ga4_manual_medium
    source: application context (GA4 manual campaign tagging)
    priority: 6
    description: The manual traffic medium from GA4, set via UTM medium parameter on
      the Mozilla website session that led to the Firefox download (e.g. cpc, email,
      organic).

  - name: ga4_manual_term
    source: application context (GA4 manual campaign tagging)
    priority: 6
    description: The manual traffic term (search keyword) from GA4, set via UTM term
      parameter on the Mozilla website session that led to the Firefox download.

  - name: ga4_manual_content
    source: application context (GA4 manual campaign tagging)
    priority: 6
    description: The manual traffic content from GA4, set via UTM content parameter
      on the Mozilla website session that led to the Firefox download, used to differentiate
      ads or links.

  - name: ga4_gclid
    source: application context (Google Ads click tracking)
    priority: 6
    description: The Google Click Identifier (gclid) from the matched GA4 session,
      a parameter appended by Google Ads to URLs to track ad clicks that led to the
      Mozilla website visit.

  - name: ga4_gclid_array
    source: application context (Google Ads click tracking)
    priority: 6
    description: All Google Click Identifiers (gclid) observed in the matched GA4 session,
      capturing multiple ad clicks within the same session.

  - name: ga4_landing_screen
    source: application context (GA4 session landing page)
    priority: 6
    description: The landing page or screen URL where the visitor first arrived during
      the matched GA4 session on the Mozilla website before proceeding to download Firefox.

  - name: ga4_ad_google_campaign
    source: application context (Google Ads campaign data)
    priority: 6
    description: The Google Ads campaign name associated with the matched GA4 session,
      from Google Ads data linked to the GA4 property.

  - name: ga4_ad_google_campaign_id
    source: application context (Google Ads campaign data)
    priority: 6
    description: The Google Ads campaign identifier associated with the matched GA4
      session, from Google Ads data linked to the GA4 property.

  - name: ga4_ad_google_group
    source: application context (Google Ads ad group data)
    priority: 6
    description: The Google Ads ad group name associated with the matched GA4 session,
      from Google Ads data linked to the GA4 property.

  - name: ga4_ad_google_group_id
    source: application context (Google Ads ad group data)
    priority: 6
    description: The Google Ads ad group identifier associated with the matched GA4
      session, from Google Ads data linked to the GA4 property.

  - name: ga4_ad_google_account
    source: application context (Google Ads account data)
    priority: 6
    description: The Google Ads account name associated with the matched GA4 session,
      from Google Ads data linked to the GA4 property.

  - name: ga4_ad_crosschannel_source
    source: application context (GA4 cross-channel attribution)
    priority: 6
    description: The cross-channel traffic source assigned by GA4 data-driven attribution,
      identifying the marketing channel that contributed to the Firefox download.

  - name: ga4_ad_crosschannel_medium
    source: application context (GA4 cross-channel attribution)
    priority: 6
    description: The cross-channel traffic medium assigned by GA4 data-driven attribution,
      indicating the medium type (e.g. cpc, organic, email) that contributed to the
      Firefox download.

  - name: ga4_ad_crosschannel_campaign
    source: application context (GA4 cross-channel attribution)
    priority: 6
    description: The cross-channel campaign name assigned by GA4 data-driven attribution,
      identifying the campaign that contributed to the Firefox download.

  - name: ga4_ad_crosschannel_campaign_id
    source: application context (GA4 cross-channel attribution)
    priority: 6
    description: The cross-channel campaign identifier assigned by GA4 data-driven
      attribution for the campaign that contributed to the Firefox download.

  - name: ga4_ad_crosschannel_source_platform
    source: application context (GA4 cross-channel attribution)
    priority: 6
    description: The advertising platform (e.g. Google Ads, Meta) assigned by GA4
      cross-channel data-driven attribution as contributing to the Firefox download.

  - name: ga4_ad_crosschannel_primary_channel_group
    source: application context (GA4 cross-channel attribution)
    priority: 6
    description: The primary channel group (e.g. Paid Search, Organic Search, Direct)
      assigned by GA4 cross-channel data-driven attribution for the session that led
      to the Firefox download.

  - name: ga4_ad_crosschannel_default_channel_group
    source: application context (GA4 cross-channel attribution)
    priority: 6
    description: The default channel group assigned by GA4 for the session using standard
      channel grouping rules (e.g. Paid Search, Organic Search, Direct, Referral) for
      the session that led to the Firefox download.
