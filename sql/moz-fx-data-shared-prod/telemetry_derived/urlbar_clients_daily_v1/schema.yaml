fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: client_id
  type: STRING
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- mode: NULLABLE
  name: default_search_engine
  type: STRING
  description: The internal identifier of the user's default search engine (e.g.,
    'google-b-d', 'baidu'), which encodes both the engine and any partner or distribution-specific
    configuration. This field represents the engine key as recognized by Firefox's
    search service.
- mode: NULLABLE
  name: app_version
  type: STRING
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- mode: NULLABLE
  name: normalized_channel
  type: STRING
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: locale
  type: STRING
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- mode: NULLABLE
  name: search_region
  type: STRING
  description: The geographic region code used to determine search engine configuration
    for this client, typically the user's country code (e.g., 'US', 'DE').
- mode: NULLABLE
  name: suggest_enabled
  type: BOOLEAN
  description: Whether the Firefox Suggest feature was enabled for this client on
    this submission date. Null when the preference was not recorded.
- mode: NULLABLE
  name: in_navbar
  type: BOOLEAN
  description: Whether the unified search/URL bar widget was present in the navigation
    toolbar for this client. Null when not recorded.
- mode: NULLABLE
  name: suggest_searches
  type: BOOLEAN
  description: Whether search suggestions from the configured search engine were enabled
    in the URL bar for this client. Null when not recorded.
- mode: NULLABLE
  name: show_search_suggestions_first
  type: BOOLEAN
  description: Whether search suggestions were configured to appear before history
    and bookmarks results in the URL bar dropdown. Null when not recorded.
- mode: NULLABLE
  name: suggest_quicksuggest
  type: BOOLEAN
  description: Deprecated; Whether Firefox Suggest (Quick Suggest) results were enabled.
    Superseded by suggest_quicksuggest_sponsored and suggest_quicksuggest_nonsponsored.
- mode: NULLABLE
  name: suggest_quicksuggest_sponsored
  type: BOOLEAN
  description: Whether sponsored Firefox Suggest recommendations were enabled for
    this client on this submission date.
- mode: NULLABLE
  name: quicksuggest_onboarding_dialog_choice
  type: STRING
  description: The button or action chosen by the user in the Firefox Suggest onboarding
    dialog (e.g., 'close_1', 'not_now_2', 'reject_2', 'accept_2'). Null when no dialog
    was shown.
- mode: NULLABLE
  name: count_picked_total
  type: INTEGER
  description: Total number of URL bar results selected by the client across all result
    types on this submission date. Null when no selections were recorded.
- fields:
  - mode: NULLABLE
    name: key
    type: STRING
    description: The urlbar result type (e.g., 'autofill', 'bookmark', 'history',
      'searchengine'); the sibling value is the total number of times the client picked
      a result of that type on this submission date.
  - mode: NULLABLE
    name: value
    type: INTEGER
  mode: REPEATED
  name: count_picked_by_type
  type: RECORD
- fields:
  - mode: NULLABLE
    name: key
    type: INTEGER
    description: The urlbar result position (one-indexed; a negative value indicates
      an unknown position); the sibling value is the number of times the client picked
      a result at that position on this submission date.
  - mode: NULLABLE
    name: value
    type: INTEGER
  mode: REPEATED
  name: count_picked_by_position
  type: RECORD
- fields:
  - mode: NULLABLE
    name: type
    type: STRING
    description: The urlbar result type for this type-by-position breakdown (e.g.,
      'autofill', 'bookmark', 'history', 'searchengine').
  - fields:
    - mode: NULLABLE
      name: key
      type: INTEGER
      description: The urlbar result position within this result type (one-indexed;
        a negative value indicates an unknown position); the sibling value is the
        number of times the client picked a result of this type at that position on
        this submission date.
    - mode: NULLABLE
      name: value
      type: INTEGER
    mode: REPEATED
    name: position
    type: RECORD
  mode: REPEATED
  name: urlbar_picked_by_type_by_position
  type: RECORD
- mode: NULLABLE
  name: suggest_quicksuggest_nonsponsored
  type: BOOLEAN
  description: Whether non-sponsored (organic) Firefox Suggest recommendations were
    enabled for this client on this submission date. Null when not recorded.
- mode: NULLABLE
  name: quicksuggest_data_collection_enabled
  type: STRING
  description: Whether the user had Firefox Suggest data collection (telemetry) enabled
    ('true') or disabled ('false'). Null when not recorded.
- fields:
  - mode: NULLABLE
    name: key
    type: STRING
    description: The experiment slug identifying the experiment the client was enrolled
      in.
  - mode: NULLABLE
    name: value
    type: STRING
  mode: REPEATED
  name: experiments
  type: RECORD
  description: An array of key-value pairs representing all active experiment enrollments
    for the client at the time of the ping, where the key is the experiment slug and
    the value is the assigned branch. This captures the full set of concurrent experiment
    enrollments.
- mode: NULLABLE
  name: profile_group_id
  type: STRING
  description: A UUID that identifies a group of profiles belonging to the same user
    or installation context. Null when profile group information is unavailable.
