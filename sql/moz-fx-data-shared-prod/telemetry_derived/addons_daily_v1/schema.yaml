- name: active_hours_sum
  type: FLOAT64
  mode: NULLABLE
  description: Total hours Firefox was actively used (keyboard/mouse interaction in five-second ticks) summed
    across all clients with this add-on.
- name: total_uri_count_sum
  type: INT64
  mode: NULLABLE
  description: Total number of URIs visited across all clients with this add-on on the submission date.
- name: tab_open_event_count_sum
  type: INT64
  mode: NULLABLE
  description: Total number of tab-open events across all clients with this add-on on the submission date.
- name: devtools_toolbox_opened_count_sum
  type: INT64
  mode: NULLABLE
  description: Total number of times the DevTools toolbox was opened across all clients with this add-on
    on the submission date.
- name: sap_searches
  type: RECORD
  mode: NULLABLE
  description: ''
  fields:
  - name: amazon
    type: INT64
    mode: NULLABLE
    description: Total SAP searches on Amazon performed by clients with this add-on on the submission date.
  - name: bing
    type: INT64
    mode: NULLABLE
    description: Total SAP searches on Bing performed by clients with this add-on on the submission date.
  - name: ddg
    type: INT64
    mode: NULLABLE
    description: Total SAP searches on DuckDuckGo performed by clients with this add-on on the submission
      date.
  - name: google
    type: INT64
    mode: NULLABLE
    description: Total search access point (SAP) searches on Google performed by clients with this add-on
      on the submission date.
  - name: other
    type: INT64
    mode: NULLABLE
    description: Total SAP searches on search engines other than the named ones performed by clients with
      this add-on on the submission date.
  - name: total
    type: INT64
    mode: NULLABLE
    description: Total SAP searches across all search engines performed by clients with this add-on on the
      submission date.
  - name: yandex
    type: INT64
    mode: NULLABLE
    description: Total SAP searches on Yandex performed by clients with this add-on on the submission date.
