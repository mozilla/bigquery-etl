    field: trial_end
- mode: NULLABLE
  name: cancel_at_period_end
  type: BOOLEAN
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: cancel_at_period_end
- mode: NULLABLE
  name: ended_at
  type: TIMESTAMP
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: ended_at
- mode: NULLABLE
  name: ended_reason
  type: STRING
  description: The reason the subscription ended, mapped from Apple's expiration_intent and revocation_reason
    codes. Values include 'Cancelled by Customer', 'Payment Failed', 'Price Change Not Approved by Customer',
    'Product Unavailable at Renewal', and 'Refund'. Null if the subscription has not yet ended.
- mode: NULLABLE
