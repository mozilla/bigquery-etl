friendly_name: App-specific view for Glean ping "onboarding"
description: |-
  This a view that UNIONs the stable ping tables
  across all channels of the Glean application "Firefox for Android"
  (org_mozilla_firefox.onboarding, org_mozilla_firefox_beta.onboarding, org_mozilla_fenix.onboarding, org_mozilla_fenix_nightly.onboarding, org_mozilla_fennec_aurora.onboarding).

  It is used by Looker.
owners: []
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  view.sql:
  - moz-fx-data-shared-prod.org_mozilla_fenix.onboarding
  - moz-fx-data-shared-prod.org_mozilla_fenix_nightly.onboarding
  - moz-fx-data-shared-prod.org_mozilla_fennec_aurora.onboarding
  - moz-fx-data-shared-prod.org_mozilla_firefox.onboarding
  - moz-fx-data-shared-prod.org_mozilla_firefox_beta.onboarding
