fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: document_id
  type: STRING
  mode: NULLABLE
  description: A unique UUID identifying an individual telemetry ping submission.
    This identifier is used to deduplicate records and trace a specific ping through
    the data pipeline.
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- name: subsession_start_date
  type: STRING
  mode: NULLABLE
  description: The local date and time at which a Firefox subsession began, formatted
    as an ISO 8601 string including timezone offset. Reflects the client's local time
    rather than UTC.
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- name: addon_id
  type: STRING
  mode: NULLABLE
  description: The unique identifier string for a Firefox browser add-on or extension,
    typically in the format of a UUID or a reverse-DNS email-style string (e.g., 'formautofill@mozilla.org').
- name: blocklisted
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the add-on appears in the Firefox blocklist. True if blocked,
    false otherwise.
- name: name
  type: STRING
  mode: NULLABLE
  description: A human-readable name string associated with the entity being described,
    such as an add-on or extension name. May be null or a placeholder string when
    the name is unavailable or not yet resolved.
- name: user_disabled
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the user has explicitly disabled this add-on. True if disabled
    by the user.
- name: app_disabled
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the application has disabled this add-on due to version incompatibility,
    dependency issues, or blocklisting. True if app-disabled.
- name: version
  type: STRING
  mode: NULLABLE
  description: The version string of the software, add-on, or component being measured.
    Follows standard versioning conventions such as major.minor.patch.
- name: scope
  type: INTEGER
  mode: NULLABLE
  description: 'Numeric code indicating the installation scope of the add-on: 1=profile,
    2=user, 4=application, 8=system, 16=built-in.'
- name: type
  type: STRING
  mode: NULLABLE
  description: The category of a browser add-on or extension, indicating its nature.
    Common values include 'extension', 'locale', 'dictionary', and 'service'.
- name: foreign_install
  type: BOOLEAN
  mode: NULLABLE
  description: Whether this add-on was installed by an external application rather
    than directly by the user. True if foreign-installed.
- name: has_binary_components
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the add-on includes binary (native code) components. Always
    false since Firefox 60.
- name: install_day
  type: INTEGER
  mode: NULLABLE
  description: The number of days since the Unix epoch (1970-01-01) on which this
    add-on was first installed.
- name: update_day
  type: INTEGER
  mode: NULLABLE
  description: The number of days since the Unix epoch (1970-01-01) on which this
    add-on was last updated.
- name: signed_state
  type: INTEGER
  mode: NULLABLE
  description: 'The AMO signature state of the add-on: 2=signed, 3=system add-on,
    4=preliminary signed; negative values indicate invalid or unsigned states.'
- name: is_system
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the add-on or component is a system-level (built-in)
    item rather than a user-installed one. True means it is a system item; false means
    it is user-installed.
- name: is_web_extension
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the add-on uses the WebExtension API. True for modern WebExtensions,
    false for legacy XUL-based add-ons.
- name: multiprocess_compatible
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the add-on is compatible with multi-process Firefox (e10s).
    Always true since Firefox 61.
- name: profile_group_id
  type: STRING
  mode: NULLABLE
  description: A UUID that identifies a group of profiles belonging to the same user
    or installation context. Null when profile group information is unavailable.
