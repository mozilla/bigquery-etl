fields:
- name: as_of_date
  type: DATE
  mode: NULLABLE
  description: Date for which the recovery phone counts were computed, used as the
    partition date.
- name: country_code
  type: STRING
  mode: NULLABLE
  description: Code of the country in which the activity took place, as determined
    by the IP geolocation.
- name: total_rows
  type: INTEGER
  mode: NULLABLE
  description: Total number of recovery phone records for the given country and date.
