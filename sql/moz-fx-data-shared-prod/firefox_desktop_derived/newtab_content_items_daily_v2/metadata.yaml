friendly_name: Newtab Content Items Daily v2
description: |-
  A daily aggregation of newtab content actions on content/items (example: impressions, clicks, dismissals)
  for Firefox desktop, partitioned by day.

  Extends newtab_content_items_daily_v1 with:
  - `format`: the tile display format extracted from event extras.
  - `impression_count_adjusted`: a propensity-corrected impression count. For items shown
    inside sections (section_position IS NOT NULL), raw impressions are divided by the
    positional propensity weight from newtab_merino_propensity_v1, normalising for the
    fact that lower-ranked positions receive fewer exposures. Non-section (grid) impressions
    are passed through unchanged.

  Related documentation:
  - Jira ticket: https://mozilla-hub.atlassian.net/browse/DENG-9057?focusedCommentId=1106194
  - Proposal Doc: https://docs.google.com/document/d/1dQfwddq1_3WoLctFqmT4L2aFiNgeFNsSd78PnV0GpmU/edit?usp=sharing
  - Newtab Content Ping: https://dictionary.telemetry.mozilla.org/apps/firefox_desktop/pings/newtab-content
  - Newtab Content Ping Rollout Doc: https://mozilla-hub.atlassian.net/wiki/spaces/FPS/pages/1517617439/Rollout+of+NewTab+Content+Ping
owners:
  - lmcfall@mozilla.com
labels:
  application: newtab
  incremental: true
  schedule: daily
  dag: bqetl_newtab
  owner1: lmcfall
  table_type: aggregate
scheduling:
  dag_name: bqetl_newtab
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: true
    expiration_days: null
  range_partitioning: null
  clustering:
    fields:
      - channel
      - country
workgroup_access:
  - role: roles/bigquery.dataViewer
    members:
      - workgroup:mozsoc-ml/service
      - workgroup:mozsoc-ml/developers
require_column_descriptions: false
