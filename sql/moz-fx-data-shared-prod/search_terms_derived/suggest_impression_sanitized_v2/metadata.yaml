friendly_name: Sanitized Firefox Suggest Impressions with Search Terms
description: |-
  Firefox Suggest impression pings joined with sanitized search query data
  captured in logs from the backend Merino service.

  This table allows removal of PII and slightly longer retention than
  the underlying ping table.

  Fulfills https://mozilla-hub.atlassian.net/browse/ROAD-85
owners:
- ctroy@mozilla.com
labels:
  incremental: true
  owner1: ctroy
bigquery:
  time_partitioning:
    type: day
    field: submission_timestamp
    require_partition_filter: true
    expiration_days: 14.0
  clustering:
    fields:
    - normalized_channel
    - sample_id
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:search-terms/sanitized
- role: roles/bigquery.metadataViewer
  members:
  - workgroup:search-terms/external-outerbounds-task-search-terms-sanitized
  - workgroup:search-terms/sanitized-writer
references:
  query.sql:
  - suggest-searches-prod-a30f.sanitized.suggest_impression_sanitized_v2
