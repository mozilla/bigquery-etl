fields:
- mode: NULLABLE
  name: corpus_item_id
  type: STRING
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: corpus_item_id
- mode: NULLABLE
  name: impression_count
  type: INTEGER
  description: The propensity-weight-adjusted number of impressions for this corpus item. For section-layout
    events the raw count is divided by the position-bias propensity weight; for non-section events the raw
    count passes through unchanged.
- mode: NULLABLE
  name: click_count
  type: INTEGER
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: click_count
- mode: NULLABLE
  name: report_count
  type: INTEGER
  description: Total number of times users submitted content reports for the corpus item via the report
    content dialog in the reporting period.
- mode: NULLABLE
  name: region
  type: STRING
  description: !include-field-description
