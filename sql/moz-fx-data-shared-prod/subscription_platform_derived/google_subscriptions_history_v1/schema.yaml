fields:
- name: id
  type: STRING
  mode: NULLABLE
  description: |-
    History record ID.
- name: valid_from
  type: TIMESTAMP
  mode: NULLABLE
  description: |-
    Start of the time range this history record is considered valid for (inclusive).
- name: valid_to
  type: TIMESTAMP
  mode: NULLABLE
  description: |-
    End of the time range this history record is considered valid for (non-inclusive).
    Open-ended history records will have this set to the max timestamp value (9999-12-31 23:59:59.999999).
- name: google_subscriptions_revised_changelog_id
  type: STRING
  mode: NULLABLE
  description: |-
    ID of the `google_subscriptions_revised_changelog_v1` record this history record was derived from.
- name: original_subscription_purchase_token
  type: STRING
  mode: NULLABLE
  description: |-
    The subscription's original purchase token.
    This can differ from `subscription.metadata.purchase_token` if the subscription has had a series of purchases (e.g. upgrades/downgrades).
- !include-field
  table: moz-fx-data-shared-prod.subscription_platform_derived.google_subscriptions_revised_changelog_v1
  field: subscription
  new_description: |-
    Google subscription as it ostensibly was during the time range this history record is considered valid for.
