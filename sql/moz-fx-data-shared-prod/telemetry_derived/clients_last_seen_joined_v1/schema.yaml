  name: active_addons
  type: RECORD
  description: Array of active add-ons installed on this client as of the most recent active day, including metadata such as ID, name, version, and flags
    for whether the add-on is a system extension or web extension.
- mode: NULLABLE
  name: active_experiment_branch
  type: STRING
  description: The branch of the legacy active experiment this client was enrolled in. Null for clients not in a legacy experiment.
- mode: NULLABLE
  name: active_experiment_id
  type: STRING
  description: The ID of the legacy active experiment this client was enrolled in. Null for clients not in a legacy experiment.
- mode: NULLABLE
  name: active_hours_sum
  type: FLOAT
  description: Total number of active browsing hours logged by this client on the most recent active day.
- mode: NULLABLE
  name: addon_compatibility_check_enabled
  type: BOOLEAN
  description: Whether add-on compatibility checking was enabled on this client on the most recent active day.
- mode: NULLABLE
  name: app_build_id
  type: STRING
  description: The build ID of the Firefox application identifying the specific build on the most recent active day (e.g., '20260511200624').
- mode: NULLABLE
  name: app_display_version
  type: STRING
  description: User visible version string (e.g. "1.0.3") for the browser.
- mode: NULLABLE
  name: app_name
  type: STRING
  description: The application name reported by this client, always 'Firefox' for rows in this table.
- mode: NULLABLE
  name: app_version
  type: STRING
  description: User visible version string (e.g. "1.0.3") for the browser.
