fields:
- name: account_enabled
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the user's logged in to an FxA account.
- name: activity_segment
  type: STRING
  description: Classification of users based on their browsing activity.
    E.g., infrequent, casual, regular.
  aliases:
  - segment
  possible_values:
  - casual_user
  - core_user
  - infrequent_user
  - regular_user
  - other
- name: adjust_network
  type: STRING
  mode: NULLABLE
  description: The name of the Adjust Network that sourced the installation.
- name: app_build_id
  type: STRING
  description: The build ID of the application.
  aliases:
  - build_id
- name: app_version
  type: INTEGER
  description: User visible version string (e.g. "1.0.3") for the browser.
  aliases:
  - version
  - app_display_version
- name: app_version_major
  type: INTEGER
  description: The major version of the user visible app version string for the browser,
    e.g. "142.1.3", has major version 142
- name: app_version_minor
  type: INTEGER
  description: The minor version of the user visible app version string for the browser,
    e.g. "142.1.3" has minor version 1
- name: app_version_patch
  type: INTEGER
  description: The patch version of the user visible app version string for the browser,
    e.g. "142.1.3" has patch version 3
- name: app_name
  type: STRING
  description: The name of the browser or application.
- name: architecture
  type: STRING
  description: The architecture of the device, (e.g. "arm", "x86").
- name: branch
  type: STRING
  description: The Nimbus experiment branch to which the client was assigned
    (e.g., "control", "treatment-a", "treatment-b").
- name: attribution_campaign
  type: STRING
  description: The campaign this client/install was attributed to (utm_campaign
    value, identifying a specific marketing campaign or promotion).
- name: attribution_content
  type: STRING
  description: The attribution content; similar or the same as UTM content.
- name: attribution_experiment
  type: STRING
  description: The attribution experiment key.
- name: attribution_medium
  type: STRING
  description: The attribution medium; similar or the same as UTM medium.
- name: attribution_source
  type: STRING
  description: The attribution source; similar or the same as UTM source.
- name: attribution_variation
  type: STRING
  description: The attribution variation key.
- name: client_id
  type: STRING
  description: A unique identifier (UUID) for the client.
- name: context_id
  type: STRING
  description: A unique identifier (UUID) for clients in contextual services user
    interaction pings, e.g. top-sites ping.
- name: country
  type: STRING
  description: Name of the country in which the activity took place, as determined by
    the IP geolocation.
  aliases:
  - normalized_country
  - geo
- name: country_code
  type: STRING
  description: Code of the country in which the activity took place, as determined by
    the IP geolocation. Unknown or NULL values are normally stored as '??'.
  aliases:
  - normalized_country_code
- name: created_at
  type: TIMESTAMP
  description: Timestamp when the row was created.
  aliases:
  - created_timestamp
  - created_date
- name: dau
  type: INTEGER
  description: The number of daily active users, corresponding to the count of clients that reported
    at least one ping on the submission_date and qualify as active.
- name: first_run_date
  type: DATE
  mode: NULLABLE
  description: The date of the first run of the application.
- name: first_seen_date
  type: DATE
  mode: NULLABLE
  description: Date when the server first received a ping from this client.
- name: wau
  type: INTEGER
  description: The number of weekly active users, corresponding to the count of clients that reported
    at least one ping on the previous 7 days from the submission_date and qualify as active.
- name: mau
  type: INTEGER
  description: The number of monthly active users, corresponding to the count of clients that reported
    at least one ping on the previous 28 days from the submission_date and qualify as active.
- name: distribution_id
  type: STRING
  description: The distribution id associated with the install of Firefox.
- name: document_id
  type: STRING
  description: The document ID specified in the URI when the client sent this message.
- name: is_bot_generated
  type: BOOLEAN
  description: A flag indicating whether the record was generated by a bot rather
    than a real user interaction.
- name: is_default_browser
  type: BOOLEAN
  description: A flag indicating whether the browser is set as the default browser on the client side.
- name: is_desktop
  type: BOOLEAN
  description: Indicates if the client is included in the desktop KPI.
- name: is_mobile
  type: BOOLEAN
  description: Indicates if the client is included in the mobile KPI.
- name: isp_name
  type: STRING
  description: The name of the internet service provider associated with the client's IP address.
  aliases:
  - isp
- name: locale
  type: STRING
  description: Set of language- and/or country-based preferences for a user interface.
- name: normalized_channel
  description: The normalized channel the application is being distributed on.
  type: STRING
  aliases:
  - channel
  possible_values:
  - release
  - beta
  - nightly
  - aurora
  - esr
  - Other
- name: normalized_os
  type: STRING
  description: The normalized name of the operating system running at the client.
  aliases:
  - os
- name: os_code
  type: STRING
  mode: NULLABLE
  description: The operating system code based on the Common Platform Enumeration CPE.
- name: os_version
  type: STRING
  description: The operating system version running at the client prior to
    normalization (e.g. "4.18.0-553.97.1.el8_10.aarch64" or
    "6.11+parrot-amd64" for Linux; "10.0" for Windows, "25.3.0" for macOS,
    "26.3.1" for iOS, "16" for Android). Windows 10 and Windows 11 both
    show "10.0". Use `windows_build_number >= 22000` to identify
    Windows 11.
- name: normalized_os_version
  type: STRING
  description: The operating system version normalized to a consistent format
    at ingestion (e.g. "10.0" for Windows, "16" for Android, "26.3.1" for
    iOS, "25.3.0" for macOS, "6.8" for Linux). Windows 10 and Windows 11
    both show "10.0". Use `windows_build_number >= 22000` to identify
    Windows 11.
- name: os_major
  type: INTEGER
  description: Major or first part of the operating system version running at the
    client. E.g. for version "100.9.11", the major is 100.
  aliases:
  - os_major_version
  - os_version_major
- name: os_minor
  type: INTEGER
  description: Minor part of the operating system version running at the client. E.g.
    for version "100.9.11", the minor is 9.
  aliases:
  - os_minor_version
  - os_version_minor
- name: profile_group_id
  type: STRING
  description: A UUID uniquely identifying the profile group, not shared with other telemetry data.
- name: sample_id
  type: INTEGER
  description: A number, 0-99, that samples by client_id and allows filtering data for analysis.
    It is a pipeline-generated artifact that should match between pings.
- name: source_column
  type: STRING
  description: Column name in the source used to ingest the data.
- name: source_report
  type: STRING
  description: Name of the report file used to ingest the data.
  aliases:
  - source_file
- name: submission_date
  type: DATE
  description: The date when the telemetry ping is received on the server side.
- name: submission_hour
  type: TIMESTAMP
  description: The submission_timestamp truncated to the hour.
- name: submission_month
  type: DATE
  description: First calendar day of the month extracted from submission_date or
    submission_timestamp.
- name: submission_timestamp
  type: TIMESTAMP
  description: Timestamp when the ping is received on the server side.
- name: telemetry_sdk_build
  type: STRING
  description: The version of the Glean SDK at the time the ping was collected (e.g. 25.0.0).
- name: updated_at
  type: TIMESTAMP
  description: Most recent date and time when the row was updated.
  aliases:
  - updated_timestamp
  - updated_date
- name: city
  description: The city in which the activity took place, as determined by IP geolocation.
- name: channel
  description: The normalized channel the application is being distributed on.
- name: os
  description: The normalized name of the operating system running at the client.
- name: os_version_major
  description: Major or first part of the operating system version running at the client. E.g. for version "100.9.11", the major is 100.
- name: os_version_minor
  description: Minor part of the operating system version running at the client. E.g. for version "100.9.11", the minor is 9.
- name: app_version_patch_revision
  description: The patch/revision component of the app version. Null (~61%) for versions without a patch number (sampled 2026-06-02).
- name: windows_build_number
  description: The Windows build number (e.g. 22000). Always null for mobile platforms (sampled 2026-06-02).
- name: app_channel
  description: The release channel for this application entry, e.g. 'release', 'beta', or 'nightly'.
- name: attribution_dlsource
  description: Identifier indicating where the Firefox installation originated (e.g., 'mozorg', 'fxdotcom', 'mozillaci').
- name: attribution_dltoken
  description: A unique token created at Firefox download time to correlate installs with download events.
- name: attribution_ua
  description: The derived user agent type at attribution time (e.g., 'chrome', 'edge', 'firefox').
- name: attribution.campaign
  description: The campaign identifier from the install attribution.
- name: attribution.content
  description: The attribution content identifier from the install attribution.
- name: attribution.dlsource
  description: Identifier indicating where the Firefox installation originated (e.g., 'mozorg', 'fxdotcom').
- name: attribution.dltoken
  description: A unique token created at Firefox download time to correlate installs with download events.
- name: attribution.experiment
  description: The attribution experiment key associated with the install.
- name: attribution.medium
  description: The attribution medium from the install (e.g., 'organic', 'referral', 'cpc').
- name: attribution.source
  description: The attribution source from the install attribution, indicating the referring partner domain that drove the installation.
- name: attribution.ua
  description: The derived user agent type at attribution time (e.g., 'chrome', 'edge', 'firefox').
- name: attribution.variation
  description: The attribution variation key associated with the install.
- name: build_id
  description: The Firefox build ID of the client at the time of first seen, in YYYYMMDDHHMMSS format.
- name: adjust_ad_group
  description: The Adjust ad group identifier associated with the mobile install attribution. Only available for mobile clients.
- name: adjust_campaign
  description: The Adjust campaign identifier associated with the mobile install attribution. Only available for mobile clients.
- name: adjust_creative
  description: The Adjust creative identifier (e.g., ad creative name) associated with the mobile install attribution. Only available for mobile clients.
- name: normalized_app_name
  description: The normalized name of the Firefox application (e.g., Fenix, Firefox Desktop, Focus Android). Set to 'Other' if the app name was unrecognized.
- name: play_store_attribution_campaign
  description: The Google Play Store attribution campaign associated with the install, sourced from the Play Store referral parameters. Only available
    for Android clients.
- name: play_store_attribution_content
  description: The Google Play Store attribution content parameter associated with the install. Only available for Android clients.
- name: play_store_attribution_install_referrer_response
  description: The raw install referrer response string from the Google Play Store (e.g., 'utm_source=google-play&utm_medium=organic'), containing
    the full set of attribution parameters. Only available for Android clients.
- name: play_store_attribution_medium
  description: The Google Play Store attribution medium (e.g., 'organic', 'referral', 'preload') associated with the install. Only available for Android
    clients.
- name: play_store_attribution_source
  description: The Google Play Store attribution source (e.g., 'google-play', 'eea-browser-choice') associated with the install. Only available for
    Android clients.
- name: play_store_attribution_term
  description: The Google Play Store attribution search term associated with the install (e.g., 'firefox', 'mozilla firefox'). Only available for Android
    clients.
- name: arch
  description: The CPU architecture of the device (e.g., 'arm64-v8a', 'armeabi-v7a', 'arm64', 'x86_64'). Represents the modal value across all core
    pings for this client on the day.
- name: default_browser
  description: Whether the user has set Firefox as their default browser at the time of the ping. Null (~90%) when this preference is not reported
    by the client.
- name: application_name
  description: The normalized application name reporting the crash (always 'Firefox' in this table, sampled 2026-06-02).
- name: activity_segments_v1
  description: 'User engagement segment based on browsing frequency. Values: ''core_user'', ''regular_user'', ''infrequent_user'', ''casual_user'',
    ''other'' (sampled 2026-06-02).'
- name: subsample_id
  description: A number, 0-99, that samples by client_id to allow filtering data for analysis. Uniformly distributed across 100 buckets (sampled 2026-06-02).
- name: client_info.telemetry_sdk_build
  description: The version of the Glean SDK at the time the crash ping was collected (e.g. '67.2.0') (sampled 2026-06-02).
- name: normalized_country_code
  description: ISO 3166-1 alpha-2 country code of the client's location, as determined by IP geolocation (e.g. 'US', 'IN', 'FR') (sampled 2026-06-02).
- name: campaign
  description: The attribution campaign (UTM campaign) for the Firefox installation; null when the client is not attributed (sampled 2026-06-02).
- name: content
  description: The attribution content (UTM content) for the Firefox installation; null when the client is not attributed (sampled 2026-06-02).
- name: medium
  description: The attribution medium (UTM medium) for the Firefox installation; null when the client is not attributed (sampled 2026-06-02).
- name: source
  description: The attribution source (UTM source) for the Firefox installation; null when the client is not attributed (sampled 2026-06-02).
- name: app_display_version
  description: The user-visible version string of Firefox (e.g. '120.0.1').
- name: fields.client_id
  description: A unique identifier (UUID) for the client, nested inside the fields struct.
- name: os_version_patch
  description: The patch (third) component of the OS version string. For example, for '100.9.11', the patch is 11. Defaults to 0 when not present or
    parseable.
- name: experiments
  description: An array of key-value pairs listing the Nimbus experiments and rollouts the client was enrolled in on the submission date, where key
    is the experiment slug and value is the branch name (e.g. 'control', 'treatment-a').
