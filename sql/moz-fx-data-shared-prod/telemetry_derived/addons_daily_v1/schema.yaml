  type: STRING
  mode: NULLABLE
  description: The most frequently observed default search engine string among clients with this add-on
    installed on the submission date (e.g., 'google-b-d', 'ddg').
- name: dau
  type: INT64
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: dau
- name: wau
  type: INT64
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: wau
