fields:
- name: logName
  type: STRING
  mode: NULLABLE
  description: The resource name of the log to which this log entry belongs.
- name: resource
  type: RECORD
  mode: NULLABLE
  description: The monitored resource that produced this log entry.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: The monitored resource type. For example, the type of a Compute Engine
      VM instance is `gce_instance`.
  - name: labels
    type: RECORD
    mode: NULLABLE
    description: GCP resource metadata labels attached to the log entry by Cloud Logging.
    fields:
    - name: instance_id
      type: STRING
      mode: NULLABLE
      description: Cloud instance identifier of the node that generated the log entry.
    - name: project_id
      type: STRING
      mode: NULLABLE
      description: GCP project ID of the log source.
    - name: zone
      type: STRING
      mode: NULLABLE
      description: Availability zone of the resource.
- name: textPayload
  type: STRING
  mode: NULLABLE
  description: The log entry payload, represented as a Unicode string (UTF-8).
- name: jsonPayload
  type: RECORD
  mode: NULLABLE
  description: The log entry payload, represented as a structure that is expressed
    as a JSON object.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: Log entry type classifier (e.g., 'amplitudeEvent').
  - name: pid
    type: FLOAT
    mode: NULLABLE
    description: Process ID of the FxA service instance that generated the log entry.
  - name: logger
    type: STRING
    mode: NULLABLE
    description: Name of the logger or component that emitted the log entry (e.g.,
      'fxa-auth-server', 'fxa-content-server', 'fxa-oauth-server'). Used to derive
      the top-level `fxa_server` field.
  - name: timestamp
    type: FLOAT
    mode: NULLABLE
    description: Application-level event timestamp as a Unix epoch nanoseconds float,
      as reported by the FxA service. Distinct from the top-level Cloud Logging `timestamp`.
  - name: severity
    type: FLOAT
    mode: NULLABLE
    description: Application-level numeric log severity from the FxA service payload,
      using syslog-style levels (6=informational, 2=critical). Distinct from the top-level
      Cloud Logging `severity` STRING field.
  - name: envversion
    type: STRING
    mode: NULLABLE
    description: Log envelope version used by the FxA logging framework.
  - name: fields
    type: RECORD
    mode: NULLABLE
    fields:
    - name: op
      type: STRING
      mode: NULLABLE
      description: Operation or action type associated with the event.
    - name: os_version
      type: STRING
      mode: NULLABLE
      description: Operating system version string from the event payload.
    - name: event_properties
      type: STRING
      mode: NULLABLE
      description: Structured event properties for the amplitude event, as a JSON
        string.
    - name: event_type
      type: STRING
      mode: NULLABLE
      description: Event type string identifying the category of event (e.g., 'fxa_login
        - complete', 'fxa_email - sent').
    - name: country
      type: STRING
      mode: NULLABLE
      description: Country associated with the event, as a full country name (e.g.,
        'United States').
    - name: os_name
      type: STRING
      mode: NULLABLE
      description: Operating system name from the event payload (e.g., 'Windows',
        'iOS', 'Android').
    - name: time
      type: FLOAT
      mode: NULLABLE
      description: Event time as a Unix epoch milliseconds float.
    - name: language
      type: STRING
      mode: NULLABLE
      description: BCP 47 language tag for the user's locale at the time of the event
        (e.g., 'en-US', 'de').
    - name: user_properties
      type: STRING
      mode: NULLABLE
      description: Structured user properties for the amplitude event, as a JSON string.
    - name: session_id
      type: FLOAT
      mode: NULLABLE
      description: Identifier for the user's FxA session, represented as an epoch
        millisecond timestamp.
    - name: region
      type: STRING
      mode: NULLABLE
      description: Geographic region associated with the event (e.g., 'California').
    - name: app_version
      type: STRING
      mode: NULLABLE
      description: Firefox Accounts application version at the time of the event (e.g.,
        '333.6').
    - name: device_model
      type: STRING
      mode: NULLABLE
      description: Device model associated with the event (e.g., 'iPhone', 'iPad').
    - name: err
      type: STRING
      mode: NULLABLE
      description: Error details associated with the event, if any.
    - name: method
      type: STRING
      mode: NULLABLE
      description: HTTP method associated with the request.
    - name: path
      type: STRING
      mode: NULLABLE
      description: URL path of the request.
    - name: clientaddress
      type: STRING
      mode: NULLABLE
      description: Client IP address as logged by the FxA service.
    - name: remoteaddresschain
      type: STRING
      mode: NULLABLE
      description: Forwarding chain of client IP addresses from X-Forwarded-For headers.
    - name: useragent
      type: STRING
      mode: NULLABLE
      description: Raw user agent string from the request.
    - name: status
      type: STRING
      mode: NULLABLE
      description: HTTP or application status code for the event.
    - name: t
      type: STRING
      mode: NULLABLE
      description: Elapsed time in milliseconds for the operation.
    - name: contentlength
      type: STRING
      mode: NULLABLE
      description: HTTP Content-Length header value in bytes.
    - name: referer
      type: STRING
      mode: NULLABLE
      description: HTTP referer URL from the event payload.
    - name: violated
      type: STRING
      mode: NULLABLE
      description: CSP directive that was violated, from a content security policy
        report.
    - name: agent
      type: STRING
      mode: NULLABLE
      description: User agent string from the event payload.
    - name: source
      type: STRING
      mode: NULLABLE
      description: Source identifier for the event (e.g., originating service or component).
    - name: line
      type: FLOAT
      mode: NULLABLE
      description: Source code line number associated with the log event.
    - name: blocked
      type: STRING
      mode: NULLABLE
      description: Whether the action was blocked (e.g., by rate limiting or IP blocklist).
    - name: column
      type: FLOAT
      mode: NULLABLE
      description: Source code column number associated with the log event.
    - name: referrer
      type: STRING
      mode: NULLABLE
      description: HTTP referrer URL at the time of the event.
    - name: sample
      type: STRING
      mode: NULLABLE
      description: Sampling rate or sample value associated with the log entry.
    - name: msg
      type: STRING
      mode: NULLABLE
      description: Log message string from the structured event payload.
    - name: error
      type: STRING
      mode: NULLABLE
      description: Error message or details associated with the event.
    - name: stack
      type: STRING
      mode: NULLABLE
      description: Stack trace string. Populated on error events.
    - name: context
      type: STRING
      mode: NULLABLE
      description: Context string for the event (OAuth flow context).
    - name: event
      type: STRING
      mode: NULLABLE
      description: Event name from the FxA service payload. In Amplitude-connected
        tables this is an Amplitude event name; in admin and log tables it is a service-level
        action name.
    - name: joierrors
      type: STRING
      mode: NULLABLE
      description: Joi schema validation error messages, populated when request validation
        fails.
    - name: user_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA user identifier, hex-encoded.
    - name: device_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA device identifier, hex-encoded.
    - name: config
      type: STRING
      mode: NULLABLE
      description: Configuration metadata associated with the event.
    - name: tags
      type: STRING
      mode: NULLABLE
    - name: release
      type: STRING
      mode: NULLABLE
    - name: level
      type: STRING
      mode: NULLABLE
    - name: project
      type: STRING
      mode: NULLABLE
    - name: extra
      type: STRING
      mode: NULLABLE
    - name: request
      type: STRING
      mode: NULLABLE
      description: Request metadata associated with the event.
    - name: exception
      type: STRING
      mode: NULLABLE
    - name: fingerprint
      type: STRING
      mode: NULLABLE
    - name: culprit
      type: STRING
      mode: NULLABLE
    - name: logger
      type: STRING
      mode: NULLABLE
    - name: event_id
      type: STRING
      mode: NULLABLE
    - name: platform
      type: STRING
      mode: NULLABLE
    - name: message
      type: STRING
      mode: NULLABLE
      description: Log message from the event payload.
    - name: value
      type: STRING
      mode: NULLABLE
    - name: param
      type: STRING
      mode: NULLABLE
      description: Parameter field from the event payload.
    - name: amplitudeevent
      type: STRING
      mode: NULLABLE
    description: Application-level structured event data from the FxA service.
  - name: region
    type: STRING
    mode: NULLABLE
    description: Geographic region associated with the event.
  - name: hostname
    type: STRING
    mode: NULLABLE
    description: Hostname of the server or container that generated the log entry.
  - name: flow_id
    type: STRING
    mode: NULLABLE
    description: UUID flow identifier from the FxA content server log payload, linking
      all events in a single authentication session.
  - name: flow_time
    type: FLOAT
    mode: NULLABLE
    description: Milliseconds elapsed since the authentication flow began, as reported
      by the FxA content server. Pair with `flow_id` to measure funnel completion
      latency.
  - name: v
    type: FLOAT
    mode: NULLABLE
    description: Payload schema version number used by the FxA logging framework.
  - name: country
    type: STRING
    mode: NULLABLE
    description: Country associated with the event, as a full country name.
  - name: entrypoint
    type: STRING
    mode: NULLABLE
    description: FxA entry point where the user started the flow, set by Firefox UI
      callsites (e.g., 'menupanel', 'preferences', 'synced-tabs'). Not a fixed enum.
  - name: event
    type: STRING
    mode: NULLABLE
    description: FxA content server event name (e.g., 'flow.signin.view', 'flow.signin.submit').
      Excludes Amplitude-captured event types.
  - name: useragent
    type: STRING
    mode: NULLABLE
    description: User agent string from the log payload.
  - name: op
    type: STRING
    mode: NULLABLE
    description: Operation type from the log payload.
  - name: locale
    type: STRING
    mode: NULLABLE
    description: BCP 47 locale string (e.g., 'en-US', 'fr', 'de') from the FxA content
      server log payload.
  - name: service
    type: STRING
    mode: NULLABLE
    description: The Mozilla service or relying party associated with the event.
  - name: context
    type: STRING
    mode: NULLABLE
    description: OAuth context string identifying the FxA flow type (e.g., 'oauth',
      'fx_desktop_v3'). Set when the flow originates from a relying party OAuth integration.
  - name: utm_campaign
    type: STRING
    mode: NULLABLE
    description: UTM campaign parameter identifying the marketing campaign that drove
      the user to FxA.
  - name: utm_medium
    type: STRING
    mode: NULLABLE
    description: UTM medium parameter identifying the marketing channel (e.g., 'cpc',
      'email', 'social').
  - name: utm_content
    type: STRING
    mode: NULLABLE
    description: UTM content parameter used to distinguish links within the same campaign
      (for A/B testing creative).
  - name: utm_source
    type: STRING
    mode: NULLABLE
    description: UTM source parameter identifying the traffic origin (e.g., 'google',
      'email'). Present when the user arrived at FxA via a tracked marketing URL.
  - name: user_properties
    type: RECORD
    mode: NULLABLE
    fields:
    - name: ua_browser
      type: STRING
      mode: NULLABLE
    - name: utm_campaign
      type: STRING
      mode: NULLABLE
    - name: _append
      type: RECORD
      mode: NULLABLE
      fields:
      - name: fxa_services_used
        type: STRING
        mode: NULLABLE
      - name: experiments
        type: STRING
        mode: REPEATED
    - name: flow_id
      type: STRING
      mode: NULLABLE
    - name: entrypoint
      type: STRING
      mode: NULLABLE
    - name: utm_source
      type: STRING
      mode: NULLABLE
    - name: ua_version
      type: STRING
      mode: NULLABLE
    - name: utm_content
      type: STRING
      mode: NULLABLE
    - name: utm_medium
      type: STRING
      mode: NULLABLE
    - name: utm_term
      type: STRING
      mode: NULLABLE
    - name: newsletter_state
      type: STRING
      mode: NULLABLE
  - name: user_id
    type: STRING
    mode: NULLABLE
  - name: os_version
    type: STRING
    mode: NULLABLE
  - name: device_id
    type: STRING
    mode: NULLABLE
  - name: event_properties
    type: RECORD
    mode: NULLABLE
    fields:
    - name: service
      type: STRING
      mode: NULLABLE
    - name: reason
      type: STRING
      mode: NULLABLE
    - name: connect_device_flow
      type: STRING
      mode: NULLABLE
    - name: email_provider
      type: STRING
      mode: NULLABLE
    - name: email_type
      type: STRING
      mode: NULLABLE
    - name: oauth_client_id
      type: STRING
      mode: NULLABLE
    - name: connect_device_os
      type: STRING
      mode: NULLABLE
  - name: event_type
    type: STRING
    mode: NULLABLE
  - name: os_name
    type: STRING
    mode: NULLABLE
  - name: app_version
    type: STRING
    mode: NULLABLE
  - name: language
    type: STRING
    mode: NULLABLE
  - name: session_id
    type: FLOAT
    mode: NULLABLE
  - name: device_model
    type: STRING
    mode: NULLABLE
- name: timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the event described by the log entry occurred, as reported
    by the originating FxA service.
- name: receiveTimestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the log entry was received by Logging.
- name: severity
  type: STRING
  mode: NULLABLE
  description: The severity of the log entry. The default value is `LogSeverity.DEFAULT`.
- name: insertId
  type: STRING
  mode: NULLABLE
  description: A unique identifier for the log entry. Logging considers other log
    entries in the same project, with the same `timestamp`, and with the same `insertId`
    to be duplicates which are removed in a single query result.
- name: httpRequest
  type: RECORD
  mode: NULLABLE
  description: Information about the HTTP request associated with this log entry,
    if applicable.
  fields:
  - name: requestMethod
    type: STRING
    mode: NULLABLE
    description: 'The request method. Examples: "GET", "HEAD", "PUT", "POST".'
  - name: requestUrl
    type: STRING
    mode: NULLABLE
    description: The scheme (http, https), the host name, the path and the query portion
      of the URL that was requested.
  - name: requestSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP request message in bytes, including the request
      headers and the request body.
  - name: status
    type: INTEGER
    mode: NULLABLE
    description: 'The response code indicating the status of response. Examples: 200,
      404.'
  - name: responseSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP response message sent back to the client, in
      bytes.
  - name: userAgent
    type: STRING
    mode: NULLABLE
    description: The user agent sent by the client.
  - name: remoteIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the client that issued the HTTP
      request.
  - name: serverIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the origin server that the request
      was sent to.
  - name: referer
    type: STRING
    mode: NULLABLE
    description: The referer URL of the request, as defined in HTTP/1.1 Header Field
      Definitions.
  - name: cacheLookup
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not a cache lookup was attempted.
  - name: cacheHit
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not an entity was served from cache (with or without validation).
  - name: cacheValidatedWithOriginServer
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not the response was validated with the origin server
      before being served from cache. This field is only meaningful if `cacheHit`
      is True.
  - name: cacheFillBytes
    type: INTEGER
    mode: NULLABLE
    description: The number of HTTP response bytes inserted into cache. Set only when
      a cache fill was attempted.
  - name: protocol
    type: STRING
    mode: NULLABLE
    description: 'Protocol used for the request. Examples: "HTTP/1.1", "HTTP/2".'
- name: labels
  type: RECORD
  mode: NULLABLE
  description: A map of key, value pairs that provides additional information about
    the log entry.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: Type label from the log metadata indicating the log source category.
  - name: compute_googleapis_com_resource_name
    type: STRING
    mode: NULLABLE
    description: GCP Compute resource name (compute.googleapis.com/resource_name),
      identifying the VM or node that generated the log entry.
  - name: application
    type: STRING
    mode: NULLABLE
    description: Application label identifying the FxA application.
  - name: env
    type: STRING
    mode: NULLABLE
    description: Deployment environment label.
  - name: stack
    type: STRING
    mode: NULLABLE
    description: Stack label from the log metadata.
  - name: fxa________
    type: STRING
    mode: NULLABLE
  - name: defau
    type: STRING
    mode: NULLABLE
  - name: cont
    type: STRING
    mode: NULLABLE
  - name: pro
    type: STRING
    mode: NULLABLE
  - name: fxa______pi
    type: STRING
    mode: NULLABLE
- name: operation
  type: RECORD
  mode: NULLABLE
  description: Information about an operation associated with the log entry, if applicable.
  fields:
  - name: id
    type: STRING
    mode: NULLABLE
    description: An arbitrary operation identifier. Log entries with the same identifier
      are assumed to be part of the same operation.
  - name: producer
    type: STRING
    mode: NULLABLE
    description: An arbitrary producer identifier. The combination of `id` and `producer`
      must be globally unique.
  - name: first
    type: BOOLEAN
    mode: NULLABLE
    description: Set this to True if this is the first log entry in the operation.
  - name: last
    type: BOOLEAN
    mode: NULLABLE
    description: Set this to True if this is the last log entry in the operation.
- name: trace
  type: STRING
  mode: NULLABLE
  description: The trace ID being written to Cloud Trace in association with this
    log entry.
- name: spanId
  type: STRING
  mode: NULLABLE
  description: The ID of the Cloud Trace span associated with the current operation
    in which the log is being written.
- name: traceSampled
  type: BOOLEAN
  mode: NULLABLE
  description: The sampling decision of the span associated with the log entry at
    the time the log entry was created.
- name: sourceLocation
  type: RECORD
  mode: NULLABLE
  description: Source code location information associated with the log entry, if
    any.
  fields:
  - name: file
    type: STRING
    mode: NULLABLE
    description: Source file name. Depending on the runtime environment, this might
      be a simple name or a fully-qualified name.
  - name: line
    type: INTEGER
    mode: NULLABLE
    description: Line within the source file. 1-based; 0 indicates no line number
      available.
  - name: function
    type: STRING
    mode: NULLABLE
    description: Human-readable name of the function or method being invoked, with
      optional context such as the class or package name.
- name: split
  type: RECORD
  mode: NULLABLE
  description: Information indicating this LogEntry is part of a sequence of multiple
    log entries split from a single LogEntry.
  fields:
  - name: uid
    type: STRING
    mode: NULLABLE
    description: A globally unique identifier for all log entries in a sequence of
      split log entries.
  - name: index
    type: INTEGER
    mode: NULLABLE
    description: The index of this LogEntry in the sequence of split log entries.
  - name: totalSplits
    type: INTEGER
    mode: NULLABLE
    description: The total number of log entries that the original LogEntry was split
      into.
