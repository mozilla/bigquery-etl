fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: submission_date
- name: usage
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: usage
- name: metrics
  type: RECORD
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: metrics
  fields:
  - name: day_0
    type: RECORD
    mode: NULLABLE
    description: Usage metrics evaluated on the snapshot (submission) date, day 0 of the observation window.
    fields:
    - name: active_days_in_week
      type: INT64
      mode: NULLABLE
      description: Total number of active days summed across all clients within the most recent 7-day window ending on the snapshot date.
    - name: dau
      type: INT64
      mode: NULLABLE
      description: Daily Active Users (DAU) on the snapshot date, counting clients whose most recent activity was less than 1 day prior (active that day).
    - name: mau
      type: INT64
      mode: NULLABLE
      description: Monthly Active Users (MAU) on the snapshot date, counting clients active at least one day in the previous 28 days.
    - name: wau
      type: INT64
      mode: NULLABLE
      description: Weekly Active Users (WAU) on the snapshot date, counting clients active at least one day in the previous 7 days.
  - name: day_13
    type: RECORD
    mode: NULLABLE
    description: Two-week retention metrics evaluated 13 days after the profile-creation (cohort) anchor
      date, where week 0 covers days 0 through 6 and week 1 covers days 7 through 13.
    fields:
    - name: active_in_week_0
      type: INT64
      mode: NULLABLE
      description: Count of clients active at least one day during week 0 (days 0 through 6 of the two-week window).
    - name: active_in_week_1
      type: INT64
      mode: NULLABLE
      description: Count of clients active at least one day during week 1 (days 7 through 13 of the two-week window).
    - name: active_in_weeks_0_and_1
      type: INT64
      mode: NULLABLE
      description: Count of clients active at least one day in both week 0 and week 1 of the two-week window.
    - name: new_profile_active_in_week_0
      type: INT64
      mode: NULLABLE
      description: Count of clients whose profile was created 13 days before the snapshot date that were
        active at least one day during week 0 (days 0 through 6).
    - name: new_profile_active_in_week_1
      type: INT64
      mode: NULLABLE
      description: Count of clients whose profile was created 13 days before the snapshot date that were
        active at least one day during week 1 (days 7 through 13).
    - name: new_profile_active_in_weeks_0_and_1
      type: INT64
      mode: NULLABLE
      description: Count of clients whose profile was created 13 days before the snapshot date that were active at least one day in both week 0 and week 1.
    - name: new_profiles
      type: INT64
      mode: NULLABLE
      description: Count of clients whose profile was created exactly 13 days before the snapshot date.
  - name: day_6
    type: RECORD
    mode: NULLABLE
    description: Metrics evaluated 6 days after the profile-creation (cohort) anchor date.
    fields:
    - name: new_profiles
      type: INT64
      mode: NULLABLE
      description: Count of clients whose profile was created exactly 6 days before the snapshot date.
