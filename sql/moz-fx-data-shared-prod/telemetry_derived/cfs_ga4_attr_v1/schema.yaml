fields:
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A UUID that uniquely identifies a Firefox client installation. Used
    to join and deduplicate records across tables at the individual client level.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- name: first_seen_date
  type: DATE
  mode: NULLABLE
  description: The calendar date on which the client profile was first observed in
    telemetry data. This is used to determine client tenure and cohort assignment.
- name: second_seen_date
  type: DATE
  mode: NULLABLE
  description: The calendar date on which the client was observed for the second time.
    A null value indicates the client has not yet been seen a second time within the
    tracked period.
- name: architecture
  type: STRING
  mode: NULLABLE
  description: The CPU architecture of the system on which the application is running
    (e.g., 'x86-64', 'aarch64', 'arm'). Identifies the instruction set architecture
    of the client device.
- name: app_build_id
  type: STRING
  mode: NULLABLE
  description: 'The build identifier string for the application, encoding the date
    and time when the specific build was compiled (format: YYYYMMDDHHmmSS).'
- name: app_name
  type: STRING
  mode: NULLABLE
  description: The name of the Mozilla application that generated the telemetry event
    (e.g., 'firefox_desktop', 'fenix', 'firefox_ios', 'mozilla_vpn'). Used to distinguish
    telemetry across Mozilla's suite of products.
- name: locale
  type: STRING
  mode: NULLABLE
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- name: platform_version
  type: STRING
  mode: NULLABLE
  description: The version of the browser platform or Gecko engine as reported in
    telemetry (e.g., '151.0.3'). May differ from the user-facing product version and
    is used to identify the underlying platform build.
- name: vendor
  type: STRING
  mode: NULLABLE
  description: The organization that produced the browser or software being measured.
    In this dataset the value is consistently 'Mozilla'.
- name: app_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the application at the time of the event
    (e.g., '151.0.2'). Combines major, minor, and patch components into a single human-readable
    version identifier.
- name: xpcom_abi
  type: STRING
  mode: NULLABLE
  description: The XPCOM Application Binary Interface identifier describing the CPU
    architecture and compiler ABI of the Firefox build, such as 'x86_64-msvc' or 'aarch64-gcc3'.
- name: document_id
  type: STRING
  mode: NULLABLE
  description: A unique UUID identifying an individual telemetry ping submission.
    This identifier is used to deduplicate records and trace a specific ping through
    the data pipeline.
- name: distribution_id
  type: STRING
  mode: NULLABLE
  description: An identifier for the Firefox distribution package the client is running,
    such as 'default' for the standard Mozilla build or partner-specific identifiers
    like 'canonical-002' or 'mozilla-MSIX'. This field is null when no distribution
    identifier is available.
- name: partner_distribution_version
  type: STRING
  mode: NULLABLE
  description: The version of the partner distribution package used to install or
    configure the browser. Null when the client is not associated with a partner distribution.
- name: partner_distributor
  type: STRING
  mode: NULLABLE
  description: The name of the organization or Linux distribution that packaged and
    distributed the browser (e.g., 'canonical', 'mint', 'fedora'). Null for clients
    that installed Firefox through standard Mozilla channels.
- name: partner_distributor_channel
  type: STRING
  mode: NULLABLE
  description: The specific distribution channel or sub-product variant used by the
    partner distributor (e.g., 'ubuntu', 'esrWinFull'). Null or empty when the client
    did not arrive through a named partner channel.
- name: partner_id
  type: STRING
  mode: NULLABLE
  description: A short identifier for the top-level partner organization associated
    with the browser installation (e.g., 'ubuntu', 'mozillaonline', 'yandex'). Null
    when the client has no partner affiliation.
- name: attribution_campaign
  type: STRING
  mode: NULLABLE
  description: The marketing campaign name associated with the Firefox installation,
    sourced from attribution parameters (e.g., 'SET_DEFAULT_BROWSER'). Null when attribution
    data is unavailable.
- name: attribution_content
  type: STRING
  mode: NULLABLE
  description: The content variant or creative identifier from the marketing attribution
    parameters, used to distinguish specific ad placements or page elements (e.g.,
    'body-download-button'). Null when attribution data is unavailable.
- name: attribution_dltoken
  type: STRING
  mode: NULLABLE
  description: A unique token assigned at download time to link an installation to
    a specific download event for attribution tracking. Null when no download token
    was recorded.
- name: attribution_dlsource
  type: STRING
  mode: NULLABLE
  description: The download source identifier from attribution parameters, indicating
    the platform or property from which Firefox was downloaded (e.g., 'mozorg', 'fxdotcom',
    'mozillaci'). Null when attribution data is unavailable.
- name: attribution_experiment
  type: STRING
  mode: NULLABLE
  description: The experiment identifier from attribution parameters, indicating whether
    the install was part of a specific marketing experiment (e.g., 'download-privacy').
    Null when no experiment was associated with the attribution.
- name: attribution_medium
  type: STRING
  mode: NULLABLE
  description: The marketing medium from attribution parameters describing how the
    user arrived at the download (e.g., 'referral', 'firefox-desktop'). Null when
    attribution data is unavailable.
- name: attribution_source
  type: STRING
  mode: NULLABLE
  description: The referring source from attribution parameters, typically the website
    or property that directed the user to download Firefox (e.g., 'www.google.com',
    'www.bing.com'). Null when attribution data is unavailable.
- name: attribution_ua
  type: STRING
  mode: NULLABLE
  description: The user agent type of the browser the user was using when they downloaded
    Firefox, as captured in attribution parameters (e.g., 'chrome', 'edge', 'firefox').
    Null when attribution data is unavailable.
- name: attribution_variation
  type: STRING
  mode: NULLABLE
  description: The A/B test variation from attribution parameters that the user was
    assigned to during the download funnel (e.g., 'treatment', 'control'). Null when
    no variation was recorded.
- name: engine_data_load_path
  type: STRING
  mode: NULLABLE
  description: The load path describing how and from where a search engine definition
    was loaded, such as from the built-in application bundle ('[app]'), an add-on
    ('[addon]'), or other sources. This field is used to identify the origin mechanism
    for a specific search engine configuration.
- name: engine_data_name
  type: STRING
  mode: NULLABLE
  description: The human-readable display name of a search engine as configured on
    the client (e.g., 'Google', 'DuckDuckGo', 'Bing'). This field reflects the localized
    or user-visible name of the engine.
- name: engine_data_origin
  type: STRING
  mode: NULLABLE
  description: Indicates how a particular search engine configuration was established,
    with values such as 'default' (set by the application), 'verified', 'unverified',
    or 'invalid'. This field is null when origin information is not available for
    the engine.
- name: engine_data_submission_url
  type: STRING
  mode: NULLABLE
  description: The base URL template used to submit queries to a specific search engine,
    including any partner or distribution tracking parameters. This URL is used by
    the browser when constructing search requests for the given engine.
- name: apple_model_id
  type: STRING
  mode: NULLABLE
  description: The Apple hardware model identifier for macOS and iOS devices (e.g.,
    'MacBookAir10,1', 'Mac16,12'). Null for non-Apple platforms or when the model
    cannot be determined.
- name: city
  type: STRING
  mode: NULLABLE
  description: The city associated with the client's IP address or profile geography
    at the time of the record. May be null when city-level geolocation is unavailable
    or suppressed.
- name: db_version
  type: STRING
  mode: NULLABLE
  description: The version identifier of the database or data snapshot used to produce
    the record, expressed as an ISO 8601 UTC timestamp string. This indicates when
    the underlying reference data was last updated.
- name: subdivision1
  type: STRING
  mode: NULLABLE
  description: The first-level administrative subdivision (e.g., state, province,
    or region) derived from the client's geographic location, represented as a code.
    Null indicates the subdivision could not be determined.
- name: isp_name
  type: STRING
  mode: NULLABLE
  description: The canonical name of the Internet Service Provider associated with
    the client's network connection. This is a normalized or deduplicated version
    of the ISP identifier.
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- name: country
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- name: normalized_os
  type: STRING
  mode: NULLABLE
  description: The standardized operating system name for the client device, such
    as 'Windows', 'Mac', or 'Linux'. This normalizes raw OS strings into a consistent
    set of values.
- name: normalized_os_version
  type: STRING
  mode: NULLABLE
  description: The standardized version string of the client's operating system, such
    as '10.0' for Windows 10 or '6.8.0' for a Linux kernel version. Provides a normalized
    representation across different OS reporting formats.
- name: startup_profile_selection_reason
  type: STRING
  mode: NULLABLE
  description: The reason or method by which a Firefox profile was selected at the
    start of a session. Common values include 'firstrun-created-default' (a new default
    profile was created on first run) and 'default' (the existing default profile
    was selected).
- name: installation_first_seen_admin_user
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the user had administrator privileges at the time
    the installation was first observed. True means admin rights were present; false
    means they were not.
- name: installation_first_seen_default_path
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the application was installed in the default installation
    path when first observed. True means the default path was used; false means a
    custom path was chosen.
- name: installation_first_seen_failure_reason
  type: STRING
  mode: NULLABLE
  description: The reason the installation data could not be retrieved when first
    observed, such as 'NoError', 'NotFoundError', or 'SyntaxError'. A null value indicates
    the failure reason was not recorded.
- name: installation_first_seen_from_msi
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the application was installed via an MSI package
    when first observed. True means an MSI installer was used; false means it was
    not.
- name: installation_first_seen_install_existed
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether a prior installation of the application already existed
    on the system when the installation was first observed. True means a previous
    install was found; false means it was a fresh installation.
- name: installation_first_seen_installer_type
  type: STRING
  mode: NULLABLE
  description: The type of installer used when the installation was first observed,
    such as 'stub', 'full', or 'msix'. A null value indicates the installer type was
    not available.
- name: installation_first_seen_other_inst
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether another non-MSIX installation of the application
    was present on the system when the installation was first observed. True means
    another installation was detected; false means it was not.
- name: installation_first_seen_other_msix_inst
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether another MSIX-packaged installation of the application
    was present on the system when the installation was first observed. True means
    another MSIX installation was detected; false means it was not.
- name: installation_first_seen_profdir_existed
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether a Firefox profile directory already existed on the
    system when the installation was first observed. True means a profile directory
    was found; false means it did not exist.
- name: installation_first_seen_silent
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the installation was performed silently (without
    user interaction) when first observed. True means a silent install was used; false
    means it was an interactive install.
- name: installation_first_seen_version
  type: STRING
  mode: NULLABLE
  description: The version of the application that was recorded when the installation
    was first observed. A null value indicates the version could not be determined
    at first observation.
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: os_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- name: windows_build_number
  type: FLOAT
  mode: NULLABLE
  description: The Windows OS build number of the client's operating system, such
    as 19045 for a specific Windows 10 release. Null values indicate the client was
    not running a Windows operating system.
- name: windows_version
  type: STRING
  mode: NULLABLE
  description: A human-readable label for the client's Windows operating system version,
    such as 'Windows 10' or 'Windows 11'. Null values indicate the client was not
    running a Windows OS.
- name: metadata
  type: RECORD
  mode: NULLABLE
  fields:
  - name: first_seen_date_source_ping
    type: STRING
    mode: NULLABLE
    description: The ping type that provided the client's first-seen date 'new_profile',
      'main', or 'shutdown'.
  - name: reported_main_ping
    type: BOOLEAN
    mode: NULLABLE
    description: Whether the client sent at least one main ping on the first-seen
      date. True if a main ping was received.
  - name: reported_new_profile_ping
    type: BOOLEAN
    mode: NULLABLE
    description: Whether the client sent a new-profile ping on the first-seen date.
      True if a new_profile ping was received.
  - name: reported_shutdown_ping
    type: BOOLEAN
    mode: NULLABLE
    description: Whether the client sent a shutdown ping on the first-seen date. True
      if a shutdown ping was received.
- name: profile_group_id
  type: STRING
  mode: NULLABLE
  description: A UUID that identifies a group of profiles belonging to the same user
    or installation context. Null when profile group information is unavailable.
- name: funnel_derived
  type: STRING
  mode: NULLABLE
  description: A categorical label describing the acquisition channel or funnel through
    which a user was obtained (e.g. 'mozorg windows funnel', 'mozorg mac funnel',
    'partner', 'other'). This is used to segment users by how they came to install
    Firefox.
- name: distribution_model
  type: STRING
  mode: NULLABLE
  description: A categorical label describing the channel or method through which
    the Firefox distribution was delivered to the user (e.g., 'non-distribution',
    'OS pre-installed', 'OEM pre-installed', 'secondary store'). This field classifies
    how the client obtained the browser.
- name: partner_org
  type: STRING
  mode: NULLABLE
  description: A human-readable label categorizing the browser's distribution partner
    into a broader organizational group (e.g., 'Linux - Canonical', 'Mozilla - China',
    'non-distribution'). Used to segment clients by distribution partnership type.
- name: is_desktop
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the client is running on a desktop platform as opposed
    to a mobile device. True means the client is on desktop; false means it is on
    a mobile platform.
- name: stub_attr_logs_first_seen_date
  type: DATE
  mode: NULLABLE
  description: The date the stub installer attribution log was first observed for
    this client. Null if no stub attribution log is available.
- name: stub_attr_logs_ga_client_id
  type: STRING
  mode: NULLABLE
  description: The Google Analytics client ID recorded in the stub installer attribution
    log for this client. Null if unavailable.
- name: stub_attr_logs_stub_session_id
  type: STRING
  mode: NULLABLE
  description: The session ID recorded by the stub installer for this client, used
    to correlate stub attribution logs.
- name: stub_attr_logs_dl_token
  type: STRING
  mode: NULLABLE
  description: The download token recorded in the stub installer attribution log,
    correlating the download with the install.
- name: stub_attr_logs_download_source
  type: STRING
  mode: NULLABLE
  description: The download source identifier recorded in the stub installer attribution
    log (e.g., 'fxdotcom', 'mozorg').
- name: ga4_website
  type: STRING
  mode: NULLABLE
  description: The Mozilla website from which the GA4 session originated (e.g., 'FIREFOX.COM',
    'MOZILLA.ORG'). Null if no GA4 session is linked.
- name: ga4_ga_client_id
  type: STRING
  mode: NULLABLE
  description: The Google Analytics 4 client ID associated with the web session linked
    to this Firefox install.
- name: ga4_session_date
  type: DATE
  mode: NULLABLE
  description: The date of the GA4 web session linked to this Firefox install.
- name: ga4_session_start_timestamp
  type: DATETIME
  mode: NULLABLE
  description: The datetime when the linked GA4 web session started.
- name: ga4_country
  type: STRING
  mode: NULLABLE
  description: The country reported by GA4 for the web session linked to this install
    (country name, not code).
- name: ga4_region
  type: STRING
  mode: NULLABLE
  description: The geographic region (e.g., state or province) reported by GA4 for
    the linked web session.
- name: ga4_city
  type: STRING
  mode: NULLABLE
  description: The city reported by GA4 for the web session linked to this install.
- name: ga4_device_category
  type: STRING
  mode: NULLABLE
  description: The device category reported by GA4 for the linked session (always
    'desktop' in this table).
- name: ga4_mobile_device_model
  type: STRING
  mode: NULLABLE
  description: The mobile device model reported by GA4 for the linked session. Always
    null for desktop sessions.
- name: ga4_mobile_device_string
  type: STRING
  mode: NULLABLE
  description: The mobile device string reported by GA4 for the linked session. Always
    null for desktop sessions.
- name: ga4_operating_system
  type: STRING
  mode: NULLABLE
  description: The operating system reported by GA4 for the linked session (e.g.,
    'Windows', 'Macintosh').
- name: ga4_operating_system_version
  type: STRING
  mode: NULLABLE
  description: The OS version string reported by GA4 for the linked session (e.g.,
    'Windows 10', 'Windows 11').
- name: ga4_language
  type: STRING
  mode: NULLABLE
  description: The browser language reported by GA4 for the linked session (e.g.,
    'en-us', 'pt-br').
- name: ga4_browser
  type: STRING
  mode: NULLABLE
  description: The browser type reported by GA4 for the linked web session (e.g.,
    'Chrome', 'Edge', 'Firefox').
- name: ga4_browser_version
  type: STRING
  mode: NULLABLE
  description: The browser version string reported by GA4 for the linked web session.
- name: ga4_first_campaign_from_event_params
  type: STRING
  mode: NULLABLE
  description: The first non-null campaign name extracted from GA4 event parameters
    for the linked session (e.g., '(organic)', 'SET_DEFAULT_BROWSER').
- name: ga4_distinct_campaigns_from_event_params
  type: STRING
  mode: REPEATED
  description: Array of all distinct non-null campaign names extracted from GA4 event
    parameters for the linked session.
- name: ga4_first_source_from_event_params
  type: STRING
  mode: NULLABLE
  description: The first non-null traffic source extracted from GA4 event parameters
    for the linked session (e.g., 'google', 'bing').
- name: ga4_distinct_sources_from_event_params
  type: STRING
  mode: REPEATED
  description: Array of all distinct non-null traffic sources extracted from GA4 event
    parameters for the linked session.
- name: ga4_first_medium_from_event_params
  type: STRING
  mode: NULLABLE
  description: The first non-null traffic medium extracted from GA4 event parameters
    for the linked session (e.g., 'organic', 'referral').
- name: ga4_distinct_mediums_from_event_params
  type: STRING
  mode: REPEATED
  description: Array of all distinct non-null traffic mediums extracted from GA4 event
    parameters for the linked session.
- name: ga4_first_content_from_event_params
  type: STRING
  mode: NULLABLE
  description: The first non-null UTM content value extracted from GA4 event parameters
    for the linked session.
- name: ga4_distinct_contents_from_event_params
  type: STRING
  mode: REPEATED
  description: Array of all distinct non-null UTM content values extracted from GA4
    event parameters for the linked session.
- name: ga4_first_term_from_event_params
  type: STRING
  mode: NULLABLE
  description: The first non-null search term extracted from GA4 event parameters
    for the linked session.
- name: ga4_distinct_terms_from_event_params
  type: STRING
  mode: REPEATED
  description: Array of all distinct non-null search terms extracted from GA4 event
    parameters for the linked session.
- name: ga4_first_experiment_id_from_event_params
  type: STRING
  mode: NULLABLE
  description: The first non-null experiment ID extracted from GA4 event parameters
    for the linked session.
- name: ga4_distinct_experiment_ids_from_event_params
  type: STRING
  mode: REPEATED
  description: Array of all distinct non-null experiment IDs extracted from GA4 event
    parameters for the linked session.
- name: ga4_first_experiment_branch_from_event_params
  type: STRING
  mode: NULLABLE
  description: The first non-null experiment branch name extracted from GA4 event
    parameters for the linked session.
- name: ga4_distinct_experiment_branches_from_event_params
  type: STRING
  mode: REPEATED
  description: Array of all distinct non-null experiment branch names extracted from
    GA4 event parameters for the linked session.
- name: ga4_first_gad_campaignid_from_event_params
  type: STRING
  mode: NULLABLE
  description: The first non-null reported gad_campaignid from event_params for this
    session.
- name: ga4_distinct_gad_campaignid_from_event_params
  type: STRING
  mode: REPEATED
  description: All non-null reported gad_campaignid from event_params for this session.
- name: ga4_manual_campaign_id
  type: STRING
  mode: NULLABLE
  description: The manually tagged campaign ID (utm_id) from the GA4 session linked
    to this install.
- name: ga4_manual_campaign_name
  type: STRING
  mode: NULLABLE
  description: The manually tagged campaign name (utm_campaign) from the GA4 session
    linked to this install.
- name: ga4_manual_source
  type: STRING
  mode: NULLABLE
  description: The manually tagged UTM source from the GA4 session linked to this
    install.
- name: ga4_manual_medium
  type: STRING
  mode: NULLABLE
  description: The manually tagged UTM medium from the GA4 session linked to this
    install.
- name: ga4_manual_term
  type: STRING
  mode: NULLABLE
  description: The manually tagged UTM term (search keyword) from the GA4 session
    linked to this install.
- name: ga4_manual_content
  type: STRING
  mode: NULLABLE
  description: The manually tagged UTM content from the GA4 session linked to this
    install.
- name: ga4_gclid
  type: STRING
  mode: NULLABLE
  description: The Google Click ID (gclid) from the GA4 session linked to this install,
    used to attribute Google Ads clicks.
- name: ga4_gclid_array
  type: STRING
  mode: REPEATED
  description: Array of all Google Click IDs (gclid) observed across GA4 event parameters
    for the linked session.
- name: ga4_had_download_event
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the GA4 session linked to this install included a download
    event for Firefox. True if a download event was recorded.
- name: ga4_firefox_desktop_downloads
  type: INTEGER
  mode: NULLABLE
  description: The count of Firefox Desktop download events recorded in the GA4 session
    linked to this install.
- name: ga4_last_reported_install_target
  type: STRING
  mode: NULLABLE
  description: The last reported install target from GA4 events (e.g., 'product_download',
    'firefox_download').
- name: ga4_all_reported_install_targets
  type: STRING
  mode: REPEATED
  description: Array of all install target values reported across GA4 events in the
    linked session (e.g., 'product_download', 'firefox_download').
- name: ga4_stub_session_id
  type: STRING
  mode: NULLABLE
  description: The session ID from GA4 that corresponds to the stub installer download
    session for this client.
- name: ga4_landing_screen
  type: STRING
  mode: NULLABLE
  description: The URL of the landing page in the GA4 session that led to the Firefox
    download (e.g., 'https://www.firefox.com/en-US/').
- name: ga4_ad_google_campaign
  type: STRING
  mode: NULLABLE
  description: The Google Ads campaign name reported by GA4 for the linked session.
- name: ga4_ad_google_campaign_id
  type: STRING
  mode: NULLABLE
  description: The Google Ads campaign ID reported by GA4 for the linked session.
- name: ga4_ad_google_group
  type: STRING
  mode: NULLABLE
  description: The Google Ads ad group name reported by GA4 for the linked session.
- name: ga4_ad_google_group_id
  type: STRING
  mode: NULLABLE
  description: The Google Ads ad group ID reported by GA4 for the linked session.
- name: ga4_ad_google_account
  type: STRING
  mode: NULLABLE
  description: The Google Ads account name reported by GA4 for the linked session.
- name: ga4_ad_crosschannel_source
  type: STRING
  mode: NULLABLE
  description: The traffic source as attributed by GA4 cross-channel last-touch attribution
    for the linked session.
- name: ga4_ad_crosschannel_medium
  type: STRING
  mode: NULLABLE
  description: The traffic medium as attributed by GA4 cross-channel last-touch attribution
    (e.g., 'organic', 'cpc', 'referral').
- name: ga4_ad_crosschannel_campaign
  type: STRING
  mode: NULLABLE
  description: The campaign name as attributed by GA4 cross-channel last-touch attribution
    for the linked session.
- name: ga4_ad_crosschannel_campaign_id
  type: STRING
  mode: NULLABLE
  description: The campaign ID as attributed by GA4 cross-channel last-touch attribution
    for the linked session.
- name: ga4_ad_crosschannel_source_platform
  type: STRING
  mode: NULLABLE
  description: The advertising platform attributed by GA4 cross-channel attribution
    (e.g., 'Google Ads', 'Manual').
- name: ga4_ad_crosschannel_primary_channel_group
  type: STRING
  mode: NULLABLE
  description: The primary channel group classification by GA4 cross-channel attribution
    (e.g., 'Organic Search', 'Paid Search', 'Direct').
- name: ga4_ad_crosschannel_default_channel_group
  type: STRING
  mode: NULLABLE
