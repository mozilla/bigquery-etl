friendly_name: Accounts Aggregates
description: |-
  Aggregate counts of accounts from the FxA backend services databases grouped by a number of dimensions.

  This table can be used to get a total number of accounts, including those inactive that aren't captured
  in the telemetry data.
owners:
- akomar@mozilla.com
labels:
  incremental: true
  owner1: akomar@mozilla.com
scheduling:
  dag_name: bqetl_accounts_db_daily
  # Adjust the execution delta for the task dependencies in the bqetl_accounts_db DAG
  # so this depends on the latest bqetl_accounts_db DAG run.
  depends_on:
  - dag_name: bqetl_accounts_db
    task_id: accounts_db_external__fxa_accounts__v1
    execution_delta: -21h
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: true
    expiration_days: null
