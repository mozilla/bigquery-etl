friendly_name: SUMO Zendesk SLA KPIs (CSAT, FCR, TTFR, TRT)
description: |
  Daily SLA KPI view for SUMO Zendesk support tickets, aggregated from
  zendesk_ticket_sla_v1. Resolved-ticket KPIs (FCR, CSAT, TRT) are attributed
  to the ticket's resolution date and mirror Zendesk Explore.

  Grain: resolved_date x ticket_created_date x product x automation_category.

  Tickets where is_excluded_from_sla = TRUE in the base table are filtered out
  (Appbot non-English, Sumo Test / VPN QA groups, %test% tags). Unresolved
  tickets are included so TTFR component metrics (replied_tickets,
  first_reply_business_minutes_sum) cover every replied ticket; their rows
  have resolved_date IS NULL. FCR / CSAT / TRT remain resolved-only via
  per-metric gating on resolution_status.

  Exposes sum/count component columns rather than precomputed rates so KPIs
  remain correct under any downstream filter or grouping. Compute as:
    FCR %        = SUM(one_touch_tickets)                    / NULLIF(SUM(tickets_resolved), 0) * 100
    CSAT %       = SUM(satisfied_surveys)                    / NULLIF(SUM(rated_surveys),     0) * 100
    Avg TTFR min = SUM(first_reply_business_minutes_sum)     / NULLIF(SUM(replied_tickets),   0)
    Avg TRT min  = SUM(full_resolution_business_minutes_sum) / NULLIF(SUM(tickets_resolved), 0)

  KPI definitions:
  - FCR: one-touch tickets (resolved with fewer than two agent replies) divided
    by total resolved tickets. Mirrors "% One-touch tickets" in Zendesk Explore.
  - CSAT: 'good' ratings divided by rated tickets ('good' + 'bad'). Tickets
    without a rating are excluded from the denominator.
  - TTFR (Time to First Response): business minutes between ticket creation and
    the first public agent/admin reply, computed against Mozilla Support Hours
    with holiday subtraction. Tickets auto-solved without an agent reply are
    excluded from the average via replied_tickets.
  - TRT (Total Resolution Time): business minutes between ticket creation and
    full resolution (last 'solved' timestamp, falling back to 'closed').
