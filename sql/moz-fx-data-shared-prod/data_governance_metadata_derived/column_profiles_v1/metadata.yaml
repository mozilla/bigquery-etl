friendly_name: Column Profiles
description: |-
  Per-column profiling statistics (null rate, approximate distinct count,
  cardinality flag, example value, and value/frequency pairs) for base tables
  across one or more source datasets, tagged with source_dataset/source_table.
  Produced weekly by a self-contained Python job (defaults to profiling
  telemetry_derived and telemetry) and consumed by schema enrichment tooling.
  Each run overwrites its own profiled_at date partition.
labels:
  incremental: true
owners:
- gkatre@mozilla.com
scheduling:
  dag_name: bqetl_data_governance_metadata
  # --date and --source-datasets are overridable per-run via the Airflow trigger
  # "Configuration JSON" (dag_run.conf); source_datasets is comma-separated.
  # Example: {"date": "2026-06-01", "source_datasets": "fenix,firefox_desktop"}
  #
  # Scheduled/backfill runs omit both: --date defaults to the data interval END
  # date (data_interval_end) — so a Monday run is tagged with that Monday, not the
  # prior week's interval start — and the job then scans (interval_end - 7 days);
  # --source-datasets defaults to the standard set below. Manual ("Trigger DAG w/
  # config") runs must pass BOTH "date" and "source_datasets" explicitly: the
  # defaults render empty for them, so query.py rejects either if omitted (avoids
  # the surprising future partition Airflow would infer from a manual trigger's
  # interval, and forces deliberate scoping of ad-hoc runs).
  arguments: [
    "--date", "{{ dag_run.conf.get('date', (data_interval_end | ds) if dag_run.run_type != 'manual' else '') }}",
    "--source-datasets", "{{ dag_run.conf.get('source_datasets', 'telemetry_derived,telemetry' if dag_run.run_type != 'manual' else '') }}"
  ]
bigquery:
  time_partitioning:
    type: day
    field: profiled_at
    require_partition_filter: false
    expiration_days: 90
  clustering:
    fields:
    - source_dataset
    - source_table
    - column_name
