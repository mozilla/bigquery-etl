      mode: NULLABLE
    - name: referer
      type: STRING
      mode: NULLABLE
    - name: os_version
      type: STRING
      mode: NULLABLE
    - name: event_type
      type: STRING
      mode: NULLABLE
    - name: app_version
      type: STRING
      mode: NULLABLE
    - name: user_properties
      type: STRING
      mode: NULLABLE
    - name: time
      type: FLOAT
      mode: NULLABLE
    - name: event_properties
      type: STRING
      mode: NULLABLE
    - name: op
      type: STRING
      mode: NULLABLE
    - name: session_id
      type: FLOAT
      mode: NULLABLE
    - name: os_name
      type: STRING
      mode: NULLABLE
    - name: device_model
      type: STRING
      mode: NULLABLE
    - name: message
      type: STRING
      mode: NULLABLE
    - name: msg
