fields:
  - name: activity_date
    mode: NULLABLE
    type: DATE
    description: "The date that the conversion action took place."
  - name: fbclid
    mode: NULLABLE
    type: STRING
    description: "A Google Click ID, which uniquely represent an ad impression for Google ads."
  - name: first_wk_5_actv_days_and_1_or_more_search_w_ads
    mode: NULLABLE
    type: BOOLEAN
    description: "Whether the client ID associated with this GCLID had 5 or more days of use and 1 or more search with ads in first week"
  - name: first_wk_3_actv_days_and_1_or_more_search_w_ads
    mode: NULLABLE
    type: BOOLEAN
    description: "Whether the client ID associated with this GCLID had 3 or more days of use and 1 or more search with ads in first week"
  - name: first_wk_3_actv_days_and_24_active_minutes
    mode: NULLABLE
    type: BOOLEAN
    description: "Whether the client ID associated with this GCLID had 3 or more days of use and 0.5 or more active hours in first week"
  - name: is_dau_at_least_4_of_first_7_days
    mode: NULLABLE
    type: BOOLEAN
    description: "Whether the client ID associated with this GCLID was active 4 of more days in the first 7"
  - name: is_dau_at_least_3_of_first_7_days
    mode: NULLABLE
    type: BOOLEAN
    description: "Whether the client ID associated with this GCLID was active 3 of more days in the first 7"
  - name: is_dau_at_least_2_of_first_7_days
    mode: NULLABLE
    type: BOOLEAN
    description: "Whether the client ID associated with this GCLID was active 2 of more days in the first 7"
  - mode: NULLABLE
    name: is_dau_at_least_5_of_first_7_days
    type: BOOLEAN
    description: Client was a daily active user in at least 5 of first 7 days
  - mode: NULLABLE
    name: is_dau_at_least_6_of_first_7_days
    type: BOOLEAN
    description: Client was a daily active user in at least 6 of first 7 days
  - mode: NULLABLE
    name: is_dau_at_least_7_of_first_7_days
    type: BOOLEAN
    description: Client was a daily active user in at least 7 of first 7 days
  - mode: NULLABLE
    name: set_default
    type: BOOLEAN
    description: Set browser to default at any point in the first 7 days
  - mode: NULLABLE
    name: is_dau_on_days_6_or_7
    type: BOOLEAN
    description: Active on day 6 and / or 7 of their first week
