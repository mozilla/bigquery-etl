fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: os
  type: STRING
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: channel
  type: STRING
  mode: NULLABLE
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- name: major_version
  type: INTEGER
  mode: NULLABLE
  description: The major version number of the Firefox browser (e.g., 128, 151), representing
    the primary release train. Used to segment clients by their browser generation.
- name: process_type_bit
  type: INT64
  mode: NULLABLE
  description: The type of process that experienced a crash as a bit. See the full
    list of options [here](https://firefox-source-docs.mozilla.org/toolkit/components/telemetry/data/crash-ping.html#process-types).
- name: classification_bit
  type: INT64
  mode: NULLABLE
  description: Classification for OOM, crash_background_task_name, crash_async_manager_shutdown_timeout,
    crash_quota_manager_shutdown_timeout.
- name: total_crashes
  type: FLOAT
  mode: NULLABLE
  description: The total number of crashes.
- name: total_95percentile
  type: FLOAT
  mode: NULLABLE
  description: The 95th percentile of crashes.
- name: total_no_outliers
  type: FLOAT
  mode: NULLABLE
  description: The total number of crashes with no outliers.
