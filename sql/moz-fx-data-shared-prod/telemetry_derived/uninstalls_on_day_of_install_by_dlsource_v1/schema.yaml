fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: uninstall_same_day_as_install
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates whether the browser or add-on was uninstalled on the same
    calendar day it was installed. True means the uninstall occurred on the install
    day; false means it did not.
- name: attribution_dlsource
  type: STRING
  mode: NULLABLE
  description: The download source identifier from attribution parameters, indicating
    the platform or property from which Firefox was downloaded (e.g., 'mozorg', 'fxdotcom',
    'mozillaci'). Null when attribution data is unavailable.
- name: uninstalls_count
  type: INTEGER
  mode: NULLABLE
  description: The total number of uninstall events recorded during the reporting
    period for the relevant software or add-on.
