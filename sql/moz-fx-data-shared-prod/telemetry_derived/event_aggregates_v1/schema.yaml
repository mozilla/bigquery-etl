fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: event_category
  type: STRING
  mode: NULLABLE
  description: The category grouping for a telemetry event, used to classify events
    by feature area or subsystem (e.g., 'address', 'creditcard', 'form_autocomplete').
    This field is the top-level namespace for organizing event data.
- name: event_object
  type: STRING
  mode: NULLABLE
  description: The UI element or component that was the target of the event (e.g.
    'address_form', 'cc_form_v2', 'capture_doorhanger'). This identifies which part
    of the product the event is associated with.
- name: event_method
  type: STRING
  mode: NULLABLE
  description: The method or action that triggered the event, describing what occurred
    (e.g. 'detected', 'submitted', 'show'). This categorizes the type of interaction
    or lifecycle step associated with the event.
- name: event_string_value
  type: STRING
  mode: NULLABLE
  description: An optional free-text string value associated with an event, providing
    additional context such as an error code or identifier (e.g. 'SSL_ERROR_BAD_CERT_DOMAIN').
    This field may be null or contain the literal string 'null' when no value is applicable.
- name: country
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The standardized release channel of the Firefox application, such as
    'release', 'beta', 'nightly', 'esr', or 'aurora'. 'Other' is used when the channel
    does not match a known value.
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: os_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- name: installation_cnt
  type: INTEGER
  mode: NULLABLE
  description: Installation Count
- name: etp_toggle_off_cnt
  type: INTEGER
  mode: NULLABLE
  description: ETP Toggle Off Count
- name: etp_toggle_on_cnt
  type: INTEGER
  mode: NULLABLE
  description: ETP Toggle On Count
- name: sitenotworking_link_cnt
  type: INTEGER
  mode: NULLABLE
  description: Site Not Working Link Count
- name: send_report_link_cnt
  type: INTEGER
  mode: NULLABLE
  description: Send Report Link Count
- name: send_report_submit_cnt
  type: INTEGER
  mode: NULLABLE
  description: Send Report Submit Count
- name: certerror_cnt
  type: INTEGER
  mode: NULLABLE
  description: Certificate Error Count
- name: certerror_aboutcerterror_load_cnt
  type: INTEGER
  mode: NULLABLE
  description: Certificate Error - About Certificate Error - Load Count
- name: certerror_aboutcerterror_load_value_cnt
  type: INTEGER
  mode: NULLABLE
  description: Certificate Error - About Certificate Error - Load Value Count
- name: browser_language_cnt
  type: INTEGER
  mode: NULLABLE
  description: Browser Language Count
- name: browser_language_click_cnt
  type: INTEGER
  mode: NULLABLE
  description: Browser Language Click Count
- name: browser_language_language_item_cnt
  type: INTEGER
  mode: NULLABLE
  description: Browser Language Language Item Count
- name: nbr_events
  type: INTEGER
  mode: NULLABLE
  description: The total number of events recorded in a given context. A value of
    1 indicates a single event occurred, with higher values representing multiple
    events aggregated together.
- name: disable_etp_cnt
  type: INTEGER
  mode: NULLABLE
  description: Disable ETP Count; i.e. etp_toggle_off clicks
- name: enable_etp_cnt
  type: INTEGER
  mode: NULLABLE
  description: Enable ETP Count; i.e. etp_toggle_on clicks
- name: click_site_not_working
  type: INTEGER
  mode: NULLABLE
  description: Clicks on Site Not Working Link
- name: click_report_cnt
  type: INTEGER
  mode: NULLABLE
  description: Clicks on Send Report Link
- name: submit_report_cnt
  type: INTEGER
  mode: NULLABLE
  description: Clicks on Send Report Submit
- name: open_panel
  type: INTEGER
  mode: NULLABLE
  description: Clicks on Open Panel
- name: nbr_non_null_client_ids
  type: INTEGER
  mode: NULLABLE
  description: Count of Non-Null Client IDs
- name: nbr_distinct_client_ids
  type: INTEGER
  mode: NULLABLE
  description: Count of Distinct Client IDs
