fields:
- mode: NULLABLE
  name: funnel_date
  type: DATE
  description: The date associated with a funnel analysis snapshot, representing the
    point in time at which funnel stage counts were computed. Stored as a DATE type.
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: funnel_derived
  type: STRING
  description: A categorical label describing the acquisition channel or funnel through
    which a user was obtained (e.g. 'mozorg windows funnel', 'mozorg mac funnel',
    'partner', 'other'). This is used to segment users by how they came to install
    Firefox.
- mode: NULLABLE
  name: channel_raw
  type: STRING
  description: The raw marketing or traffic acquisition channel through which a user
    arrived (e.g., 'Organic Search', 'Referral', 'Paid Search', 'Direct'). May be
    null when the acquisition channel could not be determined.
- mode: NULLABLE
  name: campaign
  type: STRING
  description: The marketing campaign name associated with a user's acquisition or
    install event (e.g., 'SET_DEFAULT_BROWSER', 'non-fx-button'). Null when no campaign
    attribution is available.
- mode: NULLABLE
  name: campaign_id
  type: STRING
  description: The unique identifier of the marketing campaign associated with a user's
    acquisition event, which may include platform-specific campaign codes (e.g., Google
    Ads or Facebook campaign IDs). Null when no campaign ID is available.
- mode: NULLABLE
  name: source
  type: STRING
  description: The referring domain or source URL from which a user navigated to a
    Mozilla property. Null indicates the source was not captured or not applicable.
- mode: NULLABLE
  name: medium
  type: STRING
  description: The marketing or traffic medium through which a user arrived, such
    as 'referral', 'cpc', or 'firefox-desktop'. Used to classify the acquisition channel
    for attribution purposes.
- mode: NULLABLE
  name: normalized_os
  type: STRING
  description: The standardized operating system name for the client device, such
    as 'Windows', 'Mac', or 'Linux'. This normalizes raw OS strings into a consistent
    set of values.
- mode: NULLABLE
  name: partner_org
  type: STRING
  description: A human-readable label categorizing the browser's distribution partner
    into a broader organizational group (e.g., 'Linux - Canonical', 'Mozilla - China',
    'non-distribution'). Used to segment clients by distribution partnership type.
- mode: NULLABLE
  name: distribution_model
  type: STRING
  description: A categorical label describing the channel or method through which
    the Firefox distribution was delivered to the user (e.g., 'non-distribution',
    'OS pre-installed', 'OEM pre-installed', 'secondary store'). This field classifies
    how the client obtained the browser.
- mode: NULLABLE
  name: distribution_id
  type: STRING
  description: An identifier for the Firefox distribution package the client is running,
    such as 'default' for the standard Mozilla build or partner-specific identifiers
    like 'canonical-002' or 'mozilla-MSIX'. This field is null when no distribution
    identifier is available.
- mode: NULLABLE
  name: visits
  type: INTEGER
  description: The number of visits or sessions recorded for a given record. Null
    values indicate the visit count was not available or applicable for that row.
- mode: NULLABLE
  name: downloads
  type: INTEGER
  description: The number of file downloads initiated by the user during the reporting
    period. A value of zero indicates no downloads were started.
- mode: NULLABLE
  name: installs
  type: INTEGER
  description: The count of new application installations recorded for a given period
    or segment. A null value indicates the install count was not available for that
    record.
- mode: NULLABLE
  name: new_profiles
  type: INTEGER
  description: The number of newly created Firefox profiles observed within the aggregation
    period. A value of 0 indicates no new profiles were created for that record's
    segment.
- mode: NULLABLE
  name: return_user
  type: INTEGER
  description: An integer flag indicating whether a user (profile) returned after
    their initial activity, where a value of 0 indicates no return was observed. Null
    indicates the observation window had not yet elapsed.
- mode: NULLABLE
  name: retained_week4
  type: INTEGER
  description: An integer flag (0 or null) indicating whether a profile was retained
    through week 4 after its creation, where 0 means the profile was not retained.
    Null indicates the retention window had not yet elapsed.
- mode: NULLABLE
  name: channel
  type: STRING
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- mode: NULLABLE
  name: subchannel
  type: STRING
  description: The advertising subchannel classification for a marketing campaign
    or traffic source. Values include 'Brand', 'Non-Brand', 'Competitor', 'PMax',
    'Other', and 'All' (an aggregate across all subchannels).
