friendly_name: Active Users Aggregates Tou Desktop
description: |-
  Aggregated table of daily, weekly, and monthly active users segmented by Terms of Use
  acceptance status, built to support the Terms of Use acceptance rate dashboard. This
  derived table replaces a Looker PDT that was causing inflated aggregates, providing
  performant, pre-aggregated data without relying on Looker-side caching.

  Jira ticket: https://mozilla-hub.atlassian.net/browse/DO-2122
owners:
- rbaffourawuah@mozilla.com
- mhirose@mozilla.com
labels:
  incremental: true
  owner1: rbaffourawuah
  dag: bqetl_analytics_aggregations
  owner2: mhirose
scheduling:
  dag_name: bqetl_analytics_aggregations
  task_name: active_users_aggregates_tou_desktop_v1
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: true
    expiration_days: null
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  query.sql:
  - moz-fx-data-shared-prod.firefox_desktop.baseline_active_users
  - moz-fx-data-shared-prod.firefox_desktop.terms_of_use_status
require_column_descriptions: true
