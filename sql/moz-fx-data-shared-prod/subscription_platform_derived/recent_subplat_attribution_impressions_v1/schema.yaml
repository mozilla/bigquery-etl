fields:
- name: flow_id
  type: STRING
  mode: NULLABLE
  description: Unique identifier for the Firefox Accounts authentication or subscription flow session during
    which this attribution impression was recorded.
- name: flow_started_at
  type: TIMESTAMP
  mode: NULLABLE
  description: The timestamp when the FxA flow session that produced this impression began.
- name: impression_at
  type: TIMESTAMP
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: old_subscription_last_touch_attribution_impression_at
- name: event_type
  type: STRING
  mode: NULLABLE
  description: The type of FxA or subscription platform event that generated this attribution impression
    (e.g. a pageview or flow start event).
- name: entrypoint
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: old_subscription_last_touch_attribution_entrypoint
- name: entrypoint_experiment
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: old_subscription_last_touch_attribution_entrypoint_experiment
- name: entrypoint_variation
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: old_subscription_first_touch_attribution_entrypoint_variation
- name: utm_campaign
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: old_subscription_first_touch_attribution_utm_campaign
- name: utm_content
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: old_subscription_last_touch_attribution_utm_content
- name: utm_medium
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: old_subscription_last_touch_attribution_utm_medium
- name: utm_source
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: old_subscription_first_touch_attribution_utm_source
- name: utm_term
  type: STRING
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/subscription_platform_derived/subscription_platform_derived.yaml
    field: old_subscription_first_touch_attribution_utm_term
- name: mozilla_account_ids_sha256
  type: STRING
  mode: REPEATED
  description: Array of SHA-256-hashed Mozilla Account (FxA) user IDs associated with this impression flow,
    used for privacy-preserving attribution matching to subscription events.
- name: oauth_client_ids
  type: STRING
  mode: REPEATED
  description: Array of OAuth client IDs for the Mozilla services that were accessed or targeted during
    this flow session.
- name: oauth_client_names
  type: STRING
  mode: REPEATED
  description: Array of human-readable names corresponding to the OAuth clients in oauth_client_ids, identifying
    the Mozilla services involved in this flow.
- name: product_ids
  type: STRING
  mode: REPEATED
  description: Array of subscription product identifiers (provider product IDs) associated with the subscription
    plans encountered during this flow.
- name: plan_ids
  type: STRING
  mode: REPEATED
  description: Array of subscription plan or price identifiers (provider plan IDs) for the plans encountered
    during this attribution flow.
- name: service_ids
  type: STRING
  mode: REPEATED
  description: Array of Mozilla service short identifiers (e.g. 'VPN', 'Relay') for the services associated
    with the subscription plans in this impression flow.
