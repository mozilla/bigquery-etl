fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- mode: NULLABLE
  name: usage
  type: STRING
  description: A categorical label describing the type of Firefox Desktop activity
    observed, such as any activity, visiting 5 or more URIs, or opening Developer
    Tools.
- mode: NULLABLE
  name: id_bucket
  type: INTEGER
  description: "A bucketing identifier (0\u201319) used to partition clients into\
    \ evenly distributed groups, typically for sampling or incremental processing\
    \ purposes."
- mode: NULLABLE
  name: country
  type: STRING
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- mode: NULLABLE
  name: locale
  type: STRING
  description: The language and region locale of the Firefox browser or application,
    such as 'en' for English or 'fr' for French. A null value indicates the locale
    could not be determined.
- mode: NULLABLE
  name: os
  type: STRING
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- mode: NULLABLE
  name: channel
  type: STRING
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- mode: NULLABLE
  name: attributed
  type: BOOLEAN
  description: Indicates whether the client or install event has a known marketing
    attribution source (true) or was not attributed to any campaign or referral (false).
- fields:
  - fields:
    - mode: NULLABLE
      name: dau
      type: INTEGER
      description: Daily Active Users (DAU). The count of distinct clients active
        on a given day. See detailed DAU definitions for Desktop and Mobile in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#Definitions.
    - mode: NULLABLE
      name: wau
      type: INTEGER
      description: Weekly Active Users (WAU). In aggregate tables this is the count
        of distinct clients active at least one day in the previous 7 days. See detailed
        definition in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#WAU-and-MAU.
    - mode: NULLABLE
      name: mau
      type: INTEGER
      description: Monthly Active Users (MAU). The count of distinct clients that
        were active at least one day within the previous 28 days. See detailed MAU
        definition in https://mozilla-hub.atlassian.net/wiki/spaces/DATA/pages/314704478/Daily+Active+Users+DAU+Metric#WAU-and-MAU.
    - mode: NULLABLE
      name: active_days_in_week
      type: INTEGER
    mode: NULLABLE
    name: day_0
    type: RECORD
  - fields:
    - mode: NULLABLE
      name: new_profiles
      type: INTEGER
    mode: NULLABLE
    name: day_6
    type: RECORD
  - fields:
    - mode: NULLABLE
      name: new_profiles
      type: INTEGER
      description: The number of newly created Firefox profiles observed within the
        aggregation period. A value of 0 indicates no new profiles were created for
        that record's segment.
    - mode: NULLABLE
      name: active_in_week_0
      type: INTEGER
    - mode: NULLABLE
      name: active_in_week_1
      type: INTEGER
    - mode: NULLABLE
      name: active_in_weeks_0_and_1
      type: INTEGER
    - mode: NULLABLE
      name: new_profile_active_in_week_0
      type: INTEGER
    - mode: NULLABLE
      name: new_profile_active_in_week_1
      type: INTEGER
    - mode: NULLABLE
      name: new_profile_active_in_weeks_0_and_1
      type: INTEGER
    mode: NULLABLE
    name: day_13
    type: RECORD
  mode: NULLABLE
  name: metrics
  type: RECORD
  description: A nested struct containing all Glean metric values reported in a ping,
    organized by metric type (e.g., boolean, string, quantity, timespan). Each sub-field
    corresponds to a specific named metric collected by the application.
