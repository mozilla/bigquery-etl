fields:
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The date when the telemetry ping is received on the server side.
- name: days_seen_bytes
  type: BYTES
  mode: NULLABLE
  description: A byte array representing the days within the past year that this client was seen, with each
    bit encoding presence on a specific day.
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier (UUID) for the client.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: A number, 0-99, that samples by client_id and allows filtering data
    for analysis. It is a pipeline-generated artifact that should match between pings.
- name: first_run_date
  type: DATE
  mode: NULLABLE
  description: The date of the first run of the application.
- name: durations
  type: INTEGER
  mode: NULLABLE
  description: Total foreground session duration in seconds for this client on the submission date.
- name: days_seen_session_start_bits
  type: INTEGER
  mode: NULLABLE
  description: A bitmask representing the days within a recent window that this client started a browsing
    session.
- name: days_seen_session_end_bits
  type: INTEGER
  mode: NULLABLE
  description: A bitmask representing the days within a recent window that this client ended a browsing
    session.
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The normalized channel the application is being distributed on.
- name: normalized_os
  type: STRING
  mode: NULLABLE
  description: The normalized name of the operating system running at the client.
- name: normalized_os_version
  type: STRING
  mode: NULLABLE
  description: The normalized version string of the Android operating system (e.g., '13', '14', '16').
- name: android_sdk_version
  type: STRING
  mode: NULLABLE
  description: The optional Android specific SDK version of the software running on
    this hardware device.
- name: locale
  type: STRING
  mode: NULLABLE
  description: Set of language- and/or country-based preferences for a user interface.
- name: city
  type: STRING
  mode: NULLABLE
  description: Name of the city in which the activity took place, as determined by
    the IP geolocation.
- name: country
  type: STRING
  mode: NULLABLE
  description: Code of the country in which the activity took place, as determined
    by the IP geolocation.
- name: app_build
  type: STRING
  mode: NULLABLE
  description: The build identifier generated by the CI system for the Fenix application.
- name: app_channel
  type: STRING
  mode: NULLABLE
  description: The distribution channel of the Fenix application as reported by the client.
- name: app_display_version
  type: STRING
  mode: NULLABLE
  description: User visible version string (e.g. "1.0.3") for the browser.
- name: architecture
  type: STRING
  mode: NULLABLE
  description: The architecture of the device, (e.g. "arm", "x86").
- name: device_manufacturer
  type: STRING
  mode: NULLABLE
  description: The manufacturer of the device the application is running on.
- name: device_model
  type: STRING
  mode: NULLABLE
  description: The model of the device the application is running on.
    On Android, this is Build.MODEL, the user-visible marketing name, like "Pixel 2 XL".
- name: telemetry_sdk_build
  type: STRING
  mode: NULLABLE
  description: The version of the Glean SDK at the time the ping was collected (e.g.
    25.0.0).
- name: first_seen_date
  type: DATE
  mode: NULLABLE
  description: Date when the server first received a ping from this client.
- name: is_new_profile
  type: BOOLEAN
  mode: NULLABLE
  description: True if this is the first time this client profile was seen within the yearly window, false
    otherwise.
- name: isp
  type: STRING
  mode: NULLABLE
  description: The name of the internet service provider associated with the client's
    IP address.
- name: distribution_id
  type: STRING
  mode: NULLABLE
  description: The distribution id associated with the install of Firefox.
- name: geo_subdivision
  type: STRING
  mode: NULLABLE
  description: The primary geographic subdivision (e.g., state or province code) where the client's activity
    occurred. Null when not available.
