fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: submission_date
- mode: NULLABLE
  name: ping
  type: STRING
  description: The name of the Glean ping the percentiles were computed from (one of 'metrics', 'baseline',
    or 'main').
- mode: NULLABLE
  name: channel
  type: STRING
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: channel
- mode: NULLABLE
  name: metric_name
  type: STRING
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: metric_name
- mode: REPEATED
  name: percentiles
  type: INTEGER
  description: An array of approximate quantile boundaries of the metric value, computed with APPROX_QUANTILES
    into 20 buckets (21 values spanning the 0th to 100th percentile in 5-point increments).
- mode: NULLABLE
  name: mean
  type: FLOAT
  description: The arithmetic mean of the metric value across clients for the given channel and metric_name.
- mode: NULLABLE
  name: std_dev
  type: FLOAT
  description: The standard deviation of the metric value across clients for the given channel and metric_name.
- mode: NULLABLE
  name: median
  type: INTEGER
  description: The median (50th percentile, via PERCENTILE_DISC) of the metric value across clients for the
    given channel and metric_name.
