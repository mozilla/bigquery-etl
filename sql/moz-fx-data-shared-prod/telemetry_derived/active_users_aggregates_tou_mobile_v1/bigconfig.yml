type: BIGCONFIG_FILE
tag_deployments:
- collection:
    name: Operational Checks
    notification_channels:
    - slack: '#de-bigeye-triage'
  deployments:
  - column_selectors:
    - name: moz-fx-data-shared-prod.moz-fx-data-shared-prod.telemetry_derived.active_users_aggregates_tou_mobile_v1.submission_date
    - name: moz-fx-data-shared-prod.moz-fx-data-shared-prod.telemetry_derived.active_users_aggregates_tou_mobile_v1.mobile_app_name
    metrics:
    - saved_metric_id: is_not_null
      rct_overrides:
      - submission_date
  - column_selectors:
    - name: moz-fx-data-shared-prod.moz-fx-data-shared-prod.telemetry_derived.active_users_aggregates_tou_mobile_v1.*
    metrics:
    - saved_metric_id: VOLUME
    - saved_metric_id: FRESHNESS
