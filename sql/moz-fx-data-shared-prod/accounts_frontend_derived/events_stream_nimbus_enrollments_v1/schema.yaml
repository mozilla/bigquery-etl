fields:
- name: event_id
  type: STRING
  mode: NULLABLE
  description: Row identifier UUID. When unnesting the results column, use 'COUNT(DISTINCT event_id)' to count events.
- name: additional_properties
  type: STRING
  mode: NULLABLE
  description: A JSON string containing any payload properties not present in the schema.
- name: client_info
  type: RECORD
  mode: NULLABLE
  description: Record containing client information.
  fields:
  - name: app_build
    type: STRING
    mode: NULLABLE
    description: The build identifier generated by the CI system (e.g. "1234/A").
  - name: app_channel
    type: STRING
    mode: NULLABLE
    description: The channel the application is being distributed on.
  - name: app_display_version
    type: STRING
    mode: NULLABLE
    description: User visible version string (e.g. "1.0.3") for the browser.
  - name: architecture
    type: STRING
    mode: NULLABLE
    description: The architecture of the device, (e.g. "arm", "x86").
  - name: device_manufacturer
    type: STRING
    mode: NULLABLE
    description: The manufacturer of the device the application is running on. Not set
      if the device manufacturer can't be determined (e.g. on Desktop).
  - name: device_model
    type: STRING
    mode: NULLABLE
    description: The model of the device the application is running on. Not set if the
      device model can't be determined (e.g. on Desktop).
  - name: first_run_date
    type: STRING
    mode: NULLABLE
    description: The date of the first run of the application.
  - name: locale
    type: STRING
    mode: NULLABLE
    description: Set of language- and/or country-based preferences for a user interface.
  - name: os
    type: STRING
    mode: NULLABLE
    description: The operating system running at the client.
  - name: os_version
    type: STRING
    mode: NULLABLE
    description: The version of the operating system running at the client.
  - name: telemetry_sdk_build
    type: STRING
    mode: NULLABLE
    description: The version of the Glean SDK at the time the ping was collected (e.g. 25.0.0).
  - name: build_date
    type: STRING
    mode: NULLABLE
    description: The build date of the Glean SDK at the time the ping was collected (e.g. 2024-01-01).
  - name: session_id
    type: STRING
    mode: NULLABLE
    description: A UUID identifying the current application session, generated by the Glean SDK.
  - name: session_count
    type: INTEGER
    mode: NULLABLE
    description: Session Count.
  - name: attribution
    type: RECORD
    mode: NULLABLE
    description: Record containing attribution information.
    fields:
    - name: campaign
      type: STRING
      mode: NULLABLE
      description: The attribution campaign (e.g. 'mozilla-org').
    - name: content
      type: STRING
      mode: NULLABLE
      description: The attribution content (e.g. 'firefoxview').
    - name: medium
      type: STRING
      mode: NULLABLE
      description: The attribution medium (e.g. 'organic' for a search engine).
    - name: source
      type: STRING
      mode: NULLABLE
      description: The attribution source (e.g. 'google-play').
    - name: term
      type: STRING
      mode: NULLABLE
      description: The attribution term (e.g. 'browser with developer tools for android').
    - name: ext
      type: JSON
      mode: NULLABLE
      description: attribution extension
  - name: distribution
    type: RECORD
    mode: NULLABLE
    description: Record containing distribution information.
    fields:
    - name: name
      type: STRING
      mode: NULLABLE
      description: Name of the distribution
    - name: ext
      type: JSON
      mode: NULLABLE
      description: Distribution extension
  - name: windows_build_number
    type: INTEGER
    mode: NULLABLE
    description: The optional Windows build number, reported by Windows (e.g. 22000)
      and not set for other platforms (Windows only).
- name: document_id
  type: STRING
  mode: NULLABLE
  description: The document ID specified in the URI when the client sent this message.
- name: metadata
  type: RECORD
  mode: NULLABLE
  description: Record containing metadata information.
  fields:
  - name: geo
    type: RECORD
    mode: NULLABLE
    description: Geographic information about the client
    fields:
    - name: city
      type: STRING
      mode: NULLABLE
      description: City associated with the client's activity, as determined by the IP geolocation.
    - name: country
      type: STRING
      mode: NULLABLE
      description: An ISO 3166-1 alpha-2 country code.
    - name: db_version
      type: STRING
      mode: NULLABLE
      description: The specific geo database version used for this lookup.
    - name: subdivision1
      type: STRING
      mode: NULLABLE
      description: First major country subdivision, typically a state, province, or county.
    - name: subdivision2
      type: STRING
      mode: NULLABLE
      description: Second major country subdivision; not applicable for most countries.
  - name: header
    type: RECORD
    mode: NULLABLE
    description: Record containing header information.
    fields:
    - name: date
      type: STRING
      mode: NULLABLE
      description: Date HTTP header.
    - name: dnt
      type: STRING
      mode: NULLABLE
      description: DNT (Do Not Track) HTTP header.
    - name: x_debug_id
      type: STRING
      mode: NULLABLE
      description: X-Debug-Id HTTP header.
    - name: x_foxsec_ip_reputation
      type: STRING
      mode: NULLABLE
      description: X-Foxsec-IP-Reputation header.
    - name: x_lb_tags
      type: STRING
      mode: NULLABLE
      description: X-LB-Tags HTTP header.
    - name: x_pingsender_version
      type: STRING
      mode: NULLABLE
      description: X-PingSender-Version HTTP header.
    - name: x_source_tags
      type: STRING
      mode: NULLABLE
      description: X-Source-Tags HTTP header.
    - name: x_telemetry_agent
      type: STRING
      mode: NULLABLE
      description: X-Telemetry-Agent HTTP header.
    - name: parsed_date
      type: TIMESTAMP
      mode: NULLABLE
      description: Parsed Date.
    - name: parsed_x_source_tags
      type: STRING
      mode: REPEATED
      description: Parsed X Source Tags.
    - name: parsed_x_lb_tags
      type: RECORD
      mode: NULLABLE
      description: Parsed X LB Tags.
      fields:
      - name: tls_version
        type: STRING
        mode: NULLABLE
        description: TLS Version.
      - name: tls_cipher_hex
        type: STRING
        mode: NULLABLE
        description: TLS Cipher Hex.
  - name: isp
    type: RECORD
    mode: NULLABLE
    description: Record containing ISP information.
    fields:
    - name: db_version
      type: STRING
      mode: NULLABLE
      description: The specific geo ISP database version used for this lookup.
    - name: name
      type: STRING
      mode: NULLABLE
      description: The name of the ISP associated with the client's IP address.
    - name: organization
      type: STRING
      mode: NULLABLE
      description: The name of a specific business entity associated with the client's
        IP address when available; otherwise the ISP name.
  - name: user_agent
    type: RECORD
    mode: NULLABLE
    description: User agent information.
    fields:
    - name: browser
      type: STRING
      mode: NULLABLE
      description: Browser.
    - name: os
      type: STRING
      mode: NULLABLE
      description: The operating system running at the client.
    - name: version
      type: STRING
      mode: NULLABLE
      description: Version.
- name: normalized_app_name
  type: STRING
  mode: NULLABLE
  description: Set to "Other" if this message contained an unrecognized app name.
- name: normalized_channel
  type: STRING
  mode: NULLABLE
  description: The normalized channel the application is being distributed on.
- name: normalized_country_code
  type: STRING
  mode: NULLABLE
  description: Code of the country in which the activity took place, as determined by
    the IP geolocation. Unknown or NULL values are normally stored as '??'.
- name: normalized_os
  type: STRING
  mode: NULLABLE
  description: The normalized name of the operating system running at the client.
- name: normalized_os_version
  type: STRING
  mode: NULLABLE
  description: Normalized Operating System Version.
- name: ping_info
  type: RECORD
  mode: NULLABLE
  description: Record containing ping information.
  fields:
  - name: seq
    type: INTEGER
    mode: NULLABLE
    description: running counter of the number of times pings of this type have been sent.
      This metric definition is only used for documentation purposes - internally,
      Glean instantiates the metric manually and calls it <mark>seq</mark>uence.
  - name: start_time
    type: STRING
    mode: NULLABLE
    description: The time of the start of collection of the data in the ping,
      in local time and with minute precision, including timezone information.
  - name: parsed_start_time
    type: TIMESTAMP
    mode: NULLABLE
    description: The parsed start time of the start of collection of the data in the ping,
      in local time and with minute precision, including timezone information.
  - name: end_time
    type: STRING
    mode: NULLABLE
    description: The time of the end of collection of the data in the ping,
      in local time and with minute precision, including timezone information.
      This is also the time this ping was generated and is likely well before ping transmission time.
  - name: parsed_end_time
    type: TIMESTAMP
    mode: NULLABLE
    description: The parsed end time of the end of collection of the data in the ping,
      in local time and with minute precision, including timezone information.
      This is also the time this ping was generated and is likely well before ping transmission time.
  - name: ping_type
    type: STRING
    mode: NULLABLE
    description: The type of the ping, as defined in the Glean SDK. This is a required field in Glean,
      but may be NULL if the ping was generated by an older version of the SDK or if the field was not properly populated.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: A number, 0-99, that samples by client_id and allows filtering data for analysis.
    It is a pipeline-generated artifact that should match between pings.
- name: submission_timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: Timestamp when the ping is received on the server side.
- name: client_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier (UUID) for the client.
- name: reason
  type: STRING
  mode: NULLABLE
  description: Additional context-dependent (on event.name) info, e.g. the cause of an error
- name: experiments
  type: JSON
  mode: NULLABLE
  description: Experiment Information.
- name: event_timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: Glean event timestamp.
- name: event_category
  type: STRING
  mode: NULLABLE
  description: Category of the recorded event.
- name: event_name
  type: STRING
  mode: NULLABLE
  description: Name of the recorded event.
- name: event
  type: STRING
  mode: NULLABLE
  description: Event value recorded as a string.
- name: event_extra
  type: JSON
  mode: NULLABLE
  description: Extra details about the event itself
- name: metrics
  type: RECORD
  mode: NULLABLE
  description: Record of metrics for the ping.
  fields:
  - name: labeled_counter
    type: RECORD
    mode: NULLABLE
    description: Record containing labeled counter metrics.
    fields:
    - name: glean_error_invalid_label
      type: RECORD
      mode: REPEATED
      description: Counts the number of times a metric was set with an invalid label.
         The labels are the category.name identifier of the metric.
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
        description: Key of glean_error_invalid_label
      - name: value
        type: INTEGER
        mode: NULLABLE
        description: Value of glean_error_invalid_label
    - name: glean_error_invalid_overflow
      type: RECORD
      mode: REPEATED
      description: Counts the number of times a metric was set a value that overflowed.
        The labels are the category.name identifier of the metric.
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
        description: Key of glean_error_invalid_overflow
      - name: value
        type: INTEGER
        mode: NULLABLE
        description: Valu
    - name: glean_error_invalid_state
      type: RECORD
      mode: REPEATED
      description: Counts the number of times a timing metric was used incorrectly.
       The labels are the category.name identifier of the metric.
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
        description: Key of glean_error_invalid_state
      - name: value
        type: INTEGER
        mode: NULLABLE
        description: Value of glean_error_invalid_state
    - name: glean_error_invalid_value
      type: RECORD
      mode: REPEATED
      description: Counts the number of times a metric was set to an invalid value.
        The labels are the category.name identifier of the metric.
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
        description: Key of glean_error_invalid_value
      - name: value
        type: INTEGER
        mode: NULLABLE
        description: Value of glean_error_invalid_value
    - name: glean_error_invalid_type
      type: RECORD
      mode: REPEATED
      description: Counts the number of times a metric set a value which was not of the expected type.
        The labels are the category.name identifier of the metric. This error type is only recorded by the Glean JavaScript SDK.
        This error may only happen in dynamically typed languages.
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
        description: Key of glean_error_invalid_type
      - name: value
        type: INTEGER
        mode: NULLABLE
        description: Value of glean_error_invalid_type
  - name: string
    type: RECORD
    mode: NULLABLE
    description: Record of string metrics.
    fields:
    - name: glean_client_annotation_experimentation_id
      type: STRING
      mode: NULLABLE
      description: An experimentation identifier derived and provided by the application for the purpose of experimentation enrollment.
    - name: account_user_id_sha256
      type: STRING
      mode: NULLABLE
      description: A hex string of a sha256 hash of the account's uid
    - name: relying_party_oauth_client_id
      type: STRING
      mode: NULLABLE
      description: The client id of the relying party
    - name: relying_party_service
      type: STRING
      mode: NULLABLE
      description: The service name of the relying party
    - name: session_device_type
      type: STRING
      mode: NULLABLE
      description: one of 'mobile', 'tablet', or 'desktop'
    - name: session_entrypoint
      type: STRING
      mode: NULLABLE
      description: entrypoint to the service
    - name: session_flow_id
      type: STRING
      mode: NULLABLE
      description: an ID generated by FxA for its flow metrics
    - name: utm_campaign
      type: STRING
      mode: NULLABLE
      description: A marketing campaign. For example, if a user signs into FxA from selecting a
        Mozilla VPN plan on Mozilla VPN's product site, then value of this metric could be 'vpn-product-page'.
        The value has a max length of 128 characters with the alphanumeric characters,
        _ (underscore), forward slash (/), . (period), % (percentage sign), and - (hyphen) in the allowed set of characters.
        The special value of 'page+referral+-+not+part+of+a+campaign' is also allowed.
    - name: utm_content
      type: STRING
      mode: NULLABLE
      description: The content on which the user acted. For example, if the user clicked on the (previously available)
        "Get started here" link in "Looking for Firefox Sync? Get started here", then the value for this metric would
        be 'fx-sync-get-started'. The value has a max length of 128 characters with the alphanumeric characters,
         _ (underscore), forward slash (/), . (period), % (percentage sign), and - (hyphen) in the allowed set of characters.
    - name: utm_medium
      type: STRING
      mode: NULLABLE
      description: The "medium" on which the user acted. For example, if the user clicked on a link in an email,
        then the value of this metric would be 'email'. The value has a max length of 128 characters with the
        alphanumeric characters, _ (underscore), forward slash (/), . (period), % (percentage sign), and - (hyphen)
        in the allowed set of characters.
    - name: utm_source
      type: STRING
      mode: NULLABLE
      description: The source from where the user started. For example, if the user clicked on a link on
        the Firefox accounts web site, this value could be 'fx-website'. The value has a max length of 128 characters
        with the alphanumeric characters, _ (underscore), forward slash (/), . (period), % (percentage sign), and - (hyphen)
        in the allowed set of characters.
    - name: utm_term
      type: STRING
      mode: NULLABLE
      description: This metric is similar to the utm.source; it is used in the Firefox browser. For example,
        if the user started from about:welcome, then the value could be 'aboutwelcome-default-screen'.
        The value has a max length of 128 characters with the alphanumeric characters, _ (underscore), forward slash (/), . (period), % (percentage sign),
        and - (hyphen) in the allowed set of characters.
    - name: entrypoint_experiment
      type: STRING
      mode: NULLABLE
      description: The entrypoint experiment the user was assigned to. This value is specified by
        query parameter <mark>entrypoint</mark>_experiment in the URL.
    - name: entrypoint_variation
      type: STRING
      mode: NULLABLE
      description: The entrypoint variation the user was assigned to. This value is specified by
        query parameter <mark>entrypoint</mark>_variation in the URL.
    - name: account_user_id
      type: STRING
      mode: NULLABLE
      description: The firefox/mozilla account id
  - name: uuid
    type: RECORD
    mode: NULLABLE
    description: Record of UUID metrics.
    fields:
    - name: glean_page_id
      type: STRING
      mode: NULLABLE
      description: Uniquely identifies a page_load, not the page itself,
        for the purpose of associating other events with the specific page load event.
        This gets rotated with each page load and is sent along with each event ping.
  - name: labeled_boolean
    type: RECORD
    mode: NULLABLE
    description: Record of labeled boolean metrics.
    fields:
    - name: sync_cwts
      type: RECORD
      mode: REPEATED
      description: Sync CWTS
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
        description: Key of sync_cwts
      - name: value
        type: BOOLEAN
        mode: NULLABLE
        description: Value of sync_cwts
    - name: standard_marketing
      type: RECORD
      mode: REPEATED
      description: Record of Standard marketing
      fields:
      - name: key
        type: STRING
        mode: NULLABLE
        description: Key of standard_marketing
      - name: value
        type: BOOLEAN
        mode: NULLABLE
        description: Value of standard_marketing
- name: profile_group_id
  type: STRING
  mode: NULLABLE
  description: A UUID uniquely identifying the profile group, not shared with other telemetry data.
- name: legacy_telemetry_client_id
  type: STRING
  mode: NULLABLE
  description: A unique identifier (UUID) for the client based on legacy telemetry data.
- name: app_version_major
  type: NUMERIC
  mode: NULLABLE
  description: The major version of the user visible app version string for the browser,
    e.g. "142.1.3", has major version 142.
- name: app_version_minor
  type: NUMERIC
  mode: NULLABLE
  description: The minor version of the user visible app version string for the browser,
    e.g. "142.1.3" has minor version 1.
- name: app_version_patch
  type: NUMERIC
  mode: NULLABLE
  description: The patch version of the user visible app version string for the browser,
    e.g. "142.1.3" has patch version 3.
- name: is_bot_generated
  type: BOOLEAN
  mode: NULLABLE
  description: Indicates if the client is a bot.
- name: document_event_number
  type: INTEGER
  mode: NULLABLE
  description: Document Event Number
- name: experiment_id
  type: STRING
  mode: NULLABLE
  description: Nimbus experiment identifier.
- name: branch
  type: STRING
  mode: NULLABLE
  description: Nimbus experiment branch.
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: The date when the telemetry ping is received on the server side.
