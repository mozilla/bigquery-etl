friendly_name: Translation Daily Locale Base (Daily)
description: |
  Daily translation/localization metrics for SUMO knowledge base articles.

  Single source of truth tracking:
  - Translations completed within 30-day SLA for 5 priority locales
  - Translation velocity and coverage metrics

  Grain: Daily x Locale (fr, es, de, it, zh-CN)

  Used by:
  - translations_weekly_v1 (weekly aggregation)
  - translations_monthly_v1 (monthly aggregation)
  - Translation dashboard and SLA reporting
owners:
- plee@mozilla.com
labels:
  application: sumo
  type: base_metrics
  schedule: daily
  dag: bqetl_sumo_metrics
  owner1: plee
scheduling:
  dag_name: bqetl_sumo_metrics
  depends_on_past: false
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
  - workgroup:sumo/bq-automation
references:
  query.sql:
  - moz-fx-data-shared-prod.sumo_syndicate.kitsune_wiki_document
  - moz-fx-data-shared-prod.sumo_syndicate.kitsune_wiki_revision
