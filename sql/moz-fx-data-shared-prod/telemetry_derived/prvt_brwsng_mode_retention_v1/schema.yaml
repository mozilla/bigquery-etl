fields:
- description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
  mode: NULLABLE
  name: submission_date
  type: DATE
- name: first_seen_date
  type: DATE
  mode: NULLABLE
  description: The calendar date on which the client profile was first observed in
    telemetry data. This is used to determine client tenure and cohort assignment.
- name: saw_onboarding
  type: BOOLEAN
  mode: NULLABLE
  description: Saw Onboarding - Flag indicating if the client saw "'about:welcome"
    on or before first seen date
- name: used_pbm_on_first_seen_date
  type: BOOLEAN
  mode: NULLABLE
  description: Used Private Browsing Mode on First Seen Date
- name: active_in_next_7_days
  type: BOOLEAN
  mode: NULLABLE
  description: Active in Next 7 Days - Indicates if the client was a daily active
    user on 1 or more days
- name: nbr_clients
  type: INTEGER
  mode: NULLABLE
  description: Number of Clients
