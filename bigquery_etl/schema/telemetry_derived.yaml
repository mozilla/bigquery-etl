fields:
- name: cobra
  description: Count of clients using the Cobra screen reader on the given submission date and channel.
- name: dolphin
  description: Count of clients using the Dolphin screen reader on the given submission date and channel.
- name: jaws
  description: Count of clients using JAWS (Job Access With Speech) screen reader on the given submission date and channel.
- name: kazaguru
  description: Count of clients using the Kazaguru assistive technology on the given submission date and channel.
- name: magnifier
  description: Count of clients using the Windows Magnifier accessibility tool on the given submission date and channel.
- name: narrator
  description: Count of clients using Windows Narrator screen reader on the given submission date and channel.
- name: nvda
  description: Count of clients using NVDA (NonVisual Desktop Access) screen reader on the given submission date and channel.
- name: oldjaws
  description: Count of clients using an older version of the JAWS screen reader on the given submission date and channel.
- name: on_screen_keyboard
  description: Count of clients using the Windows On-Screen Keyboard accessibility feature on the given submission date and channel.
- name: other
  description: Count of clients using other accessibility tools not covered by the specific named columns on the given submission date and channel.
- name: serotek
  description: Count of clients using the Serotek screen reader on the given submission date and channel.
- name: speech_recognition
  description: Count of clients using a speech recognition assistive technology on the given submission date and channel.
- name: touch_keyboard_and_handwriting_panel
  description: Count of clients using the Windows Touch Keyboard and Handwriting Panel on the given submission date and channel.
- name: uiautomation
  description: Count of clients where the Windows UI Automation accessibility framework was detected on the given submission date and channel.
- name: unknown
  description: Count of clients using an unidentified assistive technology product on the given submission date and channel.
- name: visperoshared
  description: Count of clients using Vispero shared accessibility components (parent company of JAWS) on the given submission date and channel.
- name: voice_over
  description: Count of clients using Apple VoiceOver screen reader on the given submission date and channel.
- name: we
  description: Count of clients using the Window-Eyes screen reader on the given submission date and channel.
- name: youdao
  description: Count of clients using the Youdao assistive technology on the given submission date and channel.
- name: zoomtext
  description: Count of clients using ZoomText magnification software on the given submission date and channel.
- name: active_hours
  description: Total active browsing hours accumulated by clients in this segment on the submission date.
- name: ad_clicks
  description: Total count of ad clicks recorded across all clients in this segment on the submission date.
- name: attributed
  description: Indicates whether the clients in this row have a known install attribution. True if attribution data is present, false otherwise.
- name: first_seen_year
  description: The calendar year in which the client's profile was first seen by Mozilla's telemetry pipeline.
- name: new_profiles
  description: The count of newly created profiles first seen on the submission date.
- name: organic_search_count
  description: Total count of organic (non-paid) search queries made by clients in this segment on the submission date.
- name: qdau_desktop
  description: Count of distinct, qualified Desktop clients that sent a main ping on the submission date. For mobile, this equals DAU.
- name: search_count
  description: Total count of search queries made by clients in this segment on the submission date.
- name: search_with_ads
  description: Total count of searches that returned pages containing ads, for clients in this segment on the submission date.
- name: uri_count
  description: Total count of URIs visited by clients in this segment on the submission date.
- name: device_model
  description: The hardware model identifier of the client's device (e.g., 'iPhone14,5', 'Redmi 7A'). Populated for mobile clients; null for desktop.
- name: app_version_is_major_release
  description: 'True if the app version represents a major release (e.g. ''151.0''), false for point releases (e.g. ''151.0.1''). Sampled: ~31% are major releases
    (sampled 2026-06-02).'
- name: daily_users
  description: Number of users who sent a ping on the submission_date (based on raw ping activity, before active qualification).
- name: monthly_users
  description: Number of users who sent a ping in the 28 days up to the submission_date (based on raw ping activity, before active qualification).
- name: tou_daily_active_users
  description: Count of daily active users who have accepted the mobile Terms of Use, corresponding to clients that reported at least one ping on the submission_date
    and qualify as active.
- name: tou_monthly_active_users
  description: Count of monthly active users who have accepted the mobile Terms of Use, corresponding to clients active in the 28 days up to the submission_date.
- name: tou_weekly_active_users
  description: Count of weekly active users who have accepted the mobile Terms of Use, corresponding to clients active in the 7 days up to the submission_date.
- name: weekly_users
  description: Number of users who sent a ping in the 7 days up to the submission_date (based on raw ping activity, before active qualification).
- name: language_name
  description: The human-readable name of the browser locale language (e.g., 'English', 'German').
- name: dag_run_date
  description: The actual execution date of the DAG run that produced this row.
- name: desktop
  description: Count of clients qualifying for the Desktop KPI (is_desktop = true) in telemetry.active_users for this app name and submission_date.
- name: logical_dag_date
  description: The logical DAG run date as seen by Airflow; this represents the period the DAG is processing, not the actual execution time.
- name: mobile
  description: Count of clients qualifying for the Mobile KPI (is_mobile = true) in telemetry.active_users for this app name and submission_date.
- name: row_count
  description: Total number of rows in telemetry.active_users for this app name and submission_date, as of the DAG run.
- name: unique_client_ids
  description: Count of unique client IDs from telemetry.active_users for this app name and submission_date, as of the DAG run.
- name: first_addon_install_date
  description: The date the first user-installed add-on was installed on this client, formatted as YYYYMMDD. Null if no user-installed add-ons exist.
- name: n_foreign_installed_addons
  description: Count of add-ons installed by an external application (not by the user directly) active on this client on the submission date.
- name: n_self_installed_addons
  description: Count of add-ons installed directly by the user (not system-installed or foreign-installed) active on this client on the submission date.
- name: n_shield_addons
  description: Count of Shield/Normandy experiment add-ons active on this client on the submission date.
- name: n_system_addons
  description: Count of system add-ons (built-in Mozilla add-ons shipped with Firefox) active on this client on the submission date.
- name: n_web_extensions
  description: Count of WebExtension-based add-ons active on this client on the submission date.
- name: profile_creation_date
  description: The date the Firefox profile was created on this client, formatted as YYYYMMDD.
- name: addon_id
  description: The unique identifier for the add-on, typically in reverse-DNS or email format (e.g., 'formautofill@mozilla.org').
- name: app_disabled
  description: Whether the application has disabled this add-on due to version incompatibility, dependency issues, or blocklisting. True if app-disabled.
- name: blocklisted
  description: Whether the add-on appears in the Firefox blocklist. True if blocked, false otherwise.
- name: foreign_install
  description: Whether this add-on was installed by an external application rather than directly by the user. True if foreign-installed.
- name: has_binary_components
  description: Whether the add-on includes binary (native code) components. Always false since Firefox 60.
- name: install_day
  description: The number of days since the Unix epoch (1970-01-01) on which this add-on was first installed.
- name: is_system
  description: Whether the add-on is a Mozilla system add-on shipped with Firefox. True if system, false if user-installed.
- name: is_web_extension
  description: Whether the add-on uses the WebExtension API. True for modern WebExtensions, false for legacy XUL-based add-ons.
- name: multiprocess_compatible
  description: Whether the add-on is compatible with multi-process Firefox (e10s). Always true since Firefox 61.
- name: name
  description: The display name of the add-on, limited to 100 characters (e.g., 'Picture-In-Picture', 'Form Autofill').
- name: scope
  description: 'Numeric code indicating the installation scope of the add-on: 1=profile, 2=user, 4=application, 8=system, 16=built-in.'
- name: signed_state
  description: 'The AMO signature state of the add-on: 2=signed, 3=system add-on, 4=preliminary signed; negative values indicate invalid or unsigned states.'
- name: subsession_start_date
  description: The start date and time of the telemetry subsession during which this add-on data was recorded, as reported by the client (timezone-offset string).
- name: type
  description: 'The type of add-on: ''extension'', ''locale'', ''dictionary'', or ''service''.'
- name: update_day
  description: The number of days since the Unix epoch (1970-01-01) on which this add-on was last updated.
- name: user_disabled
  description: Whether the user has explicitly disabled this add-on. True if disabled by the user.
- name: version
  description: The version string of this specific add-on (e.g., '1.0.1'), distinct from the browser version.
- name: app_description
  description: Human-readable description of the application from the Glean application registry.
- name: app_id
  description: Unique application identifier in dot notation (e.g. 'firefox.desktop', 'org.mozilla.fenix'), as defined in the Glean application registry.
- name: bq_dataset_family
  description: The BigQuery dataset family where ping data for this application is stored (e.g. 'firefox_desktop', 'telemetry').
- name: canonical_app_name
  description: The human-readable product name for this application (e.g. 'Firefox for Desktop', 'Firefox for Android').
- name: document_namespace
  description: The Telemetry ingestion document namespace for the application (e.g. 'firefox-desktop', 'fenix').
- name: is_glean
  description: True if the application uses the Glean SDK for telemetry; false if it uses the legacy telemetry system.
- name: notification_emails
  description: List of email addresses that receive notifications related to this application's telemetry configuration.
- name: url
  description: URL of the application's source code repository (e.g. 'https://github.com/mozilla-firefox/firefox').
- name: v1_name
  description: The legacy V1 application name used in older telemetry pipelines (e.g. 'firefox-desktop'). Null for applications not present in V1 (sampled 2026-06-02).
- name: apple_model_id
  description: The hardware model identifier for Apple devices (e.g., 'MacBookAir10,1'). Mac only; null on other platforms.
- name: db_version
  description: The version of the geolocation database used to resolve the client's location.
- name: distribution_model
  description: A categorized description of how Firefox was distributed to this client (e.g., 'non-distribution', 'OS pre-installed', 'secondary store', 'OEM pre-installed').
- name: engine_data_load_path
  description: The anonymized path to the default search engine configuration file (e.g., '[app]google', '[addon]google@search.mozilla.org').
- name: engine_data_name
  description: The display name of the client's default search engine (e.g., 'Google', 'Bing', 'DuckDuckGo').
- name: engine_data_origin
  description: 'The origin type of the default search engine: ''default'' for built-in engines, ''verified'' for user-installed with valid signatures, ''unverified''
    or ''invalid'' for others.'
- name: engine_data_submission_url
  description: The HTTP submission URL used for searches with the default engine. Not recorded for user-installed engines for privacy.
- name: funnel_derived
  description: 'The derived acquisition funnel category for this client: ''mozorg windows funnel'', ''mozorg mac funnel'', ''partner'', or ''other''.'
- name: ga4_ad_crosschannel_campaign
  description: The campaign name as attributed by GA4 cross-channel last-touch attribution for the linked session.
- name: ga4_ad_crosschannel_campaign_id
  description: The campaign ID as attributed by GA4 cross-channel last-touch attribution for the linked session.
- name: ga4_ad_crosschannel_default_channel_group
  description: The default channel group classification by GA4 cross-channel attribution (e.g., 'Organic Search', 'Paid Search', 'Referral').
- name: ga4_ad_crosschannel_medium
  description: The traffic medium as attributed by GA4 cross-channel last-touch attribution (e.g., 'organic', 'cpc', 'referral').
- name: ga4_ad_crosschannel_primary_channel_group
  description: The primary channel group classification by GA4 cross-channel attribution (e.g., 'Organic Search', 'Paid Search', 'Direct').
- name: ga4_ad_crosschannel_source
  description: The traffic source as attributed by GA4 cross-channel last-touch attribution for the linked session.
- name: ga4_ad_crosschannel_source_platform
  description: The advertising platform attributed by GA4 cross-channel attribution (e.g., 'Google Ads', 'Manual').
- name: ga4_ad_google_account
  description: The Google Ads account name reported by GA4 for the linked session.
- name: ga4_ad_google_campaign
  description: The Google Ads campaign name reported by GA4 for the linked session.
- name: ga4_ad_google_campaign_id
  description: The Google Ads campaign ID reported by GA4 for the linked session.
- name: ga4_ad_google_group
  description: The Google Ads ad group name reported by GA4 for the linked session.
- name: ga4_ad_google_group_id
  description: The Google Ads ad group ID reported by GA4 for the linked session.
- name: ga4_all_reported_install_targets
  description: Array of all install target values reported in the matched GA4 session.
- name: ga4_browser
  description: The browser type reported by GA4 for the linked web session (e.g., 'Chrome', 'Edge', 'Firefox').
- name: ga4_browser_version
  description: The browser version string reported by GA4 for the linked web session.
- name: ga4_city
  description: The city reported by GA4 for the web session linked to this install.
- name: ga4_country
  description: The country reported by GA4 for the web session linked to this install (country name, not code).
- name: ga4_device_category
  description: The device category reported by GA4 for the linked session (always 'desktop' in this table).
- name: ga4_distinct_campaigns_from_event_params
  description: Array of all distinct campaign names seen in GA4 event parameters for the matched session. Empty array if no GA4 session is matched.
- name: ga4_distinct_contents_from_event_params
  description: Array of all distinct content identifiers from GA4 event parameters for the matched session.
- name: ga4_distinct_experiment_branches_from_event_params
  description: Array of all distinct experiment branch names from GA4 event parameters for the matched session.
- name: ga4_distinct_experiment_ids_from_event_params
  description: Array of all distinct GA4 experiment IDs from event parameters for the matched session.
- name: ga4_distinct_gad_campaignid_from_event_params
  description: Array of all distinct Google Ads campaign IDs (gad_campaignid) from GA4 event parameters for the matched session.
- name: ga4_distinct_mediums_from_event_params
  description: Array of all distinct traffic mediums from GA4 event parameters for the matched session.
- name: ga4_distinct_sources_from_event_params
  description: Array of all distinct traffic sources from GA4 event parameters for the matched session.
- name: ga4_distinct_terms_from_event_params
  description: Array of all distinct search terms from GA4 event parameters for the matched session.
- name: ga4_firefox_desktop_downloads
  description: The count of Firefox Desktop download events recorded in the GA4 session linked to this install.
- name: ga4_first_campaign_from_event_params
  description: The first non-null campaign name extracted from GA4 event parameters for the linked session (e.g., '(organic)', 'SET_DEFAULT_BROWSER').
- name: ga4_first_content_from_event_params
  description: The first non-null UTM content value extracted from GA4 event parameters for the linked session.
- name: ga4_first_experiment_branch_from_event_params
  description: The first non-null experiment branch name extracted from GA4 event parameters for the linked session.
- name: ga4_first_experiment_id_from_event_params
  description: The first non-null experiment ID extracted from GA4 event parameters for the linked session.
- name: ga4_first_gad_campaignid_from_event_params
  description: The first Google Ads campaign ID found in GA4 event parameters for this session. Null (~98%) for clients without paid search attribution (sampled 2026-06-02).
- name: ga4_first_medium_from_event_params
  description: The first non-null traffic medium extracted from GA4 event parameters for the linked session (e.g., 'organic', 'referral').
- name: ga4_first_source_from_event_params
  description: The first non-null traffic source extracted from GA4 event parameters for the linked session (e.g., 'google', 'bing').
- name: ga4_first_term_from_event_params
  description: The first non-null search term extracted from GA4 event parameters for the linked session.
- name: ga4_ga_client_id
  description: The Google Analytics 4 client ID associated with the web session linked to this Firefox install.
- name: ga4_gclid
  description: The Google Click ID (gclid) from the GA4 session linked to this install, used to attribute Google Ads clicks.
- name: ga4_gclid_array
  description: Array of all gclid values seen across events in the matched GA4 session.
- name: ga4_had_download_event
  description: Whether the GA4 session linked to this install included a download event for Firefox. True if a download event was recorded.
- name: ga4_landing_screen
  description: The URL of the landing page in the GA4 session that led to the Firefox download (e.g., 'https://www.firefox.com/en-US/').
- name: ga4_language
  description: The browser language reported by GA4 for the linked session (e.g., 'en-us', 'pt-br').
- name: ga4_last_reported_install_target
  description: The last reported install target from GA4 events (e.g., 'product_download', 'firefox_download').
- name: ga4_manual_campaign_id
  description: The manually tagged campaign ID (utm_id) from the GA4 session linked to this install.
- name: ga4_manual_campaign_name
  description: The manually tagged campaign name (utm_campaign) from the GA4 session linked to this install.
- name: ga4_manual_content
  description: The manually tagged UTM content from the GA4 session linked to this install.
- name: ga4_manual_medium
  description: The manually tagged UTM medium from the GA4 session linked to this install.
- name: ga4_manual_source
  description: The manually tagged UTM source from the GA4 session linked to this install.
- name: ga4_manual_term
  description: The manually tagged UTM term (search keyword) from the GA4 session linked to this install.
- name: ga4_mobile_device_model
  description: The mobile device model reported by GA4 for the linked session. Always null for desktop sessions.
- name: ga4_mobile_device_string
  description: The mobile device string reported by GA4 for the linked session. Always null for desktop sessions.
- name: ga4_operating_system
  description: The operating system reported by GA4 for the linked session (e.g., 'Windows', 'Macintosh').
- name: ga4_operating_system_version
  description: The OS version string reported by GA4 for the linked session (e.g., 'Windows 10', 'Windows 11').
- name: ga4_region
  description: The geographic region (e.g., state or province) reported by GA4 for the linked web session.
- name: ga4_session_date
  description: The date of the GA4 web session linked to this Firefox install.
- name: ga4_session_start_timestamp
  description: The datetime when the linked GA4 web session started.
- name: ga4_stub_session_id
  description: The session ID from GA4 that corresponds to the stub installer download session for this client.
- name: ga4_website
  description: The Mozilla website from which the GA4 session originated (e.g., 'FIREFOX.COM', 'MOZILLA.ORG'). Null if no GA4 session is linked.
- name: installation_first_seen_admin_user
  description: Whether the Windows user account that first ran the installer had administrative privileges. Windows only; null on non-Windows.
- name: installation_first_seen_default_path
  description: Whether Firefox was installed to the default installation path. Windows only; null on non-Windows.
- name: installation_first_seen_failure_reason
  description: The error code or reason if the installation failed when first seen (e.g., 'NoError', 'NotFoundError'). Null if not applicable.
- name: installation_first_seen_from_msi
  description: Whether Firefox was installed using an MSI package. Windows only; null on non-Windows.
- name: installation_first_seen_install_existed
  description: Whether a previous Firefox installation was found on the machine when this installation was first seen. Windows only; null on non-Windows.
- name: installation_first_seen_installer_type
  description: 'The type of installer used for this Firefox installation: ''full'', ''stub'', or ''msix''. Windows only; null on non-Windows.'
- name: installation_first_seen_other_inst
  description: Whether another Firefox installation was present on the machine alongside this one when first seen. Windows only; null on non-Windows.
- name: installation_first_seen_other_msix_inst
  description: Whether another Firefox MSIX installation existed on the machine when this one was first seen. Windows only; null on non-Windows.
- name: installation_first_seen_profdir_existed
  description: Whether a Firefox profile directory already existed when this installation was first seen. Windows only; null on non-Windows.
- name: installation_first_seen_silent
  description: Whether this Firefox installation was performed silently (without user interaction). Windows only; null on non-Windows.
- name: installation_first_seen_version
  description: The version of Firefox installed when this installation was first detected (e.g., '151.0.1'). Windows only; null on non-Windows.
- name: metadata.first_seen_date_source_ping
  description: 'The ping type that provided the client''s first-seen date: ''new_profile'', ''main'', or ''shutdown''.'
- name: metadata.reported_main_ping
  description: Whether the client sent at least one main ping on the first-seen date. True if a main ping was received.
- name: metadata.reported_new_profile_ping
  description: Whether the client sent a new-profile ping on the first-seen date. True if a new_profile ping was received.
- name: metadata.reported_shutdown_ping
  description: Whether the client sent a shutdown ping on the first-seen date. True if a shutdown ping was received.
- name: partner_distribution_version
  description: The version of the partner distribution package associated with this Firefox install.
- name: partner_distributor
  description: The name of the partner distributor associated with this Firefox install (e.g., 'canonical', 'mint').
- name: partner_distributor_channel
  description: The distribution channel used by the partner distributor (e.g., 'ubuntu', 'firefox').
- name: partner_id
  description: The partner identifier from the Firefox distribution (e.g., 'ubuntu', 'mozillaonline'). Null if no partner is associated.
- name: partner_org
  description: The name of the partner organization associated with this Firefox install (e.g., 'Linux - Canonical', 'Microsoft (store)', 'Mozilla - China').
- name: platform_version
  description: The XULRunner platform version string for Firefox (same as app_version for Desktop Firefox).
- name: second_seen_date
  description: The date the server received the second ping from this client after the first-seen date. Null if the client has not sent a second ping.
- name: startup_profile_selection_reason
  description: The reason the profile was selected at browser startup (e.g., 'firstrun-created-default', 'default', 'argument-profile').
- name: stub_attr_logs_dl_token
  description: The download token recorded in the stub installer attribution log, correlating the download with the install.
- name: stub_attr_logs_download_source
  description: The download source identifier recorded in the stub installer attribution log (e.g., 'fxdotcom', 'mozorg').
- name: stub_attr_logs_first_seen_date
  description: The date the stub installer attribution log was first observed for this client. Null if no stub attribution log is available.
- name: stub_attr_logs_ga_client_id
  description: The Google Analytics client ID recorded in the stub installer attribution log for this client. Null if unavailable.
- name: stub_attr_logs_stub_session_id
  description: The session ID recorded by the stub installer for this client, used to correlate stub attribution logs.
- name: subdivision1
  description: The first-level geographic subdivision (e.g., state or province) determined by IP geolocation.
- name: vendor
  description: The application vendor (always 'Mozilla' in this table).
- name: windows_build_number
  description: The Windows build number as a float (e.g., 26200.0 for Windows 11 24H2, 19045.0 for Windows 10 22H2). Null on non-Windows platforms.
- name: windows_version
  description: A human-readable Windows version string derived from the build number (e.g., 'Windows 11', 'Windows 10', 'Windows 7'). Null on non-Windows.
- name: xpcom_abi
  description: The binary ABI string identifying the processor and compiler vtable combination (e.g., 'x86_64-msvc', 'x86_64-gcc3').
- name: lifecycle_stage
  description: 'The lifecycle stage of the client profile on the submission date: ''new_profile'' for clients seen for the first time, ''repeat_user'' for clients
    in their first week, and ''existing_user'' for established clients.'
- name: n_created_pictureinpicture
  description: The number of times the client opened a Picture-in-Picture video window during the day.
- name: n_logged_event
  description: The total number of telemetry events logged by this client during the day, summed across all event ping subsessions.
- name: n_viewed_protection_report
  description: The number of times the client viewed the Firefox Enhanced Tracking Protection report during the day.
- name: aborts_content_sum
  description: Total number of content-process abort events (unclean shutdowns of content processes) for this client on the submission date.
- name: aborts_gmplugin_sum
  description: Total number of GMP (Gecko Media Plugin) process abort events for this client on the submission date.
- name: aborts_plugin_sum
  description: Total number of plugin process abort events for this client on the submission date.
- name: active_addons_count_mean
  description: Mean number of active add-ons across subsessions for this client on the submission date.
- name: active_experiment_branch
  description: The branch of the active legacy telemetry experiment the client was enrolled in. Deprecated; always null in recent data.
- name: active_experiment_id
  description: The ID of the active legacy telemetry experiment the client was enrolled in. Deprecated; always null in recent data.
- name: active_hours_sum
  description: Total active browsing time in hours for this client on the submission date, summed across all subsessions.
- name: ad_clicks_count_all
  description: Total number of ad clicks recorded across all search providers on the submission date.
- name: addon_compatibility_check_enabled
  description: Whether add-on compatibility checking is enabled for this client. True if compatibility checks are enforced.
- name: blocklist_enabled
  description: Whether the Firefox add-on blocklist is enabled for this client. True if blocklist enforcement is active.
- name: bookmark_migrations_quantity_all
  description: Total number of bookmarks migrated from all browsers on the submission date.
- name: bookmark_migrations_quantity_chrome
  description: Number of bookmarks migrated from Google Chrome on the submission date.
- name: bookmark_migrations_quantity_edge
  description: Number of bookmarks migrated from Microsoft Edge on the submission date.
- name: bookmark_migrations_quantity_safari
  description: Number of bookmarks migrated from Apple Safari on the submission date.
- name: client_clock_skew_mean
  description: Mean difference in hours between the client's reported time and the server's reception time, averaged across subsessions.
- name: client_submission_latency_mean
  description: Mean time in hours between a ping being created and it being received by the server, averaged across subsessions.
- name: content_crash_count
  description: Number of content (tab) process crashes detected for this client on the submission date.
- name: cpu_cores
  description: Number of physical CPU cores on the client's machine.
- name: cpu_count
  description: Number of logical CPUs (including hyperthreaded cores) on the client's machine.
- name: cpu_family
  description: The CPU family identifier as reported by CPUID, used to characterize the processor microarchitecture.
- name: cpu_l2_cache_kb
  description: The CPU L2 cache size in kilobytes. Desktop only; null on failure.
- name: cpu_l3_cache_kb
  description: The CPU L3 cache size in kilobytes. Desktop only; null on failure.
- name: cpu_model
  description: The CPU model identifier as reported by CPUID. Desktop only; null on failure.
- name: cpu_speed_mhz
  description: The CPU clock speed in MHz. Desktop only.
- name: cpu_stepping
  description: The CPU stepping identifier as reported by CPUID. Desktop only; null on failure.
- name: cpu_vendor
  description: The CPU vendor string (e.g., 'GenuineIntel', 'AuthenticAMD'). Desktop only; null on failure.
- name: crash_submit_attempt_content_sum
