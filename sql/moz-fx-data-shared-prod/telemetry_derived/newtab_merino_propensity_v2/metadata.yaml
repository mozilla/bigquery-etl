friendly_name: Newtab Merino Priors v2
description: |-
  Analyzes clickthrough rates of the same items in different positions/formats to create a
  propensity weight score that is independent of content.  These weights can be used to inform
  other ranking jobs. The 'any' format is a average propensity by position, weighted by the
  prevalence of formats. The weight is designed to be divided into the impressions
  (impressions/weight). The value is normalized such that the total re-weighted impressions
  for all live content in a typical period should be about the same as the raw impressions.
  This version is partitioned by snapshot_date so daily outputs can be retained and backfilled.
owners:
- mmiermans@mozilla.com
- rrando@mozilla.com
labels:
  incremental: true
  owner: cbeck
  dag: bqetl_merino_newtab_priors_to_gcs
  owner1: mmiermans
  owner2: rrando
scheduling:
  dag_name: bqetl_merino_newtab_priors_to_gcs
  date_partition_parameter: snapshot_date
  arguments:
  - --date
  - '{{ ds }}'
  - --project
  - moz-fx-data-shared-prod
  - --destination_dataset
  - telemetry_derived
  - --destination_table
  - newtab_merino_propensity_v2
  referenced_tables:
  - - moz-fx-data-shared-prod
    - firefox_desktop
    - newtab_content_live
bigquery:
  time_partitioning:
    type: day
    field: snapshot_date
    require_partition_filter: false
    expiration_days: null
  clustering:
    fields:
    - country
    - layout
    - position
    - tile_format
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
  - workgroup:mozsoc-ml/developers
  - workgroup:mozsoc-ml/service
references:
  checks.sql:
  - ..
