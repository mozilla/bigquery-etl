friendly_name: Glean Event Counts
description: |-
  Event counts per ping and app id across all Glean apps. Derived from a 10% sample (sample_id 0-9).
  Has additional dimensions compared to v1 table.
owners:
- bewu@mozilla.com
labels:
  incremental: true
  dag: bqetl_monitoring
  owner1: bewu
scheduling:
  dag_name: bqetl_monitoring
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: null
    expiration_days: null
  clustering:
    fields:
    - app_id
    - event_category
    - event_name
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
