friendly_name: Top 10 Content Decoding Errors
description: |-
  Daily counts of Firefox Desktop content decoding errors by top-level site,
  covering the last 30 days. Includes per-site counts for the top 10 sites
  by error volume in that window, along with an all-sites total and a
  top-10 total series. Filter by `submission_date` to restrict to a
  specific day or sub-range within the 30-day window.
