fields:
- name: start_date
  type: DATE
  mode: NULLABLE
  description: Start date of the experiment or rollout
- name: experimenter_slug
  type: STRING
  mode: NULLABLE
  description: Experimenter slug identifying the experiment or rollout
- name: is_rollout
  type: BOOLEAN
  mode: NULLABLE
  description: Whether this is a rollout (true) or an experiment (false)
- name: app_name
  type: STRING
  mode: NULLABLE
  description: The name of the Mozilla application that generated the telemetry event
    (e.g., 'firefox_desktop', 'fenix', 'firefox_ios', 'mozilla_vpn'). Used to distinguish
    telemetry across Mozilla's suite of products.
- name: channel
  type: STRING
  mode: NULLABLE
  description: The Firefox release channel through which the client received its build,
    such as 'release', 'beta', 'aurora', or 'esr'. Used to segment data by product
    maturity and release train.
- name: min_version
  type: STRING
  mode: NULLABLE
  description: Minimum Firefox version from experiment targeting
- name: max_version
  type: STRING
  mode: NULLABLE
  description: Maximum Firefox version from experiment targeting
- name: end_date
  type: DATE
  mode: NULLABLE
  description: End date of the experiment or rollout
- name: metric_type
  type: STRING
  mode: NULLABLE
  description: The collection methodology or storage format of the metric, such as
    'histogram-exponential', 'scalar', or 'keyed-scalar'. Determines how the metric
    values should be interpreted and aggregated.
- name: metric_name
  type: STRING
  mode: NULLABLE
  description: A short, human-readable label identifying the type of metric being
    tracked, such as 'uri_count' or 'active_ticks'. Used to distinguish among different
    measurement concepts within the same dataset.
- name: sample_rate
  type: FLOAT64
  mode: NULLABLE
  description: Fraction of clients sampled (bucketConfig count / total)
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
