friendly_name: Glean Event Counts
description: |-
  Event counts per ping and app id across all Glean apps. Derived from a 10% sample (sample_id 0-9).
  Has additional dimensions compared to v1 table.
owners:
- bewu@mozilla.com
labels:
  incremental: true
scheduling:
  dag_name: bqetl_monitoring
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partitions_filter: false
  clustering:
    fields:
      - app_id
      - event_category
      - event_name
