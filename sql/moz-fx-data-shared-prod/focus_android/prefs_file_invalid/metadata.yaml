friendly_name: App-specific view for Glean ping "prefs-file-invalid"
description: |-
  This a view that UNIONs the stable ping tables
  across all channels of the Glean application "Firefox Focus for Android"
  (org_mozilla_focus.prefs_file_invalid, org_mozilla_focus_beta.prefs_file_invalid, org_mozilla_focus_nightly.prefs_file_invalid).

  It is used by Looker.
owners: []
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  view.sql:
  - moz-fx-data-shared-prod.org_mozilla_focus.prefs_file_invalid
  - moz-fx-data-shared-prod.org_mozilla_focus_beta.prefs_file_invalid
  - moz-fx-data-shared-prod.org_mozilla_focus_nightly.prefs_file_invalid
