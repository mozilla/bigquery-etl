fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: sample_id
  type: INTEGER
  mode: NULLABLE
  description: "A deterministic sample bucket identifier (0\u201399) derived from\
    \ the client_id, used to create reproducible random samples of the user population\
    \ for analysis or experimentation."
- name: os
  type: STRING
  mode: NULLABLE
  description: The raw operating system name as reported by the client, such as 'Windows_NT',
    'Darwin', 'Linux', 'Android', or 'iOS'. This is the unprocessed OS string before
    normalization.
- name: os_version
  type: STRING
  mode: NULLABLE
  description: The full version string of the operating system on which the browser
    is running (e.g., '10.0', '13.5.1'). Combines major, minor, and patch components
    into a single human-readable string.
- name: country
  type: STRING
  mode: NULLABLE
  description: The ISO 3166-1 alpha-2 country code (e.g., 'US', 'DE', 'FR') derived
    from the client's IP address or profile geography. Used for geographic segmentation
    of telemetry data.
- name: client_used_private_mode
  type: BOOLEAN
  mode: NULLABLE
  description: Flag indicating if cllient visited 1 or more private URIs
- name: client_had_negative_uri_count_private
  type: BOOLEAN
  mode: NULLABLE
  description: Client had negative private URI count on submission date (indicates
    bad data)
- name: client_negative_uri_count_normal
  type: BOOLEAN
  mode: NULLABLE
  description: Client had negative normal URI count on submission date (indicates
    bad data)
- name: total_uri_count_private_mode
  type: INTEGER
  mode: NULLABLE
  description: Count of URIs Visited in Private Mode
- name: total_uri_count_normal_mode
  type: INTEGER
  mode: NULLABLE
  description: Count of URIs Visited in Normal Mode
