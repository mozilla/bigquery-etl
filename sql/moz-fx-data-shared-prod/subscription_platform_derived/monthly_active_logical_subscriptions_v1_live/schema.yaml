fields:
- name: id
  type: STRING
  mode: NULLABLE
  description: |-
    Monthly snapshot record ID.
- name: month_start_date
  type: DATE
  mode: NULLABLE
  description: |-
    The start date of the month during which the logical subscription was active.
- name: month_end_date
  type: DATE
  mode: NULLABLE
  description: |-
    The end date of the month during which the logical subscription was active.
- name: logical_subscriptions_history_id
  type: STRING
  mode: NULLABLE
  description: |-
    ID of the `logical_subscriptions_history_v1` record this monthly snapshot record was derived from.
- name: subscription
  type: RECORD
  mode: NULLABLE
  description: |-
    The logical subscription as it ostensibly was at the end of the month.
  fields: !include-fields
    table: moz-fx-data-shared-prod.subscription_platform_derived.logical_subscriptions_history_v1
    parent_field: subscription
- name: was_active_at_month_start
  type: BOOLEAN
  mode: NULLABLE
  description: |-
    Whether the subscription was active at the start of the month.
- name: was_active_at_month_end
  type: BOOLEAN
  mode: NULLABLE
  description: |-
    Whether the subscription was active at the end of the month.
