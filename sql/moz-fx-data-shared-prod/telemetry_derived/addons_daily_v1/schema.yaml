  type: INT64
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: mau
- name: is_system
  type: BOOLEAN
  mode: NULLABLE
  description: !include-field-description
    file: sql/moz-fx-data-shared-prod/telemetry_derived/telemetry_derived.yaml
    field: is_system
- name: active_hours_sum
  type: FLOAT64
  mode: NULLABLE
  description: Total active browsing hours summed across all clients that have this add-on installed, for
    the submission date.
- name: total_uri_count_sum
  type: INT64
  mode: NULLABLE
  description: Total number of URIs loaded across all clients with this add-on installed on the submission
    date, reflecting overall browsing volume.
- name: tab_open_event_count_sum
  type: INT64
  mode: NULLABLE
  description: Total number of tab-open events recorded across clients with this add-on installed on the
    submission date. Null when the scalar was not recorded.
- name: devtools_toolbox_opened_count_sum
  type: INT64
  mode: NULLABLE
  description: Total number of times the DevTools toolbox was opened across clients with this add-on installed
    on the submission date. Null when not recorded.
- name: sap_searches
  type: RECORD
  mode: NULLABLE
  description: Search access point (SAP) search counts broken down by engine (google, bing, ddg, yandex,
    amazon, other, total) for clients with this add-on installed.
  fields:
  - name: amazon
    type: INT64
    mode: NULLABLE
    description: Number of SAP searches performed on Amazon by clients with this add-on installed, within
      the sap_searches struct.
  - name: bing
    type: INT64
    mode: NULLABLE
    description: Number of SAP searches performed on Bing by clients with this add-on installed, within the
      sap_searches struct.
  - name: ddg
    type: INT64
    mode: NULLABLE
    description: Number of SAP searches performed on DuckDuckGo by clients with this add-on installed, within
      the sap_searches struct.
  - name: google
    type: INT64
    mode: NULLABLE
    description: Number of search access point (SAP) searches performed on Google by clients with this add-on
      installed, within the sap_searches struct.
  - name: other
    type: INT64
    mode: NULLABLE
    description: Number of SAP searches performed on engines other than google/bing/ddg/yandex/amazon by clients
      with this add-on installed.
  - name: total
    type: INT64
    mode: NULLABLE
    description: Total number of SAP searches across all engines by clients with this add-on installed, within
      the sap_searches struct.
  - name: yandex
    type: INT64
    mode: NULLABLE
    description: Number of SAP searches performed on Yandex by clients with this add-on installed, within
      the sap_searches struct.
- name: tagged_sap_searches
  type: RECORD
  mode: NULLABLE
  description: Tagged search access point (SAP) search counts — searches that carry a partner attribution
    tag — broken down by engine for clients with this add-on installed.
  fields:
  - name: amazon
    type: INT64
    mode: NULLABLE
    description: Number of tagged SAP searches on Amazon by clients with this add-on installed, within the
      tagged_sap_searches struct.
  - name: bing
    type: INT64
    mode: NULLABLE
    description: Number of tagged SAP searches on Bing by clients with this add-on installed, within the tagged_sap_searches
      struct.
  - name: ddg
    type: INT64
    mode: NULLABLE
    description: Number of tagged SAP searches on DuckDuckGo by clients with this add-on installed, within
      the tagged_sap_searches struct.
  - name: google
    type: INT64
    mode: NULLABLE
    description: Number of tagged SAP searches on Google by clients with this add-on installed, within the
      tagged_sap_searches struct.
  - name: other
    type: INT64
    mode: NULLABLE
    description: Number of tagged SAP searches on other engines by clients with this add-on installed, within
      the tagged_sap_searches struct.
  - name: total
    type: INT64
    mode: NULLABLE
    description: Total tagged SAP searches across all engines by clients with this add-on installed, within
      the tagged_sap_searches struct.
  - name: yandex
    type: INT64
    mode: NULLABLE
    description: Number of tagged SAP searches on Yandex by clients with this add-on installed, within the
      tagged_sap_searches struct.
