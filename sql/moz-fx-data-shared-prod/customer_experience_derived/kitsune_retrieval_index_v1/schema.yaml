fields:
- name: creation_date
  type: DATE
  mode: NULLABLE
  description: Date when the Kitsune support question was originally created.
- name: question_id
  type: INTEGER
  mode: NULLABLE
  description: Unique identifier for the support question in Kitsune (SUMO).
- name: answer_id
  type: INTEGER
  mode: NULLABLE
  description: Unique identifier for the answer associated with the question; NULL when no answer exists.
- name: title
  type: STRING
  mode: NULLABLE
  description: Title of the support question as submitted by the user on Kitsune (SUMO).
- name: content
  type: STRING
  mode: NULLABLE
  description: Full text body of the support question as submitted by the user on Kitsune (SUMO).
- name: product
  type: STRING
  mode: NULLABLE
  description: Mozilla product associated with the support question.
      Normalized via `moz-fx-data-shared-prod.static.cx_product_mappings_v1`
      (source = 'Kitsune'); falls back to the raw upstream value when no mapping exists.
- name: locale
  type: STRING
  mode: NULLABLE
  description: Set of language- and/or country-based preferences for a user interface.
- name: topic
  type: STRING
  mode: NULLABLE
  description: Topic category assigned to the support question on Kitsune (SUMO).
- name: tier1_topic
  type: STRING
  mode: NULLABLE
  description: Top-level topic classification for the support question from the Kitsune topic hierarchy.
- name: tier2_topic
  type: STRING
  mode: NULLABLE
  description: Second-level topic classification for the support question from the Kitsune topic hierarchy.
- name: tier3_topic
  type: STRING
  mode: NULLABLE
  description: Third-level topic classification for the support question from the Kitsune topic hierarchy.
- name: answer_content
  type: STRING
  mode: NULLABLE
  description: Full text body of the answer to the support question. NULL when no answer exists.
- name: answer_latency_seconds
  type: INTEGER
  mode: NULLABLE
  description: Whole-second latency between the question's creation timestamp and the answer's creation timestamp.
    NULL when no answer exists. Divide by 60 or 3600 for minutes / hours. Reflects the answer state at the last
    partition write — re-running the partition will pick up later answers and surface their latencies.
- name: type
  type: STRING
  mode: NULLABLE
  description: Type of the Kitsune content record; currently always set to "question".
- name: is_self_answer
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the question author also posted the answer (self-answer).
- name: is_firefox_product
  type: BOOLEAN
  mode: NULLABLE
  description: Whether the support question is associated with a Firefox product (Desktop, Mobile, iOS, or Enterprise).
- name: num_helpful_votes
  type: INTEGER
  mode: NULLABLE
  description: Number of helpful votes the answer has received from Kitsune users.
- name: num_unhelpful_votes
  type: INTEGER
  mode: NULLABLE
  description: Number of unhelpful votes the answer has received from Kitsune users.
- name: question_summary_llm
  type: STRING
  mode: NULLABLE
  description: AI-generated summary of the support question, limited to a maximum of 8 words.
    Produced by the Gemini model.
- name: question_category_llm
  type: STRING
  mode: NULLABLE
  description: AI-generated classification label for the support question, consisting of one to two words.
    Produced by the Gemini model.
- name: question_language_llm
  type: STRING
  mode: NULLABLE
  description: AI-detected BCP 47 language tag (e.g., en-US, es-MX) for the support question content.
    Produced by the Gemini model.
- name: question_entities_llm
  type: STRING
  mode: REPEATED
  description: Array of up to three AI-extracted normalized entities from the support question.
    Produced by the Gemini model.
- name: question_topics_llm
  type: STRING
  mode: REPEATED
  description: Array of up to three AI-generated normalized topic labels for the support question.
    Produced by the Gemini model.
- name: question_sentiment_score
  type: FLOAT
  mode: NULLABLE
  description: AI-generated sentiment score ranging from -1.0 (very negative) to 1.0 (very positive),
    with 0 as neutral. Produced by the Gemini model. NULLed at write time when the model returns a value
    outside [-1, 1]; out-of-range values are still tracked in `metadata.failure_reasons`.
- name: embedding
  type: FLOAT
  mode: REPEATED
  description: Vector embedding of the concatenated title and content.
    Generated by the Gemini embedding model (gemini-embedding-001).
- name: metadata
  type: RECORD
  mode: NULLABLE
  description: Technical metadata about the AI analysis pipeline, including model versions, quality scores, and processing status.
  fields:
  - name: input_fields
    type: STRING
    mode: REPEATED
    description: List of source field names used as input for the AI analysis (e.g., title, content).
  - name: input_char_count
    type: INTEGER
    mode: NULLABLE
    description: Total character count of the input text provided to the AI model.
  - name: model_version
    type: STRING
    mode: NULLABLE
    description: Version identifier of the generative AI model used for analysis (e.g., gemini-2.5-pro).
  - name: embedding_version
    type: STRING
    mode: NULLABLE
    description: Version identifier of the embedding model used to generate the vector embedding (e.g., gemini-embedding-001).
  - name: prompt_version
    type: STRING
    mode: NULLABLE
    description: Version identifier of the prompt used for the AI analysis (e.g., v1).
  - name: analysis_timestamp
    type: TIMESTAMP
    mode: NULLABLE
    description: Ingestion timestamp — captures the actual wall-clock time when this row's
      AI analysis was produced (`CURRENT_TIMESTAMP()` at query run). Distinct from the
      partition date (`creation_date`), which reflects when the question itself was
      created. Backfills and re-runs will record their own run time here.
  - name: embedding_succeeded
    type: BOOLEAN
    mode: NULLABLE
    description: TRUE when `embedding IS NOT NULL`. **This is the sole driver for reprocessing today** —
      partitions are re-run for rows where `embedding_succeeded = FALSE`. LLM-field issues are tracked in
      `failure_reasons` for visibility but do **not** trigger reruns.
  - name: failure_reasons
    type: STRING
    mode: REPEATED
    description: Diagnostic tags for any quality check that failed on this row. Empty array when every check passes.
      Possible tags - `embedding_missing`, `question_summary_llm_missing`, `question_category_llm_missing`, `question_language_llm_missing`,
      `question_sentiment_score_missing`, `question_sentiment_score_out_of_range`, `question_entities_llm_missing`,
      `question_entities_llm_has_empty_elements`, `question_topics_llm_missing`, `question_topics_llm_has_empty_elements`.
      Use for triage (`SELECT reason, COUNT(*) FROM ..., UNNEST(metadata.failure_reasons) reason GROUP BY 1`).
