fields:
- name: id
  type: STRING
  mode: NULLABLE
  description: |-
    Revised changelog ID.
- name: timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: |-
    When the change occurred.
- name: type
  type: STRING
  mode: NULLABLE
  description: |-
    Type of revised changelog.
    "original" indicates the changelog wasn't altered from what Fivetran synced.
    "adjusted_..." indicates a minor adjustment was made, like altering when the change was considered to have occurred.
    "synthetic_..." indicates the changelog was synthesized based on other available data.
- name: stripe_subscriptions_changelog_id
  type: STRING
  mode: NULLABLE
  description: |-
    ID of the `stripe_external.subscriptions_changelog_v1` record this changelog was derived from.
- !include-field
  table: moz-fx-data-shared-prod.stripe_external.subscriptions_changelog_v1
  field: subscription
  new_fields: !include-fields
    table: moz-fx-data-shared-prod.stripe_external.subscriptions_changelog_v1
    parent_field: subscription
    field_replacements:
    - name: metadata
      type: RECORD
      mode: NULLABLE
      description: |-
        Set of key-value pairs attached to the subscription.
      fields:
      - name: appliedPromotionCode
        type: STRING
        mode: NULLABLE
        description: |-
          Promotion code applied to the subscription (if any).
      - name: cancellation_reason
        type: STRING
        mode: NULLABLE
        description: |-
          Reason the subscription was canceled (if any).
      - name: cancelled_for_customer_at
        type: TIMESTAMP
        mode: NULLABLE
        description: |-
          When the customer canceled the subscription, if they've done so.
      - name: plan_change_date
        type: TIMESTAMP
        mode: NULLABLE
        description: |-
          The most recent time when the subscription plan was changed (if any).
      - name: previous_plan_id
        type: STRING
        mode: NULLABLE
        description: |-
          ID of the previous plan the customer was subscribed to via this subscription (if any).
      - name: currency
        type: STRING
        mode: NULLABLE
        description: |-
          ISO 4217 code for the actual plan currency, possibly in lowercase.
          This may differ from `subscription.items[0].plan.currency` if multi-currency prices are being used.
      - name: amount
        type: INTEGER
        mode: NULLABLE
        description: |-
          The actual plan amount in whole cents to be charged.
          This may differ from `subscription.items[0].plan.amount` if multi-currency prices are being used.
      - name: session_flow_id
        type: STRING
        mode: NULLABLE
        description: |-
          ID of the subscription flow which resulted in the creation of the subscription.
      - name: session_entrypoint
        type: STRING
        mode: NULLABLE
        description: |-
          The `entrypoint` attribution parameter from the subscription flow which resulted in the creation of the subscription.
      - name: session_entrypoint_experiment
        type: STRING
        mode: NULLABLE
        description: |-
          The `entrypoint_experiment` attribution parameter from the subscription flow which resulted in the creation of the subscription.
      - name: session_entrypoint_variation
        type: STRING
        mode: NULLABLE
        description: |-
          The `entrypoint_variation` attribution parameter from the subscription flow which resulted in the creation of the subscription.
      - name: utm_campaign
        type: STRING
        mode: NULLABLE
        description: |-
          The `utm_campaign` attribution parameter from the subscription flow which resulted in the creation of the subscription.
      - name: utm_content
        type: STRING
        mode: NULLABLE
        description: |-
          The `utm_content` attribution parameter from the subscription flow which resulted in the creation of the subscription.
      - name: utm_medium
        type: STRING
        mode: NULLABLE
        description: |-
          The `utm_medium` attribution parameter from the subscription flow which resulted in the creation of the subscription.
      - name: utm_source
        type: STRING
        mode: NULLABLE
        description: |-
          The `utm_source` attribution parameter from the subscription flow which resulted in the creation of the subscription.
      - name: utm_term
        type: STRING
        mode: NULLABLE
        description: |-
          The `utm_term` attribution parameter from the subscription flow which resulted in the creation of the subscription.
