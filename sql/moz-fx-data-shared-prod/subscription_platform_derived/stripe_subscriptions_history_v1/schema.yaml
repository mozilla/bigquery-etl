fields:
- mode: NULLABLE
  name: customer_id
  type: STRING
  description: The hashed unique identifier for the customer in the billing system.
    Used to associate subscriptions and transactions with a specific customer account.
- mode: NULLABLE
  name: fxa_uid
  type: STRING
  description: The hashed Firefox Accounts user identifier (UID) uniquely identifying
    a Mozilla account holder. Used to link subscription and event records to a specific
    FxA user.
- mode: NULLABLE
  name: subscription_id
  type: STRING
  description: Unique identifier for a subscription record, scoped to the originating
    platform (e.g., Apple App Store, Google Play, Stripe). The format encodes the
    platform and key subscription metadata.
- mode: NULLABLE
  name: subscription_item_id
  type: STRING
  description: Unique identifier for an individual subscription line item within the
    subscription, typically a Stripe subscription item ID (e.g., 'si_...'). Used to
    reference a specific plan or product within a subscription.
- mode: NULLABLE
  name: synced_at
  type: TIMESTAMP
  description: The timestamp at which the subscription record was last synchronized
    from the upstream provider into the data warehouse. Used to track data freshness
    and identify recently updated records.
- mode: NULLABLE
  name: valid_from
  type: TIMESTAMP
  description: The timestamp at which the record version became effective, used to
    track the start of a validity window in slowly changing dimension tables. Records
    with earlier timestamps represent prior states of the same entity.
- mode: NULLABLE
  name: valid_to
  type: TIMESTAMP
  description: The timestamp at which the record version ceased to be effective, marking
    the end of its validity window. A sentinel value of 9999-12-31T23:59:59.999999+00:00
    indicates the record is the current, active version.
- mode: NULLABLE
  name: created
  type: TIMESTAMP
  description: Timestamp at which the subscription or related object was originally
    created in the billing system.
- mode: NULLABLE
  name: trial_start
  type: TIMESTAMP
  description: The timestamp at which the subscription's free trial period began.
    Null for subscriptions that do not have a trial period.
- mode: NULLABLE
  name: trial_end
  type: TIMESTAMP
  description: The timestamp at which the subscription's free trial period ended or
    is scheduled to end. Null for subscriptions that do not have a trial period.
- mode: NULLABLE
  name: subscription_start_date
  type: TIMESTAMP
  description: The timestamp representing the date when the subscription started,
    typically the first billing date or activation date. Null when the subscription
    start date is not available.
- mode: NULLABLE
  name: cancel_at
  type: TIMESTAMP
  description: Timestamp at which the subscription is scheduled to be cancelled in
    the future. Null if no future cancellation has been scheduled.
- mode: NULLABLE
  name: cancel_at_period_end
  type: BOOLEAN
  description: Indicates whether the subscription is set to cancel at the end of the
    current billing period. True means cancellation is pending at period end; false
    means no such cancellation is scheduled.
- mode: NULLABLE
  name: canceled_at
  type: TIMESTAMP
  description: Timestamp at which the subscription was actually cancelled. Null if
    the subscription has not been cancelled.
- mode: NULLABLE
  name: canceled_for_customer_at
  type: STRING
  description: Timestamp at which the subscription was cancelled from the customer's
    perspective, which may differ from the system-level cancellation time. Null if
    the subscription has not been cancelled for the customer.
- mode: NULLABLE
  name: ended_at
  type: TIMESTAMP
  description: The timestamp at which the subscription or period ended. Represents
    the scheduled or actual end date/time of the subscription term.
- mode: NULLABLE
  name: status
  type: STRING
  description: The current lifecycle status of the subscription, such as 'active',
    'expired', 'revoked', or 'in billing retry period'.
- mode: NULLABLE
  name: product_id
  type: STRING
  description: The unique identifier for the Mozilla subscription product in the provider's
    billing system, such as a Stripe product ID or an Apple/Google app bundle identifier.
- mode: NULLABLE
  name: product_name
  type: STRING
  description: The display name of the Mozilla subscription product, such as 'Mozilla
    VPN', 'Relay Premium', or 'Mozilla VPN & Firefox Relay'.
- mode: REPEATED
  name: product_capabilities
  type: STRING
  description: An array of capability identifiers granted to the subscriber at the
    product level, used for access control and feature entitlement across all plans
    within that product.
- mode: NULLABLE
  name: plan_id
  type: STRING
  description: The unique identifier for the subscription plan as defined in the provider's
    billing system, such as a Stripe price ID or an Apple/Google in-app product identifier.
- mode: NULLABLE
  name: plan_started_at
  type: TIMESTAMP
  description: The timestamp at which the subscription plan became active in the billing
    system. Null when this information is not available or applicable.
- mode: NULLABLE
  name: plan_ended_at
  type: TIMESTAMP
  description: The timestamp at which the subscription plan was retired or ended in
    the billing system. Null indicates the plan is still active or this information
    is not available.
- mode: NULLABLE
  name: plan_name
  type: STRING
  description: The human-readable display name of the subscription plan as configured
    in the billing system, which may include locale, currency, or frequency information
    (e.g., 'USD English Daily').
- mode: REPEATED
  name: plan_capabilities
  type: STRING
  description: An array of capability identifiers granted to the subscriber by the
    specific subscription plan, used for access control and feature entitlement.
- mode: NULLABLE
  name: plan_amount
  type: INTEGER
  description: The price of the subscription plan in the smallest currency unit (e.g.,
    cents for USD), as defined in the provider's billing system. Use plan_currency
    to interpret the unit.
- mode: NULLABLE
  name: billing_scheme
  type: STRING
  description: The billing scheme used to calculate the subscription charge. A value
    of 'per_unit' means the customer is charged a fixed price per unit quantity.
- mode: NULLABLE
  name: plan_currency
  type: STRING
  description: The ISO 4217 lowercase currency code for the subscription plan's pricing
    (e.g., 'usd', 'eur', 'gbp').
- mode: NULLABLE
  name: plan_interval
  type: STRING
  description: The billing interval unit for the subscription plan, either 'month'
    for monthly billing or 'year' for annual billing.
- mode: NULLABLE
  name: plan_interval_count
  type: INTEGER
  description: The number of interval units that make up one billing cycle for the
    subscription plan. For example, a value of 1 with a monthly interval means a standard
    monthly plan, while 6 with a monthly interval means a semi-annual plan.
- mode: NULLABLE
  name: plan_interval_timezone
  type: STRING
  description: The timezone used to determine billing interval boundaries for the
    subscription plan, expressed as a timezone name (e.g., 'America/Los_Angeles').
- mode: NULLABLE
  name: provider
  type: STRING
  description: The subscription or payment provider managing the subscription, such
    as 'Stripe', 'Paypal', 'Google Play', or 'Apple Store'.
- mode: NULLABLE
  name: country
  type: STRING
  description: Two-letter ISO country code associated with the subscription or customer
    record, typically derived from billing or geolocation data. Null if the country
    could not be determined.
- mode: NULLABLE
  name: state
  type: STRING
  description: The US state or Canadian province code associated with the subscriber's
    billing address. Null when the subscriber is located outside of a region that
    uses state-level codes.
- mode: NULLABLE
  name: has_refunds
  type: BOOLEAN
  description: Indicates whether the subscription has had any refunds processed, regardless
    of reason. True when at least one refund has been issued; false otherwise. Null
    when refund data is unavailable.
- mode: NULLABLE
  name: has_fraudulent_charges
  type: BOOLEAN
  description: Indicates whether the subscription has been associated with any fraudulent
    charges. True when at least one fraudulent charge has been detected; false otherwise.
    Null when fraud assessment data is unavailable.
- mode: NULLABLE
  name: has_fraudulent_charge_refunds
  type: BOOLEAN
  description: Indicates whether the subscription has had any refunds issued specifically
    due to fraudulent charges. True when at least one fraudulent charge refund has
    been processed; false otherwise.
- mode: REPEATED
  name: promotion_codes
  type: STRING
  description: An array of promotion codes that have been applied to the subscription,
    capturing all codes used across the subscription's lifetime.
- mode: NULLABLE
  name: promotion_discounts_amount
  type: INTEGER
  description: The total monetary discount amount applied to the subscription through
    promotions, expressed in the smallest currency unit (e.g., cents). Null when no
    promotional discount is present.
- name: attribution
  type: RECORD
  mode: NULLABLE
  fields:
  - name: flow_id
    type: STRING
    mode: NULLABLE
  - name: entrypoint
    type: STRING
    mode: NULLABLE
  - name: entrypoint_experiment
    type: STRING
    mode: NULLABLE
  - name: entrypoint_variation
    type: STRING
    mode: NULLABLE
  - name: utm_campaign
    type: STRING
    mode: NULLABLE
  - name: utm_content
    type: STRING
    mode: NULLABLE
  - name: utm_medium
    type: STRING
    mode: NULLABLE
  - name: utm_source
    type: STRING
    mode: NULLABLE
  - name: utm_term
    type: STRING
    mode: NULLABLE
