fields:
- mode: NULLABLE
  name: submission_date
  type: DATE
  description: The UTC calendar date on which a ping or record was received by Mozilla's
    ingestion pipeline. Used as the primary partitioning and filtering dimension for
    date-based analysis.
- name: nbr_unique_clients_uninstalling
  type: INTEGER
  mode: NULLABLE
  description: The count of distinct clients that uninstalled Firefox during the relevant
    period. Each client is counted only once regardless of how many uninstall signals
    were received.
