fields:
- name: logName
  type: STRING
  mode: NULLABLE
  description: The resource name of the log to which this log entry belongs.
- name: resource
  type: RECORD
  mode: NULLABLE
  description: The monitored resource that produced this log entry.
  fields:
  - name: type
    type: STRING
    mode: NULLABLE
    description: The monitored resource type. For example, the type of a Compute Engine
      VM instance is `gce_instance`.
  - name: labels
    type: RECORD
    mode: NULLABLE
    description: GCP resource metadata labels attached to the log entry by Cloud Logging.
    fields:
    - name: instance_id
      type: STRING
      mode: NULLABLE
      description: Cloud instance identifier of the node that generated the log entry
        (e.g., 'i-xxxxxxxxxxxxxxxxx').
    - name: zone
      type: STRING
      mode: NULLABLE
      description: Availability zone of the resource (e.g., 'us-west-1').
    - name: project_id
      type: STRING
      mode: NULLABLE
      description: GCP project ID of the log source.
- name: textPayload
  type: STRING
  mode: NULLABLE
  description: The log entry payload, represented as a Unicode string (UTF-8).
- name: jsonPayload
  type: RECORD
  mode: NULLABLE
  description: The log entry payload, represented as a structure that is expressed
    as a JSON object.
  fields:
  - name: timestamp
    type: FLOAT
    mode: NULLABLE
    description: Application-level event timestamp as a Unix epoch nanoseconds float,
      as reported by the FxA service. Distinct from the top-level Cloud Logging `timestamp`.
  - name: type
    type: STRING
    mode: NULLABLE
    description: Log entry type classifier (e.g., 'amplitudeEvent').
  - name: fields
    type: RECORD
    mode: NULLABLE
    description: Application-level structured event data from the FxA service.
    fields:
    - name: domain
      type: STRING
      mode: NULLABLE
      description: Domain string associated with the event (e.g., an email domain).
    - name: locale
      type: STRING
      mode: NULLABLE
      description: BCP 47 locale string (e.g., 'en-US', 'fr-FR').
    - name: template
      type: STRING
      mode: NULLABLE
      description: Email or notification template identifier (e.g., 'verifyEmail',
        'newDeviceLogin').
    - name: flow_id
      type: STRING
      mode: NULLABLE
      description: Flow identifier for the authentication or account creation session.
        See top-level `flow_id`.
    - name: templateversion
      type: STRING
      mode: NULLABLE
      description: Email template version number.
    - name: type
      type: STRING
      mode: NULLABLE
      description: Event type classifier within the fields payload.
    - name: email
      type: STRING
      mode: NULLABLE
      description: Hashed or redacted email identifier associated with the event.
        Present only when the event is tied to a specific account action; null for
        anonymous or pre-login flows. Stored as raw bytes (hashed) in admin server
        tables. Not a raw email address.
    - name: processingtimemillis
      type: FLOAT
      mode: NULLABLE
    - name: event
      type: STRING
      mode: NULLABLE
      description: Amplitude event name.
    - name: time
      type: FLOAT
      mode: NULLABLE
      description: Event time as a Unix epoch milliseconds float.
    - name: flow_time
      type: FLOAT
      mode: NULLABLE
      description: Elapsed time in milliseconds within the current authentication
        flow.
    - name: flowid
      type: STRING
      mode: NULLABLE
      description: Flow identifier. See top-level `flow_id`.
    - name: templatename
      type: STRING
      mode: NULLABLE
    - name: flowbegintime
      type: STRING
      mode: NULLABLE
      description: Unix epoch timestamp of when the authentication flow began.
    - name: currenttime
      type: FLOAT
      mode: NULLABLE
    - name: event_type
      type: STRING
      mode: NULLABLE
      description: Event type string identifying the category of event (e.g., 'fxa_email
        - bounced', 'fxa_login - complete').
    - name: session_id
      type: STRING
      mode: NULLABLE
      description: Identifier for the user's FxA session, represented as an epoch
        millisecond timestamp.
    - name: user_properties
      type: STRING
      mode: NULLABLE
      description: Structured user properties for the amplitude event, as a JSON string.
    - name: event_properties
      type: STRING
      mode: NULLABLE
      description: Structured event properties for the amplitude event, as a JSON
        string.
    - name: op
      type: STRING
      mode: NULLABLE
      description: Operation or action type associated with the event.
    - name: app_version
      type: STRING
      mode: NULLABLE
      description: Firefox Accounts application version at the time of the event (e.g.,
        '152.1', '195.0').
    - name: language
      type: STRING
      mode: NULLABLE
      description: BCP 47 language tag for the user's locale at the time of the event
        (e.g., 'en-US', 'de').
    - name: bounced
      type: BOOLEAN
      mode: NULLABLE
    - name: action
      type: STRING
      mode: NULLABLE
      description: Action type associated with the event.
    - name: bouncetype
      type: STRING
      mode: NULLABLE
    - name: bounce
      type: BOOLEAN
      mode: NULLABLE
    - name: status
      type: STRING
      mode: NULLABLE
      description: HTTP or application status code for the event.
    - name: bouncesubtype
      type: STRING
      mode: NULLABLE
    - name: lang
      type: STRING
      mode: NULLABLE
      description: Language code from the event payload. See `jsonPayload.fields.language`
        for the primary language field.
    - name: diagnosticcode
      type: STRING
      mode: NULLABLE
    - name: uid
      type: STRING
      mode: NULLABLE
      description: Raw FxA user identifier. Use `user_id` for the hashed version.
    - name: err
      type: STRING
      mode: NULLABLE
      description: Error details associated with the event, if any.
    - name: complaint
      type: BOOLEAN
      mode: NULLABLE
    - name: complaintfeedbacktype
      type: STRING
      mode: NULLABLE
    - name: complaintuseragent
      type: STRING
      mode: NULLABLE
    - name: url
      type: STRING
      mode: NULLABLE
      description: URL associated with the event.
    - name: user_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA user identifier, hex-encoded.
    - name: config
      type: STRING
      mode: NULLABLE
      description: Configuration metadata associated with the event.
    - name: amplitudeevent
      type: STRING
      mode: NULLABLE
    - name: host
      type: STRING
      mode: NULLABLE
      description: Hostname of the server handling the request.
    - name: msg
      type: STRING
      mode: NULLABLE
      description: Log message string from the structured event payload.
    - name: error
      type: STRING
      mode: NULLABLE
      description: Error message or details associated with the event.
    - name: port
      type: FLOAT
      mode: NULLABLE
      description: Network port number associated with the request.
    - name: device_id
      type: STRING
      mode: NULLABLE
      description: SHA-256 hashed FxA device identifier, hex-encoded.
  - name: severity
    type: FLOAT
    mode: NULLABLE
    description: Application-level numeric log severity from the FxA service payload,
      using syslog-style levels (6=informational, 2=critical). Distinct from the top-level
      Cloud Logging `severity` STRING field.
  - name: logger
    type: STRING
    mode: NULLABLE
    description: Name of the logger or component that emitted the log entry (e.g.,
      'fxa-auth-server', 'fxa-content-server').
  - name: envversion
    type: STRING
    mode: NULLABLE
    description: Log envelope version used by the FxA logging framework.
  - name: pid
    type: FLOAT
    mode: NULLABLE
    description: Process ID of the FxA service instance that generated the log entry.
- name: timestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the event described by the log entry occurred, as reported
    by the originating FxA service.
- name: receiveTimestamp
  type: TIMESTAMP
  mode: NULLABLE
  description: The time the log entry was received by Logging.
- name: severity
  type: STRING
  mode: NULLABLE
  description: The severity of the log entry. The default value is `LogSeverity.DEFAULT`.
- name: insertId
  type: STRING
  mode: NULLABLE
  description: A unique identifier for the log entry. Logging considers other log
    entries in the same project, with the same `timestamp`, and with the same `insertId`
    to be duplicates which are removed in a single query result.
- name: httpRequest
  type: RECORD
  mode: NULLABLE
  description: Information about the HTTP request associated with this log entry,
    if applicable.
  fields:
  - name: requestMethod
    type: STRING
    mode: NULLABLE
    description: 'The request method. Examples: "GET", "HEAD", "PUT", "POST".'
  - name: requestUrl
    type: STRING
    mode: NULLABLE
    description: The scheme (http, https), the host name, the path and the query portion
      of the URL that was requested.
  - name: requestSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP request message in bytes, including the request
      headers and the request body.
  - name: status
    type: INTEGER
    mode: NULLABLE
    description: 'The response code indicating the status of response. Examples: 200,
      404.'
  - name: responseSize
    type: INTEGER
    mode: NULLABLE
    description: The size of the HTTP response message sent back to the client, in
      bytes.
  - name: userAgent
    type: STRING
    mode: NULLABLE
    description: The user agent sent by the client.
  - name: remoteIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the client that issued the HTTP
      request.
  - name: serverIp
    type: STRING
    mode: NULLABLE
    description: The IP address (IPv4 or IPv6) of the origin server that the request
      was sent to.
  - name: referer
    type: STRING
    mode: NULLABLE
    description: The referer URL of the request, as defined in HTTP/1.1 Header Field
      Definitions.
  - name: cacheLookup
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not a cache lookup was attempted.
  - name: cacheHit
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not an entity was served from cache (with or without validation).
  - name: cacheValidatedWithOriginServer
    type: BOOLEAN
    mode: NULLABLE
    description: Whether or not the response was validated with the origin server
      before being served from cache. This field is only meaningful if `cacheHit`
      is True.
  - name: cacheFillBytes
    type: INTEGER
    mode: NULLABLE
    description: The number of HTTP response bytes inserted into cache. Set only when
      a cache fill was attempted.
  - name: protocol
    type: STRING
    mode: NULLABLE
    description: 'Protocol used for the request. Examples: "HTTP/1.1", "HTTP/2".'
- name: labels
  type: RECORD
  mode: NULLABLE
  description: A map of key, value pairs that provides additional information about
    the log entry.
  fields:
  - name: env
    type: STRING
    mode: NULLABLE
    description: Deployment environment label (e.g., 'prod', 'stage').
  - name: type
    type: STRING
    mode: NULLABLE
    description: Type label from the log metadata indicating the log source category
      (e.g., 'admin_panel').
  - name: stack
    type: STRING
    mode: NULLABLE
    description: Stack label from the log metadata (e.g., 'default').
  - name: compute_googleapis_com_resource_name
    type: STRING
    mode: NULLABLE
    description: GCP Compute resource name (compute.googleapis.com/resource_name),
      identifying the VM or node that generated the log entry.
  - name: application
    type: STRING
    mode: NULLABLE
    description: Application label identifying the FxA application (e.g., 'fxa').
  - name: pro
    type: STRING
    mode: NULLABLE
- name: operation
  type: RECORD
  mode: NULLABLE
  description: Information about an operation associated with the log entry, if applicable.
  fields:
  - name: id
    type: STRING
    mode: NULLABLE
    description: An arbitrary operation identifier. Log entries with the same identifier
      are assumed to be part of the same operation.
  - name: producer
    type: STRING
    mode: NULLABLE
    description: An arbitrary producer identifier. The combination of `id` and `producer`
      must be globally unique.
  - name: first
    type: BOOLEAN
    mode: NULLABLE
    description: Set this to True if this is the first log entry in the operation.
  - name: last
    type: BOOLEAN
    mode: NULLABLE
    description: Set this to True if this is the last log entry in the operation.
- name: trace
  type: STRING
  mode: NULLABLE
  description: The trace ID being written to Cloud Trace in association with this
    log entry.
- name: spanId
  type: STRING
  mode: NULLABLE
  description: The ID of the Cloud Trace span associated with the current operation
    in which the log is being written.
- name: traceSampled
  type: BOOLEAN
  mode: NULLABLE
  description: The sampling decision of the span associated with the log entry at
    the time the log entry was created.
- name: sourceLocation
  type: RECORD
  mode: NULLABLE
  description: Source code location information associated with the log entry, if
    any.
  fields:
  - name: file
    type: STRING
    mode: NULLABLE
    description: Source file name. Depending on the runtime environment, this might
      be a simple name or a fully-qualified name.
  - name: line
    type: INTEGER
    mode: NULLABLE
    description: Line within the source file. 1-based; 0 indicates no line number
      available.
  - name: function
    type: STRING
    mode: NULLABLE
    description: Human-readable name of the function or method being invoked, with
      optional context such as the class or package name.
- name: split
  type: RECORD
  mode: NULLABLE
  description: Information indicating this LogEntry is part of a sequence of multiple
    log entries split from a single LogEntry.
  fields:
  - name: uid
    type: STRING
    mode: NULLABLE
    description: A globally unique identifier for all log entries in a sequence of
      split log entries.
  - name: index
    type: INTEGER
    mode: NULLABLE
    description: The index of this LogEntry in the sequence of split log entries.
  - name: totalSplits
    type: INTEGER
    mode: NULLABLE
    description: The total number of log entries that the original LogEntry was split
      into.
- name: submission_date
  type: DATE
  mode: NULLABLE
  description: DO NOT USE! This column was added accidentally and isn't populated.
