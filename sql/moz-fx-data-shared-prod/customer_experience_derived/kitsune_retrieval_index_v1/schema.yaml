fields:
- name: creation_date
  type: TIMESTAMP
  mode: NULLABLE
  description: >-
    Timestamp when the Kitsune support question was originally created.
- name: title
  type: STRING
  mode: NULLABLE
  description: >-
    Title of the support question as submitted by the user on Kitsune (SUMO).
- name: content
  type: STRING
  mode: NULLABLE
  description: >-
    Full text body of the support question as submitted by the user on Kitsune (SUMO).
- name: locale
  type: STRING
  mode: NULLABLE
  description: Set of language- and/or country-based preferences for a user interface.
- name: product
  type: STRING
  mode: NULLABLE
  description: >-
    Mozilla product that the Kitsune support question is associated with (e.g., Firefox, Thunderbird).
- name: topic
  type: STRING
  mode: NULLABLE
  description: >-
    Topic category assigned to the support question on Kitsune (SUMO).
- name: type
  type: STRING
  mode: NULLABLE
  description: >-
    Type of the Kitsune content record; currently always set to "question".
- name: is_solved
  type: BOOLEAN
  mode: NULLABLE
  description: >-
    Whether the support question has been marked as solved on Kitsune (SUMO).
- name: votes
  type: INTEGER
  mode: NULLABLE
  description: >-
    Number of votes the support question has received from Kitsune users.
- name: summary_generated
  type: STRING
  mode: NULLABLE
  description: >-
    AI-generated summary of the support question, limited to a maximum of 20 words, produced by the Gemini model.
- name: category_generated
  type: STRING
  mode: NULLABLE
  description: >-
    AI-generated classification label for the support question, consisting of one to two words, produced by the Gemini model.
- name: language_generated
  type: STRING
  mode: NULLABLE
  description: >-
    AI-detected ISO language code (e.g., en, es, fr) for the support question content, produced by the Gemini model.
- name: entities_generated
  type: STRING
  mode: REPEATED
  description: >-
    Array of up to five AI-extracted normalized entities from the support question, produced by the Gemini model.
- name: topics_generated
  type: STRING
  mode: REPEATED
  description: >-
    Array of up to three AI-generated normalized topic labels for the support question, produced by the Gemini model.
- name: sentiment_score
  type: FLOAT
  mode: NULLABLE
  description: >-
    AI-generated sentiment score ranging from -1.0 (very negative) to 1.0 (very positive), with 0 as neutral, produced by the Gemini model.
- name: embedding
  type: FLOAT
  mode: REPEATED
  description: >-
    Dense vector embedding of the concatenated title and content, generated by the Gemini embedding model (gemini-embedding-001).
- name: recency_score
  type: FLOAT
  mode: NULLABLE
  description: >-
    Exponential decay score measuring content freshness, computed as exp(-age_in_days / 7) where 7 days is the half-relevance window.
- name: metadata
  type: RECORD
  mode: NULLABLE
  description: >-
    Technical metadata about the AI analysis pipeline, including model versions, quality scores, and processing status.
  fields:
  - name: input_fields
    type: STRING
    mode: REPEATED
    description: >-
      List of source field names used as input for the AI analysis (e.g., title, content).
  - name: input_char_count
    type: INTEGER
    mode: NULLABLE
    description: >-
      Total character count of the input text provided to the AI model.
  - name: input_quality_score
    type: FLOAT
    mode: NULLABLE
    description: >-
      AI-assessed score from 0 to 1 measuring the structure, clarity, and usefulness of the source text for analysis.
  - name: model_output_quality_score
    type: FLOAT
    mode: NULLABLE
    description: >-
      Self-assessed score from 0 to 1 evaluating the accuracy, structure, and usefulness of the AI model output.
  - name: model_output_confidence_score
    type: FLOAT
    mode: NULLABLE
    description: >-
      Self-assessed score from 0 to 1 representing the overall reliability and confidence of the AI analysis.
  - name: model_version
    type: STRING
    mode: NULLABLE
    description: >-
      Version identifier of the generative AI model used for analysis (e.g., gemini-2.5-pro).
  - name: embedding_version
    type: STRING
    mode: NULLABLE
    description: >-
      Version identifier of the embedding model used to generate the vector embedding (e.g., gemini-embedding-001).
  - name: prompt_version
    type: STRING
    mode: NULLABLE
    description: >-
      Version identifier of the prompt template used for the AI analysis (e.g., v1).
  - name: analysis_timestamp
    type: STRING
    mode: NULLABLE
    description: >-
      Timestamp string recording when the AI analysis was performed.
  - name: status
    type: STRING
    mode: NULLABLE
    description: >-
      Validation status of the AI-generated output, set to SUCCESS when all generated fields pass quality checks or FAILED otherwise.
