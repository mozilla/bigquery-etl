friendly_name: New Profile Churn Clients - Desktop Glean
description: |-
  Client-level churn metrics for new Firefox Desktop profiles within their first 30 days.
  Each row represents a client on their cohort date (first_seen_date), with a boolean activity
  flag for each of days 0-30 indicating whether the client was active on that day (TRUE),
  inactive (FALSE), or whether data is not yet available (NULL). Derived churn signals include
  churn risk after 5 and 7 days, churned after 1 or 2 days of activity, and immediately churned
  (never active across the full 30-day window). Client attributes such as country, channel, OS,
  attribution, and distribution are captured from the cohort date row.

  Jira: https://mozilla-hub.atlassian.net/browse/DENG-10676
owners:
- bbaird@mozilla.com
- mhirose@mozilla.com
labels:
  incremental: true
  owner1: bbaird
  owner2: mhirose
  dag: bqetl_cohort_daily_churn
scheduling:
  dag_name: bqetl_cohort_daily_churn
bigquery:
  time_partitioning:
    type: day
    field: submission_date
    require_partition_filter: true
    expiration_days: null
  clustering:
    fields:
    - cohort_date
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:mozilla-confidential/data-viewers
references:
  query.sql:
  - moz-fx-data-shared-prod.firefox_desktop.baseline_clients_last_seen
  - moz-fx-data-shared-prod.firefox_desktop_derived.baseline_clients_first_seen_v1
  - moz-fx-data-shared-prod.firefox_desktop_derived.desktop_dau_distribution_id_history_v1
require_column_descriptions: true
