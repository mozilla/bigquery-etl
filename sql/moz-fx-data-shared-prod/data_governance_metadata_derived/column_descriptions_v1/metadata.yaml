friendly_name: Column Descriptions
description: |-
  Per-column descriptions for base tables, generated by reconciling probe
  metadata and profiling statistics with LLM-assisted enrichment. Each row
  maps a table column to its resolved description, source probe, and
  recommended base schema promotion target. Consumed by schema enrichment
  tooling to populate schema.yaml description fields.

  Schema enricher agent:
  https://github.com/mozilla/data-shared-llm-agents/tree/main/agents/schema_enricher
owners:
- cbeck@mozilla.com
- gkatre@mozilla.com
- phlee@mozilla.com
