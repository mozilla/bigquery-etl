friendly_name: FxA DB Counts Monitoring
description: |-
  Simple aggregation of counts of records in the FxA DB tables.
  Enables to identify trends within accounts data. E.g. "How many
  inactive accounts are there?"
owners:
- wclouser@mozilla.com
labels:
  incremental: true
  owner1: wclouser@mozilla.com
scheduling:
  dag_name: bqetl_accounts_derived
  date_partition_parameter: as_of_date
  # Adjust the execution delta for the task dependencies in the bqetl_accounts_db DAG
  # so this depends on the latest bqetl_accounts_db DAG run.
  depends_on:
  - dag_name: bqetl_accounts_db
    task_id: accounts_db_external__fxa_accounts__v1
    execution_delta: -21h
  - dag_name: bqetl_accounts_db
    task_id: accounts_db_external__fxa_emails__v1
    execution_delta: -21h
  - dag_name: bqetl_accounts_db
    task_id: accounts_db_external__fxa_security_events__v1
    execution_delta: -21h
bigquery:
  time_partitioning:
    type: day
    field: as_of_date
    require_partition_filter: false
    expiration_days: null
