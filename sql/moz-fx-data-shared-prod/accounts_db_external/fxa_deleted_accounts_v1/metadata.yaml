friendly_name: deletedAccounts table from production fxa database
description: |
  A mirror of the `deletedAccounts` table from the production `fxa` CloudSQL database, excluding columns containing confidential data, updated daily to match the current state of the table.
  See https://mozilla.github.io/ecosystem-platform/reference/database-structure#database-fxa
owners:
- wclouser@mozilla.com
labels:
  application: accounts_backend
  schedule: daily
  dag: bqetl_accounts_db_daily
  owner1: wclouser
scheduling:
  dag_name: bqetl_accounts_db_daily
  date_partition_parameter: null
workgroup_access:
- role: roles/bigquery.dataViewer
  members:
  - workgroup:accounts-confidential/data-viewers
references:
  query.sql:
  - EXTERNAL_QUERY('moz-fx-fxa-prod.us.fxa-rds-prod-prod-fxa', 'SELECT\n         uid,\n         deletedAt\n       FROM\n         fxa.deletedAccounts\n    ')
